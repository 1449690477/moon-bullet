  // 紫电闪电链：多段高频抖动的不规则电弧（自制特效代码，可叠加上传的贴图）
  function drawLightningBolt(x1, y1, x2, y2, k, rose) {
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    const segs = Math.max(6, Math.floor(len / 22));
    const glow = rose ? `rgba(200,150,255,${0.30 * k})` : `rgba(168,120,255,${0.32 * k})`;
    const core = rose ? `rgba(250,238,255,${0.96 * k})` : `rgba(236,228,255,${0.96 * k})`;
    ctx.globalCompositeOperation = 'lighter';
    // 画 2 条交叠抖动的电弧 + 偶发分叉
    for (let b = 0; b < 2; b++) {
      const amp = (b === 0 ? 15 : 9) * (0.6 + 0.4 * Math.random());
      const pts = [{ x: x1, y: y1 }];
      for (let s = 1; s < segs; s++) {
        const t = s / segs;
        const taper = Math.sin(t * Math.PI);           // 两端收束，中段抖动大
        const off = (Math.random() - 0.5) * 2 * amp * taper;
        pts.push({ x: x1 + dx * t + nx * off, y: y1 + dy * t + ny * off });
      }
      pts.push({ x: x2, y: y2 });
      // 外发光
      ctx.strokeStyle = glow; ctx.lineWidth = b === 0 ? 10 : 6;
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (const p of pts) ctx.lineTo(p.x, p.y); ctx.stroke();
      // 亮芯
      ctx.strokeStyle = core; ctx.lineWidth = b === 0 ? 2.6 : 1.6;
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (const p of pts) ctx.lineTo(p.x, p.y); ctx.stroke();
      // 随机分叉小电弧
      if (b === 0 && Math.random() < 0.7) {

  // 追踪弹幕：在被锁定的目标上绘制脉动锁定环（去重，每目标一枚）

    if (player.plugin !== 'homing') return;
    const seen = [];
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const s of playerShots) {
      if (!s.homing || s.tx == null) continue;
      let dup = false;
      for (const o of seen) { if (Math.abs(o.x - s.tx) < 24 && Math.abs(o.y - s.ty) < 24) { dup = true; break; } }
      if (dup) continue;
      seen.push({ x: s.tx, y: s.ty });
      const pulse = 0.6 + Math.sin(time * 7 + s.tx * 0.05) * 0.4;

  }

  // 幽灵暗刃：幽灵现身挥砍的瞬时动画（贴图以 lighter 叠加，暗背景自然消隐）
  // 七神武：整套终极演出渲染（压暗→法阵→幻影→环绕剑→锁定→飞剑→AOE 闪光）
  function drawQishenwu() {
    if (!qsw.active) return;

    let dim = 0;
    if (t < 0.4) dim = t / 0.4 * 0.32; else if (t < QSW.activeEnd) dim = 0.22; else dim = Math.max(0, 1 - (t - QSW.activeEnd) / QSW.rest) * 0.22;
    if (dim > 0) { ctx.save(); ctx.fillStyle = `rgba(6,8,20,${dim})`; ctx.fillRect(0, 0, W, H); ctx.restore(); }
    // 七神舞专属金色全屏脉冲（召唤/中段/终结时亮起）——自带主题色，避免改全局白色 flash 管线
    if (qsw.goldFlash > 0) { ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.fillStyle = `rgba(255,226,150,${Math.min(0.5, qsw.goldFlash) * vis})`; ctx.fillRect(0, 0, W, H); ctx.restore(); }
    const fade = t > QSW.activeEnd ? Math.max(0, 1 - (t - QSW.activeEnd) / (QSW.total - QSW.activeEnd)) : 1;
    ctx.save();

    if (assetReady('qswCircle')) { ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(t * 0.7); const sc = 0.7 + Math.min(t / 0.8, 1) * 0.5; ctx.globalAlpha = 0.85 * fade * vis; const cw = 300 * sc, ch = cw * (assets.qswCircle.height / assets.qswCircle.width); ctx.drawImage(assets.qswCircle, -cw / 2, -ch / 2, cw, ch); ctx.restore(); }
    if (assetReady('qswAvatar')) {
      let av; if (t < 0.3) av = t / 0.3; else if (t < QSW.intro) av = 1; else if (t < QSW.activeEnd) av = 0.28; else av = fade * 0.28;
      const pulse = 1 + Math.sin(t * 5) * 0.015;

      halo.addColorStop(0, 'rgba(255,238,180,0.55)'); halo.addColorStop(0.5, 'rgba(255,210,120,0.22)'); halo.addColorStop(1, 'rgba(255,210,120,0)');
      ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(ax, ay, ah * 0.62, 0, TAU); ctx.fill();

      ctx.drawImage(assets.qswAvatar, ax - aw / 2, ay - ah / 2, aw, ah);

      ctx.globalCompositeOperation = 'lighter';

      ctx.globalAlpha = av * vis * 0.16; ctx.drawImage(assets.qswAvatar, ax - aw * 1.13 / 2, ay - ah * 1.13 / 2, aw * 1.13, ah * 1.13);

    // 环绕展示剑：半径随时间轻微呼吸 + 转速微微脉动，让护持阵法更"活"（纯三角函数，零开销）
    const orbBreath = 1 + Math.sin(t * 2.2) * 0.06;
    for (let i = 0; i < 7; i++) {

      const ox = player.x + Math.cos(a) * 118 * orbBreath, oy = player.y - 18 + Math.sin(a) * 64 * orbBreath;

      if (assetReady(key)) { ctx.save(); ctx.translate(ox, oy); ctx.rotate(a + Math.PI / 2); ctx.globalAlpha = (0.7 + Math.sin(t * 6 + i) * 0.18) * fade * vis; const sw = 26, sh = sw * (assets[key].height / assets[key].width); ctx.drawImage(assets[key], -sw / 2, -sh / 2, sw, sh); ctx.restore(); }

    const nSw = qsw.swords.length;

    for (const s of qsw.swords) {

      const bh = 60, bw = qbk ? bh * (qbk.width / qbk.height) : 16;
      // 刃身底层金色光晕（立体厚度）——渐变较贵，弱机/剑多时跳过

        const ba = ctx.createLinearGradient(0, -bh * 0.6, 0, bh * 0.35);
        ba.addColorStop(0, 'rgba(255,245,210,0)'); ba.addColorStop(0.4, 'rgba(255,210,110,0.6)'); ba.addColorStop(0.72, 'rgba(255,170,60,0.4)'); ba.addColorStop(1, 'rgba(255,150,50,0)');
        ctx.fillStyle = ba; ctx.beginPath(); ctx.moveTo(0, -bh * 0.62); ctx.lineTo(7, bh * 0.1); ctx.lineTo(0, bh * 0.32); ctx.lineTo(-7, bh * 0.1); ctx.closePath(); ctx.fill();
      }
      // 金焰剑本体（贴图，剑尖朝飞行方向）
      if (qbk) { ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = vis; ctx.drawImage(qbk, -bw / 2, -bh * 0.62, bw, bh); if (!liteSw) { ctx.globalAlpha = 0.32 * vis; ctx.drawImage(qbk, -bw * 0.66, -bh * 0.62 * 1.05, bw * 1.32, bh * 1.05); } }
      else if (assetReady(s.tex)) { ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = vis; const sw = 30, sh = sw * (assets[s.tex].height / assets[s.tex].width); ctx.drawImage(assets[s.tex], -sw / 2, -sh / 2, sw, sh); }
      else { ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = vis; ctx.fillStyle = '#ffe7a0'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, TAU); ctx.fill(); }
      // 剑尖前冲光刺 + 白核（穿透空气感）——白核辉光弱机改用廉价实心点

      ctx.beginPath(); ctx.moveTo(0, tipY - (liteSw ? 14 : 22)); ctx.lineTo(0, tipY + 10); ctx.stroke();
      if (!liteSw) { const hg = ctx.createRadialGradient(0, tipY, 0, 0, tipY, 16); hg.addColorStop(0, 'rgba(255,250,225,0.9)'); hg.addColorStop(0.5, 'rgba(255,215,120,0.5)'); hg.addColorStop(1, 'rgba(255,190,80,0)'); ctx.globalAlpha = 0.9 * vis; ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(0, tipY, 16, 0, TAU); ctx.fill(); }

  function drawGhostSlashes() {
    if (!ghostSlashes.length) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const g of ghostSlashes) {
      const k = clamp(g.life / g.maxLife, 0, 1);   // 1 -> 0
      const appear = 1 - k;                          // 0 -> 1 进度
      // 幽灵本体（淡入淡出 + 轻微上浮）
      if (assetReady('ghostBlade')) {
        const gs = 84;
        ctx.save();
        ctx.translate(g.x, g.y - appear * 10);
        ctx.scale(g.side < 0 ? -1 : 1, 1);           // 朝向挥砍方向
        ctx.globalAlpha = Math.sin(k * Math.PI) * 0.95;
        ctx.drawImage(assets.ghostBlade, -gs / 2, -gs / 2, gs, gs);
        ctx.restore();
      }
      // 挥砍弧光（向前扫出）
      if (assetReady('vfxBladeSlash')) {
        const sl = 150 * (0.6 + appear * 0.6);
        ctx.save();
        ctx.translate(g.x + g.side * 30, g.y - 8);
        ctx.scale(g.side < 0 ? -1 : 1, 1);
        ctx.rotate(-0.5 - appear * 0.8);
        ctx.globalAlpha = Math.sin(k * Math.PI) * 0.9;

  function drawPlayerShots() {
    ctx.save();

    drawGhostSlashes();

      const a = Math.atan2(s.vy, s.vx) + Math.PI / 2;

        ctx.globalAlpha = pulse; ctx.fillStyle = 'rgba(255,255,255,0.95)';

  // 解析子弹颜色为 {r,g,b}（支持 #rgb/#rrggbb/rgba()）
  function parseColor(c) {
    if (!c) return { r: 255, g: 210, b: 110 };
    if (c[0] === '#') {
      let h = c.slice(1);
      if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
      return { r: parseInt(h.slice(0, 2), 16), g: parseInt(h.slice(2, 4), 16), b: parseInt(h.slice(4, 6), 16) };
    }
    const m = c.match(/(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
    if (m) return { r: +m[1], g: +m[2], b: +m[3] };
    return { r: 255, g: 210, b: 110 };
  }

  // ═══════════════════════════════════════════════════════════════
  // 弹幕精灵缓存：把每种「形状+颜色+半径」的圆/异形弹（含外发光+实体+
  // 描边+亮核）预渲染到离屏 canvas 一次，之后每帧只 drawImage 一次。
  // 彻底消除每帧成千上万次 createRadialGradient（Windows 卡顿主因）。
  // ═══════════════════════════════════════════════════════════════
  const _bulletSpriteCache = new Map();
  function getBulletSprite(shape, col, r) {
    const rq = Math.round(r * 2) / 2; // 半径量化到 0.5，限制缓存条目数
    const key = shape + '|' + col.r + ',' + col.g + ',' + col.b + '|' + rq;
    let spr = _bulletSpriteCache.get(key);
    if (spr) return spr;
    const body = rq * 1.5;
    const pad = Math.ceil(body * 1.9) + 3;       // 容纳外发光半径
    const size = pad * 2;
    const oc = document.createElement('canvas');
    oc.width = size; oc.height = size;
    const g = oc.getContext('2d');
    g.translate(pad, pad);
    const rimC = `rgba(${col.r * 0.3 | 0},${col.g * 0.3 | 0},${col.b * 0.3 | 0},0.95)`;
    const fillC = `rgb(${col.r},${col.g},${col.b})`;
    // 外发光（additive）
    g.globalCompositeOperation = 'lighter';
    const gl = g.createRadialGradient(0, 0, 0, 0, 0, body * 1.9);
    gl.addColorStop(0, `rgba(${col.r},${col.g},${col.b},0.5)`);
    gl.addColorStop(1, `rgba(${col.r},${col.g},${col.b},0)`);
    g.fillStyle = gl; g.beginPath(); g.arc(0, 0, body * 1.9, 0, TAU); g.fill();
    g.globalCompositeOperation = 'source-over';
    if (shape === 'orb') {
      g.fillStyle = fillC; g.beginPath(); g.arc(0, 0, body, 0, TAU); g.fill();
      g.strokeStyle = rimC; g.lineWidth = 1.8; g.beginPath(); g.arc(0, 0, body, 0, TAU); g.stroke();
      g.fillStyle = 'rgba(255,255,255,0.96)';
      g.beginPath(); g.arc(-body * 0.18, -body * 0.18, body * 0.46, 0, TAU); g.fill();
    } else {
      buildBulletShape(g, shape, body);
      g.fillStyle = fillC; g.fill();
      g.strokeStyle = rimC; g.lineWidth = 1.8; g.stroke();
      g.fillStyle = 'rgba(255,255,255,0.95)';
      g.beginPath(); g.arc(0, 0, body * 0.4, 0, TAU); g.fill();
    }
    spr = { canvas: oc, pad };
    if (_bulletSpriteCache.size < 600) _bulletSpriteCache.set(key, spr);
    return spr;
  }

  // 方向性弹精灵缓存（沿速度拉伸的菱形 + 暗边 + 亮核）
  const _dirSpriteCache = new Map();
  function getDirSprite(col, r) {
    const rq = Math.round(r * 2) / 2;
    const key = col.r + ',' + col.g + ',' + col.b + '|' + rq;
    let spr = _dirSpriteCache.get(key);
    if (spr) return spr;
    const L = rq * 2.6, Wd = rq * 1.15;
    const pad = Math.ceil(L * 1.3) + 3;
    const size = pad * 2;
    const oc = document.createElement('canvas');
    oc.width = size; oc.height = size;
    const g = oc.getContext('2d');
    g.translate(pad, pad);
    g.globalCompositeOperation = 'lighter';
    const gl = g.createRadialGradient(0, 0, 0, 0, 0, L * 1.3);
    gl.addColorStop(0, `rgba(${col.r},${col.g},${col.b},0.45)`);
    gl.addColorStop(1, `rgba(${col.r},${col.g},${col.b},0)`);
    g.fillStyle = gl; g.beginPath(); g.arc(0, 0, L * 1.3, 0, TAU); g.fill();
    g.globalCompositeOperation = 'source-over';
    g.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
    g.beginPath();
    g.moveTo(L, 0); g.lineTo(0, -Wd); g.lineTo(-L * 0.7, 0); g.lineTo(0, Wd); g.closePath();
    g.fill();
    g.strokeStyle = `rgba(${col.r * 0.35 | 0},${col.g * 0.35 | 0},${col.b * 0.35 | 0},0.9)`;
    g.lineWidth = 1.6; g.stroke();
    g.fillStyle = 'rgba(255,255,255,0.95)';
    g.beginPath(); g.ellipse(L * 0.15, 0, rq * 0.7, rq * 0.5, 0, 0, TAU); g.fill();
    spr = { canvas: oc, pad };
    if (_dirSpriteCache.size < 400) _dirSpriteCache.set(key, spr);
    return spr;
  }

    ctx.save();
    for (const b of enemyBullets) {
      const r = b.r;
      // —— 大型刃/贴图弹：沿速度朝向 + 叠加亮核 ——
      if (SPRITE_BULLETS.has(b.kind)) {
        const key = BULLET_KEY[b.kind];
        if (assetReady(key)) {
          const ang = Math.atan2(b.vy, b.vx);
          ctx.save();
          ctx.translate(b.x, b.y);
          ctx.rotate(ang + Math.PI / 2 + (b.rot || 0) * 0.15);
          const isScythe = b.kind.startsWith('scythe');
          const isSpear = b.kind === 'homingspear';
          const size = isScythe ? r * 6.6 : (isSpear ? r * 7.0 : r * 5.4);
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = 0.5;
          ctx.drawImage(assets[key], -size / 2, -size / 2, size, size);
          ctx.globalAlpha = 1;
          ctx.globalCompositeOperation = 'source-over';
          ctx.drawImage(assets[key], -size / 2, -size / 2, size, size);
          ctx.restore();
          continue;
        }
      }

      const col = b._c || (b._c = parseColor(b.color));

      // —— 方向性弹（针/钻石/月牙）：用缓存精灵，按朝向旋转 ——
      if (DIRECTIONAL_BULLETS.has(b.kind)) {
        const ang = Math.atan2(b.vy, b.vx);
        const spr = getDirSprite(col, r);
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(ang);
        ctx.drawImage(spr.canvas, -spr.pad, -spr.pad);
        ctx.restore();
        continue;
      }

      // —— 圆形/异形"糖果弹"：用缓存精灵 ——
      const shape = BULLET_SHAPE[b.kind] || 'orb';
      const rEff = b.grazed ? r * 1.15 : r;
      const spr = getBulletSprite(shape, col, rEff);
      if (shape === 'orb') {
        // 圆形无需旋转，直接贴图（最快路径）
        ctx.drawImage(spr.canvas, b.x - spr.pad, b.y - spr.pad);
      } else {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.rot || 0);
        ctx.drawImage(spr.canvas, -spr.pad, -spr.pad);
        ctx.restore();
      }
    }
    ctx.restore();
  }

  // 构建异形弹路径（星/水晶/花瓣/六角）——保持亮核+暗边的可读性
  function buildBulletShape(ctx, shape, body) {
    ctx.beginPath();
    if (shape === 'star') {
      const n = 5, ro = body * 1.35, ri = body * 0.6;
      for (let i = 0; i < n * 2; i++) {
        const a = -Math.PI / 2 + i * Math.PI / n, rr = (i % 2 === 0) ? ro : ri;
        const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
    } else if (shape === 'crystal') {
      // 六角水晶（硬边）
      const n = 6, rr = body * 1.18;
      for (let i = 0; i < n; i++) {
        const a = -Math.PI / 2 + i * TAU / n;
        const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
    } else if (shape === 'petal') {
      // 四瓣花（圆角十字）
      const lobe = body * 1.25;
      for (let i = 0; i < 4; i++) {
        const a = i * TAU / 4;
        const cx = Math.cos(a) * body * 0.62, cy = Math.sin(a) * body * 0.62;
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, lobe * 0.5, 0, TAU);
      }
    } else { // diamond
      const L = body * 1.5;
      ctx.moveTo(0, -L); ctx.lineTo(body * 0.85, 0); ctx.lineTo(0, L); ctx.lineTo(-body * 0.85, 0); ctx.closePath();
    }
  }

  function drawPlayerHitbox() {
    if (state === 'title' || state === 'win' || state === 'lose') return;
    const slow = !!(keys.ShiftLeft || keys.ShiftRight);
    ctx.save();
    ctx.translate(player.x, player.y);
    // 精准移动时显示判定环贴图（素材 ui_focus_ring）
    if (slow && assetReady('uiFocusRing')) {
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.globalCompositeOperation = 'lighter';
      ctx.rotate(time * 1.6);
      const fr = 46;
      ctx.drawImage(assets.uiFocusRing, -fr, -fr, fr * 2, fr * 2);
      ctx.restore();
    }
    // 真实判定点：极小的核心点，精确显示受伤范围（便于擦弹）
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff5a78';
    // 外圈柔光（仅辅助看清，非判定）
    ctx.globalAlpha = slow ? 0.9 : 0.5;
    ctx.strokeStyle = 'rgba(120,230,255,0.7)';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(0, 0, 6, 0, TAU); ctx.stroke();
    // 判定核心（红白点，半径≈hitR）
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ff3b5c';
    ctx.beginPath(); ctx.arc(0, 0, player.hitR + 1.4, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(0, 0, player.hitR, 0, TAU); ctx.fill();
    ctx.restore();
  }

  function drawWarnings() {
    for (const w of warnings) {
      const p = 1 - w.life / w.maxLife;
      ctx.save();
      ctx.globalAlpha = 0.32 + Math.sin(time * 24) * 0.12;
      ctx.strokeStyle = '#ff315d';
      ctx.fillStyle = 'rgba(255,49,93,.16)';
      ctx.lineWidth = 4 + Math.sin(time * 28) * 2;
      if (w.type === 'laser') {
        ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke();
        ctx.lineWidth = w.width;
        ctx.globalAlpha = 0.10 + p * 0.16;
        ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke();
      } else if (w.type === 'circle') {
        ctx.beginPath(); ctx.arc(w.x, w.y, w.r, 0, TAU); ctx.fill(); ctx.stroke();
        ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.arc(w.x, w.y, w.r * p, 0, TAU); ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawLasers() {
    for (const l of lasers) {
      const p = l.life / l.maxLife;
      ctx.save();
      ctx.globalAlpha = Math.min(1, p * 2.2);
      const dx = l.x2 - l.x1, dy = l.y2 - l.y1;
      const len = Math.hypot(dx, dy);
      const ang = Math.atan2(dy, dx) - Math.PI / 2;
      if (assetReady('laserGlow')) {
        ctx.save();
        ctx.translate(l.x1, l.y1);
        ctx.rotate(ang);
        ctx.globalAlpha *= 0.85;
        ctx.drawImage(assets.laserGlow, -l.width * 0.8, 0, l.width * 1.6, len);
        ctx.restore();
      }
      ctx.shadowBlur = 24;
      ctx.shadowColor = l.color;
      ctx.strokeStyle = l.color;
      ctx.lineWidth = l.width;
      ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
      if (assetReady('laserCore')) {
        ctx.save();
        ctx.shadowBlur = 0;
        ctx.translate(l.x1, l.y1);
        ctx.rotate(ang);
        ctx.drawImage(assets.laserCore, -l.width * 0.16, 0, l.width * 0.32, len);
        ctx.restore();
      }
      ctx.strokeStyle = '#fff6f9';
      ctx.lineWidth = l.width * 0.22;
      ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
      ctx.restore();
    }
  }

  function drawPlayerBeam() {
    if (!playerBeam) return;
    const p = playerBeam.life / playerBeam.maxLife;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const x = playerBeam.x;
    const w = playerBeam.width * (0.72 + (1 - p) * 0.32);
    const a = Math.min(1, p * 1.4);
    const by = player.y - 26;
    // 外层宽辉光（横向渐变软边，替代贴图）
    ctx.globalAlpha = a * 0.5;
    const og = ctx.createLinearGradient(x - w * 1.5, 0, x + w * 1.5, 0);
    og.addColorStop(0, 'rgba(126,222,255,0)'); og.addColorStop(0.5, 'rgba(150,225,255,.28)'); og.addColorStop(1, 'rgba(126,222,255,0)');
    ctx.fillStyle = og; ctx.fillRect(x - w * 1.5, -10, w * 3, by + 10);
    // 主束（流体扭动软边，青→白→紫渐变芯）
    ctx.globalAlpha = a;
    fluidColumn(x, w * 0.5, -10, by, '130,235,255', 'rgba(244,254,255,.95)', 0.12, 7);
    fluidColumn(x, w * 0.34, -10, by, '170,140,255', 'rgba(214,196,255,.5)', 0.18, 9);
    // 白色亮芯（流体细线）
    ctx.globalAlpha = a * 0.9;
    fluidColumn(x, Math.max(5, w * 0.12), -10, by, '255,255,255', 'rgba(255,255,255,.95)', 0.3, 12);
    // 顶端灼烧爆点 + 旋转星芒
    const isz = w * 0.9 * (0.7 + (1 - p) * 0.4);
    const ig = ctx.createRadialGradient(x, by, 0, x, by, isz);
    ig.addColorStop(0, `rgba(255,255,255,${0.85 * a})`); ig.addColorStop(0.4, `rgba(190,235,255,${0.55 * a})`); ig.addColorStop(1, 'rgba(130,235,255,0)');
    ctx.fillStyle = ig; ctx.beginPath(); ctx.arc(x, by, isz, 0, TAU); ctx.fill();
    ctx.save(); ctx.translate(x, by); ctx.rotate(time * 2.5); ctx.strokeStyle = `rgba(235,250,255,${0.6 * a})`; ctx.lineWidth = 2.5;
    for (let k = 0; k < 6; k++) { ctx.rotate(Math.PI / 3); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -isz * 1.4); ctx.stroke(); }
    ctx.restore();
    if (Math.random() < 0.5) addParticle(x + rand(-w * 0.4, w * 0.4), by, rand(-70, 70), rand(30, 90), 0.25, rand(1.5, 3), '#cfeaff', true);
    ctx.restore();
  }

  function drawUltimateEffect() {
    if (!ultimateEffect) return;
    const t = 1 - ultimateEffect.life / ultimateEffect.maxLife;
    const x = ultimateEffect.x;
    const y = ultimateEffect.y;
    // —— 角色1 全屏红激光大招渲染 ——
    if (ultimateEffect.fullLaser) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const a = Math.sin(Math.min(1, ultimateEffect.life / ultimateEffect.maxLife) * Math.PI); // 渐入渐出
      const cols = 9;
      for (let c = 0; c < cols; c++) {
        const lx = (W / (cols + 1)) * (c + 1);
        const w = (28 + Math.sin(time * 24 + c) * 8) * (0.6 + a);
        const g = ctx.createLinearGradient(lx - w, 0, lx + w, 0);
        g.addColorStop(0, 'rgba(255,90,120,0)');
        g.addColorStop(0.5, `rgba(255,224,230,${0.92 * a})`);
        g.addColorStop(1, 'rgba(255,90,120,0)');
        ctx.fillStyle = g; ctx.fillRect(lx - w, 0, w * 2, y);
        ctx.fillStyle = `rgba(255,110,136,${0.5 * a})`;
        ctx.fillRect(lx - w * 0.3, 0, w * 0.6, y);
      }
      // 顶部灼烧横光
      ctx.globalAlpha = a * 0.5;
      const hg = ctx.createLinearGradient(0, 0, 0, 120);
      hg.addColorStop(0, 'rgba(255,120,150,.6)'); hg.addColorStop(1, 'rgba(255,120,150,0)');
      ctx.fillStyle = hg; ctx.fillRect(0, 0, W, 120);
      ctx.restore();
      return;
    }
    // —— 雅努西娅 坠月之巅：坠落黑月幻影 ——
    if (ultimateEffect.fallMoon) {
      const p = 1 - ultimateEffect.life / ultimateEffect.maxLife; // 0->1
      const fall = Math.min(1, p / 0.55);                          // 坠落进度
      const ez = fall < 1 ? 1 - Math.pow(1 - fall, 3) : 1;         // 缓出
      const my = -W * 0.5 + (y + W * 0.5) * ez;                    // 从屏上坠到中心
      const moonD = (W * 0.55 + W * 0.45 * ez);                    // 直径增大到约满屏宽
      const impact = p > 0.55 ? (p - 0.55) / 0.45 : 0;             // 撞击进度
      ctx.save();
      ctx.translate(x, my);

      // 1) 背景放射爆（旋转，红色，additive）
      if (assetReady('yRadial')) {
        ctx.save(); ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.5 * fall; ctx.rotate(time * 0.6);
        const rs = moonD * 1.8; ctx.drawImage(assets.yRadial, -rs / 2, -rs / 2, rs, rs);
        ctx.restore();
      }
      // 2) 暗红光晕底
      ctx.globalCompositeOperation = 'source-over';
      const halo = ctx.createRadialGradient(0, 0, moonD * 0.2, 0, 0, moonD * 0.85);
      halo.addColorStop(0, 'rgba(90,16,30,.7)'); halo.addColorStop(0.55, 'rgba(50,8,24,.5)'); halo.addColorStop(1, 'rgba(10,0,10,0)');
      ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(0, 0, moonD * 0.85, 0, TAU); ctx.fill();
      // 3) 月球本体（缓慢自转）+ 赤红染色
      if (assetReady('yMoon')) {
        ctx.save(); ctx.rotate(time * 0.25);
        ctx.globalAlpha = 0.99; ctx.drawImage(assets.yMoon, -moonD / 2, -moonD / 2, moonD, moonD);
        // 赤红叠色（减弱，保留 3D 月球细节）
        ctx.globalCompositeOperation = 'overlay'; ctx.globalAlpha = 0.28 + impact * 0.28;
        const rg = ctx.createRadialGradient(0, 0, 0, 0, 0, moonD / 2);
        rg.addColorStop(0, 'rgba(255,70,80,.55)'); rg.addColorStop(1, 'rgba(120,0,20,.45)');
        ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(0, 0, moonD / 2, 0, TAU); ctx.fill();
        ctx.restore();
      } else {
        const mg = ctx.createRadialGradient(-moonD * 0.15, -moonD * 0.15, moonD * 0.1, 0, 0, moonD / 2);
        mg.addColorStop(0, '#7a1020'); mg.addColorStop(1, '#1a0010');
        ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(0, 0, moonD / 2, 0, TAU); ctx.fill();
      }
      // 4) 月辉外圈（additive）
      if (assetReady('yMoonGlow')) {
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.5 + Math.sin(time * 8) * 0.15;
        const gs = moonD * 1.25; ctx.drawImage(assets.yMoonGlow, -gs / 2, -gs / 2, gs, gs);
      }
      // 5) 环绕云雾（多团旋转）
      if (assetReady('yCloud')) {
        ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.45 * fall;
        for (let i = 0; i < 5; i++) {
          const ca = time * 0.5 + i * TAU / 5;
          const cd = moonD * 0.62, cs = moonD * 0.5;
          ctx.drawImage(assets.yCloud, Math.cos(ca) * cd - cs / 2, Math.sin(ca) * cd - cs / 2, cs, cs);
        }
      }
      // 6) 放射闪电（撞击后增强）
      if (assetReady('yLightning') && p > 0.4) {
        ctx.globalCompositeOperation = 'lighter';
        const bolts = 10;
        for (let i = 0; i < bolts; i++) {
          if ((Math.floor(time * 20) + i) % 3 !== 0) continue; // 闪烁
          ctx.save(); ctx.rotate(i * TAU / bolts + time * 0.3);
          ctx.globalAlpha = 0.6 * (0.4 + impact);
          const bl = moonD * (0.5 + Math.random() * 0.4);
          ctx.drawImage(assets.yLightning, -moonD * 0.04, moonD * 0.35, moonD * 0.08, bl);
          ctx.restore();
        }
      }
      ctx.restore();

      // 7) 撞击冲击波环（多层扩散）+ 屏闪
      if (impact > 0) {
        ctx.save(); ctx.globalCompositeOperation = 'lighter';
        for (let k = 0; k < 3; k++) {
          const wp = clamp(impact - k * 0.18, 0, 1);
          if (wp <= 0) continue;
          ctx.globalAlpha = (1 - wp) * 0.7;
          if (assetReady('yRing')) {
            const rd = 120 + wp * 820;
            ctx.drawImage(assets.yRing, x - rd / 2, my - rd / 2, rd, rd);
          } else {
            ctx.strokeStyle = '#ff6a7a'; ctx.lineWidth = 10 * (1 - wp);
            ctx.beginPath(); ctx.arc(x, my, 100 + wp * 760, 0, TAU); ctx.stroke();
          }
        }
        ctx.restore();
      }
      return;
    }
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = Math.max(0, 1 - t);
    const r = 90 + t * 760;
    const pulse = ctx.createRadialGradient(x, y, 0, x, y, r);
    pulse.addColorStop(0, 'rgba(255,255,255,.34)');
    pulse.addColorStop(0.12, 'rgba(180,105,255,.34)');
    pulse.addColorStop(0.38, 'rgba(90,220,255,.15)');
    pulse.addColorStop(1, 'rgba(90,220,255,0)');
    ctx.fillStyle = pulse;
    ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();

    ctx.translate(x, y);
    ctx.rotate(time * 0.8);
    if (assetReady('vfxUltimate')) {
      const size = 180 + t * 700;
      ctx.drawImage(assets.vfxUltimate, -size / 2, -size / 2, size, size);
    }
    for (let i = 0; i < 3; i++) {
      const rr = 80 + t * (180 + i * 140);
      const ring = ctx.createRadialGradient(0, 0, rr * 0.65, 0, 0, rr);
      ring.addColorStop(0, 'rgba(255,230,143,0)');
      ring.addColorStop(0.76, 'rgba(255,230,143,.10)');
      ring.addColorStop(1, 'rgba(255,230,143,0)');
      ctx.fillStyle = ring;
      ctx.beginPath(); ctx.arc(0, 0, rr, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }

  function drawSpriteFx() {
    if (!spriteFx.length) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const fx of spriteFx) {
      const img = assets[fx.key];
      if (!img || !img.ready) continue;
      const p = clamp(fx.life / fx.maxLife, 0, 1);
      const t = 1 - p;
      const size = fx.size * (1 + fx.grow * t);
      ctx.save();
      ctx.translate(fx.x, fx.y);
      ctx.rotate(fx.rot);
      ctx.globalAlpha = fx.alpha * Math.sin(p * Math.PI);
      ctx.drawImage(img, -size / 2, -size / 2, size, size);
      ctx.restore();
    }
    ctx.restore();
  }

  function drawParticles() {
    // Cheap additive glow pass (no per-particle shadowBlur, which is CPU-killing at scale).
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles) {
      if (!p.glow) continue;
      const a = clamp(p.life / p.maxLife, 0, 1);
      ctx.globalAlpha = a * 0.5;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (1.4 + a), 0, TAU); ctx.fill();
    }
    ctx.restore();
    // Core pass.
    ctx.save();
    for (const p of particles) {
      const a = clamp(p.life / p.maxLife, 0, 1);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.45 + a), 0, TAU); ctx.fill();
    }
    ctx.restore();
  }

  function drawDamageTexts() {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 24px PingFang SC, Microsoft YaHei, sans-serif';
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(0,0,0,.65)';
    for (const d of damageTexts) {
      const a = clamp(d.life / d.maxLife, 0, 1);
      ctx.globalAlpha = a;
      ctx.font = `bold ${d.size}px PingFang SC, Microsoft YaHei, sans-serif`;
      ctx.strokeText(d.text, d.x, d.y);
      ctx.fillStyle = d.color;
      ctx.fillText(d.text, d.x, d.y);
    }
    ctx.restore();
  }

  function drawBar(x, y, w, h, rate, fill, bg = 'rgba(255,255,255,.12)') {
    ctx.fillStyle = bg; roundRect(x, y, w, h, h / 2); ctx.fill();
    ctx.fillStyle = fill; roundRect(x, y, w * clamp(rate, 0, 1), h, h / 2); ctx.fill();
  }

  function drawUI() {
    ctx.save();
    // Top boss bar
    if (state === 'boss' && boss) {
      // 极简 Boss 顶栏：贴顶、半透明磨砂条 + 血条，不再用黑色大框遮挡视野
      ctx.textAlign = 'center';
      const bw = 420, bx = W / 2 - bw / 2, by = 8, bh = 40;
      const g = ctx.createLinearGradient(0, by, 0, by + bh);
      g.addColorStop(0, 'rgba(28,18,34,0.42)'); g.addColorStop(1, 'rgba(28,18,34,0.12)');
      ctx.fillStyle = g; roundRect(bx, by, bw, bh, 14); ctx.fill();
      ctx.strokeStyle = 'rgba(255,150,190,0.30)'; ctx.lineWidth = 1; ctx.stroke();
      // Boss 名（描边）
      ctx.font = 'bold 17px PingFang SC, Microsoft YaHei, sans-serif';
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.strokeText(boss.name, W / 2, by + 18);
      ctx.fillStyle = '#ffe2ec'; ctx.fillText(boss.name, W / 2, by + 18);
      // 血条
      drawBar(bx + 24, by + 26, bw - 48, 9, boss.hp / boss.maxHp, '#ff4d7f', 'rgba(255,255,255,.14)');
      const phTotal = boss.kind === 'midboss' ? 3 : 5;
      ctx.font = '11px PingFang SC, Microsoft YaHei, sans-serif';
      ctx.lineWidth = 2.2; ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      const binfo = `Phase ${Math.min(bossPhase + 1, phTotal)}/${phTotal}   轮回 ${loopCount + 1}`;
      ctx.strokeText(binfo, W / 2, by + bh + 12);
      ctx.fillStyle = '#ffc7d8'; ctx.fillText(binfo, W / 2, by + bh + 12);
    } else if (state === 'mobs') {
      const total = (STAGE_WAVES[segment] || STAGE_WAVES.stage1).length;

  function drawSkill(x, y, key, name, cdRate, ready = false) {

    ctx.font = '15px PingFang SC, Microsoft YaHei, sans-serif'; ctx.fillStyle = 'rgba(255,255,255,.8)';
    ctx.fillText('方向键移动 · Shift 精准 · 空格 波束 · X 大招 · 1/2/3/4 换将 · C 换皮肤', W/2, H*0.845);
    ctx.fillText('装备圣冕后 Q 释放「裁决领域」· 击破小怪掉 P 火力道具升级弹幕', W/2, H*0.875);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // 拾取弹幕插件时弹出的卡片提示（滑入 + 停留 + 淡出）
  function drawPluginToast() {
    const t = pluginToast;
    const p = 1 - t.life / t.maxLife;       // 0 -> 1
    const slide = p < 0.16 ? p / 0.16 : 1;  // 滑入
    const fade = p > 0.82 ? 1 - (p - 0.82) / 0.18 : 1;
    const cw = 132, ch = 158;
    const cx = W * 0.5;
    const cy = H * 0.34 - (1 - slide) * 40;
    ctx.save();
    ctx.globalAlpha = fade;
    if (assetReady(t.card)) {
      ctx.drawImage(assets[t.card], cx - cw / 2, cy - ch / 2, cw, ch);
    }
    // 标签：插件显示「插件已装备」，暴走等显示其名称
    const label = t.card ? '插件已装备！' : (t.name || '');
    const labelY = t.card ? (cy + ch / 2 + 28) : cy;
    if (!t.card) {
      // 暴走等无卡片：金色光环大字
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, 160);
      gr.addColorStop(0, 'rgba(255,200,80,.5)'); gr.addColorStop(1, 'rgba(255,200,80,0)');
      ctx.fillStyle = gr; ctx.fillRect(cx - 160, cy - 90, 320, 180);
      ctx.restore();
    }
    ctx.font = '700 24px "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(10,8,20,.72)';
    ctx.strokeText(label, cx, labelY);
    ctx.fillStyle = t.card ? '#fff2c4' : '#ffe07a';
    ctx.fillText(label, cx, labelY);
    ctx.restore();
  }

  function drawSkillCutin() {
    const sc = skillCutin;
    const p = 1 - sc.life / sc.maxLife; // 0 -> 1
    ctx.save();
    // diagonal slash band
    let bandA = p < 0.18 ? p / 0.18 : (p > 0.78 ? Math.max(0, 1 - (p - 0.78) / 0.22) : 1);
    const bandH = 300;
    const cy = H * 0.46;
    ctx.save();
    ctx.globalAlpha = bandA * 0.9;
    const g = ctx.createLinearGradient(0, cy - bandH / 2, 0, cy + bandH / 2);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(0.5, `rgba(${sc.aura},0.18)`);
    g.addColorStop(0.5, 'rgba(8,6,16,0.86)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0, cy - bandH / 2);
    ctx.lineTo(W, cy - bandH / 2 - 46);
    ctx.lineTo(W, cy + bandH / 2 - 46);
    ctx.lineTo(0, cy + bandH / 2);
    ctx.closePath(); ctx.fill();
    // top/bottom accent lines
    ctx.strokeStyle = `rgba(${sc.aura},${bandA})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, cy - bandH / 2); ctx.lineTo(W, cy - bandH / 2 - 46); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy + bandH / 2); ctx.lineTo(W, cy + bandH / 2 - 46); ctx.stroke();
    ctx.restore();
    // character splash slides in from the left
    if (assetReady(sc.key)) {
      const slide = p < 0.22 ? (1 - p / 0.22) : 0;
      const outSlide = p > 0.8 ? (p - 0.8) / 0.2 : 0;
      const dx = -W * 0.55 * slide + W * 0.5 * outSlide;
      const ca = bandA;
      const img = assets[sc.key];
      const dh = 360, dw = dh * img.width / img.height;
      ctx.globalAlpha = ca;
      ctx.drawImage(img, W * 0.04 + dx, cy - dh * 0.56, dw, dh);
    }
    // name + skill label
    const txtA = p < 0.2 ? p / 0.2 : (p > 0.82 ? Math.max(0, 1 - (p - 0.82) / 0.18) : 1);
    ctx.globalAlpha = txtA;
    ctx.textAlign = 'right';
    ctx.font = 'bold 30px PingFang SC, Microsoft YaHei, sans-serif';
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,.7)';
    ctx.strokeText(sc.name, W - 30, cy - 8);
    ctx.fillStyle = '#fff4d1'; ctx.fillText(sc.name, W - 30, cy - 8);
    ctx.font = 'bold 44px PingFang SC, Microsoft YaHei, sans-serif';
    ctx.strokeText('月 蚀 · 终 章', W - 30, cy + 40);
    ctx.fillStyle = `rgba(${sc.aura},1)`; ctx.fillText('月 蚀 · 终 章', W - 30, cy + 40);
    ctx.restore();
  }

  function drawResult(title, subtitle, color) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fillRect(0,0,W,H);
    const panelKey = title === 'VICTORY' ? 'uiVictoryPanel' : 'uiGameoverPanel';
    if (assetReady(panelKey)) {
      ctx.drawImage(assets[panelKey], 70, H * 0.31, W - 140, 360);
    }
    ctx.textAlign = 'center';
    // 银月 + 金翼 装饰
    if (assetReady('uiMoonSilver')) {
      ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.8;
      const ms = 156; ctx.drawImage(assets['uiMoonSilver'], W/2 - ms/2, H*0.27 - ms/2, ms, ms);
      ctx.restore();
    }
    // DEFEAT 原生贴图（败北）
    if (title === 'GAME OVER' && assetReady('uiTextDefeat')) {
      const dw = 376 * 0.92, dh = 84 * 0.92;
      ctx.drawImage(assets['uiTextDefeat'], W/2 - dw/2, H*0.42 - dh, dw, dh);
    } else {
      ctx.font = 'bold 58px Arial'; ctx.lineWidth = 9; ctx.strokeStyle = 'rgba(0,0,0,.75)'; ctx.strokeText(title, W/2, H*0.42);
      ctx.fillStyle = color; ctx.fillText(title, W/2, H*0.42);
    }
    ctx.font = '24px PingFang SC, Microsoft YaHei, sans-serif'; ctx.fillStyle = '#fff'; ctx.fillText(subtitle, W/2, H*0.48);
    ctx.font = '20px Arial'; ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.fillText(`Score: ${Math.floor(score)}   Kills: ${killCount}   轮回 ${loopCount + 1}`, W/2, H*0.53);
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  let loopErrCount = 0;
  function loop(now) {
    // The rAF re-schedule MUST happen no matter what, otherwise a single thrown
    // exception (e.g. on player death) would permanently freeze the game.
    try {
      const rawMs = (now - last) || 16.7;
      const dt = Math.min(0.033, (now - last) / 1000 || 0.016);
      last = now;
      // 平滑帧时 + 自适应降级（连续偏慢降一级，连续流畅回升一级）
      if (rawMs > 0 && rawMs < 200) smoothFrameMs += (rawMs - smoothFrameMs) * 0.1;
      perfHoldT += dt;
      // 很卡（<~25fps）立即跳到极简档，避免持续掉帧
      if (smoothFrameMs > 40 && perfLevel < 2) { perfLevel = 2; perfHoldT = 0; }
      else if (perfHoldT > 0.8) {
        perfHoldT = 0;
        if (smoothFrameMs > 27 && perfLevel < 2) perfLevel++;
        else if (smoothFrameMs < 18 && perfLevel > 0) perfLevel--;
      }
      // hit-stop：短暂冻结战斗推进（仍持续绘制），增强终结/重击打击感
      if (hitStop > 0) { hitStop -= dt; draw(); requestAnimationFrame(loop); return; }
      update(dt);
      draw();
    } catch (err) {
      loopErrCount++;
      if (loopErrCount <= 8) console.error('[loop] recovered from error:', err);
    }
    requestAnimationFrame(loop);
  }

  function pointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return {
      x: clamp((p.clientX - rect.left) / rect.width * W, 36, W - 36),
      y: clamp((p.clientY - rect.top) / rect.height * H, 260, H - 58)
    };
  }

  function setPointerTarget(e, snap = false) {
    pointerTarget = pointerPos(e);
    if (snap && state !== 'title') {
      player.prevX = player.x;
      player.prevY = player.y;
      player.x = pointerTarget.x;
      player.y = pointerTarget.y;
      player.moveVX = player.x - player.prevX;
      player.moveVY = player.y - player.prevY;
    }
  }

  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    unlockAudio();   // 首个按键即解锁音频（满足自动播放策略）
    if (e.code === 'Digit1' || e.code === 'Numpad1') selectChar('witch');
    if (e.code === 'Digit2' || e.code === 'Numpad2') selectChar('yanuxiya');
    if (e.code === 'Digit3' || e.code === 'Numpad3') selectChar('anna');
    if (e.code === 'Digit4' || e.code === 'Numpad4') selectChar('reaver');
    if (e.code === 'KeyC') cycleSkin();
    if (e.code === 'Enter' && state === 'title') startGame();
    if (e.code === 'KeyP') paused = !paused;
    if (e.code === 'KeyR') startGame();
    if (e.code === 'KeyM') toggleMusic();
    // 僚机装备：标题界面 Q 切换装备僚机；游戏内 Q 释放圣冕裁决领域
    if (e.code === 'KeyQ') { if (state === 'title') cycleWing(); else castSaintField(); }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  }, { passive: false });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });
  canvas.addEventListener('pointerdown', (e) => {
    unlockAudio();   // 首个点击即解锁音频
    const wasTitle = state === 'title';
    if (wasTitle) {
      // 点击僚机选择卡 → 切换装备，不开始游戏
      const pt = pointerPos(e);
      for (const c of wingCards) { if (pt.x >= c.x && pt.x <= c.x + c.w && pt.y >= c.y && pt.y <= c.y + c.h) { if (equippedWing !== c.key) { equippedWing = c.key; setMessage('僚机：' + (c.key === 'saintcrown' ? '圣冕圣械' : '无（角色自带）'), 1.6); if (saintActive()) syncScWing(); } return; } }
      startGame();
    }
    pointerDown = true;
    setPointerTarget(e, !wasTitle);
    canvas.setPointerCapture?.(e.pointerId);
  });
  canvas.addEventListener('pointermove', (e) => { if (pointerDown) setPointerTarget(e, true); });
  canvas.addEventListener('pointerup', () => { pointerDown = false; pointerTarget = null; });
  canvas.addEventListener('pointercancel', () => { pointerDown = false; pointerTarget = null; });

  // Prevent mobile scrolling while playing.
  document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  requestAnimationFrame(loop);
})();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>月蚀弹幕 Demo V3.6 - 视觉重建与资源规范版</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background:#020208; overflow: hidden; }
    body {
      color:#f8f1ff;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      user-select:none;
    }
    #wrap {
      width: 100vw; height: 100vh;
      display:flex; align-items:center; justify-content:center;
      background:
        radial-gradient(circle at 50% 14%, rgba(129,57,206,.28), transparent 28%),
        radial-gradient(circle at 20% 80%, rgba(255,196,77,.08), transparent 28%),
        #020208;
      padding:8px;
    }
    canvas {
      width: min(100vw, calc(100vh * 0.5625));
      height: min(100vh, calc(100vw / 0.5625));
      max-width:720px; max-height:1280px;
      background:#05040a;
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      box-shadow:0 0 60px rgba(132,78,255,.32), inset 0 0 52px rgba(255,255,255,.04);
      touch-action:none;
    }
    #tip {
      position: fixed; left: 12px; bottom: 10px;
      color: rgba(255,255,255,.74); font-size: 12px; line-height: 1.65;
      text-shadow: 0 2px 4px #000; pointer-events:none;
      max-width: 420px;
    }
    #badge {
      position: fixed; right: 12px; bottom: 10px;
      color: rgba(255,255,255,.45); font-size: 11px; pointer-events:none;
    }
    #musicStatus {
      position: fixed; right: 12px; top: 10px;
      color: rgba(255,255,255,.78); font-size: 12px;
      background: rgba(10, 6, 24, .55); border: 1px solid rgba(255,255,255,.12);
      padding: 7px 10px; border-radius: 999px; pointer-events:none;
      text-shadow: 0 1px 4px #000;
    }
    @media (max-width: 720px) {
      #wrap { padding:0; }
      canvas { border:none; border-radius:0; }
      #tip, #badge, #musicStatus { display:none; }
    }
  </style>
</head>
<body>
  <audio id="bgm" src="assets/audio/bgm_stage_loop.ogg" preload="auto" loop></audio>
  <div id="wrap"><canvas id="game" width="720" height="1280"></canvas></div>
  <div id="tip">
    操作：WASD/方向键移动　Shift低速　Space月光束　X月蚀大招　P暂停　R重开<br/>
    鼠标/手机：按住拖动角色移动。点击开始后会启用BGM与音效。按 M 可开关音乐。
  </div>
  <div id="musicStatus">BGM：点击开始后播放</div>
  <div id="badge">V3.6 视觉重建版 / Clean Layers + QA Assets</div>

  class AudioEngine {
    constructor() {

    // 把所有音效样本解码进 WebAudio 缓冲；播放时走 BufferSource，

    loadSfxBuffers() {
      if (!this.ctx || typeof fetch !== 'function') return;
      for (const [key, src] of Object.entries(SFX_PATHS)) {
        try {
          fetch(src).then(r => r.arrayBuffer()).then(buf => {
            this.ctx.decodeAudioData(buf, decoded => { this.buffers[key] = decoded; }, () => {});
          }).catch(() => {});
        } catch (e) {}
      }
    }
    // 通过 WebAudio 播放样本（命中则返回 true，未就绪返回 false 以便回退到 HTML5）
    playBuffer(key, volume) {
      if (!this.enabled || !this.ctx) return false;
      const b = this.buffers[key];
      if (!b) return false;
      try {
        const src = this.ctx.createBufferSource();
        const g = this.ctx.createGain();
        g.gain.value = volume;
        src.buffer = b; src.connect(g); g.connect(this.sfxGain);
        src.start();
        return true;
      } catch (e) { return false; }
    }
    tone(freq, dur = 0.12, type = 'sine', gain = 0.08, dest = null, when = 0) {
      if (!this.enabled) return;
      const t = this.ctx.currentTime + when;
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g);
      g.connect(dest || this.master);
      o.start(t);
      o.stop(t + dur + 0.04);
    }
    noise(dur = 0.18, gain = 0.08, when = 0) {
      if (!this.enabled) return;
      const t = this.ctx.currentTime + when;
      const buffer = this.ctx.createBuffer(1, Math.floor(this.ctx.sampleRate * dur), this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      const src = this.ctx.createBufferSource();
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(gain, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      src.buffer = buffer;
      src.connect(g);
      g.connect(this.master);
      src.start(t);
    }
    pad(root, dur = 2.8, gain = 0.035) {
      if (!this.enabled) return;
      const notes = [root, root * Math.pow(2, 7 / 12), root * Math.pow(2, 10 / 12), root * 2];
      notes.forEach((f, i) => this.tone(f, dur, i % 2 ? 'triangle' : 'sawtooth', gain * (i === 0 ? 1.3 : 0.8), this.musicGain, i * 0.02));
    }
    update(dt, intense) {
      if (!this.enabled) return;
      this.beatTimer -= dt;
      if (this.beatTimer <= 0) {
        const root = state === 'boss' ? 146.83 : 130.81;
        const step = this.scale[(this.beat * 3 + (intense ? 2 : 0)) % this.scale.length];
        const freq = root * Math.pow(2, step / 12);
        this.tone(freq, 0.22, 'triangle', intense ? 0.035 : 0.026, this.musicGain);
        if (this.beat % 4 === 0) this.tone(root / 2, 0.34, 'sine', intense ? 0.06 : 0.04, this.musicGain);
        if (this.beat % 8 === 0) this.pad(root / 2, 3.0, intense ? 0.05 : 0.035);
        if (intense && this.beat % 2 === 1) this.noise(0.035, 0.018);
        this.beat++;
        this.beatTimer += intense ? 0.235 : 0.32;

  // Switch playable character. Allowed on the title screen, and live mid-battle
  // (keeps current HP ratio + grants a short invuln so it feels like a tag-swap).
  function cycleWing() {
    // 切换装备僚机（标题界面）
    const i = WINGS.indexOf(equippedWing);
    equippedWing = WINGS[(i + 1) % WINGS.length];
    const nm = equippedWing === 'saintcrown' ? '圣冕圣械' : '无（角色自带）';
    setMessage('僚机：' + nm, 1.6);
    if (saintActive()) syncScWing();
  }
  function selectChar(which) {
    if (!CHARACTERS[which] || which === selectedChar) return;
    if (state === 'title') {
      selectedChar = which;
      player.maxHp = curChar().maxHp;
      player.hp = player.maxHp;
      setMessage('已选择 ' + curChar().name, 1.6);
      return;
    }
    if (state === 'mobs' || state === 'boss' || state === 'bossIntro') {
      const ratio = clamp(player.hp / player.maxHp, 0.15, 1);
      selectedChar = which;
      player.maxHp = curChar().maxHp;
      player.hp = Math.max(1, Math.round(player.maxHp * ratio));
      player.inv = Math.max(player.inv, 0.9);
      addSpriteFx('vfxSkillCircle', player.x, player.y, 150, 0.45, 0, 0.5, 0.85);
      burst(player.x, player.y, '#bfe6ff', 22, 220, true);
      setFlash(0.4, curChar().auraColor);
      playSfx('skillBeam', 0.3, 0.1);
      setMessage('换将 · ' + curChar().name, 1.4);
    }
    wingmen.length = 0; syncWingmen();   // 切换到/离开亚奴西亚时刷新僚机
    nrBlades.length = 0; if (reaverActive()) syncNrBlades();   // 切换到/离开夜裁时刷新浮游刀锋
    nrWingmen.length = 0; if (reaverActive()) syncNrWingmen();  // 刷新夜裁僚机
    if (saintActive()) syncScWing();                            // 刷新圣冕僚机（任意角色都生效）
    nrRings.length = 0; nrVoid.active = false;
  }

  function addParticle(x, y, vx, vy, life, r, color, glow = false) {
    // 降级时按概率丢弃粒子并收紧上限，弱机优先保弹幕/手感
    if (perfLevel === 1 && Math.random() < 0.4) return;
    if (perfLevel === 2 && Math.random() < 0.7) return;
    const cap = perfLevel === 2 ? 160 : (perfLevel === 1 ? 240 : 340);
    if (particles.length > cap) particles.splice(0, particles.length - cap);
    particles.push({ x, y, vx, vy, life, maxLife: life, r, color, glow });
  }

  function burst(x, y, color, n = 16, power = 170, glow = true) {
    for (let i = 0; i < n; i++) {
      const a = rand(0, TAU);
      const s = rand(power * 0.25, power);
      addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.25, 0.75), rand(2, 8), color, glow);
    }
  }

  // Directional spark fan: tight, fast streaks shooting outward from an impact point.
  function sparks(x, y, color, n = 10, baseAngle = -Math.PI / 2, spread = TAU, power = 320) {
    for (let i = 0; i < n; i++) {
      const a = baseAngle + rand(-spread / 2, spread / 2);
      const s = rand(power * 0.45, power);
      addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.18, 0.4), rand(1.6, 4.2), color, true);
    }
  }

  // —— 程序化扩散环（替代贴图光圈/冲击环）——
  const procRings = [];
  function addRingFx(x, y, r0, r1, life, colorPrefix = 'rgba(190,225,255,', lw = 3, ry = 1) {
    if (perfLevel === 2 && Math.random() < 0.5) return;
    procRings.push({ x, y, r0, r1, life, maxLife: life, c: colorPrefix, lw, ry });
    if (procRings.length > 40) procRings.shift();
  }
  function updateProcRings(dt) {
    for (let i = procRings.length - 1; i >= 0; i--) { procRings[i].life -= dt; if (procRings[i].life <= 0) procRings.splice(i, 1); }
  }
  // 流体光柱：正弦扭动的软边竖直光束（无直边、无贴图）
  function fluidColumn(cx, hw, topY, botY, glowRGB, coreRGBA, ampMul = 0.18, spd = 8) {
    const h = botY - topY; if (h <= 1) return;
    const t = time, step = (perfLevel >= 2 ? 30 : (perfLevel >= 1 ? 22 : 15));
    const amp = hw * ampMul, freq = 0.03;
    ctx.beginPath();
    for (let y = topY; y <= botY; y += step) {
      const wav = Math.sin(y * freq + t * spd) * amp + Math.sin(y * freq * 2.1 - t * spd * 0.7) * amp * 0.4;
      const xx = cx + wav - hw; (y === topY) ? ctx.moveTo(xx, y) : ctx.lineTo(xx, y);
    }
    for (let y = botY; y >= topY; y -= step) {
      const wav = Math.sin(y * freq + t * spd) * amp + Math.sin(y * freq * 2.1 - t * spd * 0.7) * amp * 0.4;
      ctx.lineTo(cx + wav + hw, y);
    }
    ctx.closePath();
    const g = ctx.createLinearGradient(cx - hw, 0, cx + hw, 0);
    g.addColorStop(0, `rgba(${glowRGB},0)`); g.addColorStop(0.5, coreRGBA); g.addColorStop(1, `rgba(${glowRGB},0)`);
    ctx.fillStyle = g; ctx.fill();
  }

  // 程序化弯刃（镰刀/月刃通用）：以原点为中心，半径 R，glow/edge 为 'r,g,b'
  function drawScytheBlade(R, glowRGB, edgeRGB, ghostA) {
    // 光晕
    const hg = ctx.createRadialGradient(0, 0, 0, 0, 0, R * 1.5);
    hg.addColorStop(0, `rgba(${glowRGB},0.5)`); hg.addColorStop(0.5, `rgba(${glowRGB},0.2)`); hg.addColorStop(1, `rgba(${glowRGB},0)`);
    ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(0, 0, R * 1.5, 0, TAU); ctx.fill();
    // 弯刃路径（外凸弧 - 内凹弧）
    const blade = (sc, fill) => {
      ctx.beginPath();
      ctx.moveTo(-R * sc, R * 0.42 * sc);
      ctx.quadraticCurveTo(0, -R * 1.18 * sc, R * sc, R * 0.42 * sc);
      ctx.quadraticCurveTo(0, -R * 0.05 * sc, -R * sc, R * 0.42 * sc);
      ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
    };
    // 残影
    if (ghostA) { ctx.globalAlpha = ghostA; ctx.save(); ctx.translate(0, R * 0.5); blade(0.96, `rgba(${glowRGB},0.8)`); ctx.restore(); ctx.globalAlpha = 1; }
    // 主刃渐变
    const lg = ctx.createLinearGradient(0, -R * 1.1, 0, R * 0.4);
    lg.addColorStop(0, `rgba(${edgeRGB},0.98)`); lg.addColorStop(0.5, `rgba(${glowRGB},0.9)`); lg.addColorStop(1, `rgba(${glowRGB},0.35)`);
    blade(1, lg);
    // 内核高光 + 前缘锐光
    blade(0.6, `rgba(${edgeRGB},0.9)`);
    ctx.globalAlpha = 0.85; ctx.lineWidth = 1.6; ctx.strokeStyle = `rgba(${edgeRGB},0.9)`;
    ctx.beginPath(); ctx.moveTo(-R, R * 0.42); ctx.quadraticCurveTo(0, -R * 1.18, R, R * 0.42); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function drawProcRings() {
    if (!procRings.length) return;
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    for (const g of procRings) {
      const k = 1 - g.life / g.maxLife;          // 0→1 扩散
      const r = g.r0 + (g.r1 - g.r0) * k;
      const a = (1 - k) * 0.9;
      ctx.globalAlpha = a; ctx.strokeStyle = g.c + a + ')'; ctx.lineWidth = g.lw * (1 - k * 0.5);
      ctx.save(); ctx.translate(g.x, g.y); ctx.scale(1, g.ry);
      ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU); ctx.stroke(); ctx.restore();
    }
    ctx.restore(); ctx.globalAlpha = 1;
  }

  function dmgText(x, y, text, color = '#fff2a8', size = 24) {

  function addEnemyBullet(x, y, vx, vy, r = 7, color = '#ffd46a', damage = 8, life = 7, kind = 'orb') {
    if (enemyBullets.length >= MAX_ENEMY_BULLETS) cullEnemyBullets();
    const b = { x, y, vx, vy, ax: 0, ay: 0, r, color, damage, life, maxLife: life, kind, grazed: false, rot: rand(0, TAU), spin: rand(-3, 3) };
    enemyBullets.push(b);

  // 超限回收：优先剔除已飞出屏幕（玩家看不见）的子弹，屏幕内的尽量保留，
  // 避免出现“屏幕内弹幕凭空消失”。出屏弹不够时才删最旧的。
  function cullEnemyBullets() {
    let need = enemyBullets.length - MAX_ENEMY_BULLETS + 1;
    if (need <= 0) return;
    for (let i = 0; i < enemyBullets.length && need > 0; i++) {
      const b = enemyBullets[i];
      if (b.x < -40 || b.x > W + 40 || b.y < -60 || b.y > H + 60) {
        enemyBullets.splice(i, 1); i--; need--;
      }
    }
    if (need > 0) enemyBullets.splice(0, need);
  }

    const s = { x, y, vx, vy, damage, r, kind, life: 2.6, pierce, homing: kind === 'bird', rot: rand(0, TAU), spin: kind === 'scythe' ? rand(-3, 3) : rand(-6, 6), flap: (Math.random() * 4) | 0 };

  function spawnWave(index) {

    if (waves[index]) waves[index]();

  // 各关卡的敌人池（用于肉鸽附加波次随机增援）

    stage1: ['bat', 'shade', 'familiar', 'nun'],
    stage2: ['familiar', 'shade', 'phantom', 'nun'],
    stage3: ['wisp', 'specter', 'banshee', 'cultist'],

  // —— 编队入场系统：多种规律阵型，让每一波小怪入场都整齐又多变 ——
  function spawnEnemyV(type, x, y, vx) {
    spawnEnemy(type, x, y);
    if (vx) { const e = enemies[enemies.length - 1]; if (e) e.vx = vx; }
  }
  const FORMATIONS = ['row', 'vshape', 'wings', 'arc', 'diamond'];
  function spawnFormation(shape, type, n) {
    const margin = 66, span = W - margin * 2, cx = W * 0.5;
    n = Math.max(2, n);
    if (shape === 'vshape') {                       // 倒 V 箭头：中央最先入场
      for (let i = 0; i < n; i++) { const t = n === 1 ? 0 : i / (n - 1) - 0.5; spawnEnemyV(type, cx + t * span, -70 - (0.5 - Math.abs(t)) * 220); }
    } else if (shape === 'wings') {                 // 两翼：左右两群，向中间斜插
      const half = Math.ceil(n / 2);
      for (let i = 0; i < half; i++) { spawnEnemyV(type, margin + i * 46, -70 - i * 40, 24); }
      for (let i = 0; i < n - half; i++) { spawnEnemyV(type, W - margin - i * 46, -70 - i * 40, -24); }
    } else if (shape === 'arc') {                   // 下凹弧线：两端高、中间低
      for (let i = 0; i < n; i++) { const t = n === 1 ? 0.5 : i / (n - 1); spawnEnemyV(type, margin + span * t, -70 - Math.sin(t * Math.PI) * 150); }
    } else if (shape === 'diamond') {               // 菱形集群：1-2-3-2-1
      const rows = [1, 2, 3, 2, 1]; let placed = 0;
      for (let r = 0; r < rows.length && placed < n; r++) {
        const c = Math.min(rows[r], n - placed);
        for (let j = 0; j < c; j++) { const t = c === 1 ? 0 : j / (c - 1) - 0.5; spawnEnemyV(type, cx + t * 180, -70 - r * 52); placed++; }
      }
    } else {                                        // row：等距横排（轻微锯齿）
      for (let i = 0; i < n; i++) { const x = margin + (n === 1 ? span / 2 : span * i / (n - 1)); spawnEnemyV(type, x, -70 - (i % 2) * 46); }
    }
  }
  let bonusFormN = 0;

    const forms = (prof && prof.forms) ? prof.forms : FORMATIONS;   // 用本关专属阵型

    const type = pool[bonusFormN % pool.length];
    bonusFormN++;
    spawnFormation(shape, type, n);
    // 偶尔混编一小队精英/异类，增加层次（每 3 波一次）
    if (bonusFormN % 3 === 0) {
      const type2 = pool[(bonusFormN + 2) % pool.length];
      for (let i = 0; i < 2; i++) spawnEnemy(type2, W * (0.34 + i * 0.32), -150 - i * 40);
    }
  }

      dpsCap: bhp / 36, dmgCreditMax: bhp * 0.06, dmgCredit: bhp * 0.06,

    bossPhase = -1;

  function spawnCircle(x, y, count, speed, color, offset = 0, r = 7, damage = 8, kind = 'orb') {
    count = Math.max(count, Math.round(count * densMul()));
    for (let i = 0; i < count; i++) {
      const a = offset + (i / count) * TAU;
      addEnemyBullet(x, y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, damage, 7, kind);
    }
  }

  function spawnFanAtPlayer(x, y, count, spread, speed, color, r = 6) {
    const base = angleTo(x, y, player.x, player.y);
    const dm = densMul();
    count = Math.max(count, Math.round(count * dm));
    const sp = spread * (count > 1 ? Math.min(1.5, dm) : 1);
    for (let i = 0; i < count; i++) {
      const t = count === 1 ? 0.5 : i / (count - 1);
      const a = base - sp / 2 + sp * t;
      addEnemyBullet(x, y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 8, 7, 'needle');
    }
  }

  function spawnWall(y, gapCenter, gapSize, speed, color) {
    const step = 32;
    for (let x = 28; x < W; x += step) {
      if (Math.abs(x - gapCenter) < gapSize * 0.5) continue;
      addEnemyBullet(x, y, 0, speed, 8, color, 8, 8, 'orb');
    }
  }

  function spawnDenseArc(x, y, count, spread, speed, color, baseAngle, r = 6, kind = 'orb') {
    for (let i = 0; i < count; i++) {
      const t = count === 1 ? 0.5 : i / (count - 1);
      const a = baseAngle - spread * 0.5 + spread * t;
      addEnemyBullet(x, y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 8, 7.5, kind);
    }
  }

    const columns = [78, W - 78];

      for (let y = -36; y < H * 0.56; y += 44) {

  function addLaserWarning(x1, y1, x2, y2, width = 34, delay = 1.0, duration = 0.75) {

  function pointLineDistance(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const len2 = dx * dx + dy * dy || 1;
    let t = ((px - x1) * dx + (py - y1) * dy) / len2;
    t = clamp(t, 0, 1);
    const x = x1 + dx * t, y = y1 + dy * t;
    return Math.hypot(px - x, py - y);
  }

  function useBeam() {
    if (player.beamCd > 0 || state === 'title' || state === 'win' || state === 'lose') return;

  function useBomb() {
    if (player.energy < player.maxEnergy || player.bombCd > 0 || state === 'title' || state === 'win' || state === 'lose') return;
    player.energy = 0;
    player.bombCd = 1.3;
    skillCutin = { life: 0.95, maxLife: 0.95, key: curChar().cutin, name: curChar().name, aura: curChar().auraColor };

    // —— 伊丽莎白「血蚀」：向前发射巨大赤红冲击波（全屏多列激光） ——
    if (curChar().ultKind === 'crimsonBeam') {
      player.bombCd = 1.6;
      ultimateEffect = { x: player.x, y: player.y, life: 1.2, maxLife: 1.2, fullLaser: true };
      flash = 0.8; screenShake = 26; audio.bomb();
      const clearCount = enemyBullets.length;
      enemyBullets.length = 0; warnings.length = 0; lasers.length = 0;
      const cols = 9;
      for (let c = 0; c < cols; c++) {
        const lx = (W / (cols + 1)) * (c + 1);
        enemies.forEach(e => { if (Math.abs(e.x - lx) < W / (cols + 1)) e.hp -= 900; });
      }
      enemies.forEach(e => { e.hp -= 300; });
      if (boss && state === 'boss') hitBoss(2600, boss.x, boss.y, true);

      dmgText(W * 0.5, H * 0.42, `血蚀 · 始祖之怒 ×${clearCount}`, '#ffd0d6', 32);
      return;
    }

    // —— 雅努西娅「坠月之巅」：制造坠落之月黑暗幻影，巨额AoE ——
    if (curChar().ultKind === 'fallMoon') {
      player.bombCd = 1.8;
      ultimateEffect = { x: W * 0.5, y: H * 0.38, life: 2.2, maxLife: 2.2, fallMoon: true };
      flash = 0.7; screenShake = 30; audio.bomb();
      const clearCount = enemyBullets.length;
      enemyBullets.length = 0; warnings.length = 0; lasers.length = 0;
      // 坠月冲击：全场巨额伤害
      enemies.forEach(e => { e.hp -= 1400; });
      if (boss && state === 'boss') hitBoss(2400, boss.x, boss.y, true);
      for (let i = 0; i < 150; i++) { const a = rand(0, TAU), s = rand(60, 520); addParticle(W * 0.5, H * 0.4, Math.cos(a) * s, Math.sin(a) * s, rand(0.4, 1.1), rand(3, 12), i % 2 ? '#ff8a6a' : '#ff5a6e', true); }
      dmgText(W * 0.5, H * 0.5, `坠月之巅 ×${clearCount}`, '#ffd0d6', 32);
      return;
    }

    // —— 夜裁「终焉裁界」：裂界黑洞三段式（展开→吸附吞噬→星爆裁决） ——
    if (curChar().ultKind === 'voidJudgement') {

    ultimateEffect = { x: player.x, y: player.y, life: 1.05, maxLife: 1.05 };
    addSpriteFx('vfxClearBullets', player.x, player.y, 520, 0.82, 0, 0.72, 0.62);
    flash = 0.75;
    screenShake = 22;
    audio.bomb();
    const clearCount = enemyBullets.length;
    enemyBullets.length = 0;
    warnings.length = 0;
    lasers.length = 0;
    if (boss && state === 'boss') hitBoss(900, boss.x, boss.y, true);
    enemies.forEach(e => { e.hp -= 450; });
    for (let i = 0; i < 120; i++) {
      const a = rand(0, TAU), s = rand(70, 480);
      addParticle(player.x, player.y, Math.cos(a) * s, Math.sin(a) * s, rand(0.35, 1.1), rand(3, 13), i % 2 ? '#f2d6ff' : '#9bdcff', true);
    }
    dmgText(W * 0.5, H * 0.44, `月蚀清弹 ×${clearCount}`, '#f6d6ff', 34);
  }

  function hitBoss(amount, x, y, big = false) {
    if (!boss || boss.inv > 0 || boss.dead) return;
    amount = amount * grindDmg();
    // DPS 上限：单位时间内最多扣除 dmgCredit，爆发被摊平 → Boss 不会被秒，约 20-40 秒清完
    if (boss.dmgCredit !== undefined) {
      const actual = Math.min(amount, boss.dmgCredit);
      boss.dmgCredit -= actual;
      if (actual <= 0.5) { boss.hitFlash = 0.16; if (Math.random() < 0.3) addSpriteFx('vfxBossHit', x, y, 50, 0.18, rand(0, TAU), 0.2, 0.4); return; } // 信用耗尽：格挡，不掉血
      amount = actual;
    }
    boss.hp = Math.max(0, boss.hp - amount);
    boss.hitFlash = 0.16;
    playSfx('enemyHit', big ? 0.7 : 0.4, 0.06);   // 命中 Boss 的打击反馈（节流防刷屏）
    score += Math.floor(amount * 1.5);
    player.combo += 1;
    comboTimer = 2.0;
    bossDamageTicker++;
    if (big || Math.random() < 0.16) addSpriteFx(big ? 'vfxBossBreak' : 'vfxBossHit', x, y, big ? 180 : 74, big ? 0.46 : 0.22, rand(0, TAU), big ? 0.5 : 0.25, big ? 0.74 : 0.62);
    if (!big && bossDamageTicker % 4 === 0) {
      const pop = Math.floor(amount * rand(420, 780));
      dmgText(x + rand(-95, 95), y + rand(-46, 34), pop, '#ffb45f', rand(24, 34));
    }
    if (big || amount >= 150) dmgText(x + rand(-20, 20), y + rand(-25, 30), Math.floor(amount), big ? '#fff2a8' : '#e5fbff', big ? 34 : 22);
    if (boss.hp <= 0) defeatBoss();
  }

  function defeatBoss() {
    if (!boss || boss.dead) return;
    boss.dead = true;
    bossesCleared++;
    state = 'bossOutro';
    stateTimer = 0;
    screenShake = 30;
    flash = 1;
    audio.bossBoom();
    addSpriteFx('vfxExplosionLarge', boss.x, boss.y + 12, 390, 1.15, 0, 0.62, 0.88);
    for (let i = 0; i < 180; i++) {
      const a = rand(0, TAU), s = rand(40, 520);
      addParticle(boss.x, boss.y, Math.cos(a) * s, Math.sin(a) * s, rand(0.5, 1.8), rand(3, 16), i % 3 ? '#ffd983' : '#c199ff', true);
    }
    enemyBullets.length = 0;
    warnings.length = 0;
    lasers.length = 0;
    // Boss 击破奖励：必掉一个插件（终极 Boss 更偏向掉七神武）+ 资源
    addItem(boss.x, boss.y, (bossKind === 'finalboss' || bossKind === 'seraph') ? 'plugin_qishenwu' : randPlugin());
    addItem(boss.x - 40, boss.y, 'heal');
    addItem(boss.x + 40, boss.y, Math.random() < 0.5 ? 'life' : 'bomb');
    if (bossKind === 'finalboss') {
      setMessage('Victory · 第一章 · 月蚀终幕', 999);
    } else if (bossKind === 'midboss') {
      setMessage('守卫被击破！', 2.2);
      playSfx('bossPhase', 0.5, 0.6);
    } else if (bossKind === 'seraph') {
      setMessage('六翼炽天使坠落……极光散尽', 2.2);
      playSfx('bossPhase', 0.55, 0.72);
    } else if (bossKind === 'eclipseboss') {
      setMessage('蚀环守望者陨落……月蚀深处展开', 2.2);
      playSfx('bossPhase', 0.55, 0.7);
    } else {
      setMessage('Boss被击破！', 2.2);
      playSfx('bossPhase', 0.55, 0.7);
    }
  }

  // Short death/transition beat after a boss falls, then continue the chapter.
  function updateBossOutro(dt) {
    if (boss) {
      boss.t += dt;
      boss.y = lerp(boss.y, boss.y + 40, 0.02);
    }
    if (stateTimer < 1.4 && tickEvery(stateTimer, dt, 0.2) && boss) {
      addSpriteFx('vfxBossBreak', boss.x + rand(-90, 90), boss.y + rand(-70, 70), 130, 0.42, rand(0, TAU), 0.4, 0.7);
      burst(boss.x + rand(-60, 60), boss.y + rand(-40, 40), Math.random() < 0.5 ? '#ffd983' : '#c199ff', 14, 240, true);
      screenShake = Math.max(screenShake, 10);
    }
    if (stateTimer > 2.6) {
      // Stage progression mapping
      const stageProgression = {
        'stage1': 'stage2',
        'stage2': 'stage3',
        'stage3': 'stage4',
        'stage4': 'stage5',
        'stage5': 'stage6',
        'stage6': 'stage7',
        'stage7': 'stage8',
        'stage8': 'stage9',
        'stage9': 'stage10',
        'stage10': null  // Final stage leads to loop
      };

      const stageMessages = {
        'stage2': '第二幕：月蚀回廊',
        'stage3': '第三幕：极光圣域',
        'stage4': '第四幕：银冠圣域',
        'stage5': '第五幕：幽冥深渊',
        'stage6': '第六幕：终焉之境',
        'stage7': '第七幕：虚空裂隙',
        'stage8': '第八幕：混沌之核',
        'stage9': '第九幕：血月回廊',
        'stage10': '第十幕：终焉月蚀',
      };
      
      if (bossKind === 'finalboss') {
        // Final boss defeated - loop to stage1 with increased difficulty
        loopCount++;
        segment = 'stage1';
        state = 'mobs';
        waveIndex = 0;
        extraSpawned = 0;
        stateTimer = 0;
        spawnTimer = 1.8;
        boss = null;
        bossPhase = -1;

      } else {

        const nextStage = stageProgression[segment];
        if (nextStage) {
          segment = nextStage;
          state = 'mobs';
          waveIndex = 0;
          extraSpawned = 0;
          stateTimer = 0;
          spawnTimer = 1.6;
          boss = null;
          bossPhase = -1;
          setMessage(stageMessages[nextStage] || '下一幕开始', 2.6);

          // Reached end of stage6 without finalboss - loop anyway
          loopCount++;
          segment = 'stage1';
          state = 'mobs';
          waveIndex = 0;
          extraSpawned = 0;
          stateTimer = 0;
          spawnTimer = 1.8;
          boss = null;
          bossPhase = -1;
          bossesCleared++;
          player.lives = Math.min(6, player.lives + 1);
          player.hp = player.maxHp;
          setMessage('轮回 ' + (loopCount + 1) + ' · 月蚀更深，强度大幅提升！', 3.2);

      playSfx('victory', 0.6, 1);
    }
  }

  function damagePlayer(amount) {
    if (player.inv > 0 || state === 'win') return;
    player.hp = Math.max(0, player.hp - amount);
    player.inv = 1.3;   // 受击后短暂无敌，防止连续掉血
    player.combo = 0;
    screenShake = 11;
    flash = 0.18;
    audio.hit();
    burst(player.x, player.y, '#ff7b9d', 24, 210, true);
    dmgText(player.x, player.y - 30, `-${amount}`, '#ff9cb0', 25);
    // 被击中会损失部分火力等级（STG 惯例：死亡跌火力），但不至于一击毙命
    player.power = clamp(player.power - 18, 0, MAX_POWER);
    if (player.hp <= 0) {
      if (player.lives > 0) {
        // 复活：清空来袭弹幕、给一段无敌、保留大部分火力
        player.lives--;
        player.hp = player.maxHp;
        player.inv = 2.6;
        player.power = clamp(player.power - 12, 0, MAX_POWER);
        flash = 0.6;
        screenShake = 20;
        enemyBullets.length = 0;
        warnings.length = 0;
        lasers.length = 0;
        addSpriteFx('vfxClearBullets', player.x, player.y, 460, 0.7, 0, 0.6, 0.6);
        setMessage('复活！剩余 ' + player.lives, 1.6);
        playSfx('skillBomb', 0.4, 0.3);
        return;
      }
      state = 'lose';
      stateTimer = 0;
      setMessage('Game Over · 按 R 重开', 999);
      playSfx('gameover', 0.62, 1);
      enemyBullets.length = 0;
      warnings.length = 0;
      lasers.length = 0;
    }
  }

  function update(dt) {
    if (paused) {
      audio.update(dt, false);
      return;
    }
    time += dt;
    stateTimer += dt;
    titlePulse += dt;
    screenShake = Math.max(0, screenShake - 38 * dt);
    flash = Math.max(0, flash - 1.8 * dt);
    messageTimer = Math.max(0, messageTimer - dt);
    comboTimer = Math.max(0, comboTimer - dt);
    if (comboTimer <= 0) player.combo = 0;

    updateBackground(dt);
    audio.update(dt, state === 'boss' && bossPhase >= 2);
    if (musicStarted && !musicMuted) syncBgmTrack();
    if (bgmEl && musicStarted && !musicMuted) bgmEl.volume = lerp(bgmEl.volume, state === 'boss' ? 0.64 : 0.52, 0.035);

    if (state === 'title') {
      updateParticles(dt);
      updateSpriteFx(dt);
      return;
    }

    updatePlayer(dt);
    updatePlayerShots(dt);
    updateGiantBirds(dt);
    updateItems(dt);
    updateEnemies(dt);
    updateEnemyBullets(dt);
    updateWarnings(dt);
    updateLasers(dt);
    updateParticles(dt);
    updateSpriteFx(dt);
    updateDamageTexts(dt);
    updateQishenwu(dt);
    updateWingmen(dt);

    if (state === 'mobs' || state === 'boss' || state === 'bossIntro' || state === 'bossOutro') elapsed += dt;
    if (state === 'mobs') updateMobStage(dt);
    if (state === 'bossIntro') updateBossIntro(dt);
    if (state === 'boss') updateBoss(dt);
    if (state === 'bossOutro') updateBossOutro(dt);
    if (state === 'win' || state === 'lose') {
      // slow cleanup after result
      enemyBullets.length = Math.min(enemyBullets.length, 80);
    }
  }

  function updateBackground(dt) {
    for (const s of stars) {
      s.y += s.sp * dt * (state === 'boss' ? 1.22 : 0.75);
      s.tw += dt * rand(0.4, 1.2);
      if (s.y > H + 4) { s.y = -4; s.x = rand(0, W); }
    }
    for (const f of fog) {
      f.y += f.sp * dt;
      f.x += Math.sin(time * 0.2 + f.r) * 3 * dt;
      if (f.y - f.r > H) { f.y = -f.r; f.x = rand(-120, W + 120); }
    }
  }

  // ===== 月泪·圣羽僚机系统（仅亚奴西亚）=====
  function wingmanActive() { return curChar() === CHARACTERS.yanuxiya; }
  function syncWingmen() {

  function updateWingmen(dt) {

      if (ber && firing) {
        const mx = w.x, my = w.renderY - 12;

        w.laserTick = (w.laserTick || 0) - dt;

          const dmg = (7 + lv * 3) * berserkDmg() * grindDmg();
          for (const e of enemies) { if (e.y < my && Math.abs(e.x - mx) < halfW + e.r) { e.hp -= dmg; e.hitFlash = 0.1; if (Math.random() < 0.5) addParticle(e.x, e.y, rand(-60, 60), rand(-40, 60), 0.2, rand(2, 4), '#ffe7a0', true); } }
          if (boss && state === 'boss' && !boss.dead && Math.abs(boss.x - mx) < halfW + boss.r && boss.y < my) hitBoss(dmg * 0.5, mx, boss.y, false);
          if (audio.wmLaserLoop) audio.wmLaserLoop();
        }
        for (let q = 0; q < 2; q++) addParticle(mx, my, rand(-50, 50), rand(-160, -60), 0.22, rand(1.5, 3), '#ffd98a', true);
      } else if (firing) {
        w.fireT -= dt;
        if (w.fireT <= 0) {
          const mx = w.x, my = w.renderY - 14;
          // 普通：白羽连射（3 发轻扇形）
          w.fireT = 0.2;
          for (let k = -1; k <= 1; k++) {
            const a = -Math.PI / 2 + k * 0.1;
            addPlayerShot(mx, my, Math.cos(a) * 780, Math.sin(a) * 780, 8 + lv * 3, 9, 'wmfeather');
            const s = playerShots[playerShots.length - 1]; s.berserk = false;
          }
          if (audio.wmFeatherShot) audio.wmFeatherShot();
          for (let q = 0; q < 4; q++) addParticle(mx, my, rand(-60, 60), rand(-120, -30), 0.25, rand(1.5, 3), '#cfefff', true);
        }
      }
    }
    // —— 月牙脉冲（中频清场）——
    if (firing) {
      wmCrescentCd -= dt;
      if (wmCrescentCd <= 0) {
        wmCrescentCd = 3.2;
        const n = 3 + (lv >= 4 ? 2 : 0);
        for (const w of wingmen) {
          if (w.spawnT > 0) continue;
          for (let k = 0; k < n; k++) {
            const t = n === 1 ? 0 : (k / (n - 1) - 0.5);
            const a = -Math.PI / 2 + t * 0.5;
            addPlayerShot(w.x, w.renderY - 12, Math.cos(a) * 520, Math.sin(a) * 520, 24 + lv * 6, 16, 'wmcrescent');
            const s = playerShots[playerShots.length - 1]; s.wmGrow = 0.75; s.spin = (k % 2 ? 4 : -4);
          }
        }
        if (audio.wmCrescent) audio.wmCrescent();
        // 程序化发射环：粒子向外扩散
        for (const w of wingmen) {
          if (w.spawnT > 0) continue;
          for (let q = 0; q < 12; q++) { const ang = q / 12 * TAU; addParticle(w.x, w.renderY - 10, Math.cos(ang) * 90, Math.sin(ang) * 90 - 30, 0.32, rand(1.8, 3.2), q % 2 ? '#dff3ff' : '#9fcdff', true); }
          addRingFx(w.x, w.renderY - 10, 14, 52, 0.3, 'rgba(190,225,255,', 2.5);
        }
      }
    }
    // —— 圣月光束 & 圣辉护盾 的冷却触发（仅战斗中）——
    if (firing) {
      if (!wmBeam.active) { wmBeamCd -= dt; if (wmBeamCd <= 0) { wmBeam.active = true; wmBeam.t = 0; wmBeam.x = player.x; wmBeamCd = WMBEAM.cd; if (audio.wmBeamCharge) audio.wmBeamCharge(); } }
      if (!wmShield.active) { wmShieldCd -= dt; if (wmShieldCd <= 0) { wmShieldActivate(); wmShieldCd = WMSHIELD.cd; } }
    }
    updateWmBeam(dt);
    updateWmShield(dt);
  }
  // 圣月光束：蓄力 → 贯穿 → 收束
  function updateWmBeam(dt) {
    if (!wmBeam.active) return;
    wmBeam.t += dt;
    const C = WMBEAM.charge, F = WMBEAM.fire, total = C + F + WMBEAM.recover;
    wmBeam.x = lerp(wmBeam.x, player.x, 0.2);   // 起点缓随玩家
    if (wmBeam.t < C) {
      // 蓄力：聚拢粒子 + 轻微震屏
      if (Math.random() < 0.7) { const a = rand(0, TAU), r = 80 + rand(0, 120); addParticle(wmBeam.x + Math.cos(a) * r, player.y - 30 + Math.sin(a) * r, -Math.cos(a) * 200, -Math.sin(a) * 200, 0.3, rand(2, 5), '#cfefff', true); }
      if (wmBeam.t - dt <= 0) screenShake = Math.max(screenShake, 3);
    } else if (wmBeam.t < C + F) {
      if (wmBeam.t - dt < C) { screenShake = Math.max(screenShake, 10); flash = Math.max(flash, 0.4); if (audio.wmBeamFire) audio.wmBeamFire(); addRingFx(wmBeam.x, player.y - 26, 20, 220, 0.45, 'rgba(220,242,255,', 4); addRingFx(wmBeam.x, player.y - 26, 10, 130, 0.32, 'rgba(255,255,255,', 3); }
      // 贯穿伤害 tick
      const hw = WMBEAM.width / 2 + powerLevel() * 3, top = player.y - 30;
      if (!wmBeam._tick || time - wmBeam._tick > 0.05) {
        wmBeam._tick = time;
        const dmg = (22 + powerLevel() * 8) * grindDmg();
        for (const e of enemies) { if (e.y < top && Math.abs(e.x - wmBeam.x) < hw + e.r) { e.hp -= dmg; e.hitFlash = 0.1; if (Math.random() < 0.4) { sparks(e.x, e.y, '#eafaff', 5, -Math.PI / 2, 1.4, 220); addRingFx(e.x, e.y, 2, 22, 0.2, 'rgba(220,242,255,', 2); } } }
        if (boss && state === 'boss' && !boss.dead && Math.abs(boss.x - wmBeam.x) < hw + boss.r) hitBoss(dmg * 0.6, wmBeam.x, boss.y, true);
      }
    } else if (wmBeam.t >= total) { wmBeam.active = false; }
  }
  function wmShieldActivate() {
    wmShield.active = true; wmShield.t = 0; wmShield.hp = wmShield.maxHp;
    // 清弹：半径内敌弹化为星点
    let cleared = 0;
    for (let i = enemyBullets.length - 1; i >= 0; i--) { const b = enemyBullets[i]; if (dist2(b.x, b.y, player.x, player.y) < WMSHIELD.cleanseR * WMSHIELD.cleanseR) { addParticle(b.x, b.y, rand(-40, 40), rand(-40, 40), 0.3, b.r * 0.7, '#dff3ff', true); enemyBullets.splice(i, 1); cleared++; } }
    // 程序化展开冲击环（替代贴图）
    addRingFx(player.x, player.y, 20, WMSHIELD.cleanseR, 0.5, 'rgba(210,238,255,', 5);
    addRingFx(player.x, player.y, 10, WMSHIELD.cleanseR * 0.7, 0.38, 'rgba(255,255,255,', 3);
    flash = Math.max(flash, 0.2); screenShake = Math.max(screenShake, 6);
    if (audio.wmShieldOpen) audio.wmShieldOpen();
  }
  function updateWmShield(dt) {
    if (!wmShield.active) return;
    wmShield.t += dt;
    // 持续清弹/挡弹：进入护盾的敌弹被消除并扣盾
    const r = WMSHIELD.radius;
    for (let i = enemyBullets.length - 1; i >= 0; i--) { const b = enemyBullets[i]; if (dist2(b.x, b.y, player.x, player.y) < r * r) { enemyBullets.splice(i, 1); wmShield.hp -= 4; addParticle(b.x, b.y, rand(-30, 30), rand(-30, 30), 0.2, 2.5, '#cfefff', true); if (Math.random() < 0.4) addRingFx(b.x, b.y, 2, 26, 0.28, 'rgba(200,235,255,', 2); } }
    if (wmShield.hp <= 0 || wmShield.t > WMSHIELD.duration) {
      wmShield.active = false;
      for (let q = 0; q < 26; q++) { const a = rand(0, TAU), s = rand(120, 360); addParticle(player.x, player.y, Math.cos(a) * s, Math.sin(a) * s, rand(0.3, 0.7), rand(2, 5), Math.random() < 0.5 ? '#dff3ff' : '#ffe7a0', true); }
      if (audio.wmShieldBreak) audio.wmShieldBreak();
    }
  }
  function drawWmSkills() {
    if (!wingmanActive()) { wmBeam.active = false; wmShield.active = false; return; }
    // 圣月光束
    if (wmBeam.active) {
      const C = WMBEAM.charge, F = WMBEAM.fire, x = wmBeam.x, top = -10, by = player.y - 24;
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      if (wmBeam.t < C) {
        // 蓄力：程序化汇聚能量核 + 双旋转能量环
        const k = wmBeam.t / C, rr = 70 * (1 - k) + 16;
        // 旋转能量环（程序化，多段弧）
        for (let ri = 0; ri < 2; ri++) {
          const rad = (44 - ri * 16) * (1.1 - k * 0.5);
          ctx.save(); ctx.translate(x, by); ctx.rotate(time * (ri ? -2.6 : 3.2));
          ctx.globalAlpha = (0.35 + 0.5 * k); ctx.strokeStyle = `rgba(210,238,255,${0.5 + 0.4 * k})`; ctx.lineWidth = 2.4;
          for (let seg = 0; seg < 5; seg++) { const a0 = seg / 5 * TAU; ctx.beginPath(); ctx.arc(0, 0, rad, a0, a0 + 0.7); ctx.stroke(); }
          ctx.restore();
        }
        // 汇聚核心
        const g = ctx.createRadialGradient(x, by, 0, x, by, rr); g.addColorStop(0, `rgba(245,252,255,${0.85 * k})`); g.addColorStop(0.4, `rgba(200,230,255,${0.6 * k})`); g.addColorStop(1, 'rgba(180,220,255,0)');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, by, rr, 0, TAU); ctx.fill();
      } else if (wmBeam.t < C + F) {
        const fk = clamp((wmBeam.t - C) / F, 0, 1), env = Math.sin(fk * Math.PI); // 收放包络
        const hw = (WMBEAM.width / 2 + powerLevel() * 3) * (0.6 + env * 0.6);
        // 外辉光（横向渐变软边，替代实心矩形硬边）
        const og = ctx.createLinearGradient(x - hw * 2.2, 0, x + hw * 2.2, 0);
        og.addColorStop(0, 'rgba(150,210,255,0)'); og.addColorStop(0.5, `rgba(150,210,255,${0.36 * env})`); og.addColorStop(1, 'rgba(150,210,255,0)');
        ctx.fillStyle = og; ctx.fillRect(x - hw * 2.2, top, hw * 4.4, by - top);
        // 主束（流体扭动边缘 → 无直边）
        fluidColumn(x, hw, top, by, '190,225,255', `rgba(240,250,255,${0.95 * env})`);
        // 白核（软边渐变 + 微抖）
        const jit = Math.sin(time * 50) * hw * 0.05;
        const cg = ctx.createLinearGradient(x - hw * 0.32 + jit, 0, x + hw * 0.32 + jit, 0);
        cg.addColorStop(0, 'rgba(255,255,255,0)'); cg.addColorStop(0.5, `rgba(255,255,255,${0.97 * env})`); cg.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = cg; ctx.fillRect(x - hw * 0.32 + jit, top, hw * 0.64, by - top);
        // 发射点程序化爆闪 + 旋转星芒
        const isz = 60 * env;
        const ig = ctx.createRadialGradient(x, by, 0, x, by, isz);
        ig.addColorStop(0, `rgba(255,255,255,${0.9 * env})`); ig.addColorStop(0.4, `rgba(210,235,255,${0.6 * env})`); ig.addColorStop(1, 'rgba(180,220,255,0)');
        ctx.fillStyle = ig; ctx.beginPath(); ctx.arc(x, by, isz, 0, TAU); ctx.fill();
        ctx.save(); ctx.translate(x, by); ctx.rotate(time * 3.5); ctx.strokeStyle = `rgba(235,248,255,${0.7 * env})`; ctx.lineWidth = 2.5;
        for (let k2 = 0; k2 < 6; k2++) { ctx.rotate(Math.PI / 3); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -isz * 1.5); ctx.stroke(); }
        ctx.restore();
        // 发射点火花
        if (Math.random() < 0.6) addParticle(x + rand(-hw * 0.5, hw * 0.5), by, rand(-90, 90), rand(40, 120), 0.25, rand(1.5, 3), '#dff2ff', true);
      }
      ctx.restore();
    }
    // 圣辉护盾
    if (wmShield.active) {
      const t = wmShield.t, sc = clamp(t / WMSHIELD.expand, 0, 1);
      const fade = (t > WMSHIELD.duration - 0.4) ? Math.max(0, (WMSHIELD.duration - t) / 0.4) : 1;
      const R = WMSHIELD.radius * sc;
      ctx.save(); ctx.translate(player.x, player.y); ctx.globalCompositeOperation = 'lighter';
      const hp = clamp(wmShield.hp / wmShield.maxHp, 0, 1);
      const shimmer = 0.5 + 0.2 * Math.sin(time * 5);
      // 1) 菲涅尔填充：中空、边缘亮（程序化能量穹顶）
      const fg = ctx.createRadialGradient(0, 0, R * 0.55, 0, 0, R);
      fg.addColorStop(0, 'rgba(120,180,255,0)');
      fg.addColorStop(0.78, `rgba(150,205,255,${0.14 * fade})`);
      fg.addColorStop(0.96, `rgba(205,235,255,${0.42 * fade * shimmer})`);
      fg.addColorStop(1, 'rgba(225,245,255,0)');
      ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(0, 0, R, 0, TAU); ctx.fill();
      // 2) 六边形蜂巢网格（裁剪在盾内）
      ctx.save(); ctx.beginPath(); ctx.arc(0, 0, R * 0.99, 0, TAU); ctx.clip();
      ctx.globalAlpha = (0.32 + 0.18 * hp) * fade; ctx.strokeStyle = 'rgba(180,222,255,0.9)'; ctx.lineWidth = 1;
      const hr = 22; const dx = hr * 1.5, dy = hr * Math.sqrt(3);
      for (let gx = -R; gx <= R; gx += dx) {
        let col = Math.round(gx / dx);
        for (let gy = -R; gy <= R; gy += dy) {
          const oy = (col % 2) ? dy / 2 : 0;
          ctx.beginPath();
          for (let v = 0; v < 6; v++) { const a = v / 6 * TAU + Math.PI / 6; const px = gx + Math.cos(a) * hr, py = gy + oy + Math.sin(a) * hr; v ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
          ctx.closePath(); ctx.stroke();
        }
      }
      // 流光扫过（斜向高光带）
      const sweep = ((time * 0.4) % 1) * (R * 2.6) - R * 1.3;
      const sg = ctx.createLinearGradient(sweep - 40, -R, sweep + 40, R);
      sg.addColorStop(0, 'rgba(255,255,255,0)'); sg.addColorStop(0.5, `rgba(235,248,255,${0.3 * fade})`); sg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = sg; ctx.globalAlpha = fade; ctx.fillRect(-R, -R, R * 2, R * 2);
      ctx.restore();
      // 3) 边缘亮环（双层）
      ctx.globalAlpha = (0.5 + 0.3 * hp) * fade; ctx.strokeStyle = `rgba(210,238,255,${0.85 * fade})`; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(0, 0, R, 0, TAU); ctx.stroke();
      ctx.globalAlpha = 0.4 * fade * shimmer; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.arc(0, 0, R, 0, TAU); ctx.stroke();
      ctx.restore();
    }
  }
  function drawWingmen() {
    if (!wingmen.length) return;

    const bodyKey = ber ? (assetReady('wmBodyTB') ? 'wmBodyTB' : (assetReady('wmBodyBerserk') ? 'wmBodyBerserk' : 'wmBody')) : 'wmBody';
    const firing = (state === 'mobs' || state === 'boss');
    for (const w of wingmen) {
      const y = w.renderY != null ? w.renderY : w.y;

      const ll = w.laserLvl || 0;
      if (ll > 0.02 && firing) {
        const mx = w.x, my = y - 12, halfW = (18 + powerLevel() * 2) * ll;
        const flick = 0.85 + 0.15 * Math.sin(time * 60 + w.x);   // 高频闪烁
        ctx.save(); ctx.globalCompositeOperation = 'lighter';
        // 外辉光（横向渐变 → 软边，无硬矩形）
        const og = ctx.createLinearGradient(mx - halfW * 2.0, 0, mx + halfW * 2.0, 0);
        og.addColorStop(0, 'rgba(255,180,90,0)'); og.addColorStop(0.5, 'rgba(255,200,120,' + (0.32 * ll) + ')'); og.addColorStop(1, 'rgba(255,180,90,0)');
        ctx.fillStyle = og; ctx.fillRect(mx - halfW * 2.0, -20, halfW * 4.0, my + 20);
        // 主束（流体扭动软边 → 彻底去除直边/贴图感）

        // 白色核心（流体细芯 + 闪烁）
        fluidColumn(mx, halfW * 0.42, -20, my, '255,250,230', 'rgba(255,255,255,' + (0.98 * ll * flick) + ')', 0.22, 13);
        // 顶端冲击辉光（程序化爆点 + 旋转星芒）
        const isz = 34 * ll * flick;

        ig.addColorStop(0, 'rgba(255,255,255,' + (0.9 * ll) + ')'); ig.addColorStop(0.4, 'rgba(255,235,180,' + (0.6 * ll) + ')'); ig.addColorStop(1, 'rgba(255,200,120,0)');
        ctx.fillStyle = ig; ctx.beginPath(); ctx.arc(mx, my - isz * 0.4, isz, 0, TAU); ctx.fill();
        ctx.save(); ctx.translate(mx, my - isz * 0.4); ctx.rotate(time * 4);
        ctx.strokeStyle = 'rgba(255,250,235,' + (0.7 * ll) + ')'; ctx.lineWidth = 2;
        for (let k = 0; k < 4; k++) { ctx.rotate(Math.PI / 2); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -isz * 1.7); ctx.stroke(); }
        ctx.restore();
        // 枪口爆闪（程序化）
        const cw = 26 * ll * flick;
        let mg = ctx.createRadialGradient(mx, my, 0, mx, my, cw);
        mg.addColorStop(0, 'rgba(255,255,255,' + (0.85 * ll) + ')'); mg.addColorStop(0.5, 'rgba(255,225,160,' + (0.5 * ll) + ')'); mg.addColorStop(1, 'rgba(255,200,120,0)');
        ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, my, cw, 0, TAU); ctx.fill();
        ctx.restore();
        // 枪口/冲击火花粒子
        if (Math.random() < 0.5 * ll) addParticle(mx + rand(-4, 4), my, rand(-60, 60), rand(-40, 60), 0.22, rand(1.5, 3), '#ffe7b0', true);
        if (Math.random() < 0.3 * ll) addParticle(mx + rand(-halfW, halfW), my - rand(0, my * 0.6), rand(-30, 30), rand(-120, -40), 0.25, rand(1, 2.4), '#fff4d8', true);
      }
      ctx.save(); ctx.translate(w.x, y);
      // 核心光晕（呼吸，加大以柔化机体硬边）
      ctx.globalCompositeOperation = 'lighter';
      const pulse = 0.5 + 0.3 * Math.sin(w.floatT * 4);
      const gg = ctx.createRadialGradient(0, 0, 0, 0, 0, 58);
      gg.addColorStop(0, ber ? `rgba(255,205,120,${0.5 * pulse})` : `rgba(190,230,255,${0.45 * pulse})`);
      gg.addColorStop(0.5, ber ? `rgba(255,180,90,${0.22 * pulse})` : `rgba(160,210,255,${0.2 * pulse})`);
      gg.addColorStop(1, 'rgba(255,255,255,0)');

        ctx.globalAlpha = spawnScale;
        ctx.drawImage(img, -bw / 2, -bh / 2, bw, bh);
        // 泛光叠加：放大一圈低透明度加法绘制，让硬边外溢成柔光
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.28 * spawnScale;
        const bb = 1.12; ctx.drawImage(img, -bw * bb / 2, -bh * bb / 2, bw * bb, bh * bb);

  // ===================== 魔王刀锋·夜裁（reaver）系统 =====================
  function reaverActive() { return curChar() === CHARACTERS.reaver; }
  function syncNrBlades() {
    nrBlades.length = 0;
    // 4 枚浮游刀锋，环绕机体（两两对称）
    for (let i = 0; i < 4; i++) nrBlades.push({ ang: i / 4 * TAU, orbit: 56 + (i % 2) * 14, side: i < 2 ? -1 : 1, fireT: rand(0, 0.2) });
  }
  function updateReaver(dt) {
    if (!reaverActive()) { if (nrBlades.length) nrBlades.length = 0; nrRays.length = 0; nrBigBlades.length = 0; if (nrVoid.active) nrVoid.active = false; nrRings.length = 0; return; }
    if (nrBlades.length === 0) syncNrBlades();
    const firing = (state === 'mobs' || state === 'boss') && !nrVoid.active;
    const ber = player.berserk > 0;
    const lv = powerLevel();
    // 浮游刀锋环绕（暴走时旋转更快、张得更开）
    for (const b of nrBlades) {
      b.ang += dt * (ber ? 3.4 : 1.6);
      b.tx = player.x + Math.cos(b.ang) * (b.orbit + (ber ? 22 : 0));
      b.ty = player.y - 26 + Math.sin(b.ang) * (b.orbit * 0.5);
    }
    // 暴走：紫白刀刃能量粒子环绕自身（向内吸附旋绕）
    if (ber) {
      for (let q = 0; q < 2; q++) if (Math.random() < 0.8) { const a = rand(0, TAU), r = rand(40, 86); addParticle(player.x + Math.cos(a) * r, player.y - 10 + Math.sin(a) * r * 0.7, -Math.cos(a) * 70 + rand(-20, 20), -Math.sin(a) * 50 - 30, rand(0.3, 0.6), rand(1.5, 3.4), Math.random() < 0.5 ? '#dfe4ff' : '#b6a2ff', true); }
    }
    // —— 瞄准射线：从角色"直直向上"射出的细灰线（玩家自行移动对位，无自动锁定）——
    //     普通 1 条，暴走 3 条平行射线 ——
    nrRays.length = 0;
    if (firing) {
      const oy = player.y - 26;
      const gap = 44;
      const offs = ber ? [-gap, 0, gap] : [0];
      for (const dx of offs) nrRays.push({ x: player.x + dx, y1: oy, y2: -10 });
    }
    // —— 射线触碰到的敌人：进行「十字空间斩」——每条射线一道大范围 X 斩，
    //     一次斩杀范围内所有敌人（范围伤害，非逐个单体）——
    if (nrRays.length) {
      nrSlashTick -= dt;
      const doSlash = nrSlashTick <= 0;
      if (doSlash) nrSlashTick = ber ? 0.26 : 0.46;     // 低频·一刀斩杀感（暴走略快）
      const touchW = (ber ? 22 : 16);                    // 射线"命中"判定宽度
      if (doSlash) {
        let any = false;
        for (const ray of nrRays) {
          // 找该射线触碰到的最靠上的"已进入屏幕"的敌人作为斩击中心（屏幕外不斩）
          let cy = null, cobj = null;
          for (const e of enemies) { if (e.y > e.r * 0.5 && e.y < player.y - 6 && Math.abs(e.x - ray.x) < touchW + e.r) { if (cy === null || e.y < cy) { cy = e.y; cobj = e; } } }
          if (boss && state === 'boss' && !boss.dead && boss.y < player.y && Math.abs(boss.x - ray.x) < touchW + boss.r) { if (cy === null || boss.y < cy) { cy = boss.y; cobj = boss; } }
          if (cobj) { spawnCrossSlash(ray.x, cy, ber, lv); any = true; }
        }
        if (any && audio.nrSlash) audio.nrSlash(ber);
      }
    }
    // —— 暴走：自身周围生成更大的发光刀刃（旋转切割，碰敌即斩） ——
    if (ber && firing) {
      if (nrBigBlades.length < 4) for (let i = nrBigBlades.length; i < 4; i++) nrBigBlades.push({ ang: i / 4 * TAU, r: 96, t: rand(0, 1), hitT: 0 });
    } else if (nrBigBlades.length) nrBigBlades.length = 0;
    for (const bb of nrBigBlades) {
      bb.ang += dt * 2.6; bb.t += dt;
      bb.x = player.x + Math.cos(bb.ang) * bb.r; bb.y = player.y - 20 + Math.sin(bb.ang) * bb.r * 0.7;
      bb.hitT -= dt;
      if (bb.hitT <= 0) {
        bb.hitT = 0.12;
        const bdmg = (40 + lv * 12) * berserkDmg() * grindDmg();
        for (const e of enemies) { if (dist2(e.x, e.y, bb.x, bb.y) < (54 + e.r) * (54 + e.r)) { e.hp -= bdmg; e.hitFlash = 0.1; } }
        if (boss && state === 'boss' && !boss.dead && dist2(boss.x, boss.y, bb.x, bb.y) < (54 + boss.r) * (54 + boss.r)) hitBoss(bdmg * 0.5, bb.x, bb.y, false);
      }
    }
    updateNrSlashes(dt);
    // —— 小技能：浮游长剑·六连射（快速顺序发射，穿透）——
    if (nrSwordSalvo > 0) {
      nrSwordTimer -= dt;
      if (nrSwordTimer <= 0) {
        nrSwordTimer = 1.0;                          // 约 1 秒一发（有力、有节奏）
        const off = nrSwordSide * 30;
        nrSwordSide *= -1;
        fireNrSword(player.x + off, player.y - 24, -Math.PI / 2 + (off / 420), 0.34, true);
        nrSwordSalvo--;
      }
    }
    updateNrRings(dt);
    updateNrVoid(dt);
    updateNrUltSwords(dt);
    updateNrWingmen(dt);
  }
  // 发射一把浮游追踪长剑（charge=蓄力时长；蓄力结束突进，之后自动追踪敌人）
  // primary=玩家主发（带较多特效）；false=击杀连锁再生（精简特效，防卡顿）
  function fireNrSword(sx, sy, ang, charge, primary) {
    const lvN = powerLevel();
    addPlayerShot(sx, sy, Math.cos(ang) * 130, Math.sin(ang) * 130, (520 + lvN * 130) * berserkDmg(), 14, 'nrsword');
    const s = playerShots[playerShots.length - 1];
    if (s) { s.rot = ang + Math.PI / 2; s.born = time; s.big = true; s.dashT = charge; s.dashSpd = 2000; s.dashAng = ang; s.boomT = 0; s.homing = false; s.life = 3.6; s.primary = !!primary; s.longsword = true; }
    if (primary) { for (let q = 0; q < 10; q++) { const a2 = rand(0, TAU), r2 = rand(30, 70); addParticle(sx + Math.cos(a2) * r2, sy + Math.sin(a2) * r2, -Math.cos(a2) * 180, -Math.sin(a2) * 180, rand(0.2, 0.4), rand(1.6, 3.2), Math.random() < 0.5 ? '#eef0ff' : '#a98fff', true); } addRingFx(sx, sy, 8, 40, 0.3, 'rgba(210,215,255,', 3); }
  }
  // 生成一道「X 空间斩」：细长锋利的大号 X 斩，一刀斩杀范围内全部敌人
  function spawnCrossSlash(x, y, ber, lv) {
    if (nrSlashes.length > (perfLevel >= 1 ? 12 : 20)) return;
    // 暴走多道斩击错开位置，避免重叠影响观看
    if (ber) { x += rand(-46, 46); y += rand(-40, 40); }
    const R = (ber ? 200 : 150) + lv * 10;         // 斩击范围更大
    const rot = Math.PI / 4 + rand(-0.5, 0.5);     // 倾斜的 X，更有气势
    nrSlashes.push({ x, y, R, rot, life: 0.34, maxLife: 0.34, grow: 0, lean: rand(-0.12, 0.12) });
    if (assetReady('nrSlashBurst')) addSpriteFx('nrSlashBurst', x, y, R * (ber ? 1.5 : 1.2), 0.28, rand(0, TAU), 0.5, 0.9);   // 打击星爆反馈
    // 大范围 AoE：一刀斩杀范围内所有"已进入屏幕"的敌人（屏幕外不计伤害）
    const dmg = (ber ? 360 : 230) * (1 + (lv - 1) * 0.3) * berserkDmg() * grindDmg();
    for (const e of enemies) { if (e.y > e.r * 0.5 && dist2(e.x, e.y, x, y) < R * R) { e.hp -= dmg; e.hitFlash = 0.16; } }
    if (boss && state === 'boss' && !boss.dead && dist2(boss.x, boss.y, x, y) < (R + boss.r) * (R + boss.r)) hitBoss(dmg * 0.45, x, y, false);
    // 暗白色火花 + 沿斩线"拖尾"流动的细长光粒（锋利线条感 + 拖尾光效）
    for (let arm = 0; arm < 4; arm++) {
      const aa = rot + arm * Math.PI / 2;
      for (let q = 0; q < (ber ? 8 : 5); q++) {
        const sp = rand(160, R * 4.0);
        // 沿斩线方向拉出长拖尾光粒
        addParticle(x + Math.cos(aa) * rand(0, R * 0.4), y + Math.sin(aa) * rand(0, R * 0.4), Math.cos(aa) * sp, Math.sin(aa) * sp, rand(0.22, 0.5), rand(1.2, 3), Math.random() < 0.5 ? '#ffffff' : '#cdbcff', true);
      }
    }
    for (let q = 0; q < (ber ? 7 : 4); q++) addParticle(x, y, rand(-150, 150), rand(-150, 150), 0.4, rand(1.8, 4), Math.random() < 0.5 ? '#2a2440' : '#b6a2ff', Math.random() < 0.6);
    screenShake = Math.max(screenShake, ber ? 6 : 4);
    triggerHitStop(ber ? 0.04 : 0.03);             // 轻微顿帧 → 一刀斩杀手感
    // 暴走：随斩击从角色两侧射出半月光刃，自动锁定敌人所在方向（无敌人则交叉斜射）
    if (ber) {
      const lvN = powerLevel();
      const dmg = (90 + lvN * 20) * berserkDmg();
      const spd = 1320;
      // 取两个最近的已进入屏幕的敌人作为锁定方向
      const cand = [];
      for (const e of enemies) if (e.y > e.r * 0.5) cand.push(e);
      if (boss && state === 'boss' && !boss.dead && boss.y > 0) cand.push(boss);
      cand.sort((a, b) => dist2(a.x, a.y, player.x, player.y) - dist2(b.x, b.y, player.x, player.y));
      const oy = player.y - 6;
      const sides = [[-36, 0.52], [36, -0.52]];   // [发射点偏移, 无目标时的默认交叉角]
      for (let i = 0; i < 2; i++) {
        const sx = player.x + sides[i][0];
        let ang;
        const tgt = cand[i] || cand[0];
        if (tgt) ang = Math.atan2(tgt.y - oy, tgt.x - sx);
        else ang = -Math.PI / 2 + sides[i][1];
        addPlayerShot(sx, oy, Math.cos(ang) * spd, Math.sin(ang) * spd, dmg, 24, 'nrhalfmoon');
        const sh = playerShots[playerShots.length - 1]; if (sh) { sh.rot = ang + Math.PI / 2; sh.homing = true; sh.life = 1.6; }
      }
      for (let q = 0; q < 6; q++) addParticle(player.x + rand(-40, 40), player.y - 6, rand(-60, 60), rand(-120, -30), 0.3, rand(1.5, 3), '#cdbcff', true);
    }
    // 斩击打击音由触发处统一播放 audio.nrSlash（此处不再叠加 nrHit，避免重复）
  }
  function updateNrSlashes(dt) {
    for (let i = nrSlashes.length - 1; i >= 0; i--) { const s = nrSlashes[i]; s.life -= dt; s.grow = Math.min(1, s.grow + dt * 9); if (s.life <= 0) nrSlashes.splice(i, 1); }
  }
  // 破空残光：长剑射出时留下的纵向白紫光痕
  function addNrAirSlash(x, y) {
    for (let i = 0; i < 16; i++) { const yy = y - i * 34; addParticle(x + rand(-4, 4), yy, rand(-12, 12), rand(-50, 50), rand(0.1, 0.26), rand(1.4, 3.2), Math.random() < 0.5 ? '#ffffff' : '#c8bcff', true); }
  }
  function castNrRing() {
    nrRings.push({ x: player.x, y: player.y - 30, vy: -NRRING.fwSpeed, phase: 'forward', t: 0, hitT: 0, r: 58, hits: [] });
    if (audio.nrRingCast) audio.nrRingCast();
  }
  function updateNrRings(dt) {
    const lv = powerLevel();
    for (let i = nrRings.length - 1; i >= 0; i--) {
      const ring = nrRings[i];
      ring.t += dt;
      ring.r = 52 + Math.sin(ring.t * 8) * 4 + lv * 3;
      if (ring.phase === 'forward') {
        ring.y += ring.vy * dt;
        if (ring.t > NRRING.forward || ring.y < 120) ring.phase = 'return';
      } else {
        const dx = player.x - ring.x, dy = (player.y - 30) - ring.y, len = Math.hypot(dx, dy) || 1;
        ring.x += dx / len * NRRING.rtSpeed * dt; ring.y += dy / len * NRRING.rtSpeed * dt;
        if (len < 36 || ring.t > NRRING.life) { nrRings.splice(i, 1); continue; }
      }
      // 多段切割判定 + 清弹
      ring.hitT -= dt;
      if (ring.hitT <= 0) {
        ring.hitT = NRRING.hitInterval;
        const dmg = (20 + lv * 6) * berserkDmg() * grindDmg();
        for (const e of enemies) { if (dist2(e.x, e.y, ring.x, ring.y) < (ring.r + e.r) * (ring.r + e.r)) { e.hp -= dmg; e.hitFlash = 0.1; if (Math.random() < 0.35) spawnCrossSlash(e.x, e.y, false, lv); } }
        if (boss && state === 'boss' && !boss.dead && dist2(boss.x, boss.y, ring.x, ring.y) < (ring.r + boss.r) * (ring.r + boss.r)) { hitBoss(dmg * 0.6, ring.x, ring.y, false); if (Math.random() < 0.5) spawnCrossSlash(boss.x, boss.y + rand(-40, 40), false, lv); }
      }

  // 暴走：自身周围「面朝敌人」的锐利光刃（刀尖朝上，轻微摆动）

  function drawNrBlades() {
    if (!nrBlades.length) return;

      const bx = b.tx != null ? b.tx : player.x, by = b.ty != null ? b.ty : player.y;

      // 朝上微微指向（刀尖朝前），暴走偏摆

      // 程序流光辉光（柔化贴图边缘）
      ctx.globalCompositeOperation = 'lighter';
      const gl = ctx.createRadialGradient(0, 0, 0, 0, 0, 26);
      gl.addColorStop(0, ber ? 'rgba(190,200,255,0.45)' : 'rgba(150,195,255,0.4)'); gl.addColorStop(1, 'rgba(150,195,255,0)');
      ctx.fillStyle = gl; ctx.beginPath(); ctx.arc(0, 0, 26, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';

        const img = assets.nrBlade, h = 40, w = h * (img.width / img.height);
        ctx.drawImage(img, -w / 2, -h / 2, w, h);
        // 泛光叠加柔边

        ctx.drawImage(img, -w * 0.62, -h * 0.62, w * 1.24, h * 1.24); ctx.globalAlpha = 1;
      } else {

      }

  function drawNrRings() {
    if (!nrRings.length) return;
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    for (const ring of nrRings) {
      const R = ring.r;
      // 外辉光环
      ctx.globalAlpha = 0.5; const gg = ctx.createRadialGradient(ring.x, ring.y, R * 0.6, ring.x, ring.y, R * 1.3);
      gg.addColorStop(0, 'rgba(150,195,255,0)'); gg.addColorStop(0.7, 'rgba(170,210,255,0.4)'); gg.addColorStop(1, 'rgba(170,210,255,0)');
      ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(ring.x, ring.y, R * 1.3, 0, TAU); ctx.fill();
      // 主环（双层）
      ctx.globalAlpha = 0.9; ctx.strokeStyle = 'rgba(220,238,255,0.9)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(ring.x, ring.y, R, 0, TAU); ctx.stroke();
      ctx.globalAlpha = 0.5; ctx.lineWidth = 7; ctx.beginPath(); ctx.arc(ring.x, ring.y, R, 0, TAU); ctx.stroke();
      // 环上 8 枚旋转刀锋星点
      ctx.save(); ctx.translate(ring.x, ring.y); ctx.rotate(ring.t * 6);
      for (let k = 0; k < 8; k++) { const a = k / 8 * TAU; const px = Math.cos(a) * R, py = Math.sin(a) * R;
        ctx.globalAlpha = 0.95; ctx.fillStyle = '#eaf3ff'; ctx.beginPath(); ctx.moveTo(px + Math.cos(a) * 7, py + Math.sin(a) * 7); ctx.lineTo(px - Math.sin(a) * 4, py + Math.cos(a) * 4); ctx.lineTo(px + Math.sin(a) * 4, py - Math.cos(a) * 4); ctx.closePath(); ctx.fill(); }
      ctx.restore();
    }
    ctx.globalAlpha = 1; ctx.restore();
  }
  function drawNrVoid() {
    if (!nrVoid.active) return;
    const x = nrVoid.x, y = nrVoid.y;
    let R = 0, openK = 1;
    if (nrVoid.phase === 'open') { openK = clamp(nrVoid.t / NRVOID.open, 0, 1); R = 96 * openK; }
    else if (nrVoid.phase === 'suction') R = 96 + Math.sin(time * 8) * 8;
    else if (nrVoid.phase === 'finish') R = 110 * Math.max(0, 1 - nrVoid.t / NRVOID.finish * 1.4);
    else R = 0;
    ctx.save();
    // 暗紫烟雾外圈（alpha+lighten）
    ctx.globalCompositeOperation = 'lighter';
    const smoke = ctx.createRadialGradient(x, y, R * 0.5, x, y, R * 3.2);
    smoke.addColorStop(0, 'rgba(90,70,160,0.0)'); smoke.addColorStop(0.5, 'rgba(80,70,150,0.22)'); smoke.addColorStop(1, 'rgba(60,50,120,0)');
    ctx.fillStyle = smoke; ctx.beginPath(); ctx.arc(x, y, R * 3.2, 0, TAU); ctx.fill();
    // 白蓝锐光环（吸积盘）
    ctx.save(); ctx.translate(x, y); ctx.rotate(time * 2.4);
    for (let ri = 0; ri < 3; ri++) {
      const rr = R * (1.3 + ri * 0.5);
      ctx.globalAlpha = 0.5 - ri * 0.12; ctx.strokeStyle = 'rgba(190,220,255,0.8)'; ctx.lineWidth = 3 - ri;
      ctx.beginPath(); ctx.ellipse(0, 0, rr, rr * 0.42, 0, 0, TAU); ctx.stroke();
    }
    ctx.restore();
    // 旋转刀锋环
    ctx.save(); ctx.translate(x, y); ctx.rotate(-time * 3);
    for (let k = 0; k < 10; k++) { const a = k / 10 * TAU, rr = R * 1.7; const px = Math.cos(a) * rr, py = Math.sin(a) * rr * 0.5;
      ctx.globalAlpha = 0.85; ctx.fillStyle = '#cfe0ff'; ctx.save(); ctx.translate(px, py); ctx.rotate(a); ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(3, 6); ctx.lineTo(-3, 6); ctx.closePath(); ctx.fill(); ctx.restore(); }
    ctx.restore();
    // 中心黑洞（source-over 纯黑核 + 蓝边）
    ctx.globalCompositeOperation = 'source-over';
    const core = ctx.createRadialGradient(x, y, 0, x, y, R);
    core.addColorStop(0, 'rgba(0,0,0,1)'); core.addColorStop(0.7, 'rgba(6,4,18,0.96)'); core.addColorStop(0.92, 'rgba(60,70,140,0.5)'); core.addColorStop(1, 'rgba(150,190,255,0)');
    ctx.fillStyle = core; ctx.beginPath(); ctx.arc(x, y, R, 0, TAU); ctx.fill();
    ctx.restore();

  function updatePlayer(dt) {
    player.prevX = player.x;
    player.prevY = player.y;
    player.inv = Math.max(0, player.inv - dt);
    player.shootCd -= dt;
    player.beamCd = Math.max(0, player.beamCd - dt);
    player.bombCd = Math.max(0, player.bombCd - dt);
    player.grazeCd = Math.max(0, player.grazeCd - dt);
    if (player.berserk > 0) {
      player.berserk = Math.max(0, player.berserk - dt);
      // 暴走金色粒子拖尾
      if (Math.random() < 0.6) addParticle(player.x + rand(-14, 14), player.y + rand(-6, 18), rand(-30, 30), rand(20, 80), 0.3, rand(2, 4), '#ffd45a', true);
    }

    if (pointerDown && pointerTarget) {
      player.x = pointerTarget.x;
      player.y = pointerTarget.y;
    } else {
      let dx = 0, dy = 0;
      if (keys.ArrowLeft || keys.KeyA) dx -= 1;
      if (keys.ArrowRight || keys.KeyD) dx += 1;
      if (keys.ArrowUp || keys.KeyW) dy -= 1;
      if (keys.ArrowDown || keys.KeyS) dy += 1;
      const len = Math.hypot(dx, dy) || 1;
      const slow = !!(keys.ShiftLeft || keys.ShiftRight);
      const cc = curChar();
      const speed = slow ? cc.slowSpeed : cc.speed;
      if (dx || dy) {
        player.x += (dx / len) * speed * dt;
        player.y += (dy / len) * speed * dt;
      }
    }
    player.x = clamp(player.x, 36, W - 36);
    player.y = clamp(player.y, 260, H - 58);
    player.moveVX = (player.x - player.prevX) / Math.max(dt, 0.001);
    player.moveVY = (player.y - player.prevY) / Math.max(dt, 0.001);

    const firing = (state === 'mobs' || state === 'boss');
    const cc = curChar();
    // 飞羽增伤已弃用（雅努西娅改回激光）；保留 fireRamp 衰减以防残留
    player.fireRamp = Math.max(0, player.fireRamp - dt * 1.4);
    if (cc.weapon === 'laser') {
      // 激光束角色（雅努西娅）：持续激光，开火逻辑独立（暴走变粗+分裂锁敌）
      updatePlayerLaser(dt, firing);
    } else if (cc.weapon === 'bladeray') {
      // 夜裁：瞄准射线 + 空间斩，全部逻辑在 updateReaver（不发射散弹）
      pLasers.length = 0; pBeams.length = 0;
    } else {
      pLasers.length = 0;
      pBeams.length = 0;
      if (firing && player.shootCd <= 0) {
        const ber = player.berserk > 0;
        player.shootCd = cc.shootCd * (ber ? 0.6 : 1);   // 暴走：射速提升
        // 夜裁暴走时由 updateReaver 的"暴走倾泻"接管主输出，普攻扇形让位避免过密
        if (!(reaverActive() && ber)) {
          cc.shoot(powerLevel());
          // 暴走·安娜额外镰刀扇形（伊丽莎白的暴走强化在其 shoot 内处理）
          if (ber && selectedChar === 'anna') {
            const lv = powerLevel();
            for (let i = -3; i <= 3; i++) {
              const ang = -Math.PI / 2 + i * 0.16;
              addPlayerShot(player.x, player.y - 18, Math.cos(ang) * 780, Math.sin(ang) * 780, (10 + lv * 3), 10, 'scythe');
            }
          }
          if (reaverActive() && audio.nrBlade) audio.nrBlade(); else audio.shoot();
        }
      }
    }
    // 夜裁系统：浮游刀锋 / 暴走倾泻 / 裂界回环 / 黑洞大招
    updateReaver(dt);
    // 圣冕可装备僚机：对全部角色生效（独立于夜裁），必须在 updateReaver 之外调用
    updateSaintWing(dt);
    updateSaintField(dt);
    updateScFx(dt);

    // 弹幕升级插件：在基础武器之上叠加额外弹幕（对全部主角生效）
    firePlugin(dt, firing);

    if (keys.Space) { keys.Space = false; useBeam(); }
    if (keys.KeyX) { keys.KeyX = false; useBomb(); }

    if (playerBeam) {
      playerBeam.life -= dt;
      playerBeam.x = player.x;
      playerBeam.y = player.y;
      if (playerBeam.life <= 0) playerBeam = null;
    }
    if (ultimateEffect) {
      ultimateEffect.life -= dt;
      // 坠月之巅：月球坠落期间持续抵挡/清除上方来袭弹幕（演出"月球挡弹"）
      if (ultimateEffect.fallMoon && enemyBullets.length) {
        const my = ultimateEffect.y, blockR = W * 0.5;
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const b = enemyBullets[i];
          if (b.y < my + blockR && dist2(b.x, b.y, ultimateEffect.x, my) < blockR * blockR) {
            burst(b.x, b.y, '#ff8a6a', 2, 80, true);
            enemyBullets.splice(i, 1);
          }
        }
      }
      if (ultimateEffect.life <= 0) ultimateEffect = null;
    }
    if (skillCutin) {
      skillCutin.life -= dt;
      if (skillCutin.life <= 0) skillCutin = null;
    }
    if (pluginToast) {
      pluginToast.life -= dt;
      if (pluginToast.life <= 0) pluginToast = null;
    }
  }

  // 通用激光武器：随等级变粗/变强；暴走时变粗、加速、分裂锁敌。
  // 配置来自当前角色：laserColor / laserGlow / birds / laserStyle
  function updatePlayerLaser(dt, firing) {
    pLasers.length = 0;
    pBeams.length = 0;
    player.birdTimer -= dt;
    if (!firing) return;
    const cc = curChar();
    const ber = player.berserk > 0;
    const lv = powerLevel();
    let n = lv >= 5 ? 3 : (lv >= 3 ? 2 : 1);
    let baseW = 22 + lv * 9;
    let dmgps = 150 + lv * 78;
    const glow = cc.laserGlow || '150,205,255';
    const partCol = cc.laserColor || '#bfe9ff';
    if (ber) { baseW *= 1.7; dmgps *= 1.85; }   // 暴走：更粗更痛
    const offs = n === 1 ? [0] : (n === 2 ? [-24, 24] : [-44, 0, 44]);
    for (const dx of offs) pLasers.push({ x: player.x + dx, w: baseW * (dx === 0 ? 1 : 0.78), dmgps, glow, locked: false });
    // 暴走分裂：从玩家身上射出角度光束，自动锁定最近的敌人持续灼烧
    pBeams.length = 0;
    if (ber) {
      const targets = enemies.filter(e => e.y < player.y + 40)
        .sort((a, b) => dist2(player.x, player.y, a.x, a.y) - dist2(player.x, player.y, b.x, b.y))
        .slice(0, 5);
      const ox = player.x, oy = player.y - 16;
      for (const t of targets) {
        pBeams.push({ x1: ox, y1: oy, x2: t.x, y2: t.y, w: baseW * 0.5, glow });
        t.hp -= dmgps * 0.6 * dt; t.hitFlash = 0.1;
        if (Math.random() < dt * 20) addParticle(t.x + rand(-6, 6), t.y, rand(-30, 30), rand(-60, 60), 0.22, rand(2, 4), partCol, true);
        score += dmgps * 0.6 * dt * 0.3;
      }
      if (boss && state === 'boss' && !boss.dead && boss.inv <= 0) {
        pBeams.push({ x1: ox, y1: oy, x2: boss.x, y2: boss.y, w: baseW * 0.7, glow });
        boss.hp = Math.max(0, boss.hp - dmgps * 0.8 * dt); boss.hitFlash = 0.1;
        if (boss.hp <= 0) defeatBoss();
      }
    }
    for (const Lz of pLasers) {
      const half = Lz.w * 0.5;
      for (const e of enemies) {
        if (e.y < player.y && Math.abs(e.x - Lz.x) < half + e.r) {
          e.hp -= Lz.dmgps * dt; e.hitFlash = 0.08;
          if (Math.random() < dt * 16) addParticle(e.x + rand(-6, 6), e.y, rand(-30, 30), rand(-130, -30), 0.2, rand(2, 4), partCol, true);
          score += Lz.dmgps * dt * 0.35;
        }
      }
      if (boss && state === 'boss' && !boss.dead && boss.inv <= 0 && boss.y < player.y && Math.abs(boss.x - Lz.x) < half + boss.r) {
        boss.hp = Math.max(0, boss.hp - Lz.dmgps * dt);
        boss.hitFlash = 0.1;
        score += Lz.dmgps * dt * 0.5;
        if (Math.random() < dt * 9) dmgText(boss.x + rand(-60, 60), boss.y + rand(-30, 20), Math.floor(Lz.dmgps * dt * 4.5), partCol, 20);
        if (boss.hp <= 0) defeatBoss();
      }
    }
    audio.shoot();
    // 飞鸟（仅哑奴西亚等 birds 角色）：暴走时成群展开扇形齐飞，更密更壮观
    if (cc.birds && player.birdTimer <= 0) {
      player.birdTimer = Math.max(0.12, (ber ? 0.3 : 0.44) - lv * 0.04);
      const cnt = 1 + Math.floor(lv / 2) + (ber ? 4 : 0);
      const spread = ber ? 1.5 : 0.85;
      for (let i = 0; i < cnt; i++) {
        const f = cnt === 1 ? 0 : (i / (cnt - 1) - 0.5);
        const ang = -Math.PI / 2 + f * spread + rand(-0.08, 0.08);
        const spd = 430 + Math.abs(f) * 90;          // 边缘飞鸟略快，扇面更舒展
        const s = addPlayerShot(player.x + f * 30, player.y - 14, Math.cos(ang) * 250, Math.sin(ang) * spd, 9 + lv * 2 + (ber ? 4 : 0), 13 + (ber ? 4 : 0), 'bird');
        if (s) s.flap = (Math.random() * 4) | 0;
      }
    }
  }
  // 暴走巨鸟：以玩家为中心射出一只贯穿全屏的大飞鸟，持续灼烧路径上的所有敌人
  function launchGiantBird() {
    giantBirds.push({ x: player.x, y: player.y, vy: -680, w: 240, life: 1.6, maxLife: 1.6, flap: 0, hitIds: new Set(), tick: 0 });
    audio.birdCry();
    screenShake = Math.max(screenShake, 10);
    flash = Math.max(flash, 0.5); flashColor = '255,236,150';
    for (let i = 0; i < 22; i++) addParticle(player.x + rand(-40, 40), player.y + rand(-20, 20), rand(-160, 160), rand(-260, 60), 0.4, rand(3, 6), '#ffd45a', true);
  }
  function updateGiantBirds(dt) {
    const cc = curChar();
    const dmg = 240 * berserkDmg();
    for (let i = giantBirds.length - 1; i >= 0; i--) {
      const gb = giantBirds[i];
      gb.y += gb.vy * dt;
      gb.x = lerp(gb.x, player.x, Math.min(1, dt * 3));   // 略微跟随玩家横向
      gb.life -= dt; gb.tick += dt;
      const half = gb.w * 0.5;
      // 贯穿：对范围内所有敌人持续造成伤害
      for (const e of enemies) {
        if (Math.abs(e.x - gb.x) < half + e.r && Math.abs(e.y - gb.y) < gb.w * 0.55 + e.r) {
          e.hp -= dmg * dt; e.hitFlash = 0.1;
          if (Math.random() < dt * 18) addParticle(e.x + rand(-10, 10), e.y, rand(-60, 60), rand(-120, -20), 0.3, rand(3, 5), '#e8f6ff', true);
        }
      }
      if (boss && state === 'boss' && !boss.dead && boss.inv <= 0 && Math.abs(boss.x - gb.x) < half + boss.r && Math.abs(boss.y - gb.y) < gb.w * 0.6 + boss.r) {
        boss.hp = Math.max(0, boss.hp - dmg * 1.2 * dt); boss.hitFlash = 0.1;
        if (gb.tick > 0.12) { gb.tick = 0; dmgText(boss.x + rand(-40, 40), boss.y, Math.floor(dmg * 1.2 * 0.12), '#bfe9ff', 22); }
        if (boss.hp <= 0) defeatBoss();
      }
      if (gb.y < -gb.w || gb.life <= 0) giantBirds.splice(i, 1);
    }
  }
  function drawGiantBirds() {
    if (!giantBirds.length) return;
    const bk = curBirdKey();
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const gb of giantBirds) {
      const fade = Math.min(1, gb.life / 0.4);
      // 残影拖尾光柱（金色，与蓝色弹幕区分）
      const tg = ctx.createLinearGradient(gb.x - gb.w * 0.5, 0, gb.x + gb.w * 0.5, 0);
      tg.addColorStop(0, 'rgba(255,196,70,0)');
      tg.addColorStop(0.5, `rgba(255,224,130,${0.3 * fade})`);
      tg.addColorStop(1, 'rgba(255,196,70,0)');
      ctx.fillStyle = tg; ctx.fillRect(gb.x - gb.w * 0.5, gb.y, gb.w, H - gb.y + 40);
      // 巨鸟本体（4 帧振翅动画，染成金色以便和弹幕区分）
      const fi = (Math.floor(time * 16) % 4) + 1;
      const animKey = bk + fi;
      const useKey = assetReady(animKey) ? animKey : (assetReady('yBirdObj') ? 'yBirdObj' : bk);

  // 把蓝色鸟精灵图染成金色剪影（缓存离屏 canvas，按贴图键复用）
  const _goldBirdCache = new Map();
  function getGoldBird(key) {
    let c = _goldBirdCache.get(key);
    if (c) return c;
    const img = assets[key];
    if (!img || !img.width) return null;
    const oc = document.createElement('canvas');
    oc.width = img.width; oc.height = img.height;
    const g = oc.getContext('2d');
    g.drawImage(img, 0, 0);
    // 用原图形状作遮罩叠加金色渐变，保留羽翼明暗层次
    g.globalCompositeOperation = 'source-atop';
    const grd = g.createLinearGradient(0, 0, 0, img.height);
    grd.addColorStop(0, 'rgba(255,242,190,0.95)');
    grd.addColorStop(0.5, 'rgba(255,206,80,0.95)');
    grd.addColorStop(1, 'rgba(255,170,40,0.95)');
    g.fillStyle = grd; g.fillRect(0, 0, img.width, img.height);

  // 兼容旧名

  // ====== 七神武插件：终极召唤 → 全屏 AOE → 持续剑雨 → 中段爆发 → 终结齐射 → 消散 ======
  function qswBaseDmg() { return (30 + powerLevel() * 12) * grindDmg(); }
  function qswActivate() {

  function qswFindTarget(x, y, bossPriority) {
    let best = null, bestScore = -1e9;
    for (const e of enemies) {
      const d = Math.hypot(e.x - x, e.y - y);
      const score = -d * 0.8 + (e.maxHp || 0) * 0.03;
      if (score > bestScore) { bestScore = score; best = e; }
    }
    if (boss && state === 'boss' && !boss.dead) {
      const d = Math.hypot(boss.x - x, boss.y - y);

  function qswAOE(mult) {

      e.hp -= base; e.hitFlash = 0.18;

  function qswSpawnSword(mode) {
    if (qsw.swords.length >= QSW.maxSwords) return;

    const def = QSW_SWORDS[ti];
    let x, y;
    if (mode === 'sky') { x = rand(60, W - 60); y = rand(-120, 100); }
    else if (mode === 'sides') { const left = Math.random() < 0.5; x = left ? rand(-60, 40) : rand(W - 40, W + 60); y = rand(120, H * 0.6); }
    else { const a = rand(0, TAU); x = player.x + Math.cos(a) * 90; y = player.y - 20 + Math.sin(a) * 70; }
    const target = qswFindTarget(x, y, def.bossPriority);

  }
  function qswSwordHit(s, hit) {
    const dmg = qswBaseDmg() * s.dmg * 1.25 * (hit === boss ? 0.85 : 1);

    if ((s.explode || hit === boss) && qsw.hsT <= 0 && perfLevel < 2) {

  // 终结巨剑天降：一把巨大飞剑从天而降，砸地时全屏攻击（这是终极的“一击”，非开场清屏）

    qsw.goldFlash = Math.max(qsw.goldFlash, 0.85);

  function updateQishenwu(dt) {
    if (!qsw.active) return;
    qsw.time += dt;
    if (qsw.goldFlash > 0) qsw.goldFlash = Math.max(0, qsw.goldFlash - dt * 2.2);
    if (qsw.hsT > 0) qsw.hsT -= dt;
    // 开场不再全屏清屏，仅以一声召唤起手；由飞剑去“万剑归宗”地秒杀敌人
    if (qsw.time >= QSW.activeStart && qsw.time <= QSW.activeEnd) {
      qsw.swordTimer -= dt;
      while (qsw.swordTimer <= 0) { qsw.swordTimer += QSW.spawnInterval; for (let k = 0; k < QSW.swordsPerSpawn; k++) qswSpawnSword(Math.random() < 0.6 ? 'around' : 'sky'); }
    }

      // 中段爆发：给一记明确的视觉标记（金色脉冲 + 玩家处迸发环），让"剑潮再起"可被感知
      qsw.goldFlash = Math.max(qsw.goldFlash, 0.5);

      screenShake = Math.max(screenShake, QSW.shakeHit + 4);
      if (audio.qswSwordVolley) audio.qswSwordVolley();
    }
    // 终结：召唤巨剑从天而降（不再用 AOE 清屏，而是一把巨剑砸全屏）
    if (!qsw.finalDone && qsw.time >= QSW.finalBurstAt) {
      qsw.finalDone = true;
      for (let k = 0; k < 14; k++) qswSpawnSword(k % 2 ? 'sky' : 'around');  // 收尾剑雨陪衬
      qsw.giant = { y: -360, vy: 120, targetY: H * 0.46, impacted: false };
      // 落点预警：巨剑天降前在地面砸点亮起金色待击环，给玩家"大招要落了"的预读
      addRingFx(W * 0.5, H * 0.46, 200, 60, 0.6, 'rgba(255,224,150,', 5);
      if (audio.qswSummon) audio.qswSummon();
    }

      qsw.giant.vy += 1400 * dt; qsw.giant.y += qsw.giant.vy * dt;
      if (qsw.giant.y >= qsw.giant.targetY) { qsw.giant.y = qsw.giant.targetY; qsw.giant.impacted = true; qsw.giant.fade = 0.7; qswGiantImpact(); }

      const s = qsw.swords[i];
      s.life -= dt; s.lock = Math.max(0, s.lock - dt);
      if (s.life <= 0) { qsw.swords.splice(i, 1); continue; }
      const tValid = s.target && (s.target === boss ? (boss && !boss.dead && state === 'boss') : enemies.indexOf(s.target) >= 0);
      if (!tValid) s.target = qswFindTarget(s.x, s.y);
      if (s.target && s.lock <= 0) {
        const want = Math.atan2(s.target.y - s.y, s.target.x - s.x);
        let diff = want - s.angle; while (diff > Math.PI) diff -= TAU; while (diff < -Math.PI) diff += TAU;

      let hit = null;
      for (const e of enemies) { if (s.hitIds.indexOf(e) < 0 && Math.hypot(e.x - s.x, e.y - s.y) < QSW.hitR + e.r) { hit = e; break; } }
      if (!hit && boss && state === 'boss' && !boss.dead && s.hitIds.indexOf(boss) < 0 && Math.hypot(boss.x - s.x, boss.y - s.y) < QSW.hitR + boss.r) hit = boss;

  }

  // 掉落道具：下落，靠近玩家时被吸附拾取。
  function addItem(x, y, type) {
    items.push({ x, y, vx: rand(-30, 30), vy: rand(-150, -70), type, life: 12, attract: false });
  }
  function updateItems(dt) {
    const collectR = player.r + 28;
    const attractR = (state === 'mobs' || state === 'boss') ? 150 : 0;
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.life -= dt;
      const d2 = dist2(it.x, it.y, player.x, player.y);
      // 玩家位于屏幕上方时自动吸附全部道具（STG 惯例）
      if (it.attract || d2 < attractR * attractR || player.y < 360) it.attract = true;
      if (it.attract) {
        const a = angleTo(it.x, it.y, player.x, player.y);
        it.vx = lerp(it.vx, Math.cos(a) * 560, 0.18);
        it.vy = lerp(it.vy, Math.sin(a) * 560, 0.18);
      } else {
        it.vy += 340 * dt;            // 重力
        it.vy = Math.min(it.vy, 220);
      }
      it.x += it.vx * dt; it.y += it.vy * dt;
      if (d2 < collectR * collectR) { collectItem(it); items.splice(i, 1); continue; }
      if (it.y > H + 40 || it.life <= 0) { items.splice(i, 1); }
    }
  }
  function collectItem(it) {
    if (it.type === 'heal') {
      // 绿色加血：恢复生命
      const before = player.hp;
      player.hp = Math.min(player.maxHp, player.hp + 22);
      flashPickup('#7dff8c');

  function flashPickup(col) { for (let i = 0; i < 6; i++) addParticle(player.x + rand(-8, 8), player.y + rand(-8, 8), rand(-60, 60), rand(-60, 60), 0.22, rand(2, 4), col, true); }

  // 三种插件随机掉落
  function randPlugin() {
    const r = Math.random();
    // 四插件更均衡，七神武(终极)占 1/4，不再极低
    if (r < 0.27) return 'plugin_chain';

    if (r < 0.75) return 'plugin_blade';
    return 'plugin_qishenwu';
  }
  // 击杀掉落（V3.14 精简）：仅 绿色加血 / 金色暴走，低频且清晰，不再满地杂物。
  // 火力成长已由击杀直接给予（updateEnemies 内 addPower），故不再掉落火力/分数杂物。
  function dropFromEnemy(e) {
    // 防刷屏：场上掉落物较多时大幅压制新掉落（避免一片小怪同时死亡时满屏杂物）
    const onField = items.length;
    if (onField >= 9) return;                 // 硬上限
    const glut = onField >= 4 ? 0.4 : 1;      // 场上>=4个时掉率再打四折
    const elite = (e.tier >= 3);
    if (elite) {
      // 精英：掉落收敛——HP/暴走明显减少，插件作为有意义掉落保留
      if (Math.random() < 0.06 * glut) addItem(e.x, e.y, 'heal');
      if (Math.random() < 0.024 * glut) addItem(e.x + rand(-14, 14), e.y, 'berserk');
      if (Math.random() < 0.02 * glut) addItem(e.x, e.y, Math.random() < 0.5 ? 'life' : 'bomb');
      if (Math.random() < 0.10 * glut) addItem(e.x + rand(-16, 16), e.y - 8, randPlugin());
    } else {
      // 杂兵：极低频掉血/暴走，避免满屏杂物；插件偶现
      if (Math.random() < 0.008 * glut) addItem(e.x, e.y, 'heal');
      if (Math.random() < 0.0022 * glut) addItem(e.x, e.y, 'berserk');
      if (Math.random() < 0.008 * glut) addItem(e.x, e.y, randPlugin());
    }
  }

        if (tx !== null) {

        if (s.cutT <= 0 && nrWmFx.length < 60) { s.cutT = 0.06; const ca = Math.atan2(s.vy, s.vx) + rand(-1.2, 1.2); nrWmFx.push({ type: 'cut', x: s.x + rand(-10, 10), y: s.y + rand(-10, 10), ang: ca, len: rand(10, 26), life: 0.16, maxLife: 0.16 }); if (Math.random() < 0.5) addParticle(s.x, s.y, rand(-50, 50), rand(-50, 50), 0.24, rand(1.2, 2.4), '#2a2440', false); }

        s.hist = s.hist || []; s.hist.unshift({ x: s.x, y: s.y }); if (s.hist.length > (perfLevel >= 1 ? 5 : 8)) s.hist.pop();

          if (tx !== null && best < 360 * 360) { const want = Math.atan2(ty - s.y, tx - s.x); const cur = Math.atan2(s.vy, s.vx); let df = want - cur; while (df > Math.PI) df -= TAU; while (df < -Math.PI) df += TAU; const na = cur + clamp(df, -2.4 * dt, 2.4 * dt); const sp = Math.hypot(s.vx, s.vy); s.vx = Math.cos(na) * sp; s.vy = Math.sin(na) * sp; s.rot = na + Math.PI / 2; }

            }
            // 每斩杀一个敌人 → 再生一把追踪长剑（限制总量+精简特效，避免卡顿失控）
            if (e.hp <= 0 && !e._nrKilled) {
              e._nrKilled = true;
              let swCount = 0; for (const ps of playerShots) if (ps.kind === 'nrsword') swCount++;
              if (swCount < 9) fireNrSword(player.x + rand(-26, 26), player.y - 24, -Math.PI / 2 + rand(-0.2, 0.2), 0.12, false);
            }
          } else if (s.kind === 'nrlance' || s.kind === 'nrwmblade') {
            // 僚机光刃命中：紫色切割火花 + 黑银碎片
            const big = s.kind === 'nrwmblade';
            if (audio.nrHit) audio.nrHit(big);
            sparks(s.x, s.y, '#d8a8ff', big ? 7 : 4, Math.atan2(-s.vy, -s.vx), big ? 1.5 : 1.1, big ? 280 : 200);
            if (big) {
              // 斩波命中：X 形切割裂痕 + 碎片飞散（节流，避免每帧）——不再顿帧/震屏/闪白
              if ((s.boomT || 0) <= 0) {
                s.boomT = 0.07;
                const ha = Math.atan2(s.vy, s.vx);
                nrWmFx.push({ type: 'cut', x: e.x, y: e.y, ang: ha + Math.PI / 4, len: 30, life: 0.2, maxLife: 0.2 });
                nrWmFx.push({ type: 'cut', x: e.x, y: e.y, ang: ha - Math.PI / 4, len: 30, life: 0.2, maxLife: 0.2 });
                addRingFx(e.x, e.y, 3, 40, 0.24, 'rgba(220,180,255,', 3);
                for (let q = 0; q < 7; q++) addParticle(e.x, e.y, rand(-150, 150), rand(-150, 150), 0.3, rand(1.6, 3.6), Math.random() < 0.5 ? '#b878ff' : '#2a2440', Math.random() < 0.5);
              }
            } else if (Math.random() < 0.4) addParticle(s.x, s.y, rand(-60, 60), rand(-40, 60), 0.26, rand(1.5, 3), Math.random() < 0.5 ? '#2a2440' : '#b878ff', Math.random() < 0.5);
          } else if (s.kind === 'holyspear' || s.kind === 'holyspeargiant') {
            // 圣矛贯穿命中：金色爆炸 + 星爆 + 冲击环 + 星尘（强力打击反馈，避免贴图感）
            const giant = s.kind === 'holyspeargiant', big = giant || s.scT === 'heavy', rain = s.scT === 'rain';
            if (audio.scHit) audio.scHit(big); else if (audio.nrHit) audio.nrHit(big);
            if ((s.boomT || 0) <= 0) {
              s.boomT = rain ? 0.06 : 0.05;
              const sz = giant ? 110 : (big ? 80 : (rain ? 36 : 62));
              // 程序绘制金色放射爆炸（按参考图形状）+ 双层冲击波环 + 碎屑
              scFx.push({ type: 'star', x: e.x, y: e.y, size: sz, big: big, rot: rand(0, TAU), life: giant ? 0.34 : 0.26, maxLife: giant ? 0.34 : 0.26 });
              addRingFx(e.x, e.y, giant ? 6 : (big ? 4 : 2), giant ? 64 : (big ? 46 : 28), giant ? 0.32 : 0.24, 'rgba(255,225,140,', giant ? 5 : (big ? 4 : 2.5));
              if (!rain) addRingFx(e.x, e.y, 1, giant ? 84 : 52, 0.26, 'rgba(255,250,220,', 2);   // 白色冲击波环
              const pn = perfLevel >= 2 ? (big ? 6 : 3) : (giant ? 24 : (big ? 18 : (rain ? 5 : 12)));
              for (let q = 0; q < pn; q++) addParticle(e.x, e.y, rand(-200, 200), rand(-200, 200), rand(0.26, 0.42), rand(1.4, 3.8), Math.random() < 0.5 ? '#ffe79a' : '#fff6d8', true);
              if (big && perfLevel < 2) screenShake = Math.max(screenShake, giant ? 4 : 2);
            }
          } else if (s.kind === 'nrhalfmoon' || s.kind === 'nrbigblade') {
            // 半月光刃 / 大光刃：切割火花
            if (audio.nrHit) audio.nrHit(true);
            sparks(s.x, s.y, '#eaf3ff', 6, Math.atan2(-s.vy, -s.vx), 1.6, 300);
            if (Math.random() < 0.4) addRingFx(s.x, s.y, 2, 30, 0.22, 'rgba(210,235,255,', 2);
          } else if (s.kind === 'nrblade' || s.kind === 'nrcrescent') {

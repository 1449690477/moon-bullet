    if (boss.dmgCredit !== undefined) boss.dmgCredit = Math.min(boss.dmgCreditMax, boss.dmgCredit + boss.dpsCap * dt);
    boss.x = W * 0.5 + Math.sin(boss.t * 0.7) * 80 + Math.sin(boss.t * 1.53) * 26;
    boss.y = 210 + Math.sin(boss.t * 0.95) * 18;

    const hpRate = boss.hp / boss.maxHp;
    if (boss.kind === 'midboss') {
      if (hpRate > 0.6) changeBossPhase(0);
      else if (hpRate > 0.3) changeBossPhase(1);
      else changeBossPhase(2);
    } else {
      if (hpRate > 0.82) changeBossPhase(0);
      else if (hpRate > 0.60) changeBossPhase(1);
      else if (hpRate > 0.40) changeBossPhase(2);
      else if (hpRate > 0.18) changeBossPhase(3);
      else changeBossPhase(4);
    }

    const rate = (boss.kind === 'finalboss' ? 1.32 : (boss.kind === 'seraph' ? 1.26 : (boss.kind === 'midboss' ? 0.96 : 1.16))) * (1 + loopCount * 0.06);
    patternTimer += dt * rate;
    const t = patternTimer;
    if (boss.kind === 'seraph') { seraphPatterns(t, dt); return; }
    if (boss.kind === 'finalboss') { finalbossPatterns(t, dt); return; }
    if (boss.theme) { themeBossPatterns(t, dt, boss.theme); return; }
    
    // ═══════════════════════════════════════════════════════════════
    // Eclipse Boss & Mid-boss弹幕 - 简化版：规律、可预判、有呼吸空间
    // ═══════════════════════════════════════════════════════════════
    
    if (bossPhase === 0) {
      // Phase 0: 简单8方向环 + 偶尔3方向瞄准
      if (tickEvery(t, dt, 1.2)) {
        for (let i = 0; i < 8; i++) {
          const a = boss.t * 0.6 + i * TAU / 8;
          addEnemyBullet(boss.x, boss.y + 28, Math.cos(a) * 160, Math.sin(a) * 160, 7, '#ffd46d', 7, 7, 'goldcrescent');
        }
      }
      if (tickEvery(t, dt, 2.5)) {
        const base = angleTo(boss.x, boss.y, player.x, player.y);
        for (let i = -1; i <= 1; i++) {
          const a = base + i * 0.35;
          addEnemyBullet(boss.x, boss.y + 44, Math.cos(a) * 240, Math.sin(a) * 240, 6, '#fff2a8', 7, 7, 'whitecrescent');
        }
      }
    } else if (bossPhase === 1) {
      // Phase 1: 双臂螺旋 + 偶尔侧边墙
      if (tickEvery(t, dt, 0.25)) {
        const base = boss.t * 2.0;
        for (let k = 0; k < 2; k++) {
          const a = base + k * Math.PI;
          addEnemyBullet(boss.x, boss.y + 18, Math.cos(a) * 175, Math.sin(a) * 175, 7, '#8fd0ff', 7, 7, 'diamond');
        }
      }
      if (tickEvery(t, dt, 3.5)) {
        spawnWall(-20, W * 0.35, 140, 210, '#ffd36d');
      }
    } else if (bossPhase === 2) {
      // Phase 2: 12方向慢速环 + 5方向瞄准扇形
      if (tickEvery(t, dt, 1.5)) {
        for (let i = 0; i < 12; i++) {
          const a = -boss.t * 0.5 + i * TAU / 12;
          addEnemyBullet(boss.x, boss.y + 24, Math.cos(a) * 130, Math.sin(a) * 130, 7.5, '#9fe6ff', 7, 7, 'crystal');
        }
      }
      if (tickEvery(t, dt, 2.2)) {
        const base = angleTo(boss.x, boss.y, player.x, player.y);
        for (let i = -2; i <= 2; i++) {
          const a = base + i * 0.25;
          addEnemyBullet(boss.x, boss.y + 50, Math.cos(a) * 280, Math.sin(a) * 280, 6.5, '#ffdd91', 8, 7, 'homingspear');
        }
      }
      if (tickEvery(t, dt, 0.16)) patWave(boss, 150, '#9fe6ff', 6.5, 'crystal', 13);  // 流动波浪幕帘
    } else if (bossPhase === 3) {
      // Phase 3: 三臂螺旋 + 激光警告
      if (tickEvery(t, dt, 0.3)) {
        const base = boss.t * 1.5;
        for (let i = 0; i < 3; i++) {
          const a = base + i * TAU / 3;
          addEnemyBullet(boss.x, boss.y + 10, Math.cos(a) * 165, Math.sin(a) * 165, 8, '#c984ff', 8, 7, 'scytheviolet');
        }
      }
      if (tickEvery(t, dt, 3.0)) {
        addLaserWarning(rand(60, W - 60), 30, rand(60, W - 60), H + 10, 28, 0.85, 0.5);
      }
      if (tickEvery(t, dt, 2.5)) {
        for (let i = 0; i < 10; i++) {
          const a = boss.t + i * TAU / 10;
          addEnemyBullet(boss.x, boss.y + 20, Math.cos(a) * 140, Math.sin(a) * 140, 7, '#d8c6ff', 7, 7, 'soul');
        }
      }
    } else if (bossPhase === 4) {
      // Phase 4: 最终 - 多层环 + 快速扇形 + 激光
      if (tickEvery(t, dt, 0.6)) {
        const base = angleTo(boss.x, boss.y, player.x, player.y);
        for (let i = -2; i <= 2; i++) {
          const a = base + i * 0.3;
          addEnemyBullet(boss.x, boss.y, Math.cos(a) * 320, Math.sin(a) * 320, 6.5, '#e8f5ff', 8, 7, 'snow');
        }
      }
      if (tickEvery(t, dt, 1.8)) {
        for (let i = 0; i < 16; i++) {
          const a = boss.t * 0.8 + i * TAU / 16;
          addEnemyBullet(boss.x, boss.y, Math.cos(a) * 200, Math.sin(a) * 200, 7.5, '#ff5a85', 9, 7, 'scytherose');
        }
      }
      if (tickEvery(t, dt, 2.5)) {
        const x1 = rand(40, W - 40);
        const x2 = rand(40, W - 40);
        addLaserWarning(x1, 40, x2, H + 20, 32, 0.65, 0.45);
      }
    }
  }

  function addCurvedBullet(x, y, a, speed, color, r, damage) {
    const b = { x, y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, ax: 0, ay: 0, r, color, damage, life: 7, maxLife: 7, kind: 'orb', grazed: false, rot: rand(0, TAU), spin: rand(-2, 2) };
    enemyBullets.push(b);
    return b;
  }

  // ── Aurora seraph: six-wing radiant barrage ─────────────────────────────
  // Palette cycles through the three aurora hues so the curtains shimmer.
  const SERAPH_HUES = ['crystal', 'blue', 'purple'];
  const SERAPH_COLORS = ['#7ff0d8', '#7fc6ff', '#c79bff'];
  function seraphHue(i) { return SERAPH_HUES[((i % 3) + 3) % 3]; }
  function seraphColor(i) { return SERAPH_COLORS[((i % 3) + 3) % 3]; }

  // Emit a fan of bullets along one of the six "wings" radiating from the boss.
  function seraphWingFan(wing, t, speed, count, spread, kindIdx) {
    const base = -Math.PI / 2 + wing * TAU / 6 + Math.sin(t * 0.8 + wing) * 0.18;
    for (let i = 0; i < count; i++) {
      const f = count === 1 ? 0.5 : i / (count - 1);
      const a = base - spread / 2 + spread * f;
      const k = seraphHue(kindIdx + i);
      addEnemyBullet(boss.x, boss.y + 14, Math.cos(a) * speed, Math.sin(a) * speed, 6.4, seraphColor(kindIdx + i), 8, 7.5, k);
    }
  }

  function seraphPatterns(t, dt) {
    const cx = boss.x, cy = boss.y + 14;
    if (bossPhase === 0) {
      // Phase 0: 简单六臂螺旋（慢速、规律）
      if (tickEvery(t, dt, 0.22)) {
        const spin = boss.t * 1.2;
        for (let w = 0; w < 6; w++) {
          const a = -Math.PI / 2 + w * TAU / 6 + spin;
          const k = w % 3;
          addEnemyBullet(cx, cy, Math.cos(a) * 165, Math.sin(a) * 165, 6.5, seraphColor(k), 7, 7.5, seraphHue(k));
        }
      }
      if (tickEvery(t, dt, 2.8)) {
        const base = angleTo(cx, cy, player.x, player.y);
        for (let i = -2; i <= 2; i++) {
          const a = base + i * 0.3;
          addEnemyBullet(cx, cy + 30, Math.cos(a) * 230, Math.sin(a) * 230, 6, '#bfe8ff', 7, 7.5, 'petal');
        }
      }
    } else if (bossPhase === 1) {
      // Phase 1: 交替扇形 + 环形
      if (tickEvery(t, dt, 1.5)) {
        const wing = Math.floor(boss.t * 0.7) % 6;
        const base = -Math.PI / 2 + wing * TAU / 6;
        for (let i = -1; i <= 1; i++) {
          const a = base + i * 0.25;
          addEnemyBullet(cx, cy, Math.cos(a) * 190, Math.sin(a) * 190, 6.5, seraphColor(wing % 3), 7, 7.5, seraphHue(wing % 3));
        }
      }
      if (tickEvery(t, dt, 2.5)) {
        for (let i = 0; i < 10; i++) {
          const a = -boss.t * 0.6 + i * TAU / 10;
          addEnemyBullet(cx, cy, Math.cos(a) * 140, Math.sin(a) * 140, 6.5, '#9fe6ff', 7, 7.5, 'crystal');
        }
      }
    } else if (bossPhase === 2) {
      // Phase 2: 8方向环 + 5方向扇形
      if (tickEvery(t, dt, 1.3)) {
        for (let i = 0; i < 8; i++) {
          const a = boss.t * 0.8 + i * TAU / 8;
          const k = i % 3;
          addEnemyBullet(cx, cy, Math.cos(a) * 155, Math.sin(a) * 155, 7, seraphColor(k), 7, 7.5, seraphHue(k));
        }
      }
      if (tickEvery(t, dt, 2.2)) {
        const base = angleTo(cx, cy, player.x, player.y);
        for (let i = -2; i <= 2; i++) {
          const a = base + i * 0.28;
          addEnemyBullet(cx, cy, Math.cos(a) * 270, Math.sin(a) * 270, 6, '#eaffff', 8, 7.5, 'petal');
        }
      }
    } else if (bossPhase === 3) {
      // 裁决光矛：六翼放射激光（招牌「圣辉裁决」）+ 旋转环
      if (tickEvery(t, dt, 2.8)) {
        const sp = boss.t * 0.5;
        for (let w = 0; w < 6; w++) {
          const a = -Math.PI / 2 + w * TAU / 6 + sp;
          addLaserWarning(cx, cy, cx + Math.cos(a) * 1400, cy + Math.sin(a) * 1400, 26, 0.8, 0.5);
        }
      }
      if (tickEvery(t, dt, 1.8)) {
        for (let i = 0; i < 12; i++) {
          const a = -boss.t * 0.5 + i * TAU / 12;
          const k = i % 3;
          addEnemyBullet(cx, cy, Math.cos(a) * 145, Math.sin(a) * 145, 7, seraphColor(k), 7, 7.5, seraphHue(k));
        }
      }
    } else if (bossPhase === 4) {
      // Phase 4: 最终 - 四臂螺旋 + 激光 + 扇形
      if (tickEvery(t, dt, 0.18)) {
        const spin = boss.t * 1.8;
        for (let w = 0; w < 4; w++) {
          const a = w * TAU / 4 + spin;
          const k = w % 3;
          addEnemyBullet(cx, cy, Math.cos(a) * 185, Math.sin(a) * 185, 7, seraphColor(k), 8, 7.5, ['aurora', 'aurorab', 'aurorac'][k]);
        }
      }
      if (tickEvery(t, dt, 2.0)) {
        const x1 = rand(40, W - 40), x2 = rand(40, W - 40);
        addLaserWarning(x1, 40, x2, H + 20, 30, 0.6, 0.42);
      }
      if (tickEvery(t, dt, 1.5)) {
        const base = angleTo(cx, cy, player.x, player.y);
        for (let i = -1; i <= 1; i++) {
          const a = base + i * 0.4;
          addEnemyBullet(cx, cy, Math.cos(a) * 310, Math.sin(a) * 310, 6.5, '#c79bff', 9, 7.5, 'scythewhite');
        }
      }
    }
  }

  // ── Final Boss: Snow Moon Singer - 雪月咏者弹幕 ────────────────────
  // Snow, ice, and moon-themed patterns with increased speed and density
  function finalbossPatterns(t, dt) {
    const cx = boss.x, cy = boss.y + 14;
    if (bossPhase === 0) {
      // Phase 0: 雪花环 + 月牙扇形
      if (tickEvery(t, dt, 1.4)) {
        for (let i = 0; i < 10; i++) {
          const a = boss.t * 0.7 + i * TAU / 10;
          addEnemyBullet(cx, cy, Math.cos(a) * 150, Math.sin(a) * 150, 6.5, '#e8f5ff', 7, 7, 'snow');
        }
      }
      if (tickEvery(t, dt, 2.6)) {
        const base = angleTo(cx, cy, player.x, player.y);
        for (let i = -2; i <= 2; i++) {
          const a = base + i * 0.28;
          addEnemyBullet(cx, cy + 30, Math.cos(a) * 240, Math.sin(a) * 240, 6, '#ffffff', 7, 7, 'whitecrescent');
        }
      }
    } else if (bossPhase === 1) {
      // Phase 1: 三臂月刃螺旋 + 雪花散布
      if (tickEvery(t, dt, 0.28)) {
        const base = boss.t * 1.6;
        for (let i = 0; i < 3; i++) {
          const a = base + i * TAU / 3;
          addEnemyBullet(cx, cy, Math.cos(a) * 175, Math.sin(a) * 175, 7, '#d0e8ff', 8, 7, 'scythewhite');
        }
      }
      if (tickEvery(t, dt, 2.0)) {
        for (let i = 0; i < 8; i++) {
          const a = -boss.t * 0.4 + i * TAU / 8;
          addEnemyBullet(cx, cy, Math.cos(a) * 140, Math.sin(a) * 140, 6, '#e8f5ff', 6, 7, 'snow');
        }
      }
    } else if (bossPhase === 2) {
      // Phase 2: 12方向雪花环 + 灵魂追踪
      if (tickEvery(t, dt, 1.5)) {
        for (let i = 0; i < 12; i++) {
          const a = boss.t * 0.6 + i * TAU / 12;
          addEnemyBullet(cx, cy, Math.cos(a) * 155, Math.sin(a) * 155, 7, '#f0faff', 7, 7, 'snow');
        }
      }
      if (tickEvery(t, dt, 2.3)) {
        const base = angleTo(cx, cy, player.x, player.y);
        for (let i = -1; i <= 1; i++) {
          const a = base + i * 0.35;
          addEnemyBullet(cx, cy, Math.cos(a) * 270, Math.sin(a) * 270, 6.5, '#d8c6ff', 8, 7, 'soul');
        }
      }
    } else if (bossPhase === 3) {
      // Phase 3: 月牙激光 + 针雨
      if (tickEvery(t, dt, 2.8)) {
        const w = Math.floor(boss.t * 1.3) % 4;
        const a = -Math.PI / 2 + w * TAU / 4;
        addLaserWarning(cx, cy, cx + Math.cos(a) * 1200, cy + Math.sin(a) * 1200, 30, 0.75, 0.48);
      }
      if (tickEvery(t, dt, 1.6)) {
        for (let i = 0; i < 10; i++) {
          const a = boss.t * 0.5 + i * TAU / 10;
          addEnemyBullet(cx, cy, Math.cos(a) * 145, Math.sin(a) * 145, 7.5, '#ffffff', 6, 6, 'whiteneedle');
        }
      }
    } else if (bossPhase === 4) {
      // 终曲·雪月葬：雪华绽放 + 月刃旋风 + 交叉激光
      if (tickEvery(t, dt, 0.22)) {
        const base = boss.t * 2.2;
        for (let i = 0; i < 4; i++) {
          const a = base + i * TAU / 4;
          addEnemyBullet(cx, cy, Math.cos(a) * 190, Math.sin(a) * 190, 7.5, '#d0e8ff', 9, 7.5, 'scythewhite');
        }
      }
      if (tickEvery(t, dt, 1.6)) emitFlowerBloom(cx, cy, 6, 5, 165, '#e8f5ff', 7, 'snow', boss.t * 0.7);
      if (tickEvery(t, dt, 2.4)) {
        const x1 = rand(40, W - 40), x2 = rand(40, W - 40);
        addLaserWarning(x1, 30, x2, H + 20, 32, 0.6, 0.4);
      }
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // 主题化Boss弹幕系统 V3.13
  // 5个新Boss共用一套"可躲避"的弹幕骨架，但各有独特弹种与配色。
  // 设计原则：环形慢速旋转形成走廊；瞄准扇形留明显缺口；激光有预警。
  // ═══════════════════════════════════════════════════════════════
  const BOSS_THEMES = {
    void:    { ring: 'crystalpurple', aim: 'starpurple',  spiral: 'soulorb',     c1: '#b07fff', c2: '#8a5cff', c3: '#d8b8ff' },
    abyss:   { ring: 'crystalblue',   aim: 'energyblue',   spiral: 'lightorb',    c1: '#5cc8ff', c2: '#3a9fe0', c3: '#bfe8ff' },
    titan:   { ring: 'energygold',    aim: 'diamondgold',  spiral: 'fireball',    c1: '#ffc24d', c2: '#ff8a3a', c3: '#ffe6a8' },
    ancient: { ring: 'hexagonyellow', aim: 'lightningorb', spiral: 'energyred',   c1: '#9dff8f', c2: '#5fe070', c3: '#d8ffb8' },
    queen:   { ring: 'heartpink',     aim: 'petalpink',    spiral: 'candypink',   c1: '#ff7ab0', c2: '#ff5a85', c3: '#ffc6dc' },
  };

  function themeBossPatterns(t, dt, themeName) {
    const th = BOSS_THEMES[themeName] || BOSS_THEMES.void;
    const cx = boss.x, cy = boss.y + 20;
    // 每个主题 Boss 走自己的专属谱面，手感截然不同
    if (themeName === 'void')        return voidlordPatterns(t, dt, th, cx, cy);
    if (themeName === 'abyss')       return abysswalkerPatterns(t, dt, th, cx, cy);
    if (themeName === 'titan')       return voidtitanPatterns(t, dt, th, cx, cy);
    if (themeName === 'ancient')     return ancientonePatterns(t, dt, th, cx, cy);
    if (themeName === 'queen')       return darkqueenPatterns(t, dt, th, cx, cy);
    return voidlordPatterns(t, dt, th, cx, cy);
  }

  // ── 虚空领主 · 格雷姆：漩涡空间扭曲 ─────────────────────────────
  // 招式核心：旋入漩涡弹 + 紫星汇聚，营造"被吸入虚空"的压迫感
  function voidlordPatterns(t, dt, th, cx, cy) {
    if (bossPhase === 0) {
      if (tickEvery(t, dt, 1.7)) emitAimedRingGap(cx, cy, 18, 150, th.c1, 7, th.ring, 0.55);
      if (tickEvery(t, dt, 2.8)) emitConverge(3, 200, th.c3, 7, th.aim);
    } else if (bossPhase === 1) {
      if (tickEvery(t, dt, 1.4)) emitVortex(cx, cy, 14, 240, 95, 0.5, th.c2, 7, th.spiral);
      if (tickEvery(t, dt, 0.5)) emitDualSpiral(cx, cy, 5, boss.t * 1.3, 150, th.c1, 6.5, th.ring);
      if (tickEvery(t, dt, 2.6)) emitConverge(4, 220, th.c3, 7, th.aim);
    } else if (bossPhase === 2) {
      if (tickEvery(t, dt, 0.3)) emitSpiralArm(cx, cy, 4, boss.t * 1.6, 165, th.c1, 7, th.ring);
      if (tickEvery(t, dt, 1.5)) emitVortex(cx, cy, 16, 250, 100, -0.5, th.c2, 7, th.spiral);
    } else if (bossPhase === 3) {
      if (tickEvery(t, dt, 1.3)) emitVortex(cx, cy, 18, 260, 110, 0.6, th.c2, 7, th.spiral);
      if (tickEvery(t, dt, 2.8)) emitAimedRingGap(cx, cy, 22, 230, th.c3, 7, th.aim, 0.5);
      // 「次元裂隙」：朝玩家放射 3 道激光，撕裂空间
      if (tickEvery(t, dt, 3.2)) emitLaserFan(cx, cy, 3, 0.9, angleTo(cx, cy, player.x, player.y), 26, 0.85, 0.5);
    } else if (bossPhase === 4) {
      // 终焉·吞噬：双向交错螺旋织网 + 持续漩涡 + 汇聚收口
      if (tickEvery(t, dt, 0.26)) emitDualSpiral(cx, cy, 6, boss.t * 2.0, 175, th.c1, 6.5, th.ring);
      if (tickEvery(t, dt, 1.2)) emitVortex(cx, cy, 20, 270, 120, 0.7, th.c2, 7, th.spiral);
      if (tickEvery(t, dt, 2.4)) emitConverge(6, 260, th.c3, 7, th.aim);
      if (tickEvery(t, dt, 4.0)) emitLaserFan(cx, cy, 5, 2.2, Math.PI / 2, 24, 0.7, 0.45);
    }
  }

  // ── 深渊行者 · 莫德雷：深海雷幕落雨 ─────────────────────────────
  // 招式核心：自上而下的雷幕落雨 + 正弦海浪幕帘，逼迫横向走位
  function abysswalkerPatterns(t, dt, th, cx, cy) {
    if (bossPhase === 0) {
      if (tickEvery(t, dt, 1.1)) emitRainCurtain(180, th.c1, 6.5, th.ring, 9, player.x, 150);
      if (tickEvery(t, dt, 2.8)) emitAimedRingGap(cx, cy, 14, 160, th.c3, 7, th.aim, 0.6);
    } else if (bossPhase === 1) {
      if (tickEvery(t, dt, 0.22)) patWave(boss, 150, th.c2, 6.5, th.spiral, 11);
      if (tickEvery(t, dt, 2.4)) emitRainCurtain(200, th.c1, 6.5, th.ring, 11, player.x, 140);
    } else if (bossPhase === 2) {
      if (tickEvery(t, dt, 1.1)) emitRainCurtain(210, th.c1, 6.5, th.ring, 11, rand(120, W - 120), 130);
      if (tickEvery(t, dt, 2.2)) emitAimedRingGap(cx, cy, 18, 240, th.c3, 7, th.aim, 0.5);
    } else if (bossPhase === 3) {
      if (tickEvery(t, dt, 0.2)) patWave(boss, 170, th.c2, 6.5, th.spiral, 12);
      if (tickEvery(t, dt, 1.2)) emitRainCurtain(220, th.c1, 6.5, th.ring, 11, player.x, 130);
      if (tickEvery(t, dt, 3.0)) addLaserWarning(rand(60, W - 60), 30, rand(60, W - 60), H + 10, 28, 0.8, 0.5);
    } else if (bossPhase === 4) {
      if (tickEvery(t, dt, 0.18)) patWave(boss, 185, th.c2, 7, th.spiral, 12);
      if (tickEvery(t, dt, 1.0)) emitRainCurtain(235, th.c1, 6.5, th.ring, 11, player.x, 130);
      if (tickEvery(t, dt, 2.4)) emitConverge(5, 250, th.c3, 7, th.aim);
    }
  }

  // ── 虚空泰坦 · 奥古斯：笨重碾压 ─────────────────────────────────
  // 招式核心：粘性延迟地雷 + 慢速巨弹墙，强度高但节奏慢、有呼吸
  function voidtitanPatterns(t, dt, th, cx, cy) {
    if (bossPhase === 0) {
      if (tickEvery(t, dt, 2.0)) emitStickyMine(cx, cy, 5, th.c1, 9, th.ring);
      if (tickEvery(t, dt, 3.0)) spawnWall(-20, player.x, 170, 130, th.c2);
    } else if (bossPhase === 1) {
      if (tickEvery(t, dt, 1.8)) emitStickyMine(cx, cy, 7, th.c1, 9, th.ring);
      if (tickEvery(t, dt, 1.6)) emitAimedRingGap(cx, cy, 14, 130, th.c3, 8, th.aim, 0.6);
    } else if (bossPhase === 2) {
      if (tickEvery(t, dt, 2.8)) spawnWall(-20, rand(150, W - 150), 160, 150, th.c2);
      if (tickEvery(t, dt, 1.6)) emitStickyMine(cx, cy, 7, th.c1, 9, th.ring);
      if (tickEvery(t, dt, 1.4)) emitSpiralArm(cx, cy, 12, boss.t * 0.5, 120, th.c3, 7, th.ring);
    } else if (bossPhase === 3) {
      if (tickEvery(t, dt, 1.5)) emitStickyMine(cx, cy, 9, th.c1, 9, th.ring);
      if (tickEvery(t, dt, 2.6)) spawnWall(-20, player.x, 150, 165, th.c2);
      if (tickEvery(t, dt, 3.2)) addLaserWarning(rand(60, W - 60), 30, rand(60, W - 60), H + 10, 34, 0.9, 0.55);
    } else if (bossPhase === 4) {
      if (tickEvery(t, dt, 1.3)) emitStickyMine(cx, cy, 9, th.c1, 9.5, th.ring);
      if (tickEvery(t, dt, 2.2)) spawnWall(-20, rand(150, W - 150), 140, 175, th.c2);
      if (tickEvery(t, dt, 1.5)) emitSpiralArm(cx, cy, 14, boss.t * 0.7, 150, th.c3, 7, th.ring, 7);
    }
  }

  // ── 古神 · 阿撒托斯：疯狂混沌 ───────────────────────────────────
  // 招式核心：不规则多旋臂（随机抖动）+ 随机雷暴，混乱难预判但留隙
  function ancientonePatterns(t, dt, th, cx, cy) {
    if (bossPhase === 0) {
      if (tickEvery(t, dt, 0.35)) emitSpiralArm(cx, cy, 5, boss.t * 1.3 + Math.sin(boss.t * 3) * 0.3, 150, th.c1, 7, th.spiral);
      if (tickEvery(t, dt, 2.6)) emitAimedRingGap(cx, cy, 16, 170, th.c3, 7, th.aim, 0.55);
    } else if (bossPhase === 1) {
      if (tickEvery(t, dt, 0.3)) emitSpiralArm(cx, cy, 7, boss.t * 1.5 + Math.sin(boss.t * 2.4) * 0.5, 160, th.c2, 7, th.spiral, 7);
      if (tickEvery(t, dt, 2.2)) emitConverge(4, 210, th.c1, 7, th.ring);
    } else if (bossPhase === 2) {
      if (tickEvery(t, dt, 0.28)) emitSpiralArm(cx, cy, 9, boss.t * 1.7 + Math.sin(boss.t * 3.1) * 0.6, 165, th.c1, 7, th.spiral);
      if (tickEvery(t, dt, 2.0)) addLaserWarning(rand(40, W - 40), 30, rand(40, W - 40), H + 10, 26, 0.7, 0.42);
    } else if (bossPhase === 3) {
      if (tickEvery(t, dt, 0.26)) emitSpiralArm(cx, cy, 10, -boss.t * 1.6 + Math.sin(boss.t * 2.7) * 0.7, 170, th.c2, 7, th.spiral, 5);
      if (tickEvery(t, dt, 1.6)) emitConverge(5, 230, th.c3, 7, th.aim);
      if (tickEvery(t, dt, 2.4)) addLaserWarning(rand(40, W - 40), 30, rand(40, W - 40), H + 10, 28, 0.65, 0.42);
    } else if (bossPhase === 4) {
      if (tickEvery(t, dt, 0.24)) emitSpiralArm(cx, cy, 12, boss.t * 2.0 + Math.sin(boss.t * 3.5) * 0.8, 180, th.c1, 7, th.spiral, 6);
      if (tickEvery(t, dt, 1.3)) emitConverge(6, 250, th.c3, 7, th.aim);
      // 「疯狂回响」：随机角度放射激光，混沌无序
      if (tickEvery(t, dt, 2.6)) emitLaserFan(cx, cy, 4, 2.6, rand(0, TAU), 24, 0.55, 0.4);
    }
  }

  // ── 暗夜女王 · 莉莉丝：华丽舞步 ─────────────────────────────────
  // 招式核心：心形玫瑰扇 + 优雅缺口环 + 追踪魂，节奏明快、对称唯美
  function darkqueenPatterns(t, dt, th, cx, cy) {
    if (bossPhase === 0) {
      if (tickEvery(t, dt, 1.5)) emitAimedRingGap(cx, cy, 16, 150, th.c1, 7, th.ring, 0.6);
      if (tickEvery(t, dt, 2.4)) {
        const base = angleTo(cx, cy, player.x, player.y);
        for (let i = -2; i <= 2; i++) addEnemyBullet(cx, cy + 26, Math.cos(base + i * 0.22) * 230, Math.sin(base + i * 0.22) * 230, 6.5, th.c3, 7, 7, th.aim);
      }
    } else if (bossPhase === 1) {
      if (tickEvery(t, dt, 1.2)) {
        for (let side = -1; side <= 1; side += 2) {
          const base = -Math.PI / 2 + side * 0.5;
          for (let i = 0; i < 5; i++) addEnemyBullet(cx, cy, Math.cos(base + i * 0.16 * side) * 175, Math.sin(base + i * 0.16 * side) * 175, 6.5, th.c1, 7, 7, th.ring);
        }
      }
      if (tickEvery(t, dt, 2.6)) addEnemyBullet(cx, cy, 0, 0, 8, th.c3, 8, 8, th.aim).homingSoul = true;
    } else if (bossPhase === 2) {
      if (tickEvery(t, dt, 1.4)) emitAimedRingGap(cx, cy, 20, 160, th.c1, 7, th.ring, 0.5);
      if (tickEvery(t, dt, 0.5)) emitSpiralArm(cx, cy, 2, boss.t * 2.2, 170, th.c2, 7, th.spiral);
      // 「蔷薇绽放」：6 瓣旋转花型，唯美对称
      if (tickEvery(t, dt, 1.8)) emitFlowerBloom(cx, cy, 6, 5, 165, th.c3, 7, th.aim, boss.t * 0.6);
    } else if (bossPhase === 3) {
      if (tickEvery(t, dt, 1.2)) {
        for (let side = -1; side <= 1; side += 2) {
          const base = -Math.PI / 2 + side * 0.6;
          for (let i = 0; i < 6; i++) addEnemyBullet(cx, cy, Math.cos(base + i * 0.15 * side) * 190, Math.sin(base + i * 0.15 * side) * 190, 6.5, th.c1, 7, 7, th.ring);
        }
      }
      if (tickEvery(t, dt, 2.6)) emitConverge(4, 230, th.c3, 7, th.aim);
      if (tickEvery(t, dt, 2.8)) addEnemyBullet(cx, cy, 0, 0, 8, th.c2, 8, 8, th.aim).homingSoul = true;
      if (tickEvery(t, dt, 3.0)) addLaserWarning(rand(60, W - 60), 30, rand(60, W - 60), H + 10, 28, 0.8, 0.5);
    } else if (bossPhase === 4) {
      // 终曲·绝美舞步：双层蔷薇绽放 + 旋臂 + 追踪魂
      if (tickEvery(t, dt, 1.4)) emitFlowerBloom(cx, cy, 8, 6, 180, th.c1, 7, th.ring, boss.t * 0.8);
      if (tickEvery(t, dt, 1.4)) emitFlowerBloom(cx, cy, 8, 4, 120, th.c3, 6.5, th.aim, -boss.t * 0.5 + 0.4);
      if (tickEvery(t, dt, 0.45)) emitSpiralArm(cx, cy, 3, boss.t * 2.4, 185, th.c2, 7, th.spiral);
      if (tickEvery(t, dt, 2.6)) addEnemyBullet(cx, cy, 0, 0, 8.5, th.c2, 9, 9, th.aim).homingSoul = true;
    }
  }

  function tickEvery(timer, dt, interval) {
    return Math.floor(timer / interval) !== Math.floor((timer - dt) / interval);
  }

  function draw() {
    // ★ 防御性重置：如果上一帧 draw() 内部异常被 try/catch 吞掉，
    // ctx.save() 没有对应 restore() → globalCompositeOperation 可能卡在 'lighter'
    // → 清屏 fillRect 在 lighter 模式下无效 → 画面累积 → 白屏冻结。
    // 每帧开头强制重置，彻底杜绝 compositeOperation 泄漏。
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    touchSkillButtons.length = 0;
    const sx = screenShake > 0 ? rand(-screenShake, screenShake) : 0;
    const sy = screenShake > 0 ? rand(-screenShake, screenShake) : 0;
    // alpha:false 上下文要求每帧铺满不透明像素，先打底防残影
    ctx.fillStyle = '#05040a';
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.translate(sx, sy);
    drawBackground();
    drawStageObjects();
    drawMotherLifeUltimate('domain');
    drawSaintField('domain'); // 领域底纹、范围圈位于敌人下层，避免遮挡目标
    drawSaintFieldRangeOverlay();
    drawEnemies();
    if (boss) drawBoss();
    drawMotherLifeRibbons('under'); // 飘带底光位于敌人上方，领域底纹仍留在敌人下方
    drawSaintField('actor');  // 天使本体保留在战斗单位上层
    drawPlayerFireStream();
    drawNrRays();        // 夜裁瞄准射线（在敌人之上、弹幕之下）
    drawPlayerShots();
    drawNrSlashes();     // 夜裁空间斩月牙
    drawGiantBirds();
    drawPlayerBeam();
    drawUltimateEffect();
    drawSpriteFx();
    drawProcRings();
    drawEnemyBullets();
    drawWarnings();
    drawLasers();
    drawParticles();
    drawMotherLifeUltimate('overlay');
    drawSaintFieldMeteorOverlay(); // 天空圣环、斜角流星、落地爆炸与圣痕
    drawSaintCrownOverlay(); // 皇冠金属前景层，避免被流星爆光冲掉轮廓
    drawNrVoid();        // 夜裁黑洞（吞噬中心，盖在弹幕/粒子之上）
    drawItems();
    drawDamageTexts();
    drawNrWingmen();     // 可装备僚机（黑银刀阵·夜裁之影）
    drawNrWmFx();        // 僚机起手挥砍弧 + 路径切割线
    drawSaintWing();     // 圣冕圣械 可装备僚机本体
    drawNightCoffin();   // 夜棺巡礼·八芒浮骸 脱手浮游炮阵列
    drawScFx();          // 圣冕枪口/审判光束/冲击波
    drawNrBlades();      // 夜裁浮游刀锋（环绕机体）
    drawNrBigBlades();   // 夜裁暴走大刀刃（环绕自身）
    drawWingmen();
    drawPlayer();
    drawMotherLifeRibbons('over');
    drawWmSkills();
    drawNrRings();       // 夜裁裂界回环
    drawNrUltSwords();   // 夜裁大招编舞飞剑群
    drawPlayerHitbox();
    drawQishenwu();
    ctx.restore();
    drawUI();
    drawOverlay();
  }

  function bgBaseKey() {
    // Boss arenas glow with the eclipse; the final/rage fight burns blood-red.
    if (state === 'boss' || state === 'bossIntro' || state === 'bossOutro') {
      if (bossKind === 'finalboss' || bossPhase >= 4) return assetReady('bgBloodmoon') ? 'bgBloodmoon' : 'bgEclipse';
      return assetReady('bgEclipse') ? 'bgEclipse' : 'bgStageBase';
    }
    // Field stages each have their own animated sky.
    const STAGE_BG = {
      stage1: 'bgStage1', stage2: 'bgStage2', stage3: 'bgStage3',
      stage4: 'bgShadowDepths', stage5: 'bgAbyssCore', stage6: 'bgVoidRealm',
      stage7: 'bgChaosRift', stage8: 'bgDarkSanctum',
      stage9: 'bgBloodmoon', stage10: 'bgEclipse',
    };
    const perStage = STAGE_BG[segment] || 'bgStage1';
    return assetReady(perStage) ? perStage : 'bgStageBase';
  }

  function drawBackground() {
    const baseKey = bgBaseKey();
    if (assetReady(baseKey)) {
      ctx.drawImage(assets[baseKey], 0, 0, W, H);
    } else if (assetReady('bgStageBase')) {
      ctx.drawImage(assets.bgStageBase, 0, 0, W, H);
    } else {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#101126');
      g.addColorStop(0.42, '#060716');
      g.addColorStop(1, '#020208');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    if (assetReady('bgStageDepth') && perfLevel < 2) {
      ctx.save();
      ctx.globalAlpha = state === 'boss' ? 0.64 : 0.52;
      const scroll = (time * (state === 'boss' ? 12 : 8)) % H;
      ctx.drawImage(assets.bgStageDepth, 0, scroll - H, W, H);
      ctx.drawImage(assets.bgStageDepth, 0, scroll, W, H);
      ctx.restore();
    }

    // Dynamic dots are intentionally small and circular; no scan lines or magic-line residue.
    for (const s of stars) {
      ctx.globalAlpha = s.a * (0.38 + Math.sin(s.tw) * 0.18);
      ctx.fillStyle = s.r > 1.6 ? '#fff0c2' : '#d8c7ff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (assetReady('bgFog')) {
      ctx.save();
      ctx.globalAlpha = 0.32 + Math.sin(time * 0.18) * 0.05;
      const scroll = (time * 8) % H;
      ctx.drawImage(assets.bgFog, 0, scroll - H, W, H);
      ctx.drawImage(assets.bgFog, 0, scroll, W, H);
      ctx.restore();
    }
    for (const f of fog) {
      const fg = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
      fg.addColorStop(0, `rgba(205,180,255,${f.a * 0.72})`);
      fg.addColorStop(1, 'rgba(205,180,255,0)');
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, TAU); ctx.fill();
    }
    if (assetReady('bgParticles')) {
      ctx.save();
      ctx.globalAlpha = 0.38;
      const scroll = (time * 18) % H;
      ctx.drawImage(assets.bgParticles, 0, scroll - H, W, H);
      ctx.drawImage(assets.bgParticles, 0, scroll, W, H);
      ctx.restore();
    }

    if (assetReady('bgBossOverlay') && state === 'boss') {
      ctx.save();
      ctx.globalAlpha = bossPhase >= 3 ? 0.72 : 0.34;
      ctx.drawImage(assets.bgBossOverlay, 0, 0, W, H);
      ctx.restore();
    }

    const vg = ctx.createRadialGradient(W * 0.5, H * 0.45, 180, W * 0.5, H * 0.48, 850);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, state === 'boss' && bossPhase >= 3 ? 'rgba(0,0,0,.72)' : 'rgba(0,0,0,.62)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  function drawCathedral(x, y, s) {
    ctx.save();
    ctx.translate(x, y); ctx.scale(s, s);
    ctx.fillStyle = '#06040c';
    ctx.fillRect(30, 190, 250, 420);
    ctx.beginPath(); ctx.moveTo(30, 190); ctx.lineTo(155, 70); ctx.lineTo(280, 190); ctx.closePath(); ctx.fill();
    ctx.fillRect(70, 90, 36, 150);
    ctx.fillRect(206, 90, 36, 150);
    ctx.beginPath(); ctx.moveTo(60, 90); ctx.lineTo(88, 20); ctx.lineTo(116, 90); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(196, 90); ctx.lineTo(224, 18); ctx.lineTo(252, 90); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(133,91,190,.16)';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.ellipse(88 + i * 68, 290, 22, 60, 0, Math.PI, 0, true);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawBrokenPillar(x, y, h) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#080510';
    ctx.fillRect(-22, 0, 44, h);
    ctx.fillRect(-34, h - 10, 68, 30);
    ctx.beginPath(); ctx.moveTo(-22, 0); ctx.lineTo(22, 0); ctx.lineTo(8, -34); ctx.lineTo(-25, -15); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawStageObjects() {
    // Soft floor glow. Keep this broad so it never looks like extraction residue.
    ctx.save();
    ctx.translate(W * 0.5, 1010);
    const g = ctx.createRadialGradient(0, 0, 20, 0, 0, 280);
    g.addColorStop(0, 'rgba(151,231,255,.14)');
    g.addColorStop(0.42, 'rgba(148,103,255,.08)');
    g.addColorStop(1, 'rgba(148,103,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, 280, 0, TAU); ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    const x = player.x, y = player.y;
    ctx.save();
    ctx.translate(x, y);
    const blink = player.inv > 0 && Math.floor(time * 18) % 2 === 0;
    ctx.globalAlpha = blink ? 0.32 : 1;

    const cc = curChar();
    const ac = cc.auraColor;
    const aura = ctx.createRadialGradient(0, 0, 0, 0, 0, 88);
    aura.addColorStop(0, 'rgba(' + ac + ',.42)');
    aura.addColorStop(0.44, 'rgba(' + ac + ',.18)');
    aura.addColorStop(1, 'rgba(' + ac + ',0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(0, 0, 88, 0, TAU); ctx.fill();

    // 暴走光环（脉冲旋转）—— 夜裁为紫白刀刃能量，其余为金色
    if (player.berserk > 0 && !motherLifeActive()) {
      const nr = reaverActive();
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const bp = 0.6 + 0.4 * Math.sin(time * 12);
      const bg = ctx.createRadialGradient(0, 0, 10, 0, 0, nr ? 92 : 70);
      if (nr) { bg.addColorStop(0, `rgba(190,205,255,${0.55 * bp})`); bg.addColorStop(0.55, `rgba(150,130,255,${0.26 * bp})`); bg.addColorStop(1, 'rgba(150,130,255,0)'); }
      else { bg.addColorStop(0, `rgba(255,210,90,${0.5 * bp})`); bg.addColorStop(0.6, `rgba(255,160,60,${0.22 * bp})`); bg.addColorStop(1, 'rgba(255,160,60,0)'); }
      ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(0, 0, nr ? 92 : 70, 0, TAU); ctx.fill();
      if (nr) {
        // 旋转的紫白能量刀光环（双层弧 + 放射刃）
        ctx.rotate(time * 2.4);
        ctx.strokeStyle = `rgba(220,228,255,${0.7 * bp})`; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(0, 6, 58, 0.15, Math.PI - 0.15); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 6, 58, Math.PI + 0.15, TAU - 0.15); ctx.stroke();
        for (let k = 0; k < 8; k++) { ctx.rotate(TAU / 8); ctx.globalAlpha = 0.5 * bp; ctx.strokeStyle = 'rgba(200,210,255,0.8)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, -58); ctx.lineTo(0, -80); ctx.stroke(); }
      } else {
        ctx.rotate(time * 3);
        ctx.strokeStyle = `rgba(255,225,140,${0.7 * bp})`; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(0, 6, 46, 0.2, Math.PI - 0.2); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 6, 46, Math.PI + 0.2, TAU - 0.2); ctx.stroke();
      }
      ctx.restore();
    }

    const P = cc.prefix; // 'player' or 'yanuxiya'
    const slow = !!(keys.ShiftLeft || keys.ShiftRight);
    let spriteKey = P + 'Idle';
    if (reaverActive() && player.berserk > 0 && assetReady('reaverBurst')) spriteKey = 'reaverBurst';   // 夜裁暴走立绘
    else if (player.inv > 0 && player.inv < 0.82) spriteKey = P + 'Hit';
    else if (slow) spriteKey = P + 'Focus';
    else if (player.moveVX < -80 || keys.ArrowLeft || keys.KeyA) spriteKey = P + 'MoveLeft';
    else if (player.moveVX > 80 || keys.ArrowRight || keys.KeyD) spriteKey = P + 'MoveRight';
    drawMotherLifeBodyBackFx();
    if (assetReady(spriteKey)) {
      // Full-body portrait art: draw with the sprite's natural aspect ratio,
      // feet just below the hitbox, head reaching up.
      const img0 = assets[spriteKey];
      const baseW = slow ? 96 : 108;
      const nrBerserkForm = reaverActive() && player.berserk > 0 && spriteKey === 'reaverBurst';
      // 夜裁立绘整体缩小，且让命中判定点落在人物身体中心（躯干）
      const pw = motherLifeActive() ? baseW * 1.28 : (nrBerserkForm ? baseW * 1.18 : (reaverActive() ? baseW * 0.94 : baseW));
      const ph = pw * (img0.height / img0.width);
      const topY = reaverActive() ? -ph * 0.6 : (-ph + 28);   // 夜裁：躯干对齐判定点
      if (nrBerserkForm) {
        ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.45 + 0.2 * Math.sin(time * 10);
        ctx.drawImage(img0, -pw * 1.07 / 2, topY * 1.07, pw * 1.07, ph * 1.07);
        ctx.restore();
      }
      if (motherLifeActive()) {
        ctx.save();
        ctx.shadowColor = player.berserk > 0 ? 'rgba(255,42,164,0.72)' : 'rgba(194,46,139,0.56)';
        ctx.shadowBlur = perfLevel >= 2 ? 4 : player.berserk > 0 ? 16 : 10;
        ctx.drawImage(img0, -pw / 2, topY, pw, ph);
        ctx.restore();
      } else {
        ctx.drawImage(img0, -pw / 2, topY, pw, ph);
      }
    } else {
      ctx.fillStyle = '#dfefff'; ctx.beginPath(); ctx.arc(0, -38, 18, 0, TAU); ctx.fill();
      ctx.fillStyle = '#2f1e58'; ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(-26, 48); ctx.lineTo(26,48); ctx.closePath(); ctx.fill();
    }
    drawMotherLifeBodyFx();

    // Movement engine trail.
    ctx.globalAlpha *= 0.7;
    const trail = ctx.createLinearGradient(0, 20, 0, 86);
    trail.addColorStop(0, motherLifeActive() ? 'rgba(255,155,220,.45)' : 'rgba(91,242,255,.45)');
    trail.addColorStop(1, motherLifeActive() ? 'rgba(255,155,220,0)' : 'rgba(91,242,255,0)');
    ctx.fillStyle = trail;
    ctx.beginPath();
    ctx.moveTo(-18, 22); ctx.quadraticCurveTo(0, 95 + Math.sin(time*14)*8, 18, 22); ctx.closePath(); ctx.fill();

    // 弹幕插件外观：追踪→旋转囚笼法球；连锁→悬浮心链法阵
    ctx.globalAlpha = 1;
    if (player.plugin === 'homing' && assetReady('bulletCagedOrb')) {
      const os = 30 + (player.pluginGlow > 0 ? player.pluginGlow * 10 : 0);
      ctx.save();
      ctx.translate(0, -34);
      ctx.globalCompositeOperation = 'lighter';
      ctx.rotate(time * 2.2);
      ctx.drawImage(assets.bulletCagedOrb, -os / 2, -os / 2, os, os);
      ctx.restore();
    } else if (player.plugin === 'chain') {
      const ck = (curChar() === CHARACTERS.anna || curBirdKey() === 'yanuBirdRose') ? 'bulletChainHeartRose' : 'bulletChainHeart';
      if (assetReady(ck)) {
        const cs = 22 + (player.pluginGlow > 0 ? player.pluginGlow * 8 : 0);
        for (let i = 0; i < 2; i++) {
          const ang = time * 2.0 + i * Math.PI;
          ctx.save();
          ctx.translate(Math.cos(ang) * 26, -30 + Math.sin(ang) * 8);
          ctx.globalAlpha = 0.85;
          ctx.drawImage(assets[ck], -cs / 2, -cs / 2, cs, cs);
          ctx.restore();
        }
      }
    } else if (player.plugin === 'blade' && assetReady('ghostBlade')) {
      // 幽灵暗刃：小幽灵环绕，临近挥砍(pluginCd<0.6)时放大高亮
      const ready = clamp(1 - player.pluginCd / 3, 0, 1);
      const gs = 26 + ready * 8 + (player.pluginGlow > 0 ? player.pluginGlow * 8 : 0);
      const ang = time * 1.6;
      ctx.save();
      ctx.translate(Math.cos(ang) * 30, -32 + Math.sin(ang) * 6);
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.55 + ready * 0.4;
      ctx.drawImage(assets.ghostBlade, -gs / 2, -gs / 2, gs, gs);
      ctx.restore();
    } else if (player.plugin === 'qishenwu' && !qsw.active && assetReady('qswSword1')) {
      // 七神武：待机时玩家头顶悬浮金剑，冷却就绪时高亮脉动
      const ready = clamp(1 - player.pluginCd / (QSW.total + QSW.rest), 0, 1);
      ctx.save();
      ctx.translate(0, -38 + Math.sin(time * 2) * 3);
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.5 + ready * 0.5;
      const sw = 22, sh = sw * (assets.qswSword1.height / assets.qswSword1.width);
      ctx.drawImage(assets.qswSword1, -sw / 2, -sh / 2, sw, sh);
      ctx.restore();
    }

    ctx.restore();
  }

  function drawEnemies() {
    for (const e of enemies) {
      ctx.save();
      ctx.translate(e.x, e.y);
      const hpRate = clamp(e.hp / e.maxHp, 0, 1);
      const bob = Math.sin(time * 6 + e.t) * 4;
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, e.r * 3.0);
      const glowCol = e.tier >= 4 ? 'rgba(255,120,160,.28)' : (e.tier === 3 ? 'rgba(255,210,120,.26)' : 'rgba(170,130,255,.24)');
      glow.addColorStop(0, glowCol);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, bob, e.r * 3.0, 0, TAU); ctx.fill();

      // —— 开火预警（telegraph）：临近开火时显示收缩蓄力环，让玩家预判 ——
      if (e.fireTimer > 0 && e.fireTimer < 0.5 && e.y > 40 && e.y < H * 0.65) {
        const cp = 1 - e.fireTimer / 0.5;            // 0→1 收缩
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const cr = e.r * (2.4 - cp * 1.4);           // 环从大缩小到敌人
        ctx.globalAlpha = 0.35 + cp * 0.5;
        ctx.strokeStyle = e.color; ctx.lineWidth = 1.6 + cp * 1.6;
        ctx.beginPath(); ctx.arc(0, bob, cr, 0, TAU); ctx.stroke();
        // 即将开火的闪烁核
        if (cp > 0.7) {
          ctx.globalAlpha = (cp - 0.7) / 0.3;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath(); ctx.arc(0, bob, e.r * 0.5, 0, TAU); ctx.fill();
        }
        ctx.restore();
      }

      // 数据驱动：使用敌人自身的精灵图与尺寸
      const baseKey = e.sprite || 'drone';
      const stateKey = e.hitFlash > 0 ? 'Hit' : (e.attackFlash > 0 ? 'Attack' : 'Idle');
      let key = `${baseKey}${stateKey}`;
      if (!assetReady(key)) key = `${baseKey}Idle`;  // 回退到idle
      if (!assetReady(key) && assetReady(baseKey)) key = baseKey;  // 单图小怪(无状态帧)直接用基础图
      const size = e.size || 86;
      if (!assetReady(key)) {
        ctx.fillStyle = e.tier >= 4 ? '#3a1430' : (e.tier === 3 ? '#33184b' : '#24142f');
        ctx.beginPath(); ctx.arc(0, bob, e.r, 0, TAU); ctx.fill();
      } else {
        ctx.rotate(Math.sin(time * 3 + e.t) * 0.05);
        ctx.drawImage(assets[key], -size/2, -size/2 + bob, size, size);
      }

      ctx.fillStyle = 'rgba(0,0,0,.48)'; ctx.fillRect(-e.r, e.r + 10, e.r * 2, 5);
      ctx.fillStyle = e.color; ctx.fillRect(-e.r, e.r + 10, e.r * 2 * hpRate, 5);
      ctx.restore();
    }
  }

  function drawBoss() {
    if (!boss) return;
    ctx.save();
    ctx.translate(boss.x, boss.y);
    const a = boss.dead ? Math.max(0, 1 - stateTimer * 0.7) : 1;
    ctx.globalAlpha = a;

    const dangerPhase = bossPhase >= 3;
    const halo = ctx.createRadialGradient(0, 0, 24, 0, 0, 270);
    halo.addColorStop(0, dangerPhase ? 'rgba(255,74,111,.25)' : 'rgba(192,119,255,.28)');
    halo.addColorStop(0.38, dangerPhase ? 'rgba(135,54,210,.14)' : 'rgba(255,211,109,.12)');
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(0, 0, 260, 0, TAU); ctx.fill();

    const pfx = boss.spritePrefix || 'boss'; // 'boss' | 'final' | 'seraph'
    const has3 = pfx === 'boss'; // only the eclipse set has a dedicated phase3 art
    let bossKey;
    if (boss.dead) bossKey = pfx + 'Death';
    else if ((boss.hitFlash || 0) > 0) bossKey = pfx + 'Hit';
    else if (bossPhase <= 1) bossKey = pfx + 'Phase1';
    else if (bossPhase === 2) bossKey = pfx + 'Phase2';
    else if (bossPhase === 3) bossKey = has3 ? 'bossPhase3' : pfx + 'Phase2';
    else bossKey = pfx + 'Rage';
    if (assetReady(bossKey)) {
      const sc = (boss.scale || 1) * (1 + Math.sin(time * 3.2) * 0.015);
      ctx.scale(sc, sc);
      ctx.drawImage(assets[bossKey], -210, -230, 420, 420);
    } else {
      ctx.fillStyle = '#2b143f'; ctx.beginPath(); ctx.arc(0, 0, 70, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }

  function drawPlayerFireStream() {
    if (!(state === 'mobs' || state === 'boss')) return;
    // 仅在角色拥有真实激光（pLasers）时绘制；普通弹/血刃/飞羽角色不画集火流，
    // 避免误导玩家、遮挡弹幕（提升弹幕可读性）。
    if (pLasers.length) { drawPLasers(); return; }
  }

  function drawPLasers() {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const cc = curChar();
    // —— 暴走分裂光束：从玩家射向各敌人的流体水流光束（与主激光同质感）——
    if (pBeams.length) {
      const bcore = cc.laserCore || '#eafaff';
      for (const bm of pBeams) {
        const dx = bm.x2 - bm.x1, dy = bm.y2 - bm.y1;
        const len = Math.hypot(dx, dy) || 1, ang = Math.atan2(dy, dx);
        const w = bm.w * (0.85 + Math.sin(time * 30) * 0.15);
        const g = bm.glow || (cc.laserGlow || '150,205,255');
        ctx.save();
        ctx.translate(bm.x1, bm.y1); ctx.rotate(ang);
        // 外层柔光（半透明体积感）
        const halo = ctx.createLinearGradient(0, -w * 1.8, 0, w * 1.8);
        halo.addColorStop(0, `rgba(${g},0)`);
        halo.addColorStop(0.5, `rgba(${g},.16)`);
        halo.addColorStop(1, `rgba(${g},0)`);
        ctx.fillStyle = halo; ctx.fillRect(0, -w * 1.8, len, w * 3.6);
        // 蜿蜒水流：上下两条正弦扭动边缘构成流动带
        const layers = (typeof perfLevel !== 'undefined' && perfLevel >= 2) ? 1 : 2;
        const stepX = (typeof perfLevel !== 'undefined' && perfLevel >= 1) ? 22 : 14;
        for (let li = 0; li < layers; li++) {
          const ph = li * 1.7, freq = 0.05 + li * 0.02, spd = 9 + li * 3;
          const amp = w * (0.34 + li * 0.18), halfW = w * (0.7 - li * 0.22);
          const alpha = 0.34 - li * 0.1;
          ctx.beginPath();
          for (let x = 0; x <= len; x += stepX) {
            const wav = Math.sin(x * freq + time * spd + ph) * amp + Math.sin(x * freq * 2.2 - time * spd * 0.6) * amp * 0.32;
            const yy = wav - halfW; if (x === 0) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
          }
          for (let x = len; x >= 0; x -= stepX) {
            const wav = Math.sin(x * freq + time * spd + ph) * amp + Math.sin(x * freq * 2.2 - time * spd * 0.6) * amp * 0.32;
            ctx.lineTo(x, wav + halfW);
          }
          ctx.closePath();
          const lg = ctx.createLinearGradient(0, -w, 0, w);
          lg.addColorStop(0, `rgba(${g},0)`);
          lg.addColorStop(0.5, li === layers - 1 ? hexToRgba(bcore, alpha + 0.2) : `rgba(${g},${alpha})`);
          lg.addColorStop(1, `rgba(${g},0)`);
          ctx.fillStyle = lg; ctx.fill();
        }
        ctx.restore();
        // 命中点水花光晕
        const cap = ctx.createRadialGradient(bm.x2, bm.y2, 0, bm.x2, bm.y2, w * 2.2);
        cap.addColorStop(0, `rgba(${g},.6)`); cap.addColorStop(1, `rgba(${g},0)`);
        ctx.fillStyle = cap; ctx.beginPath(); ctx.arc(bm.x2, bm.y2, w * 2.2, 0, TAU); ctx.fill();
      }
    }
    const fluid = (cc.laserStyle === 'aurora');
    const glow = cc.laserGlow || '150,205,255';
    const core = cc.laserCore || '#eafaff';
    const y0 = Math.max(-20, player.y - 36);
    const pulse = 0.85 + Math.sin(time * 30) * 0.15;
    for (const Lz of pLasers) {
      const w = Lz.w * pulse;
      if (fluid) {
        drawFluidBeam(Lz.x, w, -10, y0, glow, core);
      } else {
        const g = ctx.createLinearGradient(Lz.x - w, 0, Lz.x + w, 0);
        g.addColorStop(0, `rgba(${glow},0)`);
        g.addColorStop(0.5, core.startsWith('#') ? hexToRgba(core, 0.95) : core);
        g.addColorStop(1, `rgba(${glow},0)`);
        ctx.fillStyle = g; ctx.fillRect(Lz.x - w, -10, w * 2, y0 + 10);
        // 中央亮芯
        ctx.fillStyle = `rgba(${glow},.55)`;
        ctx.fillRect(Lz.x - w * 0.28, -10, w * 0.56, y0 + 10);
      }
      // 灼烧光晕（光束顶端）
      const cap = ctx.createRadialGradient(Lz.x, y0, 0, Lz.x, y0, w * 1.6);
      cap.addColorStop(0, `rgba(${glow},.7)`); cap.addColorStop(1, `rgba(${glow},0)`);
      ctx.fillStyle = cap; ctx.beginPath(); ctx.arc(Lz.x, y0, w * 1.6, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }

  // 半透明流体激光束：多层蜿蜒水流 + 顺流而上的粒子（雅努西娅专属）
  function drawFluidBeam(cx, w, top, bottom, glow, core) {
    const h = bottom - top; if (h <= 1) return;
    const t = time;
    // —— 外层柔光（最宽、最淡，营造水的体积感）——
    ctx.globalCompositeOperation = 'lighter';
    const halo = ctx.createLinearGradient(cx - w * 1.9, 0, cx + w * 1.9, 0);
    halo.addColorStop(0, `rgba(${glow},0)`);
    halo.addColorStop(0.5, `rgba(${glow},0.14)`);
    halo.addColorStop(1, `rgba(${glow},0)`);
    ctx.fillStyle = halo; ctx.fillRect(cx - w * 1.9, top, w * 3.8, h);
    // —— 多层蜿蜒水流：每层用正弦扭动的左右边缘构成带状路径 ——
    const layers = (typeof perfLevel !== 'undefined' && perfLevel >= 2) ? 2 : 3;
    const step = (typeof perfLevel !== 'undefined' && perfLevel >= 1) ? 26 : 16;
    for (let li = 0; li < layers; li++) {
      const ph = li * 1.9;                       // 各层相位错开
      const freq = 0.018 + li * 0.006;           // 波动频率
      const speed = 5.2 + li * 1.7;              // 流动速度
      const amp = w * (0.30 + li * 0.16);        // 蜿蜒幅度
      const halfW = w * (0.62 - li * 0.13);      // 该层半宽（内层更细更亮）
      const alpha = 0.30 - li * 0.07;            // 内层更实
      ctx.beginPath();
      // 左边缘：自上而下
      for (let y = top; y <= bottom; y += step) {
        const wav = Math.sin(y * freq + t * speed + ph) * amp
                  + Math.sin(y * freq * 2.3 - t * speed * 0.6 + ph) * amp * 0.35;
        const x = cx + wav - halfW;
        if (y === top) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      // 右边缘：自下而上闭合
      for (let y = bottom; y >= top; y -= step) {
        const wav = Math.sin(y * freq + t * speed + ph) * amp
                  + Math.sin(y * freq * 2.3 - t * speed * 0.6 + ph) * amp * 0.35;
        const x = cx + wav + halfW;
        ctx.lineTo(x, y);
      }
      ctx.closePath();
      const g = ctx.createLinearGradient(cx - w, 0, cx + w, 0);
      g.addColorStop(0, `rgba(${glow},0)`);
      g.addColorStop(0.5, li === layers - 1 ? hexToRgba(core, alpha + 0.18) : `rgba(${glow},${alpha})`);
      g.addColorStop(1, `rgba(${glow},0)`);
      ctx.fillStyle = g; ctx.fill();
    }
    // —— 顺流而上的水滴粒子（基于时间的确定性流动）——
    if (!(typeof perfLevel !== 'undefined' && perfLevel >= 2)) {
      const pn = (typeof perfLevel !== 'undefined' && perfLevel >= 1) ? 7 : 12;
      for (let k = 0; k < pn; k++) {
        const seed = k * 1.6180339;
        const prog = ((t * (90 + (k % 4) * 36) + k * 53) % (h + 40)) / (h + 40);
        const py = bottom - prog * (h + 40) + 20;
        if (py < top - 6 || py > bottom + 6) continue;
        const swing = Math.sin(py * 0.02 + t * 5 + seed * 6) * w * 0.5;
        const px = cx + swing;
        const pr = (0.8 + (k % 3) * 0.5) * (0.7 + pulseFract(seed));
        const pa = 0.55 * (1 - Math.abs(prog - 0.5) * 0.8);
        ctx.fillStyle = `rgba(${glow},${pa})`;
        ctx.beginPath(); ctx.ellipse(px, py, pr, pr * 2.1, 0, 0, TAU); ctx.fill();
      }
    }
  }
  function pulseFract(seed) { const v = Math.sin(seed * 12.9898 + time) * 43758.5; return v - Math.floor(v); }
  // hex -> rgba 字符串
  function hexToRgba(hex, a) {
    const m = hex.replace('#', '');
    const r = parseInt(m.substring(0, 2), 16), g = parseInt(m.substring(2, 4), 16), b = parseInt(m.substring(4, 6), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function drawItems() {
    const KEY = { heal: 'itemHeal', berserk: 'itemBerserk', power: 'itemPower', bigpower: 'itemBigPower', point: 'itemPoint', life: 'itemLife', bomb: 'itemBomb', plugin_chain: 'itemPluginChain', plugin_homing: 'itemPluginHoming', plugin_blade: 'itemPluginBlade', plugin_qishenwu: 'itemPluginQsw' };
    ctx.save();
    for (const it of items) {
      const k = KEY[it.type] || 'itemHeal';
      // 七神武图标走和 加血/暴走 一样的高辨识掉落特效（同样大小 42）
      const isPlugin = (it.type === 'plugin_chain' || it.type === 'plugin_homing' || it.type === 'plugin_blade');
      const isDrop = (it.type === 'heal' || it.type === 'berserk' || it.type === 'plugin_qishenwu');
      const isMajor = (isDrop || it.type === 'life' || it.type === 'bomb');
      const sz = isPlugin ? 36 : (isDrop ? 42 : (isMajor ? 32 : 22));
      const bob = Math.sin(time * 5 + it.x) * 2.5;

      // ★ 加血/暴走：高辨识度掉落物——旋转光环 + 环绕星点 + 上浮微光 + 强发光，明显区别于敌弹
      if (isDrop) {
        const cx = it.x, cy = it.y + bob;
        const heal = it.type === 'heal';
        const qsw7 = it.type === 'plugin_qishenwu';
        const rgb = heal ? '120,255,150' : (qsw7 ? '255,224,150' : '255,205,90');
        const rgbBright = heal ? '210,255,220' : (qsw7 ? '255,248,210' : '255,240,180');
        const pulse = 0.6 + 0.4 * Math.sin(time * 6 + it.x);
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        // 外层柔光（大范围，确保第一眼就看到）
        const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, sz * 1.5);
        gr.addColorStop(0, `rgba(${rgb},${0.55 * pulse})`);
        gr.addColorStop(0.5, `rgba(${rgb},${0.22 * pulse})`);
        gr.addColorStop(1, `rgba(${rgb},0)`);
        ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(cx, cy, sz * 1.5, 0, TAU); ctx.fill();
        // 旋转六芒光环
        ctx.translate(cx, cy); ctx.rotate(time * 1.2);
        ctx.strokeStyle = `rgba(${rgbBright},${0.5 + 0.3 * pulse})`; ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = i * TAU / 6, rr = sz * 0.92;
          const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.stroke();
        // 环绕星点（3 颗反向旋转）
        ctx.rotate(-time * 2.2);
        for (let i = 0; i < 3; i++) {
          const a = i * TAU / 3, rr = sz * 1.05;
          const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
          ctx.fillStyle = `rgba(${rgbBright},${0.7 + 0.3 * Math.sin(time * 8 + i)})`;
          ctx.beginPath(); ctx.arc(px, py, 2.6, 0, TAU); ctx.fill();
        }
        ctx.restore();
        // 上浮微光粒子（偶发）
        if (Math.random() < 0.25) addParticle(cx + rand(-12, 12), cy + 10, rand(-8, 8), rand(-50, -20), 0.5, rand(1.5, 3), heal ? '#aaffc0' : '#ffe39a', true);
        // 图标本体（不透明，带轻微缩放呼吸）
        const isz = sz * (1 + 0.05 * Math.sin(time * 6 + it.x));
        if (assetReady(k)) ctx.drawImage(assets[k], cx - isz / 2, cy - isz / 2, isz, isz);
        continue;
      }

      if (isPlugin) {
        const pulse = 0.6 + 0.4 * Math.sin(time * 6 + it.x);
        const col = it.type === 'plugin_chain' ? 'rgba(200,130,255,' : (it.type === 'plugin_blade' ? 'rgba(150,120,255,' : (it.type === 'plugin_qishenwu' ? 'rgba(255,225,140,' : 'rgba(120,200,255,'));
        const gr = ctx.createRadialGradient(it.x, it.y + bob, 0, it.x, it.y + bob, sz);
        gr.addColorStop(0, col + (0.5 * pulse) + ')'); gr.addColorStop(1, col + '0)');
        ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(it.x, it.y + bob, sz, 0, TAU); ctx.fill();
      }
      if (assetReady(k)) {
        ctx.drawImage(assets[k], it.x - sz / 2, it.y - sz / 2 + bob, sz, sz);
      } else {
        ctx.fillStyle = it.type === 'point' ? '#8fe6ff' : (it.type === 'life' ? '#b6ff96' : (it.type === 'plugin_chain' ? '#c882ff' : (it.type === 'plugin_homing' ? '#78c8ff' : '#ff90a8')));
        ctx.beginPath(); ctx.arc(it.x, it.y + bob, sz * 0.4, 0, TAU); ctx.fill();
      }
    }
    ctx.restore();
  }

  // 连锁弹幕：渲染弹射时在敌人之间生成的发光锁链弧线（能量桥 + 链节 + 节点爆点）
  function drawChainLinks() {
    if (chainArcs.length === 0) return;
    ctx.save();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (const arc of chainArcs) {
      const k = clamp(arc.life / arc.maxLife, 0, 1);   // 1 -> 0 淡出
      drawLightningBolt(arc.x1, arc.y1, arc.x2, arc.y2, k, arc.rose);
      // 两端能量节点爆点
      ctx.globalCompositeOperation = 'lighter';
      for (const p of [{ x: arc.x1, y: arc.y1 }, { x: arc.x2, y: arc.y2 }]) {
        const rr = 18 * k + 5;
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rr);
        g.addColorStop(0, `rgba(245,238,255,${k})`);
        g.addColorStop(0.4, arc.rose ? `rgba(210,170,255,${0.8 * k})` : `rgba(170,140,255,${0.8 * k})`);
        g.addColorStop(1, 'rgba(120,90,220,0)');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, rr, 0, TAU); ctx.fill();
      }
    }
    ctx.restore();
  }

  // 紫电闪电链：多段高频抖动的不规则电弧（自制特效代码，可叠加上传的贴图）
  function drawLightningBolt(x1, y1, x2, y2, k, rose) {
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    const segs = Math.max(6, Math.floor(len / 22));
    const glow = rose ? `rgba(200,150,255,${0.30 * k})` : `rgba(168,120,255,${0.32 * k})`;
    const core = rose ? `rgba(250,238,255,${0.96 * k})` : `rgba(236,228,255,${0.96 * k})`;
    ctx.globalCompositeOperation = 'lighter';
    // 画 2 条交叠抖动的电弧 + 偶发分叉
    for (let b = 0; b < 2; b++) {
      const amp = (b === 0 ? 15 : 9) * (0.6 + 0.4 * Math.random());
      const pts = [{ x: x1, y: y1 }];
      for (let s = 1; s < segs; s++) {
        const t = s / segs;
        const taper = Math.sin(t * Math.PI);           // 两端收束，中段抖动大
        const off = (Math.random() - 0.5) * 2 * amp * taper;
        pts.push({ x: x1 + dx * t + nx * off, y: y1 + dy * t + ny * off });
      }
      pts.push({ x: x2, y: y2 });
      // 外发光
      ctx.strokeStyle = glow; ctx.lineWidth = b === 0 ? 10 : 6;
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (const p of pts) ctx.lineTo(p.x, p.y); ctx.stroke();
      // 亮芯
      ctx.strokeStyle = core; ctx.lineWidth = b === 0 ? 2.6 : 1.6;
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (const p of pts) ctx.lineTo(p.x, p.y); ctx.stroke();
      // 随机分叉小电弧
      if (b === 0 && Math.random() < 0.7) {
        const i = 1 + ((Math.random() * (pts.length - 2)) | 0);
        const fx = pts[i].x + nx * (Math.random() - 0.5) * 26, fy = pts[i].y + ny * (Math.random() - 0.5) * 26 + (Math.random() - 0.5) * 14;
        ctx.strokeStyle = core; ctx.lineWidth = 1.4;
        ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(fx, fy); ctx.stroke();
      }
    }
    // 玩家素材：编织闪电链贴图沿连线拉伸（作为主视觉）
    if (assetReady('vfxChainBolt')) {
      const img = assets.vfxChainBolt;
      const ang = Math.atan2(dy, dx);
      ctx.save(); ctx.translate(x1, y1); ctx.rotate(ang);
      const ih = 26 + Math.sin(time * 30) * 3;   // 轻微脉动
      // 外发光铺底
      ctx.globalAlpha = 0.5 * k; ctx.drawImage(img, 0, -ih * 0.9, len, ih * 1.8);
      // 主链
      ctx.globalAlpha = k; ctx.drawImage(img, 0, -ih / 2, len, ih);
      ctx.restore(); ctx.globalAlpha = 1;
    }
  }

  // 追踪弹幕：在被锁定的目标上绘制脉动锁定环（去重，每目标一枚）
  function drawHomingLocks() {
    if (player.plugin !== 'homing') return;
    const seen = [];
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const s of playerShots) {
      if (!s.homing || s.tx == null) continue;
      let dup = false;
      for (const o of seen) { if (Math.abs(o.x - s.tx) < 24 && Math.abs(o.y - s.ty) < 24) { dup = true; break; } }
      if (dup) continue;
      seen.push({ x: s.tx, y: s.ty });
      const pulse = 0.6 + Math.sin(time * 7 + s.tx * 0.05) * 0.4;
      const rr = 26 + pulse * 8;
      const ringKey = assetReady('uiLockRing') ? 'uiLockRing' : (assetReady('uiGlowRing') ? 'uiGlowRing' : null);
      if (ringKey) {
        ctx.save(); ctx.translate(s.tx, s.ty); ctx.rotate(time * 2.2);
        ctx.globalAlpha = 0.55 + pulse * 0.4;
        const sz = rr * 2.2; ctx.drawImage(assets[ringKey], -sz / 2, -sz / 2, sz, sz);
        ctx.restore();
      } else {
        ctx.strokeStyle = `rgba(150,220,255,${0.5 + pulse * 0.4})`; ctx.lineWidth = 2.4;
        ctx.beginPath(); ctx.arc(s.tx, s.ty, rr, 0, TAU); ctx.stroke();
      }
      // 四角准星标记
      ctx.strokeStyle = `rgba(190,240,255,${0.7 * pulse + 0.3})`; ctx.lineWidth = 2;
      for (let c = 0; c < 4; c++) {
        const a = c * Math.PI / 2 + Math.PI / 4 + time * 2.2;
        const ix = s.tx + Math.cos(a) * rr, iy = s.ty + Math.sin(a) * rr;
        const ox = s.tx + Math.cos(a) * (rr + 9), oy = s.ty + Math.sin(a) * (rr + 9);
        ctx.beginPath(); ctx.moveTo(ix, iy); ctx.lineTo(ox, oy); ctx.stroke();
      }
    }
    ctx.restore();
  }

  // 幽灵暗刃：幽灵现身挥砍的瞬时动画（贴图以 lighter 叠加，暗背景自然消隐）
  // 七神武：整套终极演出渲染（压暗→法阵→幻影→环绕剑→锁定→飞剑→AOE 闪光）
  function drawQishenwu() {
    if (!qsw.active) return;
    const t = qsw.time;
    const vis = enemyBullets.length > 620 ? 0.65 : (enemyBullets.length > 460 ? 0.8 : 1);
    let dim = 0;
    if (t < 0.4) dim = t / 0.4 * 0.32; else if (t < QSW.activeEnd) dim = 0.22; else dim = Math.max(0, 1 - (t - QSW.activeEnd) / QSW.rest) * 0.22;
    if (dim > 0) { ctx.save(); ctx.fillStyle = `rgba(6,8,20,${dim})`; ctx.fillRect(0, 0, W, H); ctx.restore(); }
    // 七神舞专属金色全屏脉冲（召唤/中段/终结时亮起）——自带主题色，避免改全局白色 flash 管线
    if (qsw.goldFlash > 0) { ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.fillStyle = `rgba(255,226,150,${Math.min(0.5, qsw.goldFlash) * vis})`; ctx.fillRect(0, 0, W, H); ctx.restore(); }
    const fade = t > QSW.activeEnd ? Math.max(0, 1 - (t - QSW.activeEnd) / (QSW.total - QSW.activeEnd)) : 1;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    'purple', 'moon', 'scytherose', 'scytheviolet', 'scythewhite', 'homingspear',
    'bossslash1', 'bossslash2', 'featherdark', 'bosstriangle'
  ]);
  // 仍用贴图渲染的大型/刃形弹（其余一律程序化糖果弹，保证清晰）
  const SPRITE_BULLETS = new Set([
    'scytherose', 'scytheviolet', 'scythewhite', 'homingspear', 'bossslash1', 'bossslash2', 'aurora', 'aurorab', 'aurorac'
  ]);
  // 弹幕形状分类（异形弹保留亮核+暗边可读性）：star/crystal/petal/diamond，其余 orb
  const BULLET_SHAPE = {
    starpurple: 'star', star: 'star', pentagoncyan: 'star', soulorb: 'star', soul: 'star',
    crystalblue: 'crystal', crystalpurple: 'crystal', crystal: 'crystal', hexagonyellow: 'crystal',
    energyred: 'crystal', energyblue: 'crystal', energygold: 'crystal', electric: 'crystal',
    petalpink: 'petal', petal: 'petal', flowerbloom: 'petal', flowersingle: 'petal', heartpink: 'petal', snowflake: 'star',
    bosstriangle: 'diamond', bosspentagon: 'star',
  };

  // ═══════════════════════════════════════════════════════════════
  // 弹幕精灵缓存：把每种「形状+颜色+半径」的圆/异形弹（含外发光+实体+
  // 描边+亮核）预渲染到离屏 canvas 一次，之后每帧只 drawImage 一次。
  // 彻底消除每帧成千上万次 createRadialGradient（Windows 卡顿主因）。
  // ═══════════════════════════════════════════════════════════════
  const _bulletSpriteCache = new Map();
  function getBulletSprite(shape, col, r) {
    const rq = Math.round(r * 2) / 2; // 半径量化到 0.5，限制缓存条目数
    const key = shape + '|' + col.r + ',' + col.g + ',' + col.b + '|' + rq;
    let spr = _bulletSpriteCache.get(key);
    if (spr) return spr;
    const body = rq * 1.5;
    const pad = Math.ceil(body * 1.9) + 3;       // 容纳外发光半径
    const size = pad * 2;
    const oc = document.createElement('canvas');
    oc.width = size; oc.height = size;
    const g = oc.getContext('2d');
    g.translate(pad, pad);
    const rimC = `rgba(${col.r * 0.3 | 0},${col.g * 0.3 | 0},${col.b * 0.3 | 0},0.95)`;
    const fillC = `rgb(${col.r},${col.g},${col.b})`;
    // 外发光（additive）
    g.globalCompositeOperation = 'lighter';
    const gl = g.createRadialGradient(0, 0, 0, 0, 0, body * 1.9);
    gl.addColorStop(0, `rgba(${col.r},${col.g},${col.b},0.5)`);
    gl.addColorStop(1, `rgba(${col.r},${col.g},${col.b},0)`);
    g.fillStyle = gl; g.beginPath(); g.arc(0, 0, body * 1.9, 0, TAU); g.fill();
    g.globalCompositeOperation = 'source-over';
    if (shape === 'orb') {
      g.fillStyle = fillC; g.beginPath(); g.arc(0, 0, body, 0, TAU); g.fill();
      g.strokeStyle = rimC; g.lineWidth = 1.8; g.beginPath(); g.arc(0, 0, body, 0, TAU); g.stroke();
      g.fillStyle = 'rgba(255,255,255,0.96)';
      g.beginPath(); g.arc(-body * 0.18, -body * 0.18, body * 0.46, 0, TAU); g.fill();
    } else {
      buildBulletShape(g, shape, body);
      g.fillStyle = fillC; g.fill();
      g.strokeStyle = rimC; g.lineWidth = 1.8; g.stroke();
      g.fillStyle = 'rgba(255,255,255,0.95)';
      g.beginPath(); g.arc(0, 0, body * 0.4, 0, TAU); g.fill();
    }
    spr = { canvas: oc, pad };
    if (_bulletSpriteCache.size < 600) _bulletSpriteCache.set(key, spr);
    return spr;
  }

  // 方向性弹精灵缓存（沿速度拉伸的菱形 + 暗边 + 亮核）
  const _dirSpriteCache = new Map();
  function getDirSprite(col, r) {
    const rq = Math.round(r * 2) / 2;
    const key = col.r + ',' + col.g + ',' + col.b + '|' + rq;
    let spr = _dirSpriteCache.get(key);
    if (spr) return spr;
    const L = rq * 2.6, Wd = rq * 1.15;
    const pad = Math.ceil(L * 1.3) + 3;
    const size = pad * 2;
    const oc = document.createElement('canvas');
    oc.width = size; oc.height = size;
    const g = oc.getContext('2d');
    g.translate(pad, pad);
    g.globalCompositeOperation = 'lighter';
    const gl = g.createRadialGradient(0, 0, 0, 0, 0, L * 1.3);
    gl.addColorStop(0, `rgba(${col.r},${col.g},${col.b},0.45)`);
    gl.addColorStop(1, `rgba(${col.r},${col.g},${col.b},0)`);
    g.fillStyle = gl; g.beginPath(); g.arc(0, 0, L * 1.3, 0, TAU); g.fill();
    g.globalCompositeOperation = 'source-over';
    g.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
    g.beginPath();
    g.moveTo(L, 0); g.lineTo(0, -Wd); g.lineTo(-L * 0.7, 0); g.lineTo(0, Wd); g.closePath();
    g.fill();
    g.strokeStyle = `rgba(${col.r * 0.35 | 0},${col.g * 0.35 | 0},${col.b * 0.35 | 0},0.9)`;
    g.lineWidth = 1.6; g.stroke();
    g.fillStyle = 'rgba(255,255,255,0.95)';
    g.beginPath(); g.ellipse(L * 0.15, 0, rq * 0.7, rq * 0.5, 0, 0, TAU); g.fill();
    spr = { canvas: oc, pad };
    if (_dirSpriteCache.size < 400) _dirSpriteCache.set(key, spr);
    return spr;
  }

  function drawEnemyBullets() {
    ctx.save();
    for (const b of enemyBullets) {
      const r = b.r;
      // —— V2 海洋贴图弹：整套 drawImage（方向性按速度旋转，其余自旋）+ 加法底光 ——
      if (SPRITE_BULLETS_V2.has(b.kind)) {
        const key = BULLET_KEY[b.kind];
        if (assetReady(key)) {
          const img = assets[key];
          const ar = img.height / img.width;
          const size = r * 4.6;
          const h = size * ar;
          ctx.save();
          ctx.translate(b.x, b.y);
          if (SPRITE_BULLETS_V2_DIR.has(b.kind)) ctx.rotate(Math.atan2(b.vy, b.vx) + Math.PI / 2);
          else ctx.rotate((b.rot || 0) + time * 1.8);
          if (perfLevel < 2) { ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.4; const gs = size * 1.2; ctx.drawImage(img, -gs / 2, -gs * ar / 2, gs, gs * ar); ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; }
          ctx.drawImage(img, -size / 2, -h / 2, size, h);
          ctx.restore();
          continue;
        }
      }
      // —— 大型刃/贴图弹：沿速度朝向 + 叠加亮核 ——
      if (SPRITE_BULLETS.has(b.kind)) {
        const key = BULLET_KEY[b.kind];
        if (assetReady(key)) {
          const ang = Math.atan2(b.vy, b.vx);
          ctx.save();
          ctx.translate(b.x, b.y);
          ctx.rotate(ang + Math.PI / 2 + (b.rot || 0) * 0.15);
          const isScythe = b.kind.startsWith('scythe');
          const isSpear = b.kind === 'homingspear';
          const size = isScythe ? r * 6.6 : (isSpear ? r * 7.0 : r * 5.4);
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = 0.5;
          ctx.drawImage(assets[key], -size / 2, -size / 2, size, size);
          ctx.globalAlpha = 1;
          ctx.globalCompositeOperation = 'source-over';
          ctx.drawImage(assets[key], -size / 2, -size / 2, size, size);
          ctx.restore();
          continue;
        }
      }

      const col = b._c || (b._c = parseColor(b.color));

      // —— 方向性弹（针/钻石/月牙）：用缓存精灵，按朝向旋转 ——
      if (DIRECTIONAL_BULLETS.has(b.kind)) {
        const ang = Math.atan2(b.vy, b.vx);
        const spr = getDirSprite(col, r);
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(ang);
        ctx.drawImage(spr.canvas, -spr.pad, -spr.pad);
        ctx.restore();
        continue;
      }

      // —— 圆形/异形"糖果弹"：用缓存精灵 ——
      const shape = BULLET_SHAPE[b.kind] || 'orb';
      const rEff = b.grazed ? r * 1.15 : r;
      const spr = getBulletSprite(shape, col, rEff);
      if (shape === 'orb') {
        // 圆形无需旋转，直接贴图（最快路径）
        ctx.drawImage(spr.canvas, b.x - spr.pad, b.y - spr.pad);
      } else {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.rot || 0);
        ctx.drawImage(spr.canvas, -spr.pad, -spr.pad);
        ctx.restore();
      }
    }
    ctx.restore();
  }

  // 构建异形弹路径（星/水晶/花瓣/六角）——保持亮核+暗边的可读性
  function buildBulletShape(ctx, shape, body) {
    ctx.beginPath();
    if (shape === 'star') {
      const n = 5, ro = body * 1.35, ri = body * 0.6;
      for (let i = 0; i < n * 2; i++) {
        const a = -Math.PI / 2 + i * Math.PI / n, rr = (i % 2 === 0) ? ro : ri;
        const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
    } else if (shape === 'crystal') {
      // 六角水晶（硬边）
      const n = 6, rr = body * 1.18;
      for (let i = 0; i < n; i++) {
        const a = -Math.PI / 2 + i * TAU / n;
        const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
    } else if (shape === 'petal') {
      // 四瓣花（圆角十字）
      const lobe = body * 1.25;
      for (let i = 0; i < 4; i++) {
        const a = i * TAU / 4;
        const cx = Math.cos(a) * body * 0.62, cy = Math.sin(a) * body * 0.62;
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, lobe * 0.5, 0, TAU);
      }
    } else { // diamond
      const L = body * 1.5;
      ctx.moveTo(0, -L); ctx.lineTo(body * 0.85, 0); ctx.lineTo(0, L); ctx.lineTo(-body * 0.85, 0); ctx.closePath();
    }
  }

  function drawPlayerHitbox() {
    if (state === 'title' || state === 'win' || state === 'lose') return;
    const slow = !!(keys.ShiftLeft || keys.ShiftRight);
    ctx.save();
    ctx.translate(player.x, player.y);
    // 精准移动时显示判定环贴图（素材 ui_focus_ring）
    if (slow && assetReady('uiFocusRing')) {
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.globalCompositeOperation = 'lighter';
      ctx.rotate(time * 1.6);
      const fr = 46;
      ctx.drawImage(assets.uiFocusRing, -fr, -fr, fr * 2, fr * 2);
      ctx.restore();
    }
    // 真实判定点：极小的核心点，精确显示受伤范围（便于擦弹）
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff5a78';
    // 外圈柔光（仅辅助看清，非判定）
    ctx.globalAlpha = slow ? 0.9 : 0.5;
    ctx.strokeStyle = 'rgba(120,230,255,0.7)';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(0, 0, 6, 0, TAU); ctx.stroke();
    // 判定核心（红白点，半径≈hitR）
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ff3b5c';
    ctx.beginPath(); ctx.arc(0, 0, player.hitR + 1.4, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(0, 0, player.hitR, 0, TAU); ctx.fill();
    ctx.restore();
  }

  function drawWarnings() {
    for (const w of warnings) {
      const p = 1 - w.life / w.maxLife;
      ctx.save();
      ctx.globalAlpha = 0.32 + Math.sin(time * 24) * 0.12;
      ctx.strokeStyle = '#ff315d';
      ctx.fillStyle = 'rgba(255,49,93,.16)';
      ctx.lineWidth = 4 + Math.sin(time * 28) * 2;
      if (w.type === 'laser') {
        ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke();
        ctx.lineWidth = w.width;
        ctx.globalAlpha = 0.10 + p * 0.16;
        ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke();
      } else if (w.type === 'circle') {
        ctx.beginPath(); ctx.arc(w.x, w.y, w.r, 0, TAU); ctx.fill(); ctx.stroke();
        ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.arc(w.x, w.y, w.r * p, 0, TAU); ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawLasers() {
    for (const l of lasers) {
      const p = l.life / l.maxLife;
      ctx.save();
      ctx.globalAlpha = Math.min(1, p * 2.2);
      const dx = l.x2 - l.x1, dy = l.y2 - l.y1;
      const len = Math.hypot(dx, dy);
      const ang = Math.atan2(dy, dx) - Math.PI / 2;
      if (assetReady('laserGlow')) {
        ctx.save();
        ctx.translate(l.x1, l.y1);
        ctx.rotate(ang);
        ctx.globalAlpha *= 0.85;
        ctx.drawImage(assets.laserGlow, -l.width * 0.8, 0, l.width * 1.6, len);
        ctx.restore();
      }
      ctx.shadowBlur = 24;
      ctx.shadowColor = l.color;
      ctx.strokeStyle = l.color;
      ctx.lineWidth = l.width;
      ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
      if (assetReady('laserCore')) {
        ctx.save();
        ctx.shadowBlur = 0;
        ctx.translate(l.x1, l.y1);
        ctx.rotate(ang);
        ctx.drawImage(assets.laserCore, -l.width * 0.16, 0, l.width * 0.32, len);
        ctx.restore();
      }
      ctx.strokeStyle = '#fff6f9';
      ctx.lineWidth = l.width * 0.22;
      ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
      ctx.restore();
    }
  }

  function drawPlayerBeam() {
    if (!playerBeam) return;
    const p = playerBeam.life / playerBeam.maxLife;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const x = playerBeam.x;
    const w = playerBeam.width * (0.72 + (1 - p) * 0.32);
    const a = Math.min(1, p * 1.4);
    const by = player.y - 26;
    // 外层宽辉光（横向渐变软边，替代贴图）
    ctx.globalAlpha = a * 0.5;
    const og = ctx.createLinearGradient(x - w * 1.5, 0, x + w * 1.5, 0);
    og.addColorStop(0, 'rgba(126,222,255,0)'); og.addColorStop(0.5, 'rgba(150,225,255,.28)'); og.addColorStop(1, 'rgba(126,222,255,0)');
    ctx.fillStyle = og; ctx.fillRect(x - w * 1.5, -10, w * 3, by + 10);
    // 主束（流体扭动软边，青→白→紫渐变芯）
    ctx.globalAlpha = a;
    fluidColumn(x, w * 0.5, -10, by, '130,235,255', 'rgba(244,254,255,.95)', 0.12, 7);
    fluidColumn(x, w * 0.34, -10, by, '170,140,255', 'rgba(214,196,255,.5)', 0.18, 9);
    // 白色亮芯（流体细线）
    ctx.globalAlpha = a * 0.9;
    fluidColumn(x, Math.max(5, w * 0.12), -10, by, '255,255,255', 'rgba(255,255,255,.95)', 0.3, 12);
    // 顶端灼烧爆点 + 旋转星芒
    const isz = w * 0.9 * (0.7 + (1 - p) * 0.4);
    const ig = ctx.createRadialGradient(x, by, 0, x, by, isz);
    ig.addColorStop(0, `rgba(255,255,255,${0.85 * a})`); ig.addColorStop(0.4, `rgba(190,235,255,${0.55 * a})`); ig.addColorStop(1, 'rgba(130,235,255,0)');
    ctx.fillStyle = ig; ctx.beginPath(); ctx.arc(x, by, isz, 0, TAU); ctx.fill();
    ctx.save(); ctx.translate(x, by); ctx.rotate(time * 2.5); ctx.strokeStyle = `rgba(235,250,255,${0.6 * a})`; ctx.lineWidth = 2.5;
    for (let k = 0; k < 6; k++) { ctx.rotate(Math.PI / 3); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -isz * 1.4); ctx.stroke(); }
    ctx.restore();
    if (Math.random() < 0.5) addParticle(x + rand(-w * 0.4, w * 0.4), by, rand(-70, 70), rand(30, 90), 0.25, rand(1.5, 3), '#cfeaff', true);
    ctx.restore();
  }

  function drawUltimateEffect() {
    if (!ultimateEffect) return;
    const t = 1 - ultimateEffect.life / ultimateEffect.maxLife;
    const x = ultimateEffect.x;
    const y = ultimateEffect.y;
    // —— 角色1 全屏红激光大招渲染 ——
    if (ultimateEffect.fullLaser) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const a = Math.sin(Math.min(1, ultimateEffect.life / ultimateEffect.maxLife) * Math.PI); // 渐入渐出
      const cols = 9;
      for (let c = 0; c < cols; c++) {
        const lx = (W / (cols + 1)) * (c + 1);
        const w = (28 + Math.sin(time * 24 + c) * 8) * (0.6 + a);
        const g = ctx.createLinearGradient(lx - w, 0, lx + w, 0);
        g.addColorStop(0, 'rgba(255,90,120,0)');
        g.addColorStop(0.5, `rgba(255,224,230,${0.92 * a})`);
        g.addColorStop(1, 'rgba(255,90,120,0)');
        ctx.fillStyle = g; ctx.fillRect(lx - w, 0, w * 2, y);
        ctx.fillStyle = `rgba(255,110,136,${0.5 * a})`;
        ctx.fillRect(lx - w * 0.3, 0, w * 0.6, y);
      }
      // 顶部灼烧横光
      ctx.globalAlpha = a * 0.5;
      const hg = ctx.createLinearGradient(0, 0, 0, 120);
      hg.addColorStop(0, 'rgba(255,120,150,.6)'); hg.addColorStop(1, 'rgba(255,120,150,0)');
      ctx.fillStyle = hg; ctx.fillRect(0, 0, W, 120);
      ctx.restore();
      return;
    }
    // —— 雅努西娅 坠月之巅：坠落黑月幻影 ——
    if (ultimateEffect.fallMoon) {
      const p = 1 - ultimateEffect.life / ultimateEffect.maxLife; // 0->1
      const fall = Math.min(1, p / 0.55);                          // 坠落进度
      const ez = fall < 1 ? 1 - Math.pow(1 - fall, 3) : 1;         // 缓出
      const my = -W * 0.5 + (y + W * 0.5) * ez;                    // 从屏上坠到中心
      const moonD = (W * 0.55 + W * 0.45 * ez);                    // 直径增大到约满屏宽
      const impact = p > 0.55 ? (p - 0.55) / 0.45 : 0;             // 撞击进度
      ctx.save();
      ctx.translate(x, my);

      // 1) 背景放射爆（旋转，红色，additive）
      if (assetReady('yRadial')) {
        ctx.save(); ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.5 * fall; ctx.rotate(time * 0.6);
        const rs = moonD * 1.8; ctx.drawImage(assets.yRadial, -rs / 2, -rs / 2, rs, rs);
        ctx.restore();
      }
      // 2) 暗红光晕底
      ctx.globalCompositeOperation = 'source-over';
      const halo = ctx.createRadialGradient(0, 0, moonD * 0.2, 0, 0, moonD * 0.85);
      halo.addColorStop(0, 'rgba(90,16,30,.7)'); halo.addColorStop(0.55, 'rgba(50,8,24,.5)'); halo.addColorStop(1, 'rgba(10,0,10,0)');
      ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(0, 0, moonD * 0.85, 0, TAU); ctx.fill();
      // 3) 月球本体（缓慢自转）+ 赤红染色
      if (assetReady('yMoon')) {
        ctx.save(); ctx.rotate(time * 0.25);
        ctx.globalAlpha = 0.99; ctx.drawImage(assets.yMoon, -moonD / 2, -moonD / 2, moonD, moonD);
        // 赤红叠色（减弱，保留 3D 月球细节）
        ctx.globalCompositeOperation = 'overlay'; ctx.globalAlpha = 0.28 + impact * 0.28;
        const rg = ctx.createRadialGradient(0, 0, 0, 0, 0, moonD / 2);
        rg.addColorStop(0, 'rgba(255,70,80,.55)'); rg.addColorStop(1, 'rgba(120,0,20,.45)');
        ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(0, 0, moonD / 2, 0, TAU); ctx.fill();
        ctx.restore();
      } else {
        const mg = ctx.createRadialGradient(-moonD * 0.15, -moonD * 0.15, moonD * 0.1, 0, 0, moonD / 2);
        mg.addColorStop(0, '#7a1020'); mg.addColorStop(1, '#1a0010');
        ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(0, 0, moonD / 2, 0, TAU); ctx.fill();
      }
      // 4) 月辉外圈（additive）
      if (assetReady('yMoonGlow')) {
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.5 + Math.sin(time * 8) * 0.15;
        const gs = moonD * 1.25; ctx.drawImage(assets.yMoonGlow, -gs / 2, -gs / 2, gs, gs);
      }
      // 5) 环绕云雾（多团旋转）
      if (assetReady('yCloud')) {
        ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.45 * fall;
        for (let i = 0; i < 5; i++) {
          const ca = time * 0.5 + i * TAU / 5;
          const cd = moonD * 0.62, cs = moonD * 0.5;
          ctx.drawImage(assets.yCloud, Math.cos(ca) * cd - cs / 2, Math.sin(ca) * cd - cs / 2, cs, cs);
        }
      }
      // 6) 放射闪电（撞击后增强）
      if (assetReady('yLightning') && p > 0.4) {
        ctx.globalCompositeOperation = 'lighter';
        const bolts = 10;
        for (let i = 0; i < bolts; i++) {
          if ((Math.floor(time * 20) + i) % 3 !== 0) continue; // 闪烁
          ctx.save(); ctx.rotate(i * TAU / bolts + time * 0.3);
          ctx.globalAlpha = 0.6 * (0.4 + impact);
          const bl = moonD * (0.5 + Math.random() * 0.4);
          ctx.drawImage(assets.yLightning, -moonD * 0.04, moonD * 0.35, moonD * 0.08, bl);
          ctx.restore();
        }
      }
      ctx.restore();

      // 7) 撞击冲击波环（多层扩散）+ 屏闪
      if (impact > 0) {
        ctx.save(); ctx.globalCompositeOperation = 'lighter';
        for (let k = 0; k < 3; k++) {
          const wp = clamp(impact - k * 0.18, 0, 1);
          if (wp <= 0) continue;
          ctx.globalAlpha = (1 - wp) * 0.7;
          if (assetReady('yRing')) {
            const rd = 120 + wp * 820;
            ctx.drawImage(assets.yRing, x - rd / 2, my - rd / 2, rd, rd);
          } else {
            ctx.strokeStyle = '#ff6a7a'; ctx.lineWidth = 10 * (1 - wp);
            ctx.beginPath(); ctx.arc(x, my, 100 + wp * 760, 0, TAU); ctx.stroke();
          }
        }
        ctx.restore();
      }
      return;
    }
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = Math.max(0, 1 - t);
    const r = 90 + t * 760;
    const pulse = ctx.createRadialGradient(x, y, 0, x, y, r);
    pulse.addColorStop(0, 'rgba(255,255,255,.34)');
    pulse.addColorStop(0.12, 'rgba(180,105,255,.34)');
    pulse.addColorStop(0.38, 'rgba(90,220,255,.15)');
    pulse.addColorStop(1, 'rgba(90,220,255,0)');
    ctx.fillStyle = pulse;
    ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();

    ctx.translate(x, y);
    ctx.rotate(time * 0.8);
    if (assetReady('vfxUltimate')) {
      const size = 180 + t * 700;
      ctx.drawImage(assets.vfxUltimate, -size / 2, -size / 2, size, size);
    }
    for (let i = 0; i < 3; i++) {
      const rr = 80 + t * (180 + i * 140);
      const ring = ctx.createRadialGradient(0, 0, rr * 0.65, 0, 0, rr);
      ring.addColorStop(0, 'rgba(255,230,143,0)');
      ring.addColorStop(0.76, 'rgba(255,230,143,.10)');
      ring.addColorStop(1, 'rgba(255,230,143,0)');
      ctx.fillStyle = ring;
      ctx.beginPath(); ctx.arc(0, 0, rr, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }

  function drawSpriteFx() {
    if (!spriteFx.length) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const fx of spriteFx) {
      const img = assets[fx.key];
      if (!img || !img.ready) continue;
      const p = clamp(fx.life / fx.maxLife, 0, 1);
      const t = 1 - p;
      const size = fx.size * (1 + fx.grow * t);
      ctx.save();
      ctx.translate(fx.x, fx.y);
      ctx.rotate(fx.rot);
      ctx.globalAlpha = fx.alpha * Math.sin(p * Math.PI);
      ctx.drawImage(img, -size / 2, -size / 2, size, size);
      ctx.restore();
    }
    ctx.restore();
  }

  function drawParticles() {
    // Cheap additive glow pass (no per-particle shadowBlur, which is CPU-killing at scale).
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles) {
      if (!p.glow) continue;
      const a = clamp(p.life / p.maxLife, 0, 1);
      ctx.globalAlpha = a * 0.5;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (1.4 + a), 0, TAU); ctx.fill();
    }
    ctx.restore();
    // Core pass.
    ctx.save();
    for (const p of particles) {
      const a = clamp(p.life / p.maxLife, 0, 1);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.45 + a), 0, TAU); ctx.fill();
    }
    ctx.restore();
  }

  function drawSkill(x, y, key, name, cdRate, ready = false, iconOverride = null) {
    ctx.save();

    // 爆裂魔女风格：圆形技能按钮 + 金色外环

    ctx.fillStyle = ready ? 'rgba(40,28,16,.78)' : 'rgba(18,16,28,.72)';
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.fill();

    const iconKey = iconOverride || (key === 'X' ? 'uiSkillBombIcon' : 'uiSkillBeamIcon');
    const fb = key === 'X' ? 'skillBomb' : 'skillBeam';
    const useKey = assetReady(iconKey) ? iconKey : (assetReady(fb) ? fb : null);

      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, R - 3, 0, TAU); ctx.clip();
      ctx.globalAlpha = cdRate > 0 ? 0.5 : 1;
      ctx.drawImage(assets[useKey], cx - R, cy - R, R * 2, R * 2);
      ctx.restore();

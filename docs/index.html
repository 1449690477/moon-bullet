    {
      const dashing = (d.state === 'dash' || ncState.mode === 'laser');
      const power = (over ? 1.5 : 1.0) * (dashing ? 1.0 : 0.6);
      const mx = x + Math.cos(d.angle) * (bodyH * 0.46), my = y + Math.sin(d.angle) * (bodyH * 0.46);
      const r = (ncState.mode === 'laser' ? 12 : (dashing ? 16 : 11)) * power * (0.8 + 0.2 * Math.sin(d.coreT * 8));
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      const g = ctx.createRadialGradient(mx, my, 0, mx, my, r);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(0.25, 'rgba(120,220,255,0.85)');
      g.addColorStop(0.7, 'rgba(130,50,255,0.25)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(mx, my, r, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }
  function ncMuzzle(d, bodyH) { const off = bodyH * 0.46; return { x: d.x + Math.cos(d.angle) * off, y: d.y + Math.sin(d.angle) * off }; }
  // 引擎拖尾火焰：从机体尾部向后喷射（区分前后；冲刺时随速度拉长，暴走更长更亮）
  function drawNcEngine(d, over) {
    const bodyH = over ? 54 : 46;
    const speed = Math.hypot(d.vx, d.vy);
    const dashing = ncState.mode === 'dash' && d.state === 'dash';
    let len = dashing
      ? clamp(bodyH * 0.65 + speed * 0.082, bodyH * 0.85, bodyH * (over ? 4.0 : 2.25))
      : bodyH * (over ? 0.95 : 0.62);
    const flick = 0.82 + 0.18 * Math.sin(time * 34 + d.index * 1.7);
    len *= flick;
    const rearA = d.angle + Math.PI;
    const bx = d.x - Math.cos(d.angle) * (bodyH * 0.34), by = d.y - Math.sin(d.angle) * (bodyH * 0.34);
    const tx = bx + Math.cos(rearA) * len, ty = by + Math.sin(rearA) * len;
    const nx = -Math.sin(d.angle), ny = Math.cos(d.angle);
    const w = (over ? 20 : 10) * flick * (dashing ? 1 : 0.72);
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    // 暗紫外焰：宽、长、低透明度，强化高速体积感
    const ow = w * 1.65, otx = bx + Math.cos(rearA) * len * 1.08, oty = by + Math.sin(rearA) * len * 1.08;
    let og = ctx.createLinearGradient(bx, by, otx, oty);
    og.addColorStop(0, over ? 'rgba(130,45,230,0.72)' : 'rgba(55,35,150,0.48)');
    og.addColorStop(0.42, over ? 'rgba(76,18,160,0.42)' : 'rgba(45,22,110,0.28)');
    og.addColorStop(1, 'rgba(12,0,32,0)');
    ctx.fillStyle = og;
    ctx.beginPath(); ctx.moveTo(bx + nx * ow, by + ny * ow); ctx.lineTo(bx - nx * ow, by - ny * ow); ctx.lineTo(otx, oty); ctx.closePath(); ctx.fill();
    // 蓝紫主焰
    let g = ctx.createLinearGradient(bx, by, tx, ty);
    g.addColorStop(0, over ? 'rgba(206,155,255,0.96)' : 'rgba(120,190,255,0.84)');
    g.addColorStop(0.48, over ? 'rgba(115,52,245,0.68)' : 'rgba(70,110,235,0.44)');
    g.addColorStop(1, 'rgba(40,10,90,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.moveTo(bx + nx * w, by + ny * w); ctx.lineTo(bx - nx * w, by - ny * w); ctx.lineTo(tx, ty); ctx.closePath(); ctx.fill();
    // 白蓝核心焰
    const w2 = w * 0.42, l2 = len * (over ? 0.82 : 0.68), tx2 = bx + Math.cos(rearA) * l2, ty2 = by + Math.sin(rearA) * l2;
    let g2 = ctx.createLinearGradient(bx, by, tx2, ty2);
    g2.addColorStop(0, 'rgba(255,255,255,1)'); g2.addColorStop(0.45, 'rgba(170,235,255,0.88)'); g2.addColorStop(1, 'rgba(130,90,255,0)');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.moveTo(bx + nx * w2, by + ny * w2); ctx.lineTo(bx - nx * w2, by - ny * w2); ctx.lineTo(tx2, ty2); ctx.closePath(); ctx.fill();
    // 暴走纹理贴图覆盖在程序火焰上，保留柔光并避免硬边。
    const trailKey = over && assetReady('ncTrailOverdrive') ? 'ncTrailOverdrive' : (assetReady('ncTrailNormal') ? 'ncTrailNormal' : null);
    if (trailKey && dashing && perfLevel < 2) {
      const img = assets[trailKey];
      ctx.save();
      ctx.translate(bx, by);
      ctx.rotate(rearA);
      ctx.globalAlpha = over ? 0.72 : 0.38;
      ctx.drawImage(img, 0, -w * 1.18, len * 1.12, w * 2.36);
      ctx.restore();
    }
    ctx.restore();
  }
  function drawNcLaser(d, over) {
    const t = ncState.target; if (!t) return;
    const bodyH = over ? 54 : 46;
    const m = ncMuzzle(d, bodyH);
    const x1 = m.x, y1 = m.y, x2 = t.x, y2 = t.y;
    const pulse = 1 + Math.sin(time * 24 + d.index) * 0.06;
    const wm = (over ? NC.laserWidthMulOver : NC.laserWidthMul) * pulse;
    const ang = Math.atan2(y2 - y1, x2 - x1), len = Math.hypot(x2 - x1, y2 - y1);
    const nx = -Math.sin(ang), ny = Math.cos(ang);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // butt 端盖：光束精确从炮口起，杜绝向后凸出的"反向小光束"
    ctx.lineCap = 'butt';
    const seg = (w, c) => { ctx.strokeStyle = c; ctx.lineWidth = w; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); };
    // 立体粗光束：宽柔外辉 → 紫主光 → 蓝 → 亮蓝 → 白核 + 偏置高光（圆柱体积感）
    seg(64 * wm, 'rgba(40,10,90,0.16)');     // 体积外辉
    seg(44 * wm, 'rgba(110,45,255,0.26)');   // 黑紫外雾
    seg(30 * wm, 'rgba(120,60,255,0.36)');   // 紫主光
    seg(18 * wm, 'rgba(70,190,255,0.58)');   // 蓝
    seg(9 * wm, 'rgba(190,240,255,0.82)');   // 亮蓝
    ctx.lineCap = 'round';
    seg(3.6 * wm, 'rgba(255,255,255,1)');     // 白核
    // 圆柱高光：核心偏上一侧的一条更亮细线，制造立体反光
    ctx.save(); ctx.translate(nx * 3.0 * wm, ny * 3.0 * wm); ctx.globalAlpha = 0.5;
    seg(2.2 * wm, 'rgba(255,255,255,0.9)');
    ctx.restore();
    // 滚动纹理 overlay（去绿后的激光主纹理）
    const texKey = over ? (assetReady('ncLaserOverdrive') ? 'ncLaserOverdrive' : null) : (assetReady('ncLaserNormal') ? 'ncLaserNormal' : null);
    if (texKey && perfLevel < 2) {
      const img = assets[texKey];
      const th = (over ? 26 : 18) * wm;
      ctx.save(); ctx.translate(x1, y1); ctx.rotate(ang);
      ctx.globalAlpha = 0.5;
      const scroll = (time * 320) % img.width;
      for (let sx = -scroll; sx < len; sx += img.width) ctx.drawImage(img, sx, -th / 2, img.width, th);
      ctx.restore();
    }
    // 电弧裂纹层（更快反向滚动，叠出"紫电撕裂"），暴走更明显
    if (assetReady('ncLaserCrack') && perfLevel < 1) {
      const img = assets.ncLaserCrack;
      const th = (over ? 30 : 20) * wm;
      ctx.save(); ctx.translate(x1, y1); ctx.rotate(ang);
      ctx.globalAlpha = over ? 0.55 : 0.32;
      const scroll = (time * 540) % img.width;
      for (let sx = -scroll; sx < len; sx += img.width) ctx.drawImage(img, sx, -th / 2, img.width, th);
      ctx.restore();
    }
    ctx.restore();
    // 炮口闪光
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    const mr = (over ? 18 : 12) * (1 + Math.sin(time * 30 + d.index) * 0.12);
    const mg = ctx.createRadialGradient(x1, y1, 0, x1, y1, mr);
    mg.addColorStop(0, 'rgba(255,255,255,1)'); mg.addColorStop(0.4, 'rgba(150,210,255,0.8)'); mg.addColorStop(1, 'rgba(120,40,255,0)');
    ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(x1, y1, mr, 0, TAU); ctx.fill();
    ctx.restore();
  }
  function drawNcHitPoint(over) {
    const t = ncState.target; if (!t) return;
    // 命中点抖动
    const jx = rand(-2, 2), jy = rand(-2, 2);
    const cx = t.x + jx, cy = t.y + jy;
    const r = (over ? 34 : 22) * (1 + Math.sin(time * 28) * 0.08);
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.25, 'rgba(130,220,255,0.9)');
    g.addColorStop(0.6, 'rgba(130,40,255,0.35)');
    g.addColorStop(1, 'rgba(20,0,40,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.fill();

    const period = 0.2;
    const ph = (time % period) / period;

    ctx.globalAlpha = (1 - ph) * 0.8;
    ctx.strokeStyle = over ? 'rgba(180,140,255,0.9)' : 'rgba(140,200,255,0.85)';

    ctx.globalAlpha = 1;
    ctx.restore();
  }
  // 模式重组：目标锁定环 + 各炮指向目标的锁链线（switchT 过渡期）
  function drawNcReform() {
    const t = ncState.target; if (!t) return;

    const p = 1 - clamp(ncState.switchT / NC.switchDuration, 0, 1);
    const reveal = Math.sin(clamp(p / 0.9, 0, 1) * Math.PI);
    const glowR = 86 + p * 64;
    const glow = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, glowR);
    glow.addColorStop(0, `rgba(235,245,255,${0.22 * reveal})`);
    glow.addColorStop(0.38, `rgba(126,86,255,${0.18 * reveal})`);
    glow.addColorStop(1, 'rgba(38,8,86,0)');

    if (assetReady('ncOrbitRing')) {
      const img = assets.ncOrbitRing;
      const baseR = ((NC.formationRadiusMin + NC.formationRadiusMax) * 0.5) * (0.72 + p * 0.30);
      for (let pass = 0; pass < 2; pass++) {

        ctx.rotate((pass ? -1 : 1) * (time * (pass ? 0.78 : 1.12) + p * 0.8));
        ctx.globalAlpha = reveal * (pass ? 0.28 : 0.52);

      const mx = lerp(d.x, t.x, 0.55), my = lerp(d.y, t.y, 0.55);
      ctx.beginPath(); ctx.moveTo(d.x, d.y);
      ctx.quadraticCurveTo(mx + Math.sin(d.index * 2.1) * 18, my + Math.cos(d.index * 1.7) * 18, t.x, t.y);

    else if (nrVoid.phase === 'suction') R = 96 + Math.sin(time * 8) * 8;

  function updatePlayer(dt) {
    player.prevX = player.x;
    player.prevY = player.y;
    player.inv = Math.max(0, player.inv - dt);
    player.shootCd -= dt;
    player.beamCd = Math.max(0, player.beamCd - dt);
    player.bombCd = Math.max(0, player.bombCd - dt);
    player.grazeCd = Math.max(0, player.grazeCd - dt);
    if (player.berserk > 0) {
      player.berserk = Math.max(0, player.berserk - dt);
      // 暴走金色粒子拖尾
      if (Math.random() < 0.6) addParticle(player.x + rand(-14, 14), player.y + rand(-6, 18), rand(-30, 30), rand(20, 80), 0.3, rand(2, 4), '#ffd45a', true);
    }

    if (pointerDown && pointerTarget) {
      player.x = pointerTarget.x;
      player.y = pointerTarget.y;
    } else {
      let dx = 0, dy = 0;
      if (keys.ArrowLeft || keys.KeyA) dx -= 1;
      if (keys.ArrowRight || keys.KeyD) dx += 1;
      if (keys.ArrowUp || keys.KeyW) dy -= 1;
      if (keys.ArrowDown || keys.KeyS) dy += 1;
      const len = Math.hypot(dx, dy) || 1;
      const slow = !!(keys.ShiftLeft || keys.ShiftRight);
      const cc = curChar();
      const speed = slow ? cc.slowSpeed : cc.speed;
      if (dx || dy) {
        player.x += (dx / len) * speed * dt;
        player.y += (dy / len) * speed * dt;
      }
    }
    player.x = clamp(player.x, 36, W - 36);
    player.y = clamp(player.y, 260, H - 58);
    player.moveVX = (player.x - player.prevX) / Math.max(dt, 0.001);
    player.moveVY = (player.y - player.prevY) / Math.max(dt, 0.001);

    const firing = (state === 'mobs' || state === 'boss');
    const cc = curChar();
    // 飞羽增伤已弃用（雅努西娅改回激光）；保留 fireRamp 衰减以防残留
    player.fireRamp = Math.max(0, player.fireRamp - dt * 1.4);
    if (cc.weapon === 'lifeRibbon') {
      pLasers.length = 0; pBeams.length = 0;
    } else if (cc.weapon === 'laser') {
      // 激光束角色（雅努西娅）：持续激光，开火逻辑独立（暴走变粗+分裂锁敌）
      updatePlayerLaser(dt, firing);
    } else if (cc.weapon === 'bladeray') {
      // 夜裁：瞄准射线 + 空间斩，全部逻辑在 updateReaver（不发射散弹）
      pLasers.length = 0; pBeams.length = 0;
    } else {
      pLasers.length = 0;
      pBeams.length = 0;
      if (firing && player.shootCd <= 0) {
        const ber = player.berserk > 0;
        player.shootCd = cc.shootCd * (ber ? 0.6 : 1);   // 暴走：射速提升
        // 夜裁暴走时由 updateReaver 的"暴走倾泻"接管主输出，普攻扇形让位避免过密
        if (!(reaverActive() && ber)) {
          cc.shoot(powerLevel());
          // 暴走·安娜额外镰刀扇形（伊丽莎白的暴走强化在其 shoot 内处理）
          if (ber && selectedChar === 'anna') {
            const lv = powerLevel();
            for (let i = -3; i <= 3; i++) {
              const ang = -Math.PI / 2 + i * 0.16;
              addPlayerShot(player.x, player.y - 18, Math.cos(ang) * 780, Math.sin(ang) * 780, (10 + lv * 3), 10, 'scythe');
            }
          }
          if (reaverActive() && audio.nrBlade) audio.nrBlade(); else audio.shoot();
        }
      }
    }
    updateMotherLife(dt);
    // 夜裁系统：浮游刀锋 / 暴走倾泻 / 裂界回环 / 黑洞大招
    updateReaver(dt);
    // 夜裁之影已与角色解绑，作为独立可装备僚机更新
    updateNrWingmen(dt);
    // 圣冕可装备僚机：对全部角色生效（独立于夜裁），必须在 updateReaver 之外调用
    updateSaintWing(dt);
    updateSaintField(dt);
    updateScFx(dt);
    // 夜棺巡礼·八芒浮骸 脱手浮游炮阵列（任意角色可装备）
    updateNightCoffin(dt);

    // 弹幕升级插件：在基础武器之上叠加额外弹幕（对全部主角生效）
    firePlugin(dt, firing);

    if (keys.Space) { keys.Space = false; useBeam(); }
    if (keys.KeyX) { keys.KeyX = false; useBomb(); }

    if (playerBeam) {
      playerBeam.life -= dt;
      playerBeam.x = player.x;
      playerBeam.y = player.y;
      if (playerBeam.life <= 0) playerBeam = null;
    }
    if (ultimateEffect) {
      ultimateEffect.life -= dt;
      // 坠月之巅：月球坠落期间持续抵挡/清除上方来袭弹幕（演出"月球挡弹"）
      if (ultimateEffect.fallMoon && enemyBullets.length) {
        const my = ultimateEffect.y, blockR = W * 0.5;

    }
    if (pluginToast) {
      pluginToast.life -= dt;
      if (pluginToast.life <= 0) pluginToast = null;
    }
  }

  // 通用激光武器：随等级变粗/变强；暴走时变粗、加速、分裂锁敌。
  // 配置来自当前角色：laserColor / laserGlow / birds / laserStyle
  function updatePlayerLaser(dt, firing) {
    pLasers.length = 0;
    pBeams.length = 0;
    player.birdTimer -= dt;
    if (!firing) return;
    const cc = curChar();
    const ber = player.berserk > 0;
    const lv = powerLevel();
    let n = lv >= 5 ? 3 : (lv >= 3 ? 2 : 1);
    let baseW = 22 + lv * 9;
    let dmgps = 150 + lv * 78;
    const glow = cc.laserGlow || '150,205,255';
    const partCol = cc.laserColor || '#bfe9ff';
    if (ber) { baseW *= 1.7; dmgps *= 1.85; }   // 暴走：更粗更痛
    const offs = n === 1 ? [0] : (n === 2 ? [-24, 24] : [-44, 0, 44]);
    for (const dx of offs) pLasers.push({ x: player.x + dx, w: baseW * (dx === 0 ? 1 : 0.78), dmgps, glow, locked: false });
    // 暴走分裂：从玩家身上射出角度光束，自动锁定最近的敌人持续灼烧
    pBeams.length = 0;
    if (ber) {
      const targets = enemies.filter(e => e.y < player.y + 40)
        .sort((a, b) => dist2(player.x, player.y, a.x, a.y) - dist2(player.x, player.y, b.x, b.y))
        .slice(0, 5);
      const ox = player.x, oy = player.y - 16;
      for (const t of targets) {
        pBeams.push({ x1: ox, y1: oy, x2: t.x, y2: t.y, w: baseW * 0.5, glow });
        t.hp -= dmgps * 0.6 * dt; t.hitFlash = 0.1;
        if (Math.random() < dt * 20) addParticle(t.x + rand(-6, 6), t.y, rand(-30, 30), rand(-60, 60), 0.22, rand(2, 4), partCol, true);
        score += dmgps * 0.6 * dt * 0.3;
      }
      if (boss && state === 'boss' && !boss.dead && boss.inv <= 0) {
        pBeams.push({ x1: ox, y1: oy, x2: boss.x, y2: boss.y, w: baseW * 0.7, glow });
        boss.hp = Math.max(0, boss.hp - dmgps * 0.8 * dt); boss.hitFlash = 0.1;
        if (boss.hp <= 0) defeatBoss();
      }
    }
    for (const Lz of pLasers) {
      const half = Lz.w * 0.5;
      for (const e of enemies) {
        if (e.y < player.y && Math.abs(e.x - Lz.x) < half + e.r) {
          e.hp -= Lz.dmgps * dt; e.hitFlash = 0.08;
          if (Math.random() < dt * 16) addParticle(e.x + rand(-6, 6), e.y, rand(-30, 30), rand(-130, -30), 0.2, rand(2, 4), partCol, true);
          score += Lz.dmgps * dt * 0.35;
        }
      }
      if (boss && state === 'boss' && !boss.dead && boss.inv <= 0 && boss.y < player.y && Math.abs(boss.x - Lz.x) < half + boss.r) {
        boss.hp = Math.max(0, boss.hp - Lz.dmgps * dt);
        boss.hitFlash = 0.1;
        score += Lz.dmgps * dt * 0.5;
        if (Math.random() < dt * 9) dmgText(boss.x + rand(-60, 60), boss.y + rand(-30, 20), Math.floor(Lz.dmgps * dt * 4.5), partCol, 20);
        if (boss.hp <= 0) defeatBoss();
      }
    }
    audio.shoot();
    // 飞鸟（仅哑奴西亚等 birds 角色）：暴走时成群展开扇形齐飞，更密更壮观
    if (cc.birds && player.birdTimer <= 0) {
      player.birdTimer = Math.max(0.12, (ber ? 0.3 : 0.44) - lv * 0.04);
      const cnt = 1 + Math.floor(lv / 2) + (ber ? 4 : 0);
      const spread = ber ? 1.5 : 0.85;
      for (let i = 0; i < cnt; i++) {
        const f = cnt === 1 ? 0 : (i / (cnt - 1) - 0.5);
        const ang = -Math.PI / 2 + f * spread + rand(-0.08, 0.08);
        const spd = 430 + Math.abs(f) * 90;          // 边缘飞鸟略快，扇面更舒展
        const s = addPlayerShot(player.x + f * 30, player.y - 14, Math.cos(ang) * 250, Math.sin(ang) * spd, 9 + lv * 2 + (ber ? 4 : 0), 13 + (ber ? 4 : 0), 'bird');
        if (s) s.flap = (Math.random() * 4) | 0;

    }
  }
  // 暴走巨鸟：以玩家为中心射出一只贯穿全屏的大飞鸟，持续灼烧路径上的所有敌人
  function launchGiantBird() {
    giantBirds.push({ x: player.x, y: player.y, vy: -680, w: 240, life: 1.6, maxLife: 1.6, flap: 0, hitIds: new Set(), tick: 0 });
    audio.birdCry();

    flash = Math.max(flash, 0.5); flashColor = '255,236,150';
    for (let i = 0; i < 22; i++) addParticle(player.x + rand(-40, 40), player.y + rand(-20, 20), rand(-160, 160), rand(-260, 60), 0.4, rand(3, 6), '#ffd45a', true);
  }
  function updateGiantBirds(dt) {
    const cc = curChar();
    const dmg = 240 * berserkDmg();
    for (let i = giantBirds.length - 1; i >= 0; i--) {
      const gb = giantBirds[i];
      gb.y += gb.vy * dt;
      gb.x = lerp(gb.x, player.x, Math.min(1, dt * 3));   // 略微跟随玩家横向
      gb.life -= dt; gb.tick += dt;
      const half = gb.w * 0.5;
      // 贯穿：对范围内所有敌人持续造成伤害
      for (const e of enemies) {
        if (Math.abs(e.x - gb.x) < half + e.r && Math.abs(e.y - gb.y) < gb.w * 0.55 + e.r) {
          e.hp -= dmg * dt; e.hitFlash = 0.1;
          if (Math.random() < dt * 18) addParticle(e.x + rand(-10, 10), e.y, rand(-60, 60), rand(-120, -20), 0.3, rand(3, 5), '#e8f6ff', true);
        }
      }
      if (boss && state === 'boss' && !boss.dead && boss.inv <= 0 && Math.abs(boss.x - gb.x) < half + boss.r && Math.abs(boss.y - gb.y) < gb.w * 0.6 + boss.r) {
        boss.hp = Math.max(0, boss.hp - dmg * 1.2 * dt); boss.hitFlash = 0.1;
        if (gb.tick > 0.12) { gb.tick = 0; dmgText(boss.x + rand(-40, 40), boss.y, Math.floor(dmg * 1.2 * 0.12), '#bfe9ff', 22); }

  function drawGiantBirds() {
    if (!giantBirds.length) return;
    const bk = curBirdKey();
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const gb of giantBirds) {
      const fade = Math.min(1, gb.life / 0.4);
      // 残影拖尾光柱（金色，与蓝色弹幕区分）
      const tg = ctx.createLinearGradient(gb.x - gb.w * 0.5, 0, gb.x + gb.w * 0.5, 0);
      tg.addColorStop(0, 'rgba(255,196,70,0)');

      tg.addColorStop(1, 'rgba(255,196,70,0)');
      ctx.fillStyle = tg; ctx.fillRect(gb.x - gb.w * 0.5, gb.y, gb.w, H - gb.y + 40);
      // 巨鸟本体（4 帧振翅动画，染成金色以便和弹幕区分）
      const fi = (Math.floor(time * 16) % 4) + 1;
      const animKey = bk + fi;
      const useKey = assetReady(animKey) ? animKey : (assetReady('yBirdObj') ? 'yBirdObj' : bk);
      ctx.globalAlpha = fade;
      const gold = assetReady(useKey) ? getGoldBird(useKey) : null;
      if (gold) {
        const sz = gb.w;
        // 金色外光晕烘托
        ctx.globalCompositeOperation = 'lighter';
        const halo = ctx.createRadialGradient(gb.x, gb.y, 0, gb.x, gb.y, sz * 0.6);
        halo.addColorStop(0, `rgba(255,210,90,${0.45 * fade})`);
        halo.addColorStop(1, 'rgba(255,196,70,0)');
        ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(gb.x, gb.y, sz * 0.6, 0, TAU); ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = fade;
        ctx.drawImage(gold, gb.x - sz / 2, gb.y - sz / 2, sz, sz);
      } else {
        const rg = ctx.createRadialGradient(gb.x, gb.y, 0, gb.x, gb.y, gb.w * 0.5);
        rg.addColorStop(0, 'rgba(255,236,150,.9)'); rg.addColorStop(1, 'rgba(255,196,70,0)');
        ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(gb.x, gb.y, gb.w * 0.5, 0, TAU); ctx.fill();
      }
    }
    ctx.restore();
  }
  // 把蓝色鸟精灵图染成金色剪影（缓存离屏 canvas，按贴图键复用）
  const _goldBirdCache = new Map();
  function getGoldBird(key) {
    let c = _goldBirdCache.get(key);
    if (c) return c;
    const img = assets[key];
    if (!img || !img.width) return null;
    const oc = document.createElement('canvas');
    oc.width = img.width; oc.height = img.height;
    const g = oc.getContext('2d');
    g.drawImage(img, 0, 0);
    // 用原图形状作遮罩叠加金色渐变，保留羽翼明暗层次
    g.globalCompositeOperation = 'source-atop';
    const grd = g.createLinearGradient(0, 0, 0, img.height);
    grd.addColorStop(0, 'rgba(255,242,190,0.95)');
    grd.addColorStop(0.5, 'rgba(255,206,80,0.95)');
    grd.addColorStop(1, 'rgba(255,170,40,0.95)');
    g.fillStyle = grd; g.fillRect(0, 0, img.width, img.height);
    g.globalCompositeOperation = 'source-over';
    _goldBirdCache.set(key, oc);
    return oc;
  }
  // 兼容旧名
  function updateYanuLaser(dt, firing) { return updatePlayerLaser(dt, firing); }

  // 弹幕升级插件开火：连锁(chain) / 追踪(homing)。独立计时，叠加在主武器之上。
  function firePlugin(dt, firing) {
    if (player.pluginGlow > 0) player.pluginGlow -= dt;
    if (!player.plugin || !firing) { return; }
    player.pluginCd -= dt;
    if (player.pluginCd > 0) return;
    const lv = powerLevel();
    const rose = (curChar() === CHARACTERS.anna) || (curBirdKey() === 'yanuBirdRose');
    if (player.plugin === 'chain') {
      // 连锁弹幕：月核心形弹命中敌人后，会像锁链一样自动弹射到附近的其他敌人，连续跳跃多个目标
      player.pluginCd = 0.34;
      const shots = (lv >= 4) ? 2 : 1;     // 等级高时同时射出 2 发链头
      const sp = 720;
      const dmg = (12 + lv * 4);
      const bounces = 3 + lv;              // 可弹射 4..8 个目标
      for (let i = 0; i < shots; i++) {
        const ang = -Math.PI / 2 + (shots === 1 ? 0 : (i - 0.5) * 0.18);
        addPlayerShot(player.x + (shots === 1 ? 0 : (i - 0.5) * 24), player.y - 20, Math.cos(ang) * sp, Math.sin(ang) * sp, dmg, 13, 'chainheart');
        const s = playerShots[playerShots.length - 1];
        s.rose = rose; s.spin = 0; s.bounces = bounces; s.hitIds = []; s.baseSpeed = sp;
      }

      if (lv >= 2) {
        addPlayerShot(player.x - 20, player.y - 10, -110, -560, dmg * 0.45, 12, 'feather');
        addPlayerShot(player.x + 20, player.y - 10, 110, -560, dmg * 0.45, 12, 'feather');
      }
      audio.shoot();
    } else if (player.plugin === 'homing') {
      // 追踪弹幕：囚笼法球放出追踪弹，自动锁定最近敌人
      player.pluginCd = reaverActive() ? 0.34 : 0.26;
      const cnt = 1 + Math.floor((lv + 1) / 2);  // 1..3 支
      const aurora = (curBirdKey() === 'yanuBird' && curChar() === CHARACTERS.yanuxiya && (curChar().skinIndex === 3));
      const reaverSword = reaverActive();        // 夜裁专属：用大招同款飞剑做追踪弹（快速、有力）
      for (let i = 0; i < cnt; i++) {
        const spread = (cnt === 1) ? 0 : (i / (cnt - 1) - 0.5) * 0.9;
        const ang = -Math.PI / 2 + spread;
        if (reaverSword) {
          const sp = 1050;     // 高初速，强力飞出
          addPlayerShot(player.x + (i - (cnt - 1) / 2) * 24, player.y - 30, Math.cos(ang) * sp, Math.sin(ang) * sp, 46 + lv * 14, 16, 'nrsword');
          const s = playerShots[playerShots.length - 1];
          // 直接突进态 + 追踪 + 命中爆炸；穿透 2，火力适中
          s.rot = ang + Math.PI / 2; s.born = time; s.big = true; s.dashed = true; s.homing = true; s.dashT = 0; s.boomT = 0; s.primary = false; s.pierce = 2; s.life = 2.0;
        } else {
          const sp = 430;
          addPlayerShot(player.x, player.y - 38, Math.cos(ang) * sp, Math.sin(ang) * sp, 11 + lv * 3, 11, 'homingspear');
          const s = playerShots[playerShots.length - 1];
          s.aurora = aurora; s.homing = true; s.pierce = 1;

    } else if (player.plugin === 'blade') {

      player.pluginCd = 3.0;

      const gx = player.x + side * 50, gy = player.y - 6;
      ghostSlashes.push({ x: gx, y: gy, side, life: 0.6, maxLife: 0.6 });

      const ang = -Math.PI / 2 + side * 0.16;
      // 光刃：初速慢悬停（蓄力）→ dashT 到点突然飞快穿透，带残影
      addPlayerShot(gx, gy - 14, Math.cos(ang) * 90, Math.sin(ang) * 90, dmg, 36, 'bladebig');
      const s = playerShots[playerShots.length - 1];
      s.rose = rose; s.spin = 0; s.rot = ang + Math.PI / 2; s.pierce = 99;

      // 起手斩月弧 + 紫色迸溅 + 幽光
      addSpriteFx(assetReady('gbScytheCast') ? 'gbScytheCast' : 'vfxBladeArc', gx, gy - 20, 160, 0.4, 0, 0.5, 0.9);
      for (let q = 0; q < 14; q++) addParticle(gx, gy - 16, side * rand(30, 180), rand(-220, -40), rand(0.2, 0.55), rand(2, 6), Math.random() < 0.5 ? '#b070ff' : '#e0c0ff', true);

  // ====== 七神武插件：终极召唤 → 全屏 AOE → 持续剑雨 → 中段爆发 → 终结齐射 → 消散 ======
  function qswBaseDmg() { return (30 + powerLevel() * 12) * grindDmg(); }

  function qswFindTarget(x, y, bossPriority) {
    let best = null, bestScore = -1e9;
    for (const e of enemies) {
      const d = Math.hypot(e.x - x, e.y - y);
      const score = -d * 0.8 + (e.maxHp || 0) * 0.03;
      if (score > bestScore) { bestScore = score; best = e; }
    }
    if (boss && state === 'boss' && !boss.dead) {
      const d = Math.hypot(boss.x - x, boss.y - y);

  function qswAOE(mult) {

    else { const a = rand(0, TAU); x = player.x + Math.cos(a) * 90; y = player.y - 20 + Math.sin(a) * 70; }

  function qswSwordHit(s, hit) {
    const dmg = qswBaseDmg() * s.dmg * 1.25 * (hit === boss ? 0.85 : 1);

    if (assetReady('qswFeather') && Math.random() < 0.4) addSpriteFx('qswFeather', s.x, s.y, 38, 0.5, rand(0, TAU), 0.3, 0.7);

    // 重剑 / Boss 命中给一记极短打击定格，强化"斩中"的实感；全局限频，避免高频命中导致顿挫卡顿
    if ((s.explode || hit === boss) && qsw.hsT <= 0 && perfLevel < 2) {

    if (s.explode) {
      const er = 90, ed = dmg * 0.35;
      for (const e of enemies) { if (e !== hit && Math.hypot(e.x - s.x, e.y - s.y) < er) { e.hp -= ed; e.hitFlash = 0.1; } }
      addSpriteFx('qswHit', s.x, s.y, 110, 0.3, 0, 0.6, 0.8);
    }
  }
  // 终结巨剑天降：一把巨大飞剑从天而降，砸地时全屏攻击（这是终极的“一击”，非开场清屏）
  function qswGiantImpact() {
    const base = (260 + powerLevel() * 120) * grindDmg();
    for (let i = enemies.length - 1; i >= 0; i--) { enemies[i].hp -= base; enemies[i].hitFlash = 0.2; }
    if (boss && state === 'boss' && !boss.dead) hitBoss(base * 0.7, boss.x, boss.y, true);
    for (let q = 0; q < 60; q++) { const a = rand(0, TAU), s = rand(120, 620); addParticle(W * 0.5, qsw.giant.y, Math.cos(a) * s, Math.sin(a) * s * 0.5, rand(0.3, 0.9), rand(3, 9), Math.random() < 0.5 ? '#ffe7a0' : '#cfe6ff', true); }
    addSpriteFx('qswHit', W * 0.5, qsw.giant.y, 360, 0.5, 0, 0.6, 0.95);
    hitStop = Math.max(hitStop, 0.16);
    // 砸地终结：金色全屏脉冲 + 双层扩张冲击环（弱机只留主环），把"终极一击"的张力拉满
    qsw.goldFlash = Math.max(qsw.goldFlash, 0.85);
    addRingFx(W * 0.5, qsw.giant.y, 40, W * 1.05, 0.6, 'rgba(255,238,180,', 9);
    if (perfLevel < 2) addRingFx(W * 0.5, qsw.giant.y, 20, W * 0.75, 0.45, 'rgba(255,252,230,', 4);
    screenShake = Math.max(screenShake, QSW.shakeFinal); flash = Math.max(flash, 0.8);
    if (audio.qswAoe) audio.qswAoe();
  }
  function updateQishenwu(dt) {
    if (!qsw.active) return;
    qsw.time += dt;
    if (qsw.goldFlash > 0) qsw.goldFlash = Math.max(0, qsw.goldFlash - dt * 2.2);
    if (qsw.hsT > 0) qsw.hsT -= dt;
    // 开场不再全屏清屏，仅以一声召唤起手；由飞剑去“万剑归宗”地秒杀敌人
    if (qsw.time >= QSW.activeStart && qsw.time <= QSW.activeEnd) {
      qsw.swordTimer -= dt;
      while (qsw.swordTimer <= 0) { qsw.swordTimer += QSW.spawnInterval; for (let k = 0; k < QSW.swordsPerSpawn; k++) qswSpawnSword(Math.random() < 0.6 ? 'around' : 'sky'); }
    }
    if (!qsw.midDone && qsw.time >= QSW.midBurstAt) {
      qsw.midDone = true;
      for (let k = 0; k < QSW.midBurstCount; k++) qswSpawnSword(['sky', 'sides', 'around'][k % 3]);
      // 中段爆发：给一记明确的视觉标记（金色脉冲 + 玩家处迸发环），让"剑潮再起"可被感知
      qsw.goldFlash = Math.max(qsw.goldFlash, 0.5);
      addRingFx(player.x, player.y - 18, 24, 300, 0.4, 'rgba(255,236,170,', 4);
      screenShake = Math.max(screenShake, QSW.shakeHit + 4);
      if (audio.qswSwordVolley) audio.qswSwordVolley();
    }
    // 终结：召唤巨剑从天而降（不再用 AOE 清屏，而是一把巨剑砸全屏）
    if (!qsw.finalDone && qsw.time >= QSW.finalBurstAt) {
      qsw.finalDone = true;
      for (let k = 0; k < 14; k++) qswSpawnSword(k % 2 ? 'sky' : 'around');  // 收尾剑雨陪衬
      qsw.giant = { y: -360, vy: 120, targetY: H * 0.46, impacted: false };
      // 落点预警：巨剑天降前在地面砸点亮起金色待击环，给玩家"大招要落了"的预读
      addRingFx(W * 0.5, H * 0.46, 200, 60, 0.6, 'rgba(255,224,150,', 5);
      if (audio.qswSummon) audio.qswSummon();
    }
    // 巨剑下坠 + 砸地
    if (qsw.giant && !qsw.giant.impacted) {
      qsw.giant.vy += 1400 * dt; qsw.giant.y += qsw.giant.vy * dt;
      if (qsw.giant.y >= qsw.giant.targetY) { qsw.giant.y = qsw.giant.targetY; qsw.giant.impacted = true; qsw.giant.fade = 0.7; qswGiantImpact(); }
    } else if (qsw.giant && qsw.giant.impacted) {
      qsw.giant.fade -= dt; if (qsw.giant.fade <= 0) qsw.giant = null;
    }
    for (let i = qsw.swords.length - 1; i >= 0; i--) {
      const s = qsw.swords[i];
      s.life -= dt; s.lock = Math.max(0, s.lock - dt);
      if (s.life <= 0) { qsw.swords.splice(i, 1); continue; }
      const tValid = s.target && (s.target === boss ? (boss && !boss.dead && state === 'boss') : enemies.indexOf(s.target) >= 0);
      if (!tValid) s.target = qswFindTarget(s.x, s.y);
      if (s.target && s.lock <= 0) {
        const want = Math.atan2(s.target.y - s.y, s.target.x - s.x);
        let diff = want - s.angle; while (diff > Math.PI) diff -= TAU; while (diff < -Math.PI) diff += TAU;
        s.angle += clamp(diff, -s.turn * dt, s.turn * dt);
      }
      const sp = s.lock > 0 ? s.speed * 0.25 : s.speed;
      s.x += Math.cos(s.angle) * sp * dt; s.y += Math.sin(s.angle) * sp * dt;
      s.trail.push({ x: s.x, y: s.y }); if (s.trail.length > 9) s.trail.shift();
      if (s.x < -100 || s.x > W + 100 || s.y < -140 || s.y > H + 100) { qsw.swords.splice(i, 1); continue; }
      let hit = null;
      for (const e of enemies) { if (s.hitIds.indexOf(e) < 0 && Math.hypot(e.x - s.x, e.y - s.y) < QSW.hitR + e.r) { hit = e; break; } }
      if (!hit && boss && state === 'boss' && !boss.dead && s.hitIds.indexOf(boss) < 0 && Math.hypot(boss.x - s.x, boss.y - s.y) < QSW.hitR + boss.r) hit = boss;
      if (hit) {
        qswSwordHit(s, hit); s.hitIds.push(hit);
        if (s.pierce > 0) s.pierce--; else { qsw.swords.splice(i, 1); continue; }
      }
    }
    for (let i = qsw.locks.length - 1; i >= 0; i--) { qsw.locks[i].life -= dt; if (qsw.locks[i].life <= 0) qsw.locks.splice(i, 1); }
    if (qsw.time > QSW.total) { qsw.active = false; qsw.swords.length = 0; qsw.locks.length = 0; qsw.giant = null; if (audio.qswEnd) audio.qswEnd(); }
  }

  // 掉落道具：下落，靠近玩家时被吸附拾取。
  function addItem(x, y, type) {
    items.push({ x, y, vx: rand(-30, 30), vy: rand(-150, -70), type, life: 12, attract: false });
  }
  function updateItems(dt) {
    const collectR = player.r + 28;
    const attractR = (state === 'mobs' || state === 'boss') ? 150 : 0;
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.life -= dt;
      const d2 = dist2(it.x, it.y, player.x, player.y);
      // 玩家位于屏幕上方时自动吸附全部道具（STG 惯例）
      if (it.attract || d2 < attractR * attractR || player.y < 360) it.attract = true;
      if (it.attract) {
        const a = angleTo(it.x, it.y, player.x, player.y);
        it.vx = lerp(it.vx, Math.cos(a) * 560, 0.18);
        it.vy = lerp(it.vy, Math.sin(a) * 560, 0.18);
      } else {
        it.vy += 340 * dt;            // 重力
        it.vy = Math.min(it.vy, 220);
      }
      it.x += it.vx * dt; it.y += it.vy * dt;
      if (d2 < collectR * collectR) { collectItem(it); items.splice(i, 1); continue; }
      if (it.y > H + 40 || it.life <= 0) { items.splice(i, 1); }
    }
  }
  function collectItem(it) {
    if (it.type === 'heal') {
      // 绿色加血：恢复生命
      const before = player.hp;
      player.hp = Math.min(player.maxHp, player.hp + 22);
      flashPickup('#7dff8c');
      dmgText(it.x, it.y - 6, '+' + Math.round(player.hp - before) + ' HP', '#7dff8c', 20);
      playSfx('enemyHit', 0.22, 0.05);
      return;
    }
    if (it.type === 'berserk') {
      // 金色暴走：火力爆发（夜裁暴走时间更长，配合刀锋洪流演出）
      // 叠加：连续拾取会持续延长暴走时间（封顶避免无限）
      const bAdd = reaverActive() ? 12.0 : 6.0;
      const bCap = reaverActive() ? 45.0 : 24.0;
      const wasBerserk = player.berserk > 0.1;
      player.berserk = Math.min(bCap, player.berserk + bAdd);
      player.pluginGlow = 1.2;
      flashPickup('#ffd45a');
      const bSec = Math.round(player.berserk);
      pluginToast = { life: 2.0, maxLife: 2.0, card: null, name: wasBerserk ? ('暴走延长！剩余 ' + bSec + 's') : '暴走！火力爆发' };
      dmgText(it.x, it.y - 6, '暴走!', '#ffe07a', 26);
      playSfx('skillBeam', 0.5, 0.05);
      screenShake = Math.max(screenShake, 6);
      // 雅努西娅（飞鸟系）：暴走瞬间以自身为中心射出贯穿一切的大飞鸟 + 鸟鸣
      if (curChar().birds) launchGiantBird();
      return;
    }
    if (it.type === 'life') { player.lives = Math.min(5, player.lives + 1); flashPickup('#b6ff96'); setMessage('1UP！剩余复活 ' + player.lives, 1.4); dmgText(it.x, it.y - 6, '1UP', '#b6ff96', 20); return; }
    if (it.type === 'bomb') { player.energy = clamp(player.energy + 45, 0, player.maxEnergy); flashPickup('#cd9bff'); dmgText(it.x, it.y - 6, 'EN+', '#cd9bff', 18); return; }
    if (it.type === 'plugin_chain') { player.plugin = 'chain'; player.pluginGlow = 1.2; flashPickup('#d59bff'); pluginToast = { life: 2.2, maxLife: 2.2, card: 'cardPluginChain', name: '连锁弹幕插件' }; dmgText(it.x, it.y - 6, '连锁', '#e3b8ff', 22); playSfx('enemyDeath', 0.28, 0.04); return; }
    if (it.type === 'plugin_homing') { player.plugin = 'homing'; player.pluginGlow = 1.2; flashPickup('#8fd6ff'); pluginToast = { life: 2.2, maxLife: 2.2, card: 'cardPluginHoming', name: '追踪弹幕插件' }; dmgText(it.x, it.y - 6, '追踪', '#b8e6ff', 22); playSfx('enemyDeath', 0.28, 0.04); return; }
    if (it.type === 'plugin_blade') { player.plugin = 'blade'; player.pluginCd = 0.6; player.pluginGlow = 1.2; flashPickup('#b18bff'); pluginToast = { life: 2.2, maxLife: 2.2, card: 'cardPluginBlade', name: '幽灵暗刃插件' }; dmgText(it.x, it.y - 6, '幽灵暗刃', '#caa6ff', 22); audio.bladeCast(); return; }
    if (it.type === 'plugin_qishenwu') { player.plugin = 'qishenwu'; player.pluginCd = 0.4; player.pluginGlow = 1.2; flashPickup('#ffe8a8'); pluginToast = { life: 2.4, maxLife: 2.4, card: 'cardPluginQsw', name: '七神武插件' }; dmgText(it.x, it.y - 6, '七神武', '#ffe7a0', 24); if (audio.qswSummon) audio.qswSummon(); return; }
  }
  function flashPickup(col) { for (let i = 0; i < 6; i++) addParticle(player.x + rand(-8, 8), player.y + rand(-8, 8), rand(-60, 60), rand(-60, 60), 0.22, rand(2, 4), col, true); }

  // 三种插件随机掉落
  function randPlugin() {
    const r = Math.random();
    // 四插件更均衡，七神武(终极)占 1/4，不再极低
    if (r < 0.27) return 'plugin_chain';
    if (r < 0.52) return 'plugin_homing';
    if (r < 0.75) return 'plugin_blade';
    return 'plugin_qishenwu';
  }
  // 击杀掉落（V3.14 精简）：仅 绿色加血 / 金色暴走，低频且清晰，不再满地杂物。
  // 火力成长已由击杀直接给予（updateEnemies 内 addPower），故不再掉落火力/分数杂物。
  function dropFromEnemy(e) {
    // 防刷屏：场上掉落物较多时大幅压制新掉落（避免一片小怪同时死亡时满屏杂物）
    const onField = items.length;
    if (onField >= 9) return;                 // 硬上限
    const glut = onField >= 4 ? 0.4 : 1;      // 场上>=4个时掉率再打四折
    const elite = (e.tier >= 3);
    if (elite) {
      // 精英：掉落收敛——HP/暴走明显减少，插件作为有意义掉落保留
      if (Math.random() < 0.06 * glut) addItem(e.x, e.y, 'heal');
      if (Math.random() < 0.024 * glut) addItem(e.x + rand(-14, 14), e.y, 'berserk');
      if (Math.random() < 0.02 * glut) addItem(e.x, e.y, Math.random() < 0.5 ? 'life' : 'bomb');
      if (Math.random() < 0.10 * glut) addItem(e.x + rand(-16, 16), e.y - 8, randPlugin());
    } else {
      // 杂兵：极低频掉血/暴走，避免满屏杂物；插件偶现
      if (Math.random() < 0.008 * glut) addItem(e.x, e.y, 'heal');
      if (Math.random() < 0.0022 * glut) addItem(e.x, e.y, 'berserk');
      if (Math.random() < 0.008 * glut) addItem(e.x, e.y, randPlugin());
    }
  }

  function updatePlayerShots(dt) {
    for (let i = playerShots.length - 1; i >= 0; i--) {
      const s = playerShots[i];
      // 飞鸟：缓慢归位到最近的敌人/Boss
      if (s.homing) {
        let tx = null, ty = null, best = 1e9;
        for (const e of enemies) { const d = dist2(s.x, s.y, e.x, e.y); if (d < best) { best = d; tx = e.x; ty = e.y; } }
        if (boss && state === 'boss' && !boss.dead) { const d = dist2(s.x, s.y, boss.x, boss.y); if (d < best) { tx = boss.x; ty = boss.y; } }
        if (tx !== null) {
          s.tx = tx; s.ty = ty;       // 记录锁定目标用于绘制锁定环
          const want = angleTo(s.x, s.y, tx, ty);
          const cur = Math.atan2(s.vy, s.vx);
          let diff = want - cur; while (diff > Math.PI) diff -= TAU; while (diff < -Math.PI) diff += TAU;
          const na = cur + clamp(diff, -3.4 * dt, 3.4 * dt);
          const sp = Math.hypot(s.vx, s.vy);
          s.vx = Math.cos(na) * sp; s.vy = Math.sin(na) * sp;
        } else { s.tx = null; }
        // 导引能量轨迹：沿途留下淡蓝余迹
        if (Math.random() < 0.6) addParticle(s.x, s.y, rand(-20, 20), rand(-20, 20), 0.28, rand(1.5, 3), s.aurora ? '#a6ffe0' : '#bfe6ff', true);
      }
      // 分裂镰刀：自动追向最近敌人（连锁收割）
      if (s.scytheHoming) {
        let tx = null, ty = null, best = 1e9;
        for (const e of enemies) { if (s.hitIds && s.hitIds.indexOf(e) >= 0) continue; const d = dist2(s.x, s.y, e.x, e.y); if (d < best) { best = d; tx = e.x; ty = e.y; } }
        if (tx !== null) {
          const want = angleTo(s.x, s.y, tx, ty);
          const cur = Math.atan2(s.vy, s.vx);
          let diff = want - cur; while (diff > Math.PI) diff -= TAU; while (diff < -Math.PI) diff += TAU;
          const na = cur + clamp(diff, -6 * dt, 6 * dt);
          const sp = Math.hypot(s.vx, s.vy);
          s.vx = Math.cos(na) * sp; s.vy = Math.sin(na) * sp;
        }
      }
      // 幽灵暗刃飞行时的紫色粒子拖尾
      if (s.kind === 'bladebig') {
        if (s.boomT > 0) s.boomT -= dt;
        // 幽灵光刃：蓄力→突进 + 残影轨迹记录
        if (s.gblade && s.dashT > 0) {
          s.dashT -= dt;
          if (s.dashT <= 0) {
            s.vx = Math.cos(s.dashAng) * s.dashSpd; s.vy = Math.sin(s.dashAng) * s.dashSpd; s.dashed = true;
            screenShake = Math.max(screenShake, 6); triggerHitStop(0.04);   // 突进力量感
            if (assetReady('gbScytheBurst')) addSpriteFx('gbScytheBurst', s.x, s.y, 130, 0.3, rand(0, TAU), 0.5, 0.9);
            for (let q = 0; q < 20; q++) addParticle(s.x + rand(-10, 10), s.y, rand(-90, 90), rand(-300, -110), rand(0.22, 0.55), rand(2, 6), Math.random() < 0.5 ? '#c89cff' : '#ffffff', true);
            if (audio.scytheCast) audio.scytheCast();
          }
        }
        if (s.gblade) { s.trail = s.trail || []; s.trail.unshift({ x: s.x, y: s.y, rot: Math.atan2(s.vy, s.vx) + Math.PI / 2 }); if (s.trail.length > 6) s.trail.pop(); }
        if (Math.random() < 0.9) addParticle(s.x + rand(-6, 6), s.y + rand(-4, 10), rand(-30, 30), rand(20, 90), 0.3, rand(2, 5), s.rose ? '#d7b8ff' : '#b896ff', true);
      }
      else if (s.kind === 'bladesmall' && Math.random() < 0.6) addParticle(s.x, s.y, rand(-30, 30), rand(-30, 30), 0.22, rand(1.5, 3.5), '#c4a6ff', true);
      else if (s.kind === 'wmcrescent') { if (s.wmGrow !== undefined) s.wmGrow = Math.min(1.2, s.wmGrow + dt * 0.7); s.rot = (s.rot || 0) + (s.spin || 0) * dt; if (Math.random() < 0.7) addParticle(s.x + rand(-6, 6), s.y + rand(2, 14), rand(-50, 50), rand(20, 90), 0.3, rand(1.5, 3.2), Math.random() < 0.5 ? '#dff3ff' : '#a9d6ff', true); }
      else if (s.kind === 'nrblade') { if (Math.random() < 0.5) addParticle(s.x + rand(-4, 4), s.y + rand(4, 14), rand(-30, 30), rand(40, 110), 0.22, rand(1.2, 2.6), Math.random() < 0.5 ? '#bfe0ff' : '#8fbcff', true); }
      else if (s.kind === 'nrhomesword') { if (Math.random() < 0.7) addParticle(s.x - s.vx * 0.012, s.y - s.vy * 0.012, rand(-18, 18), rand(-18, 18), 0.24, rand(1.4, 2.8), Math.random() < 0.5 ? '#dfe4ff' : '#b6a2ff', true); }
      else if (s.kind === 'nrlance') { s.hist = s.hist || []; s.hist.unshift({ x: s.x, y: s.y }); if (s.hist.length > 7) s.hist.pop(); }
      else if (s.kind === 'nrwmblade') {
        s.grow = Math.min(1, (s.grow || 0) + dt * 9);
        // 非匀速：出手极快，随后缓和到巡航速度——但绝不停下，保证能飞到敌人面前
        {
          const cruise = (s.spd0 || 1100) * 0.78;       // 巡航速度（仍然很快）
          const cur = Math.hypot(s.vx, s.vy) || 1;
          if (cur > cruise) {
            const k = Math.max(cruise / cur, 1 - dt * 1.4);  // 时间相关减速，且下限锁定巡航速度
            s.vx *= k; s.vy *= k;
          }
        }
        // 4~8 段残影历史
        s.hist = s.hist || []; s.hist.unshift({ x: s.x, y: s.y, rot: Math.atan2(s.vy, s.vx) + Math.PI / 2 }); if (s.hist.length > 11) s.hist.pop();
        // 边缘粒子拖尾
        if (Math.random() < 0.85) addParticle(s.x - s.vx * 0.01, s.y - s.vy * 0.01, rand(-28, 28), rand(-28, 28), 0.28, rand(1.6, 3.4), Math.random() < 0.5 ? '#d8a8ff' : '#8f4bff', true);
        // —— 前锋破空：尖端高速锐粒子向后拖（撕裂空气的速度感）——
        {
          const va = Math.atan2(s.vy, s.vx), fx = Math.cos(va), fy = Math.sin(va);
          const tipD = s.r * 3.3, tx = s.x + fx * tipD, ty = s.y + fy * tipD;
          for (let q = 0; q < 2; q++) addParticle(tx + rand(-4, 4), ty + rand(-4, 4), -fx * rand(160, 320) + rand(-26, 26), -fy * rand(160, 320) + rand(-26, 26), rand(0.12, 0.2), rand(1, 2.2), Math.random() < 0.55 ? '#ffffff' : (s.ber ? '#ffc0cc' : '#e3c8ff'), true);
          // 间歇前刺破空锐线（沿飞行方向，细而亮）
          if (Math.random() < 0.4 && nrWmFx.length < 60) nrWmFx.push({ type: 'cut', x: tx + fx * rand(6, 18), y: ty + fy * rand(6, 18), ang: va, len: rand(16, 30), life: 0.12, maxLife: 0.12 });
          // —— 两侧刀尖拖尾：从月牙两个尖角各拖出一道粒子残迹 ——
          const grow = s.grow || 0, sz2 = s.r * 5 * (0.6 + grow * 0.55), Wd2 = sz2 * 0.52;
          const rxp = -fy, ryp = fx;                 // 局部 +x 在世界中的方向（垂直飞行）
          const lyBack = Wd2 * 0.30;                 // 尖角略靠后
          for (let sgn = -1; sgn <= 1; sgn += 2) {

          } else {

          }
        }
        if (s.dashed && Math.random() < 0.7) addParticle(s.x + rand(-6, 6), s.y + rand(14, 40), rand(-30, 30), rand(120, 280), 0.28, rand(1.8, 3.6), Math.random() < 0.5 ? '#dfe4ff' : '#a98fff', true);
      }
      else if (s.kind === 'nrbigblade') { for (let q = 0; q < 3; q++) addParticle(s.x + rand(-10, 10), s.y + rand(-10, 10), rand(-60, 60) - s.vx * 0.08, rand(-60, 60) - s.vy * 0.08, 0.34, rand(2, 4.5), Math.random() < 0.5 ? '#e8e0ff' : '#9f86ff', true); }
      else if (s.kind === 'nrhalfmoon') { for (let q = 0; q < 2; q++) addParticle(s.x + rand(-8, 8), s.y + rand(-8, 8), -s.vx * 0.1 + rand(-30, 30), -s.vy * 0.1 + rand(-30, 30), 0.3, rand(1.6, 3.4), Math.random() < 0.5 ? '#e6def9' : '#a98fff', true); }
      else if (s.kind === 'nrcrescent') { if (s.wmGrow !== undefined) s.wmGrow = Math.min(1.15, s.wmGrow + dt * 0.6); s.rot = (s.rot || 0) + (s.spin || 0) * dt; if (Math.random() < 0.6) addParticle(s.x + rand(-8, 8), s.y + rand(2, 14), rand(-60, 60), rand(20, 90), 0.28, rand(1.5, 3), '#cfe6ff', true); }
      else if (s.kind === 'holyspear' || s.kind === 'holyspeargiant') {
        // 圣矛：保存历史轨迹做残影 + 速度生命周期(出手快→巡航) + Lv5 微追踪
        s.hist = s.hist || []; s.hist.unshift({ x: s.x, y: s.y }); if (s.hist.length > (perfLevel >= 1 ? 5 : 8)) s.hist.pop();
        if (s.homing) {
          let tx = null, ty = 1e9, best = 1e9;
          for (const e of enemies) { if (e.y < -10) continue; const d = dist2(s.x, s.y, e.x, e.y); if (d < best) { best = d; tx = e.x; ty = e.y; } }
          if (tx !== null && best < 360 * 360) { const want = Math.atan2(ty - s.y, tx - s.x); const cur = Math.atan2(s.vy, s.vx); let df = want - cur; while (df > Math.PI) df -= TAU; while (df < -Math.PI) df += TAU; const na = cur + clamp(df, -2.4 * dt, 2.4 * dt); const sp = Math.hypot(s.vx, s.vy); s.vx = Math.cos(na) * sp; s.vy = Math.sin(na) * sp; s.rot = na + Math.PI / 2; }
        }
        // 飞行粒子：沿枪尾反向甩出金色星尘，普通/重矛更密，弱机自动降密度
        const pr = perfLevel >= 2 ? 0.28 : (s.scT === 'rain' ? 0.38 : 0.78);
        if (Math.random() < pr) {
          addParticle(s.x - s.vx * 0.012, s.y - s.vy * 0.012, -s.vx * 0.045 + rand(-26, 26), -s.vy * 0.045 + rand(-26, 26), 0.24, rand(1.2, 2.8), Math.random() < 0.5 ? '#ffe79a' : '#fff4cf', true);
          if (perfLevel < 2 && s.scT !== 'rain' && Math.random() < 0.45) addParticle(s.x - s.vx * 0.02, s.y - s.vy * 0.02, -s.vx * 0.03 + rand(-18, 18), -s.vy * 0.03 + rand(-18, 18), 0.34, rand(1.1, 2.2), '#ffeec0', true);
        }
      }
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      if (s.spin) s.rot += s.spin * dt;
      s.life -= dt;
      if (s.y < -60 || s.x < -80 || s.x > W + 80 || s.life <= 0) { playerShots.splice(i, 1); continue; }
      let removed = false;
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (dist2(s.x, s.y, e.x, e.y) < (s.r + e.r) * (s.r + e.r)) {
          const isBounce = (s.kind === 'chainheart' || s.kind === 'bladesmall');
          if (isBounce && s.hitIds && s.hitIds.indexOf(e) >= 0) continue; // 不重复命中同一目标
          e.hp -= s.damage * grindDmg();
          e.hitFlash = 0.13;
          // 僚机弹：圣击音效 + 程序化命中爆点（无贴图）
          if (s.kind === 'wmfeather' || s.kind === 'wmcrescent') {
            if (audio.wmHit) audio.wmHit(s.kind === 'wmcrescent');
            const big = s.kind === 'wmcrescent';
            sparks(s.x, s.y, big ? '#eafaff' : '#cfeaff', big ? 9 : 5, Math.atan2(-s.vy, -s.vx), big ? 1.6 : 1.1, big ? 260 : 190);
            addRingFx(s.x, s.y, 2, big ? 30 : 18, big ? 0.26 : 0.2, 'rgba(220,242,255,', 2);
            if (big) for (let q = 0; q < 5; q++) addParticle(s.x, s.y, rand(-120, 120), rand(-120, 60), 0.28, rand(1.5, 3), '#ffffff', true);
          } else if (s.kind === 'nrsword') {
            // 浮游长剑：穿透命中 → 爆炸贴图 + 粒子反馈（节流，无震屏，避免狂抖卡顿）
            if ((s.boomT || 0) <= 0) {
              s.boomT = 0.12;
              addSpriteFx(assetReady('nrSlashBurst') ? 'nrSlashBurst' : 'vfxExplosionLarge', e.x, e.y, 96, 0.3, rand(0, TAU), 0.42, 0.85);
              sparks(e.x, e.y, '#eef0ff', 5, rand(0, TAU), 3, 300);
              for (let q = 0; q < 3; q++) addParticle(e.x, e.y, rand(-130, 130), rand(-130, 130), 0.32, rand(2, 4), Math.random() < 0.5 ? '#b6a2ff' : '#2a2440', Math.random() < 0.5);
              if (audio.nrHit) audio.nrHit(true);
            }
            // 每斩杀一个敌人 → 再生一把追踪长剑（限制总量+精简特效，避免卡顿失控）
            if (e.hp <= 0 && !e._nrKilled) {
              e._nrKilled = true;
              let swCount = 0; for (const ps of playerShots) if (ps.kind === 'nrsword') swCount++;
              if (swCount < 9) fireNrSword(player.x + rand(-26, 26), player.y - 24, -Math.PI / 2 + rand(-0.2, 0.2), 0.12, false);

            sparks(s.x, s.y, '#d8a8ff', big ? 7 : 4, Math.atan2(-s.vy, -s.vx), big ? 1.5 : 1.1, big ? 280 : 200);
            if (big) {

              if ((s.boomT || 0) <= 0) {

                nrWmFx.push({ type: 'cut', x: e.x, y: e.y, ang: ha - Math.PI / 4, len: 30, life: 0.2, maxLife: 0.2 });
                addRingFx(e.x, e.y, 3, 40, 0.24, 'rgba(220,180,255,', 3);
                for (let q = 0; q < 7; q++) addParticle(e.x, e.y, rand(-150, 150), rand(-150, 150), 0.3, rand(1.6, 3.6), Math.random() < 0.5 ? '#b878ff' : '#2a2440', Math.random() < 0.5);
              }
            } else if (Math.random() < 0.4) addParticle(s.x, s.y, rand(-60, 60), rand(-40, 60), 0.26, rand(1.5, 3), Math.random() < 0.5 ? '#2a2440' : '#b878ff', Math.random() < 0.5);
          } else if (s.kind === 'holyspear' || s.kind === 'holyspeargiant') {
            // 圣矛贯穿命中：金色爆炸 + 星爆 + 冲击环 + 星尘（强力打击反馈，避免贴图感）
            const giant = s.kind === 'holyspeargiant', big = giant || s.scT === 'heavy', rain = s.scT === 'rain';
            if (audio.scHit) audio.scHit(big); else if (audio.nrHit) audio.nrHit(big);
            if ((s.boomT || 0) <= 0) {

              const sz = giant ? 110 : (big ? 80 : (rain ? 36 : 62));
              // 程序绘制金色放射爆炸（按参考图形状）+ 双层冲击波环 + 碎屑
              scFx.push({ type: 'star', x: e.x, y: e.y, size: sz, big: big, rot: rand(0, TAU), life: giant ? 0.34 : 0.26, maxLife: giant ? 0.34 : 0.26 });
              addRingFx(e.x, e.y, giant ? 6 : (big ? 4 : 2), giant ? 64 : (big ? 46 : 28), giant ? 0.32 : 0.24, 'rgba(255,225,140,', giant ? 5 : (big ? 4 : 2.5));
              if (!rain) addRingFx(e.x, e.y, 1, giant ? 84 : 52, 0.26, 'rgba(255,250,220,', 2);   // 白色冲击波环
              const pn = perfLevel >= 2 ? (big ? 6 : 3) : (giant ? 24 : (big ? 18 : (rain ? 5 : 12)));
              for (let q = 0; q < pn; q++) addParticle(e.x, e.y, rand(-200, 200), rand(-200, 200), rand(0.26, 0.42), rand(1.4, 3.8), Math.random() < 0.5 ? '#ffe79a' : '#fff6d8', true);

            }
          } else if (s.kind === 'nrhalfmoon' || s.kind === 'nrbigblade') {
            // 半月光刃 / 大光刃：切割火花
            if (audio.nrHit) audio.nrHit(true);
            sparks(s.x, s.y, '#eaf3ff', 6, Math.atan2(-s.vy, -s.vx), 1.6, 300);
            if (Math.random() < 0.4) addRingFx(s.x, s.y, 2, 30, 0.22, 'rgba(210,235,255,', 2);
          } else if (s.kind === 'nrblade' || s.kind === 'nrcrescent') {

            if (audio.nrHit) audio.nrHit(big);
            sparks(s.x, s.y, big ? '#eaf3ff' : '#bfd8ff', big ? 8 : 4, Math.atan2(-s.vy, -s.vx), big ? 1.5 : 0.9, big ? 280 : 200);
            if (Math.random() < 0.5) addParticle(s.x, s.y, rand(-70, 70), rand(-40, 70), 0.3, rand(1.5, 3), '#2a3046', false);

          } else {
            audio.enemyHit();

            if (Math.random() < 0.35) addParticle(s.x, s.y, rand(-50, 50), rand(-80, 20), 0.22, rand(2, 5), '#bdefff', true);
          }
          score += s.damage;

          }
          // 连锁弹幕 / 小暗刃：命中后弹射到最近的未命中敌人，连续跳跃
          if (isBounce) {
            if (chainBounce(s, e)) { removed = false; break; }   // 成功弹射 → 继续存活
            playerShots.splice(i, 1); removed = true; break;     // 无更多目标 → 消失
          }
          if (s.pierce > 0) s.pierce--; else { playerShots.splice(i, 1); removed = true; }

        }
      }
      if (removed) continue;
      if (boss && state === 'boss' && !boss.dead) {
        if (dist2(s.x, s.y, boss.x, boss.y + 8) < (s.r + boss.r) * (s.r + boss.r)) {
          const isBounceB = (s.kind === 'chainheart' || s.kind === 'bladesmall');
          if (!(isBounceB && s.hitBoss)) {
            hitBoss(s.damage, s.x, s.y, false);
            if (s.kind === 'bladebig' && s.gblade) { if ((s.boomT || 0) <= 0) { s.boomT = 0.1; sparks(s.x, s.y, '#d9b8ff', 6, rand(0, TAU), 3, 280); } if (s.pierce > 0) s.pierce--; else playerShots.splice(i, 1); continue; }
            if (s.kind === 'bladebig') { spawnBladeSplit(s, { x: boss.x, y: boss.y }); playerShots.splice(i, 1); continue; }
            if (isBounceB) {
              s.hitBoss = true;
              if (chainBounce(s, { x: boss.x, y: boss.y })) continue; // 从 Boss 弹射到小怪
              playerShots.splice(i, 1); continue;
            }
            if (s.pierce > 0) s.pierce--; else playerShots.splice(i, 1);

    }
  }

  // 连锁弹射：从 src 命中点寻找最近的未命中敌人，重定向链头弹过去并记录锁链弧线。
  function chainBounce(s, fromEnemy) {
    if (fromEnemy && s.hitIds) s.hitIds.push(fromEnemy);
    const hitFx = assetReady('vfxChainHit') ? 'vfxChainHit' : 'vfxEnemyHit';
    if (s.bounces <= 0) {
      addSpriteFx(hitFx, s.x, s.y, 72, 0.28, rand(0, TAU), 0.5, 0.85);
      return false;
    }
    const R2 = 360 * 360;
    let target = null, best = R2;
    for (const e of enemies) {
      if (s.hitIds.indexOf(e) >= 0) continue;
      const d = dist2(s.x, s.y, e.x, e.y);
      if (d < best) { best = d; target = e; }
    }
    if (!target) {
      addSpriteFx(hitFx, s.x, s.y, 72, 0.28, rand(0, TAU), 0.5, 0.85);
      return false;
    }
    // 节点爆点（玩家素材命中特效）+ 能量桥
    addSpriteFx(hitFx, s.x, s.y, 60, 0.24, rand(0, TAU), 0.45, 0.8);
    chainArcs.push({ x1: s.x, y1: s.y, x2: target.x, y2: target.y, life: 0.32, maxLife: 0.32, rose: s.rose });
    burst(s.x, s.y, s.rose ? '#ff9ad0' : '#c99bff', 8, 150, true);
    // 重定向链头飞向新目标
    const a = angleTo(s.x, s.y, target.x, target.y);
    const sp = s.baseSpeed || 720;
    s.vx = Math.cos(a) * sp; s.vy = Math.sin(a) * sp;
    s.bounces--;
    s.life = Math.max(s.life, 0.6);
    return true;
  }

  // 幽灵暗刃：巨刃命中后在命中点炸裂出多枚小暗刃，朝四周飞出并在敌人间弹射
  function spawnBladeSplit(s, fromTarget) {
    const lv = powerLevel();
    // 分裂镰刀数量随【场上敌人数量】增减（割草感）：敌人越多，镰刀越多
    const n = clamp(3 + Math.floor(enemies.length * 0.7), 4, 12 + lv);
    const dmg = s.damage * 0.5;
    for (let k = 0; k < n; k++) {
      const a = (k / n) * TAU + (-Math.PI / 2);
      const sp = 560;
      addPlayerShot(s.x, s.y, Math.cos(a) * sp, Math.sin(a) * sp, dmg, 15, 'bladesmall');
      const b = playerShots[playerShots.length - 1];
      // 每片镰刀都自动追向最近敌人 + 连锁弹射（连续收割多个目标）
      b.rose = s.rose; b.spin = (k % 2 ? 13 : -13); b.bounces = 3 + lv; b.hitIds = (fromTarget && fromTarget.hp !== undefined) ? [fromTarget] : []; b.baseSpeed = sp; b.scytheHoming = true;
      b.rot = a;
    }
    addSpriteFx(assetReady('gbScytheBurst') ? 'gbScytheBurst' : 'vfxBladeArc', s.x, s.y, 160, 0.36, rand(0, TAU), 0.6, 0.95);
    burst(s.x, s.y, s.rose ? '#caa6ff' : '#b18bff', 22, 300, true);
    screenShake = Math.max(screenShake, 7);
    if (audio.scytheSplit) audio.scytheSplit(); else audio.bladeSplit();
  }

  // ===========================================================================
  // 规律化弹幕生成器（参考东方/开源 STG 的弹幕函数：对称、可预判、可躲避）
  // 全部为确定性几何图形，无随机抖动，节奏固定，玩家可学习走位。
  // ===========================================================================
  // 难度带来的“密度加成”：确定性、整数，便于走位
  // ═══════════════════════════════════════════════════════════════
  // 东方STG风格弹幕系统 - 重新设计
  // 原则：少量弹幕 + 明确节奏 + 可预判 + 负空间引导
  // ═══════════════════════════════════════════════════════════════
  
  function densBonus() { return Math.floor((diffMul() - 1) * 1); } // 降低难度加成
  
  // 基础弹幕模式：简单、规律、可预判
  
  // 单发瞄准（最基础）
  function patSnipe(e, speed, color, r, kind) {
    const a = angleTo(e.x, e.y, player.x, player.y);
    addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
  }
  
  // 3方向扇形（对称、整齐）
  function patFan3(e, spread, speed, color, r, kind) {
    const base = angleTo(e.x, e.y, player.x, player.y);
    for (let i = -1; i <= 1; i++) {
      const a = base + i * spread;
      addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    }
  }
  
  // 5方向扇形
  function patFan5(e, spread, speed, color, r, kind) {
    const base = angleTo(e.x, e.y, player.x, player.y);
    for (let i = -2; i <= 2; i++) {
      const a = base + i * spread * 0.5;
      addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    }
  }
  
  // 圆环8方向（经典东方环形弹）
  function patRing8(e, speed, color, r, kind, angleOffset) {
    for (let i = 0; i < 8; i++) {
      const a = (angleOffset || 0) + i * TAU / 8;
      addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    }
  }
  
  // 圆环12方向（密集环）
  function patRing12(e, speed, color, r, kind, angleOffset) {
    for (let i = 0; i < 12; i++) {
      const a = (angleOffset || 0) + i * TAU / 12;
      addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    }
  }
  
  // 双臂螺旋（简单、规律）
  function patSpiral2(e, speed, color, r, kind) {
    if (!e.spiralAngle) e.spiralAngle = 0;
    for (let i = 0; i < 2; i++) {
      const a = e.spiralAngle + i * Math.PI;
      addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    }
    e.spiralAngle += 0.18; // 固定步进
  }
  
  // 三臂螺旋
  function patSpiral3(e, speed, color, r, kind) {
    if (!e.spiralAngle) e.spiralAngle = 0;
    for (let i = 0; i < 3; i++) {
      const a = e.spiralAngle + i * TAU / 3;
      addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    }
    e.spiralAngle += 0.15;
  }

  // ═══════════════════════════════════════════════════════════════
  // 海洋小怪·东方风格弹幕（使用 V2 贴图弹 v2*）—— 旋转环/层叠/花瓣/扇刃/多段
  // ═══════════════════════════════════════════════════════════════
  // 瞄准星散（快速三连星）
  function patAimedStar(e, kind) {
    const base = angleTo(e.x, e.y, player.x, player.y);
    for (let i = -1; i <= 1; i++) { const a = base + i * 0.3; addEnemyBullet(e.x, e.y, Math.cos(a) * 300, Math.sin(a) * 300, 8, '#ff6b8a', 7, 8, kind || 'v2starred'); }
  }
  // 放射星爆（旋转 N 环星）
  function patStarBurst(e, kind, n) {
    n = n || 10; const off = (e.shotN || 0) * 0.16;
    for (let i = 0; i < n; i++) { const a = off + i * TAU / n; addEnemyBullet(e.x, e.y, Math.cos(a) * 175, Math.sin(a) * 175, 8, '#ffe07a', 7, 8, kind || 'v2staryellow'); }
  }
  // 双层逆向雪花环（经典东方层叠环）
  function patSnowRing(e) {
    const off = (e.shotN || 0) * 0.12;
    for (let i = 0; i < 12; i++) { const a = off + i * TAU / 12; addEnemyBullet(e.x, e.y, Math.cos(a) * 150, Math.sin(a) * 150, 9, '#bfeaff', 7, 9, 'v2snow'); }
    if ((e.shotN || 0) % 2 === 0) { for (let i = 0; i < 12; i++) { const a = -off + i * TAU / 12 + TAU / 24; addEnemyBullet(e.x, e.y, Math.cos(a) * 112, Math.sin(a) * 112, 8, '#9fd8ff', 7, 9, 'v2snow'); } }
  }
  // 瞄准扇刃（方向性弯刃，封走位）
  function patKnifeFan(e, n, speed) {
    n = n || 5; const base = angleTo(e.x, e.y, player.x, player.y);
    for (let i = 0; i < n; i++) { const t = n === 1 ? 0 : i / (n - 1) - 0.5; const a = base + t * 0.85; addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, 8, '#b9e0ff', 8, 8, 'v2knife'); }
  }
  // 旋转花瓣（正反双层花）
  function patPetalFlower(e) {
    if (!e.spiralAngle) e.spiralAngle = 0; const petals = 6;
    for (let i = 0; i < petals; i++) { const a = e.spiralAngle + i * TAU / petals; addEnemyBullet(e.x, e.y, Math.cos(a) * 160, Math.sin(a) * 160, 9, '#ff9ad0', 7, 9, 'v2blossom'); }
    e.spiralAngle += 0.22;
    if ((e.shotN || 0) % 3 === 0) { for (let i = 0; i < petals; i++) { const a = -e.spiralAngle + i * TAU / petals; addEnemyBullet(e.x, e.y, Math.cos(a) * 120, Math.sin(a) * 120, 9, '#c77bff', 7, 9, 'v2flower'); } }
  }
  // 三臂太阳螺旋
  function patStarSpiral(e) {
    if (!e.spiralAngle) e.spiralAngle = 0;
    for (let i = 0; i < 3; i++) { const a = e.spiralAngle + i * TAU / 3; addEnemyBullet(e.x, e.y, Math.cos(a) * 178, Math.sin(a) * 178, 9, '#ffd66b', 7, 9, 'v2sun'); }
    e.spiralAngle += 0.16;
  }
  // 留缝月牙弹墙 + 间隔瞄准红钻
  function patCrescentWall(e) {
    patWallGap(e, 185, '#ff8a5c', 9, 'v2crescent', 9);
    if ((e.shotN || 0) % 2 === 0) patFan3(e, 0.3, 245, '#ffce8a', 8, 'v2reddiamond');
  }
  // 星系慢旋密环 + 间隔紫星扇
  function patGalaxySpin(e) {
    const off = (e.shotN || 0) * 0.1;
    for (let i = 0; i < 14; i++) { const a = off + i * TAU / 14; addEnemyBullet(e.x, e.y, Math.cos(a) * 138, Math.sin(a) * 138, 10, '#c86bff', 8, 10, 'v2galaxy'); }
    if ((e.shotN || 0) % 3 === 0) patFan5(e, 0.5, 225, '#ff8ad0', 8, 'v2starpurple');
  }
  // 恶魔之眼·多段绞杀（按 shotN 轮换四种弹序）
  function patEyeBarrage(e) {
    const p = (e.shotN || 0) % 4;
    if (p === 0) patRing12(e, 152, '#ff5a7a', 9, 'v2reddiamond', (e.shotN || 0) * 0.1);
    else if (p === 1) patKnifeFan(e, 7, 300);
    else if (p === 2) patStarSpiral(e);
    else patStarBurst(e, 'v2starred', 12);
  }

  // ═══════════════════════════════════════════════════════════════
  // 扩充弹幕库（参考东方/雷电经典弹型）——每种有清晰逻辑、可读、可躲
  // ═══════════════════════════════════════════════════════════════

  // 留缺口的弹墙：整排横向弹，正对玩家处留一个安全缺口（强制走位，极易读）
  function patWallGap(e, speed, color, r, kind, n) {
    n = n || 9;
    const gapX = player.x;                     // 缺口对准玩家当前位置
    const margin = 40, span = W - margin * 2;
    for (let i = 0; i < n; i++) {
      const bx = margin + span * i / (n - 1);
      if (Math.abs(bx - gapX) < 56) continue;  // 留出安全缺口
      addEnemyBullet(bx, e.y, 0, speed, r, color, 7, 7, kind);
    }
  }

  // 扫射扇形：每次发射时基准角缓慢左右摆动，形成可读的"扫把"波
  function patArcSweep(e, speed, color, r, kind) {
    if (e.sweepT === undefined) e.sweepT = 0;
    e.sweepT += 1;
    const base = -Math.PI / 2 + Math.sin(e.sweepT * 0.5) * 0.7;   // 上方左右扫
    for (let i = -1; i <= 1; i++) {
      const a = base + i * 0.22;
      addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    }
  }

  // 花环：环形 + 每次发射整体旋转一点点，叠成"花瓣"轨迹（规律、唯美、可读）
  function patFlower(e, speed, color, r, kind, petals) {
    petals = petals || 6;
    if (!e.spiralAngle) e.spiralAngle = 0;
    for (let i = 0; i < petals; i++) {
      const a = e.spiralAngle + i * TAU / petals;
      addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    }
    e.spiralAngle += 0.42;   // 较大步进 → 清晰的花瓣旋转
  }

  // 节奏点射：短促的瞄准三连发（有节奏停顿，便于预判）
  function patBurst(e, speed, color, r, kind) {
    const base = angleTo(e.x, e.y, player.x, player.y);
    for (let i = -1; i <= 1; i++) {
      addEnemyBullet(e.x, e.y, Math.cos(base) * (speed + i * 40), Math.sin(base) * (speed + i * 40), r, color, 7, 7, kind);
    }
  }

  // 旋转十字：4方向 + 缓慢旋转（经典，留出对角安全区）
  function patCross(e, speed, color, r, kind) {
    if (!e.spiralAngle) e.spiralAngle = 0;
    for (let i = 0; i < 4; i++) {
      const a = e.spiralAngle + i * TAU / 4;
      addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    }
    e.spiralAngle += 0.12;
  }

  // 波浪幕帘：整排下落弹，下落速度沿 x 正弦起伏，形成流动的波浪墙（规律、唯美、可读）
  function patWave(e, speed, color, r, kind, n) {
    n = n || 13;
    if (e.waveT === undefined) e.waveT = 0;
    e.waveT++;
    const margin = 28, span = W - margin * 2;
    for (let i = 0; i < n; i++) {
      const bx = margin + span * i / (n - 1);
      const ph = i * 0.5 + e.waveT * 0.55;
      const vy = speed * (0.65 + 0.5 * Math.sin(ph));
      addEnemyBullet(bx, e.y, Math.cos(ph) * 28, vy, r, color, 7, 7, kind);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // 专属 Boss 发射器（可复用机关）—— 给每个主题 Boss 独特手感
  // 设计原则：规律可读、留缝隙、强度由密度而非速度堆叠
  // ═══════════════════════════════════════════════════════════════

  // 旋臂螺旋：arms 条旋臂，随 boss.t 旋转，可设缺口臂数
  function emitSpiralArm(cx, cy, arms, spin, speed, color, r, kind, skip) {
    for (let i = 0; i < arms; i++) {
      if (skip && i % skip === 0) continue;
      const a = spin + i * TAU / arms;
      addEnemyBullet(cx, cy, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 8, 7, kind);
    }
  }

  // 漩涡吸入弹：从外环朝中心切向旋入，制造空间扭曲走廊
  function emitVortex(cx, cy, count, radius, speed, swirl, color, r, kind) {
    for (let i = 0; i < count; i++) {
      const a = i * TAU / count + (boss ? boss.t * 0.8 : 0);
      const sx = cx + Math.cos(a) * radius, sy = cy + Math.sin(a) * radius;
      const tang = a + Math.PI / 2 + swirl;
      const b = addEnemyBullet(sx, sy, Math.cos(tang) * speed, Math.sin(tang) * speed, r, color, 8, 8, kind);
      b.ax = Math.cos(a + Math.PI) * 60; b.ay = Math.sin(a + Math.PI) * 60;
    }
  }

  // 雷幕落雨：屏幕顶部一排下落弹，随机错位，可带缺口
  function emitRainCurtain(speed, color, r, kind, n, gapX, gapW) {
    n = n || 12;
    const margin = 30, span = W - margin * 2;
    for (let i = 0; i < n; i++) {
      const bx = margin + span * (i + rand(-0.15, 0.15)) / (n - 1);
      if (gapX !== undefined && Math.abs(bx - gapX) < gapW * 0.5) continue;
      addEnemyBullet(clamp(bx, margin, W - margin), -10, rand(-12, 12), speed, r, color, 7, 8, kind);
    }
  }

  // 粘性延迟弹：先快速飞出后急刹，悬停片刻再朝玩家加速（重型压迫）
  function emitStickyMine(cx, cy, count, color, r, kind) {
    for (let i = 0; i < count; i++) {
      const a = -Math.PI / 2 + (i - (count - 1) / 2) * 0.42;
      const b = addEnemyBullet(cx, cy, Math.cos(a) * 280, Math.sin(a) * 280, r, color, 9, 9, kind);
      b.ax = -Math.cos(a) * 360; b.ay = -Math.sin(a) * 360; b.brake = true;
    }
  }

  // 带缺口瞄准环：朝玩家方向留一道安全缝的整环
  function emitAimedRingGap(cx, cy, count, speed, color, r, kind, gapWidth) {
    const base = angleTo(cx, cy, player.x, player.y);
    for (let i = 0; i < count; i++) {
      const a = i * TAU / count;
      let diff = Math.abs(((a - base + Math.PI) % TAU) - Math.PI);
      if (diff < (gapWidth || 0.5)) continue;
      addEnemyBullet(cx, cy, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 8, 7, kind);
    }
  }

  // 汇聚弹：从屏幕上方多点朝玩家当前位置汇聚
  function emitConverge(count, speed, color, r, kind) {
    for (let i = 0; i < count; i++) {
      const sx = (i + 0.5) * W / count, sy = -10;
      const a = angleTo(sx, sy, player.x, player.y);
      addEnemyBullet(sx, sy, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 8, 8, kind);
    }
  }

  // 花瓣绽放：petals 片花瓣，每片 perPetal 颗排成弧线，整体旋转（东方花型 spell card）
  function emitFlowerBloom(cx, cy, petals, perPetal, speed, color, r, kind, spin) {
    const sp = spin || 0;
    for (let p = 0; p < petals; p++) {
      const petalBase = sp + p * TAU / petals;
      for (let j = 0; j < perPetal; j++) {
        const f = perPetal === 1 ? 0 : (j / (perPetal - 1) - 0.5);
        const a = petalBase + f * (TAU / petals) * 0.72;
        const sv = speed * (1 - Math.abs(f) * 0.42);   // 边缘慢→形成花瓣弧
        addEnemyBullet(cx, cy, Math.cos(a) * sv, Math.sin(a) * sv, r, color, 7, 7, kind);
      }
    }
  }

  // 放射激光扇：以 baseAng 为中心扇形铺开 count 道预警激光（东方招牌放射激光）
  function emitLaserFan(cx, cy, count, spread, baseAng, width, delay, dur) {
    for (let i = 0; i < count; i++) {
      const f = count === 1 ? 0.5 : i / (count - 1);
      const a = baseAng - spread / 2 + spread * f;
      addLaserWarning(cx, cy, cx + Math.cos(a) * 1500, cy + Math.sin(a) * 1500, width, delay, dur);
    }
  }

  // 双向交错螺旋：顺逆各一组旋臂，交织成网格走廊（需穿隙走位）
  function emitDualSpiral(cx, cy, arms, spin, speed, color, r, kind) {
    for (let i = 0; i < arms; i++) {
      const a1 = spin + i * TAU / arms;
      const a2 = -spin + i * TAU / arms + TAU / arms * 0.5;
      addEnemyBullet(cx, cy, Math.cos(a1) * speed, Math.sin(a1) * speed, r, color, 7, 7, kind);
      addEnemyBullet(cx, cy, Math.cos(a2) * speed, Math.sin(a2) * speed, r, color, 7, 7, kind);
    }
  }

  // 整环 + 全局朝向偏移（可叠多层不同速度，形成"呼吸"同心环）
  function emitRing(cx, cy, count, speed, color, r, kind, offset) {
    const off = offset || 0;
    for (let i = 0; i < count; i++) {
      const a = off + i * TAU / count;
      addEnemyBullet(cx, cy, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    }
  }

  // 减速瞄准弹：初速快、带反向加速度→中途减速悬停再缓行（强烈预警感，需精准走位）
  function patAccelAimed(e, speed, color, r, kind) {
    const a = angleTo(e.x, e.y, player.x, player.y);
    const b = addEnemyBullet(e.x, e.y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 7, 7, kind);
    // 反向加速度让它减速（STG"刹车弹"）
    b.ax = -Math.cos(a) * speed * 1.3;
    b.ay = -Math.sin(a) * speed * 1.3;
    b.brake = true;
  }
  
  // ═══════════════════════════════════════════════════════════════
  // 敌人弹幕配置 - 每个敌人有专属的、规律的弹幕模式
  // ═══════════════════════════════════════════════════════════════
  
  // ═══════════════════════════════════════════════════════════════
  // 敌人弹幕模式（pattern 驱动）V3.13
  // 设计：瞄准弹用于杂兵（走位可躲）；环/螺旋用于精英重型（速度慢、可预判）
  // ═══════════════════════════════════════════════════════════════
  function enemyFire(e) {
    const c = e.color;
    switch (e.pattern) {
      // —— 杂兵：瞄准弹（玩家横向移动即可躲避） ——
      case 'aimed1':
        patSnipe(e, 250, c, 6, 'orbbasic');
        break;
      case 'aimed2': {
        const a = angleTo(e.x, e.y, player.x, player.y);
        const nx = Math.cos(a + Math.PI / 2), ny = Math.sin(a + Math.PI / 2);
        for (const off of [-10, 10]) {
          addEnemyBullet(e.x + nx * off, e.y + ny * off, Math.cos(a) * 245, Math.sin(a) * 245, 6, c, 7, 7, 'orbbasic');
        }
        break;
      }
      // —— 3方向扇形（对称、清晰间隙） ——
      case 'fan3':
        patFan3(e, 0.34, 215, c, 6.5, 'needleblue');
        break;
      case 'fan3w':
        patFan3(e, 0.34, 205, c, 7, 'crescentsilver');
        break;
      // —— 精英：5方向扇形 / 慢速8环 ——
      case 'fan5':
        patFan5(e, 0.62, 195, c, 6.5, 'snowflake');
        break;
      case 'ring8':
        // 慢环 + 缓慢旋转偏移 → 形成清晰的螺旋走廊，可预判
        patRing8(e, 145, c, 7, 'starpurple', e.shotN * 0.20);
        break;
      // —— 重型：螺旋（步进固定）/ 密环（慢） ——
      case 'spiral2':
        patSpiral2(e, 175, c, 7, 'energyblue');
        break;
      case 'spiral3':
        patSpiral3(e, 165, c, 7, 'crystalblue');
        break;
      case 'spiral3aim':
        // 三臂螺旋 + 周期性瞄准补射（重型精英）
        patSpiral3(e, 160, c, 7, 'crystalpurple');
        if (e.shotN % 3 === 0) patFan3(e, 0.3, 240, '#fff', 6, 'needleblue');
        break;
      case 'ring12':
        patRing12(e, 130, c, 7, 'energygold', e.shotN * 0.12);
        break;
      case 'ring12aim':
        // 密环交替瞄准弹：环负责覆盖、瞄准负责压迫，但二者错开发射
        if (e.shotN % 2 === 0) patRing12(e, 125, c, 7, 'energygold', -e.shotN * 0.10);
        else patFan3(e, 0.28, 255, '#e8dcff', 6.5, 'soulorb');
        break;
      // —— 扩充弹型（每种独特形状/节奏，可读可躲） ——
      case 'wallgap':
        // 留缺口弹墙：强制走位到缺口（极清晰）
        patWallGap(e, 175, c, 7, 'diamondgold', 9);
        break;
      case 'arcsweep':
        // 扫射扇形：左右摆动的可读波
        patArcSweep(e, 210, c, 6.5, 'crescentsilver');
        break;
      case 'flower':
        // 花环：旋转花瓣（唯美规律）
        patFlower(e, 150, c, 7, 'petalpink', 6);
        break;
      case 'burst':
        // 节奏三连点射
        patBurst(e, 240, c, 6.5, 'energyred');
        break;
      case 'cross':
        // 旋转十字（对角留安全区）
        patCross(e, 165, c, 7, 'starpurple');
        break;
      case 'accel':
        // 刹车瞄准弹（强预警，需精准走位）
        patAccelAimed(e, 360, c, 8, 'crystalpurple');
        break;
      // —— 海洋小怪·东方风格弹幕（V2 贴图弹）——
      case 'aimedstar': patAimedStar(e, 'v2starred'); break;
      case 'starburst': patStarBurst(e, e.tier >= 2 ? 'v2staryellow' : 'v2starred', 10 + (e.tier >= 3 ? 2 : 0)); break;
      case 'snowring': patSnowRing(e); break;
      case 'knifefan': patKnifeFan(e, e.tier >= 4 ? 7 : 5, e.tier >= 4 ? 300 : 260); break;
      case 'petalflower': patPetalFlower(e); break;
      case 'starspiral': patStarSpiral(e); break;
      case 'crescentwall': patCrescentWall(e); break;
      case 'galaxyspin': patGalaxySpin(e); break;
      case 'eyebarrage': patEyeBarrage(e); break;
      default:
        patSnipe(e, 240, c, 6, 'orbbasic');
    }
    e.shotN++;
  }

  // 敌人入场轨迹：多种风格，收敛到各自悬停层（全屏 5 高度带，不再全挤上半屏）
  function moveEnemy(e, dt) {
    const hoverY = enemyHoverY(e);
    const m = e.move;
    if (m === 'sideL' || m === 'sideR') {       // 侧边快速突入：横向飞入到 homeX，再降到悬停层
      e.x += (e.homeX - e.x) * Math.min(1, dt * 4.0);
      e.y += (hoverY - e.y) * Math.min(1, dt * 3.2);
      e.x += Math.sin(e.t * 1.7) * 12 * dt;
    } else if (m === 'rise') {                  // 底部升起：快速上浮到悬停层后横向微动
      if (e.y > hoverY + 10) { e.vy = Math.min(e.vy, -220); e.y += e.vy * dt; }
      else { e.y += (hoverY - e.y) * Math.min(1, dt * 3.0); e.x += Math.sin(e.t * 1.5) * 36 * dt; e.vy = 0; }
    } else if (m === 'dive') {                  // 俯冲：先加速下坠，到带内急刹悬停
      if (e.y < hoverY - 6) e.vy = Math.min(e.vy + 240 * dt, 460);
      else e.vy = lerp(e.vy, 24, 0.12);
      e.y += e.vy * dt; e.x += Math.sin(e.t * 1.1) * 16 * dt;
    } else if (m === 'strafe') {                // 平移：降到带内后横向往返
      if (e.y < hoverY) { e.y += e.vy * dt; }
      else { e.y += (hoverY - e.y) * 0.1; if (!e.strafe) e.strafe = (e.homeX < W / 2 ? 1 : -1); e.x += e.strafe * 120 * dt; if (e.x < 70 || e.x > W - 70) e.strafe *= -1; }
    } else if (m === 'orbit') {                 // 环绕：降到带内后绕自身入场点小圈旋转
      if (e.y < hoverY) { e.y += e.vy * dt; }
      else { e.orbA += dt * 1.4; e.x = clamp(e.homeX + Math.cos(e.orbA) * 64, 50, W - 50); e.y = hoverY + Math.sin(e.orbA) * 38; }
    } else if (m === 'driftL' || m === 'driftR') { // 斜向漂移下降（弧线感）
      const dir = m === 'driftL' ? -1 : 1;
      e.y += e.vy * dt; e.x += dir * 64 * dt + Math.sin(e.t * 1.5) * 18 * dt;
      if (e.y > hoverY) e.vy = -Math.abs(e.vy) * 0.35;
      if (e.y < 90 && e.vy < 0) e.vy = Math.abs(e.vy) * 0.45;
    } else if (m === 'weave') {                 // 大幅蛇形编织下降
      e.y += e.vy * dt; e.x += Math.sin(e.t * 2.3) * 72 * dt;
      if (e.y > hoverY) e.vy = -Math.abs(e.vy) * 0.35;
      if (e.y < 90 && e.vy < 0) e.vy = Math.abs(e.vy) * 0.45;
    } else {                                    // descend / sine 默认
      e.y += e.vy * dt; e.x += Math.sin(e.t * 1.3) * 45 * dt + e.vx * dt * 0.3;
      if (e.y > hoverY) e.vy = -Math.abs(e.vy) * 0.35;
      if (e.y < 90 && e.vy < 0) e.vy = Math.abs(e.vy) * 0.45;
    }
    // 安全兜底：任何风格都不允许长期停留在玩家脚下（防止打不到→卡波）
    if (e.y > H * 0.68) e.y = H * 0.68;
    // 侧向突入怪允许从屏外滑入（更宽边界）；其余夹在可视带内
    if (e.move === 'sideL' || e.move === 'sideR') e.x = clamp(e.x, -90, W + 90);
    else e.x = clamp(e.x, 38, W - 38);
  }

  function updateEnemies(dt) {
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.t += dt;
      e.attackFlash = Math.max(0, e.attackFlash - dt);
      e.hitFlash = Math.max(0, e.hitFlash - dt);
      // 夜棺浮游炮冲撞减速：缩放本帧移动 dt
      let mdt = dt;
      if (e._ncSlowT > 0) { e._ncSlowT -= dt; mdt = dt * (1 - (e._ncSlow || 0)); }
      if (e._mlSlowT > 0) { e._mlSlowT -= dt; mdt *= (1 - (e._mlSlow || 0)); }
      moveEnemy(e, mdt);
      e.fireTimer -= dt;
      if (e.fireTimer <= 0 && e.y > 40 && e.y < H * 0.65 && state !== 'win' && state !== 'lose') {
        // —— V3.14 弹幕节流：人群越多整体降频；弹幕软上限杜绝满屏 ——
        const crowd = enemies.length;
        const crowdMul = crowd > 5 ? 1 + (crowd - 5) * 0.14 : 1;   // 拥挤时拉长开火间隔
        const softCap = (state === 'boss') ? 300 : 150;            // 杂兵阶段最多~150弹
        e.fireTimer += e.fireBase * crowdMul;                      // 固定节奏(含人群因子)
        if (enemyBullets.length < softCap) {
          e.attackFlash = 0.25;
          enemyFire(e);
        }
      }
      if (e.hp <= 0) {
        killCount++;
        score += e.score;
        // 刷怪提升火力（已移除火力掉落物，改由击杀直接给予，数值上调补偿）
        { const heavyKill = (e.tier >= 3);
          addPower(heavyKill ? 5.0 : 1.7); }
        player.energy = clamp(player.energy + 7, 0, player.maxEnergy);
        dmgText(e.x, e.y, '+' + e.score, '#fff2a8', 20);
        { const heavy = (e.tier >= 3);
        audio.enemyKill(heavy);
        addSpriteFx(heavy ? 'vfxExplosionLarge' : 'vfxExplosionSmall', e.x, e.y, heavy ? 132 : 78, heavy ? 0.5 : 0.32, rand(0, TAU), 0.36, heavy ? 0.74 : 0.62);
        burst(e.x, e.y, e.color, heavy ? 36 : 18, heavy ? 260 : 180, true); }
        dropFromEnemy(e);
        enemies.splice(i, 1);
        continue;
      }
      if (e.y > H + 80) enemies.splice(i, 1);
    }
  }

  function updateEnemyBullets(dt) {
    const grazeR = 34;
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      // damagePlayer() 可能在循环中清空 enemyBullets（复活/死亡），此时高位索引为 undefined
      if (!b) continue;
      b.vx += b.ax * dt;
      b.vy += b.ay * dt;
      // 追踪魂弹：缓慢转向玩家后加速（暗夜女王专属）
      if (b.homingSoul) {
        b.homeT = (b.homeT || 0) + dt;
        const desired = angleTo(b.x, b.y, player.x, player.y);
        const cur = Math.atan2(b.vy, b.vx);
        let diff = ((desired - cur + Math.PI) % TAU) - Math.PI;
        const na = cur + clamp(diff, -1.4 * dt, 1.4 * dt);
        const spd = Math.min(170, 40 + b.homeT * 90);
        b.vx = Math.cos(na) * spd; b.vy = Math.sin(na) * spd;
        if (b.homeT > 2.6) b.homingSoul = false;
      }
      // 刹车弹：减速到很慢时停止加速度，转为缓慢前行（避免反向倒飞）
      if (b.brake) {
        const sp2 = b.vx * b.vx + b.vy * b.vy;
        if (sp2 < 30 * 30) {
          b.ax = 0; b.ay = 0; b.brake = false;
          const a = b.rot || Math.atan2(b.vy, b.vx);
          b.vx = Math.cos(a) * 90; b.vy = Math.abs(Math.sin(a) * 90) + 60;  // 缓慢下行
        }
      }
      // 波浪弹：正弦轨迹侧向摆动
      if (b.wavePhase !== undefined) {
        b.wavePhase += dt * 3.5;
        const perpAngle = Math.atan2(b.vy, b.vx) + Math.PI / 2;
        const waveDelta = Math.sin(b.wavePhase) * b.waveAmp * dt;
        b.x += Math.cos(perpAngle) * waveDelta;
        b.y += Math.sin(perpAngle) * waveDelta;
      }
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.rot += b.spin * dt;
      b.life -= dt;
      if (b.life <= 0 || b.x < -80 || b.x > W + 80 || b.y < -100 || b.y > H + 100) {
        enemyBullets.splice(i, 1);
        continue;
      }
      const d2 = dist2(b.x, b.y, player.x, player.y);
      const hitR = b.r + player.hitR;
      if (d2 < hitR * hitR) {
        enemyBullets.splice(i, 1);
        damagePlayer(b.damage);
        continue;
      }
      if (!b.grazed && d2 < (b.r + grazeR) * (b.r + grazeR) && d2 > hitR * hitR) {
        b.grazed = true;
        player.energy = clamp(player.energy + 2.2, 0, player.maxEnergy);
        player.combo += 1;
        comboTimer = 1.3;
        score += 12;
        audio.graze();
        if (Math.random() < 0.3) addSpriteFx('vfxGraze', player.x, player.y, 54, 0.2, rand(0, TAU), 0.18, 0.46);
        addParticle(player.x + rand(-8, 8), player.y + rand(-8, 8), rand(-80, 80), rand(-80, 80), 0.22, rand(2, 5), '#e7fbff', true);
      }
    }
  }

  function updateWarnings(dt) {
    for (let i = warnings.length - 1; i >= 0; i--) {
      const w = warnings[i];
      w.life -= dt;
      if (w.life <= 0) {
        if (w.type === 'laser') {
          lasers.push({ x1: w.x1, y1: w.y1, x2: w.x2, y2: w.y2, width: w.width, life: w.duration, maxLife: w.duration, color: '#ff365f', damage: 18 });
          playSfx('laser', 0.4, 0.14);
          screenShake = Math.max(screenShake, 6);
        } else if (w.type === 'circle') {
          spawnCircle(w.x, w.y, 28, 210, '#ff5f89', rand(0, TAU), 6, 9, 'warning');
          addSpriteFx('vfxExplosionSmall', w.x, w.y, Math.min(180, w.r * 1.6), 0.34, rand(0, TAU), 0.35, 0.58);
          burst(w.x, w.y, '#ff4d76', 24, 280, true);
        }
        warnings.splice(i, 1);
      }
    }
  }

  function updateLasers(dt) {
    for (let i = lasers.length - 1; i >= 0; i--) {
      const l = lasers[i];
      if (!l) continue; // damagePlayer() 可能清空 lasers
      l.life -= dt;
      if (l.life <= 0) { lasers.splice(i, 1); continue; }
      const d = pointLineDistance(player.x, player.y, l.x1, l.y1, l.x2, l.y2);
      if (d < l.width * 0.5 + player.hitR) damagePlayer(l.damage);
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= Math.pow(0.025, dt);
      p.vy *= Math.pow(0.025, dt);
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function updateSpriteFx(dt) {
    updateProcRings(dt);
    for (let i = spriteFx.length - 1; i >= 0; i--) {
      const fx = spriteFx[i];
      fx.life -= dt;
      fx.rot += fx.spin * dt;
      if (fx.life <= 0) spriteFx.splice(i, 1);
    }
    for (let i = chainArcs.length - 1; i >= 0; i--) {
      chainArcs[i].life -= dt;
      if (chainArcs[i].life <= 0) chainArcs.splice(i, 1);
    }
    for (let i = ghostSlashes.length - 1; i >= 0; i--) {
      ghostSlashes[i].life -= dt;
      if (ghostSlashes[i].life <= 0) ghostSlashes.splice(i, 1);
    }
  }

  function updateDamageTexts(dt) {
    for (let i = damageTexts.length - 1; i >= 0; i--) {
      const d = damageTexts[i];
      d.life -= dt;
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      d.vy += 65 * dt;
      if (d.life <= 0) damageTexts.splice(i, 1);
    }
  }

  function updateMobStage(dt) {
    const waves = STAGE_WAVES[segment] || STAGE_WAVES.stage1;
    const total = waves.length;
    const extraTotal = extraWavesForStage();
    spawnTimer -= dt;
    const actLabel = ({stage1:'第一幕',stage2:'第二幕',stage3:'第三幕',stage4:'第四幕',stage5:'第五幕',stage6:'第六幕',stage7:'第七幕',stage8:'第八幕',stage9:'第九幕',stage10:'第十幕'})[segment] || '第一幕';
    if (spawnTimer <= 0 && waveIndex < total) {
      spawnWave(waveIndex);
      spawnBonusEnemies();
      waveIndex++;
      spawnTimer = Math.max(0.95, 1.7 - elapsed / 200);
      setMessage(`${actLabel} · 波次 ${waveIndex}/${total}`, 1.0);
    } else if (spawnTimer <= 0 && waveIndex >= total && extraSpawned < extraTotal) {
      // 肉鸽附加波次：复用本关刷怪并叠加增援，随时间越来越猛
      spawnWave((extraSpawned + 1) % total);
      spawnBonusEnemies();
      extraSpawned++;
      spawnTimer = Math.max(0.85, 1.45 - elapsed / 220);
      setMessage(`${actLabel} · 增援 ${extraSpawned}/${extraTotal}`, 1.0);
    }
    // 安全网：波次全部结束后，清除卡在画面外上方、存活过久的残留怪（防止永久卡关）
    if (waveIndex >= total && extraSpawned >= extraTotal && enemies.length > 0) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.t > 4 && (e.y < 0 || e.y > H + 40)) enemies.splice(i, 1);
      }
    }
    if (waveIndex >= total && extraSpawned >= extraTotal && enemies.length === 0 && stateTimer > 4) {
      // Boss randomization system - select random boss from stage pool
      bossKind = selectRandomBoss(segment);
      boss = null;
      bossPhase = -1;
      state = 'bossIntro';
      stateTimer = 0;
      enemyBullets.length = 0;
      const def = BOSS_DEFS[bossKind];
      setMessage(def ? def.intro : '深处传来威压……Boss 即将降临', 2.8);
      screenShake = 5;
    }
  }

  function updateBossIntro(dt) {
    if (!boss && stateTimer > 2.2) spawnBoss();
    if (boss) {
      boss.t += dt;
      boss.y = lerp(boss.y, boss.targetY, 0.04);
      if (stateTimer > 5.2) {
        state = 'boss';
        stateTimer = 0;
        boss.inv = 0.6;
        setMessage('Boss战开始', 1.4);
      }
    }
  }

  function updateBoss(dt) {
    if (!boss || boss.dead) return;
    boss.t += dt;
    boss.inv = Math.max(0, boss.inv - dt);
    boss.hitFlash = Math.max(0, (boss.hitFlash || 0) - dt);
    // 回充伤害信用（DPS 上限的核心）

    for (let i = 0; i < buttons.length; i++) drawCompanionSkill(startX + i * gap, H - 174, buttons[i]);
  }

  function drawCompanionSkill(cx, cy, skill) {
    const R = 31;
    const cdRate = skill.cdMax > 0 ? clamp(skill.cd / skill.cdMax, 0, 1) : 0;
    const pulse = 0.5 + Math.sin(time * 5.5) * 0.5;
    registerTouchSkill(cx, cy, R + 19, skill.key, skill.name);
    ctx.save();

    if (skill.ready || skill.active) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const haloR = R + 8 + pulse * 3;
      const halo = ctx.createRadialGradient(cx, cy, R - 8, cx, cy, haloR);
      halo.addColorStop(0, `rgba(${skill.color},0)`);
      halo.addColorStop(0.68, `rgba(${skill.color},${skill.active ? 0.24 : 0.12 + pulse * 0.08})`);
      halo.addColorStop(1, `rgba(${skill.color},0)`);
      ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(cx, cy, haloR, 0, TAU); ctx.fill();
      ctx.restore();
    }

    const base = ctx.createRadialGradient(cx - 8, cy - 10, 2, cx, cy, R + 3);
    base.addColorStop(0, `rgba(${skill.color},0.24)`);
    base.addColorStop(0.58, 'rgba(20,14,31,0.94)');
    base.addColorStop(1, 'rgba(5,4,12,0.98)');
    ctx.fillStyle = base; ctx.beginPath(); ctx.arc(cx, cy, R + 3, 0, TAU); ctx.fill();

    if (assetReady(skill.icon)) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, R - 4, 0, TAU); ctx.clip();
      ctx.globalAlpha = cdRate > 0 ? 0.58 : 1;
      ctx.drawImage(assets[skill.icon], cx - R + 3, cy - R + 3, (R - 3) * 2, (R - 3) * 2);
      ctx.restore();
    }

    if (cdRate > 0) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, R - 3, 0, TAU); ctx.clip();
      ctx.fillStyle = 'rgba(3,2,9,0.72)';
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, R, -Math.PI / 2, -Math.PI / 2 + TAU * cdRate);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(5,3,12,0.86)';
    ctx.beginPath(); ctx.arc(cx, cy, R + 1, 0, TAU); ctx.stroke();
    ctx.lineWidth = skill.ready ? 2.6 : 1.8;
    ctx.strokeStyle = skill.ready ? skill.accent : `rgba(${skill.color},0.62)`;
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.stroke();
    ctx.lineWidth = 1;
    ctx.strokeStyle = `rgba(${skill.color},0.42)`;
    ctx.beginPath(); ctx.arc(cx, cy, R - 5, 0, TAU); ctx.stroke();

    if (skill.active) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(time * 2.7);
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = skill.accent;
      ctx.lineWidth = 2.6;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(0, 0, R + 4, i * TAU / 3, i * TAU / 3 + 0.66);
        ctx.stroke();
      }
      ctx.restore();
    }

    if (skill.cd > 0.05) {
      const text = skill.cd >= 10 ? Math.ceil(skill.cd) : skill.cd.toFixed(1);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold 15px Arial';
      ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,0.82)'; ctx.strokeText(text, cx, cy);
      ctx.fillStyle = '#ffffff'; ctx.fillText(text, cx, cy);
    }

    // Key badge and label use the same restrained gold/violet HUD language.
    const badgeX = cx - R + 4, badgeY = cy - R + 4;
    ctx.fillStyle = 'rgba(7,5,14,0.92)'; ctx.beginPath(); ctx.arc(badgeX, badgeY, 10, 0, TAU); ctx.fill();
    ctx.strokeStyle = skill.accent; ctx.lineWidth = 1.4; ctx.beginPath(); ctx.arc(badgeX, badgeY, 10, 0, TAU); ctx.stroke();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 12px Arial';
    ctx.fillStyle = skill.accent; ctx.fillText(skill.key, badgeX, badgeY + 0.5);

    ctx.textBaseline = 'alphabetic';
    ctx.font = 'bold 11px PingFang SC, Microsoft YaHei, sans-serif';
    ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.72)';
    ctx.strokeText(skill.name, cx, cy + R + 16);
    ctx.fillStyle = skill.ready ? skill.accent : 'rgba(230,224,244,0.82)';
    ctx.fillText(skill.name, cx, cy + R + 16);
    ctx.restore();
  }

  function drawOverlay() {
    if (flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${Math.min(0.72, flash)})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Boss 来袭警示横幅（素材 ui_boss_warning），仅在 Boss 入场时滑入
    if (state === 'bossIntro' && assetReady('uiBossWarning')) {
      const p = clamp(stateTimer / 0.5, 0, 1);
      const slideY = H * 0.42 - (1 - p) * 40;
      const bw = W - 80, bh = bw * (assets.uiBossWarning.height / assets.uiBossWarning.width);
      ctx.save();
      ctx.globalAlpha = (0.78 + Math.sin(time * 10) * 0.18) * p;
      ctx.drawImage(assets.uiBossWarning, 40, slideY - bh / 2, bw, bh);
      ctx.restore();
    }

    if (state !== 'title' && messageTimer > 0 && message) {
      const alpha = Math.min(1, messageTimer * 2);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      const isPhase = message.includes('阶段') || message.includes('Boss');
      const y = isPhase ? 188 : 166;
      if (isPhase) {
        ctx.fillStyle = 'rgba(5,4,12,.56)';
        roundRect(88, y - 42, W - 176, 68, 18); ctx.fill();
        ctx.strokeStyle = 'rgba(255,216,128,.34)';
        ctx.lineWidth = 2; roundRect(88, y - 42, W - 176, 68, 18); ctx.stroke();
      }
      ctx.font = `bold ${isPhase ? 38 : 30}px PingFang SC, Microsoft YaHei, sans-serif`;
      ctx.lineWidth = 8;
      ctx.strokeStyle = 'rgba(0,0,0,.72)';
      ctx.strokeText(message, W / 2, y);
      ctx.fillStyle = isPhase ? '#fff1a3' : '#fff6d7';
      ctx.fillText(message, W / 2, y);
      ctx.restore();
    }

    // 阶段通关横幅（素材 ui_stage_clear），Boss 被击破的过场展示
    if (state === 'bossOutro' && bossKind !== 'final' && assetReady('uiStageClear')) {
      const p = clamp(stateTimer / 0.4, 0, 1) * clamp((2.6 - stateTimer) / 0.5, 0, 1);
      const bw = (W - 140) * (0.85 + p * 0.15);

      ctx.drawImage(assets.uiStageClear, (W - bw) / 2, H * 0.40 - bh / 2, bw, bh);
      ctx.restore();
    }

    if (skillCutin) drawSkillCutin();
    if (pluginToast) drawPluginToast();
    if (state === 'title') drawTitle();
    if (state === 'win') drawResult('VICTORY', '第一章 · 月蚀终幕已通关，按 R 再来一局', '#fff2a8');
    if (state === 'lose') drawResult('GAME OVER', '按 R 重开', '#ff9cb0');
    if (paused) {
      ctx.save(); ctx.fillStyle = 'rgba(0,0,0,.48)'; ctx.fillRect(0,0,W,H);
      if (assetReady('uiPausePanel')) ctx.drawImage(assets.uiPausePanel, 92, H * 0.35, W - 184, 280);
      ctx.fillStyle = '#fff4d1'; ctx.font = 'bold 48px Arial'; ctx.textAlign = 'center'; ctx.fillText('PAUSED', W/2, H/2); ctx.restore();
    }
  }

  // 拾取弹幕插件时弹出的卡片提示（滑入 + 停留 + 淡出）
  function drawPluginToast() {
    const t = pluginToast;
    const p = 1 - t.life / t.maxLife;       // 0 -> 1
    const slide = p < 0.16 ? p / 0.16 : 1;  // 滑入
    const fade = p > 0.82 ? 1 - (p - 0.82) / 0.18 : 1;
    const cw = 132, ch = 158;
    const cx = W * 0.5;
    const cy = H * 0.34 - (1 - slide) * 40;
    ctx.save();
    ctx.globalAlpha = fade;
    if (assetReady(t.card)) {
      ctx.drawImage(assets[t.card], cx - cw / 2, cy - ch / 2, cw, ch);
    }
    // 标签：插件显示「插件已装备」，暴走等显示其名称
    const label = t.card ? '插件已装备！' : (t.name || '');
    const labelY = t.card ? (cy + ch / 2 + 28) : cy;
    if (!t.card) {
      // 暴走等无卡片：金色光环大字
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, 160);
      gr.addColorStop(0, 'rgba(255,200,80,.5)'); gr.addColorStop(1, 'rgba(255,200,80,0)');
      ctx.fillStyle = gr; ctx.fillRect(cx - 160, cy - 90, 320, 180);
      ctx.restore();
    }
    ctx.font = '700 24px "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(10,8,20,.72)';
    ctx.strokeText(label, cx, labelY);
    ctx.fillStyle = t.card ? '#fff2c4' : '#ffe07a';
    ctx.fillText(label, cx, labelY);
    ctx.restore();
  }

  function drawSkillCutin() {
    const sc = skillCutin;
    const p = 1 - sc.life / sc.maxLife; // 0 -> 1
    ctx.save();
    // diagonal slash band
    let bandA = p < 0.18 ? p / 0.18 : (p > 0.78 ? Math.max(0, 1 - (p - 0.78) / 0.22) : 1);
    const bandH = sc.compact ? 170 : 300;
    const cy = sc.compact ? H * 0.27 : H * 0.46;
    ctx.save();
    ctx.globalAlpha = bandA * 0.9;
    const g = ctx.createLinearGradient(0, cy - bandH / 2, 0, cy + bandH / 2);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(0.5, `rgba(${sc.aura},0.18)`);
    g.addColorStop(0.5, 'rgba(8,6,16,0.86)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0, cy - bandH / 2);
    ctx.lineTo(W, cy - bandH / 2 - 46);
    ctx.lineTo(W, cy + bandH / 2 - 46);
    ctx.lineTo(0, cy + bandH / 2);
    ctx.closePath(); ctx.fill();
    // top/bottom accent lines
    ctx.strokeStyle = `rgba(${sc.aura},${bandA})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, cy - bandH / 2); ctx.lineTo(W, cy - bandH / 2 - 46); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy + bandH / 2); ctx.lineTo(W, cy + bandH / 2 - 46); ctx.stroke();
    ctx.restore();
    // character splash slides in from the left
    if (assetReady(sc.key)) {
      const slide = p < 0.22 ? (1 - p / 0.22) : 0;
      const outSlide = p > 0.8 ? (p - 0.8) / 0.2 : 0;
      const dx = -W * 0.55 * slide + W * 0.5 * outSlide;
      const ca = bandA;
      const img = assets[sc.key];
      const dh = sc.compact ? 210 : 360, dw = dh * img.width / img.height;
      ctx.globalAlpha = ca;
      ctx.drawImage(img, W * 0.04 + dx, cy - dh * 0.56, dw, dh);
    }
    // name + skill label
    const txtA = p < 0.2 ? p / 0.2 : (p > 0.82 ? Math.max(0, 1 - (p - 0.82) / 0.18) : 1);
    ctx.globalAlpha = txtA;
    ctx.textAlign = 'right';
    ctx.font = `bold ${sc.compact ? 22 : 30}px PingFang SC, Microsoft YaHei, sans-serif`;
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,.7)';
    ctx.strokeText(sc.name, W - 30, cy - 8);
    ctx.fillStyle = '#fff4d1'; ctx.fillText(sc.name, W - 30, cy - 8);
    ctx.font = `bold ${sc.compact ? 32 : 44}px PingFang SC, Microsoft YaHei, sans-serif`;
    const skillTitle = sc.title || '月 蚀 · 终 章';
    ctx.strokeText(skillTitle, W - 30, cy + 40);
    ctx.fillStyle = `rgba(${sc.aura},1)`; ctx.fillText(skillTitle, W - 30, cy + 40);
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  let loopErrCount = 0;
  function loop(now) {
    // The rAF re-schedule MUST happen no matter what, otherwise a single thrown
    // exception (e.g. on player death) would permanently freeze the game.
    try {
      const rawMs = (now - last) || 16.7;
      const dt = Math.min(0.033, (now - last) / 1000 || 0.016);
      last = now;
      // 平滑帧时 + 自适应降级（连续偏慢降一级，连续流畅回升一级）
      if (rawMs > 0 && rawMs < 200) smoothFrameMs += (rawMs - smoothFrameMs) * 0.1;
      perfHoldT += dt;
      // 很卡（<~25fps）立即跳到极简档，避免持续掉帧
      if (smoothFrameMs > 40 && perfLevel < 2) { perfLevel = 2; perfHoldT = 0; }
      else if (perfHoldT > 0.8) {
        perfHoldT = 0;
        if (smoothFrameMs > 27 && perfLevel < 2) perfLevel++;
        else if (smoothFrameMs < 18 && perfLevel > MOBILE_BEST_PERF_LEVEL) perfLevel--;
        if (perfLevel < MOBILE_BEST_PERF_LEVEL) perfLevel = MOBILE_BEST_PERF_LEVEL;
      }
      // hit-stop：短暂冻结战斗推进（仍持续绘制），增强终结/重击打击感
      if (hitStop > 0) { hitStop -= dt; draw(); requestAnimationFrame(loop); return; }
      update(dt);
      draw();
    } catch (err) {
      loopErrCount++;
      if (loopErrCount <= 8) console.error('[loop] recovered from error:', err);
    }
    requestAnimationFrame(loop);
  }

  function rawCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return {
      x: (p.clientX - rect.left) / rect.width * W,
      y: (p.clientY - rect.top) / rect.height * H
    };
  }

  function pointerPos(e) {
    const p = rawCanvasPos(e);
    return {
      x: clamp(p.x, 36, W - 36),
      y: clamp(p.y, 260, H - 58)
    };
  }

  function registerTouchSkill(cx, cy, r, key, name) {
    if (!IS_MOBILE_RUNTIME || state === 'title') return;
    touchSkillButtons.push({ cx, cy, r, key, name });
  }

  function hitTouchSkill(pt) {
    if (!IS_MOBILE_RUNTIME || state === 'title') return null;
    for (let i = touchSkillButtons.length - 1; i >= 0; i--) {
      const b = touchSkillButtons[i];
      if (dist2(pt.x, pt.y, b.cx, b.cy) <= b.r * b.r) return b;
    }
    return null;
  }

  function triggerVirtualSkill(key) {
    if (state === 'title') return false;
    unlockAudio();
    if (key === 'Space') { useBeam(); return true; }
    if (key === 'X') { useBomb(); return true; }
    if (key === 'Q') { castSaintField(); return true; }
    if (key === 'E') { ncToggleMode(); return true; }
    return false;
  }

  function setPointerTarget(e, snap = false) {
    pointerTarget = pointerPos(e);
    if (snap && state !== 'title') {
      player.prevX = player.x;
      player.prevY = player.y;
      player.x = pointerTarget.x;
      player.y = pointerTarget.y;
      player.moveVX = player.x - player.prevX;
      player.moveVY = player.y - player.prevY;
    }
  }

  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    unlockAudio();   // 首个按键即解锁音频（满足自动播放策略）
    if (e.code === 'Digit1' || e.code === 'Numpad1') selectChar('witch');
    if (e.code === 'Digit2' || e.code === 'Numpad2') selectChar('yanuxiya');
    if (e.code === 'Digit3' || e.code === 'Numpad3') selectChar('anna');
    if (e.code === 'Digit4' || e.code === 'Numpad4') selectChar('reaver');
    if (e.code === 'Digit5' || e.code === 'Numpad5') selectChar('motherlife');
    if (e.code === 'KeyC') cycleSkin();
    if (e.code === 'Enter' && state === 'title') startGame();
    if (e.code === 'KeyP') paused = !paused;
    if (e.code === 'KeyR') startGame();
    if (e.code === 'KeyG') { player.energy = player.maxEnergy; }
    if (e.code === 'KeyM') toggleMusic();
    if (e.code === 'KeyQ' && state !== 'title') castSaintField();
    if (e.code === 'KeyE' && state !== 'title') ncToggleMode();
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  }, { passive: false });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });
  canvas.addEventListener('pointerdown', (e) => {
    unlockAudio();   // 首个点击即解锁音频
    const wasTitle = state === 'title';
    if (wasTitle) {
      // 点击角色/僚机卡只改变选择，不立即开始游戏。
      const pt = pointerPos(e);
      for (const c of characterCards) { if (pt.x >= c.x && pt.x <= c.x + c.w && pt.y >= c.y && pt.y <= c.y + c.h) { selectChar(c.key); return; } }
      for (const c of wingCards) { if (pt.x >= c.x && pt.x <= c.x + c.w && pt.y >= c.y && pt.y <= c.y + c.h) { toggleWingSelection(c.key); return; } }
      startGame();
    }
    const rawPt = rawCanvasPos(e);
    const touchedSkill = hitTouchSkill(rawPt);
    if (touchedSkill) {
      activeTouchButtonPointer = e.pointerId;
      triggerVirtualSkill(touchedSkill.key);
      canvas.setPointerCapture?.(e.pointerId);
      e.preventDefault();
      return;
    }
    pointerDown = true;
    setPointerTarget(e, !wasTitle);
    canvas.setPointerCapture?.(e.pointerId);
  });
  canvas.addEventListener('pointermove', (e) => {
    if (activeTouchButtonPointer === e.pointerId) return;
    if (pointerDown) setPointerTarget(e, true);
  });
  canvas.addEventListener('pointerup', (e) => { if (activeTouchButtonPointer === e.pointerId) activeTouchButtonPointer = null; pointerDown = false; pointerTarget = null; });
  canvas.addEventListener('pointercancel', (e) => { if (activeTouchButtonPointer === e.pointerId) activeTouchButtonPointer = null; pointerDown = false; pointerTarget = null; });

  // Prevent mobile scrolling while playing.
  document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  if (window.__PAGE_BUILD_VERSION__ && 'serviceWorker' in navigator && /^https?:$/.test(location.protocol)) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  window.__mobileRuntimeInfo__ = {
    isMobile: IS_MOBILE_RUNTIME,
    narrowViewport: NARROW_VIEWPORT,
    coarsePointer: HAS_COARSE_POINTER,
    bestPerfLevel: MOBILE_BEST_PERF_LEVEL,
    mobileAssets: !!Object.keys(MOBILE_ASSET_PATHS).length,
  };

  requestAnimationFrame(loop);
})();

</script>
</body>
</html>

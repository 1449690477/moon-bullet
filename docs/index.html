<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" href="data:," />
  <title>月蚀弹幕 V1.0 - 移动端自适应版</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background:#020208; overflow: hidden; }
    body {
      color:#f8f1ff;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      user-select:none;
    }
    #wrap {
      width: 100vw; height: 100vh;
      display:flex; align-items:center; justify-content:center;
      background:
        radial-gradient(circle at 50% 14%, rgba(129,57,206,.28), transparent 28%),
        radial-gradient(circle at 20% 80%, rgba(255,196,77,.08), transparent 28%),
        #020208;
      padding:8px;
    }
    canvas {
      width: min(100vw, calc(100vh * 0.5625));
      height: min(100vh, calc(100vw / 0.5625));
      max-width:720px; max-height:1280px;
      background:#05040a;
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      box-shadow:0 0 60px rgba(132,78,255,.32), inset 0 0 52px rgba(255,255,255,.04);
      touch-action:none;
    }
    #tip {
      position: fixed; left: 12px; bottom: 10px;
      color: rgba(255,255,255,.74); font-size: 12px; line-height: 1.65;
      text-shadow: 0 2px 4px #000; pointer-events:none;
      max-width: 420px;
    }
    #badge {
      position: fixed; right: 12px; bottom: 10px;
      color: rgba(255,255,255,.45); font-size: 11px; pointer-events:none;
    }
    #musicStatus {
      position: fixed; right: 12px; top: 10px;
      color: rgba(255,255,255,.78); font-size: 12px;
      background: rgba(10, 6, 24, .55); border: 1px solid rgba(255,255,255,.12);
      padding: 7px 10px; border-radius: 999px; pointer-events:none;
      text-shadow: 0 1px 4px #000;
    }
    @media (max-width: 720px) {
      #wrap { padding:0; }
      canvas { border:none; border-radius:0; }
      #tip, #badge, #musicStatus { display:none; }
    }
  </style>
</head>

  <audio id="bgm" src="assets/audio/bgm_stage_loop.ogg" preload="none" loop></audio>
  <div id="wrap"><canvas id="game" width="720" height="1280"></canvas></div>
  <div id="tip">
    操作：WASD/方向键移动　Shift低速　Space角色技能　X角色大招　1–5换将　P暂停　R重开<br/>
    鼠标/手机：按住拖动角色移动。点击开始后会启用BGM与音效。按 M 可开关音乐。
  </div>
  <div id="musicStatus">BGM：点击开始后播放</div>
  <div id="badge">V1.0 移动端自适应 / Mobile Ready</div>

  function ncDashDmg()  { return 44 + powerLevel() * 22; }   // 单次冲撞 AOE 伤害基数（主力清场）
  function ncLaserDmg() { return 12 + powerLevel() * 6; }    // 单 tick 单炮激光伤害基数（主力绞杀）
  const ncDrones = [];                         // 8 枚浮游炮本体
  const ncFx = [];                             // 命中爆点 / 减速领域 / 切换闪光等程序特效
  const ncState = {                            // 阵列总控
    mode: 'dash',                              // 'dash' | 'laser'
    switchCd: 0,
    switchT: 0,                                // 模式切换动画计时（>0 时为重组过渡）
    target: null,                              // 激光锁定目标（enemy 对象 或 boss）
    swarmX: W * 0.5, swarmY: H * 0.32,         // 无目标时的群体游荡中心
    swarmVX: 60, swarmVY: 40,
    summonT: 0,                                // 召唤登场计时
    laserSpin: 0,                              // 激光阵列整体旋转相位
    laserReshuffleT: 0,                        // 换角计时
    formationIndex: 0,
    formationPhase: 0,
  };
  const damageTexts = [];
  const warnings = [];
  const lasers = [];
  const items = [];        // 掉落道具（火力/分数/复活/能量）
  const pLasers = [];       // 雅努西娅的玩家激光束（跟随玩家，按等级变粗）
  const pBeams = [];        // 暴走分裂激光：从玩家射向各敌人的角度光束
  const giantBirds = [];    // 暴走巨型贯穿飞鸟（雅努西娅）
  const stars = [];
  const fog = [];

  const rand = (a, b) => a + Math.random() * (b - a);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const easeOutCubic = (t) => 1 - Math.pow(1 - clamp(t, 0, 1), 3);
  const dist2 = (ax, ay, bx, by) => { const x = ax - bx, y = ay - by; return x * x + y * y; };
  const angleTo = (ax, ay, bx, by) => Math.atan2(by - ay, bx - ax);

  // ===== Saint_Wing Berserk_Form Pulse_Cycle 工具函数(spec: saint-wing-berserk-beam-rework, Task 1.1) =====
  // 这些纯函数无副作用,定义在 IIFE 顶层以便:
  //  (a) 被 drawSaintWing() 内的状态机推进与渲染插值复用;
  //  (b) 后续 Task 1.3 挂到 window.__saintWingBerserkInternals__ 供 PBT(jsdom + fast-check)访问。
  // 注:本 IIFE 已定义 `clamp` 与 `lerp`,Pulse_Cycle 状态机直接复用,不再重复定义。
  // 阶段时长(秒): charge=0.50, fire=0.15, impact=0.30, cooldown=0.30 → 总周期 1.25s。
  const scBerserkDurationOf = (phase) => {
    switch (phase) {
      case 'charge':   return 0.50;
      case 'fire':     return 0.15;
      case 'impact':   return 0.30;
      case 'cooldown': return 0.30;
      default:         return 0;
    }
  };
  // 阶段链:charge → fire → impact → cooldown → charge(回到起点)。
  const scBerserkNextOf = (phase) => {
    switch (phase) {
      case 'charge':   return 'fire';
      case 'fire':     return 'impact';
      case 'impact':   return 'cooldown';
      case 'cooldown': return 'charge';
      default:         return 'charge';
    }
  };

  // ===== Saint_Wing Berserk_Form Pulse_Cycle 状态机(spec: saint-wing-berserk-beam-rework, Task 2.2) =====
  // onEnterPhase(cyc, prevPhase, ctx_in):在阶段切换瞬间由 advancePulseCycle 调用,集中触发四种入场副作用。
  // ctx_in 字段约定(全部经由 ctx_in 注入,纯逻辑形式便于 PBT mock):
  //   emitWX, emitWY        — Emit_Point 世界坐标
  //   enemies, boss, state  — 目标筛选输入(charge 起始用)
  //   w, li                 — 僚机对象与发射器索引(li ∈ {0,1})
  //   perfLevel             — 性能等级 0/1/2,影响 impact 粒子数量
  //   selectAimTarget       — 可选注入,缺省 fallback 到模块级 scBerserkSelectAimTarget
  //   hitBoss(amount,x,y,big)               — 伤害结算入口(impact 起始)
  //   screenShakeRef / flashRef / triggerHitStop — 旧全屏反馈入口;本粒子炮不再触发,避免整屏震动闪白
  //   addParticle(x,y,vx,vy,life,r,col,glow) — 粒子入口
  //   scFx                  — 全局特效数组(impact 起始 push berserkImpact 实现第三层环延寿)
  //   scBaseDmg(), berserkDmg()             — 伤害倍率函数(impact 起始 hitBoss 用)
  //   TAU                   — 2π,可缺省(默认 Math.PI*2)
  // _Validates_: R2.3, R2.4, R2.5, R2.6, R5.1, R5.7, R5.8, R7.1, R7.2, R7.3, R7.4, R7.5,
  //              R11.1, R11.2, R11.3, R11.4, R11.5, P3, P12, P13, P14
  const scBerserkOnEnterPhase = (cyc, prevPhase, ctx_in) => {
    if (!cyc || !ctx_in) return;
    const TAU_L = ctx_in.TAU || (Math.PI * 2);
    const li = ctx_in.li;
    const w  = ctx_in.w;
    switch (cyc.phase) {
      case 'charge': {
        // R2.3 / R6.x: charge 起始锁定本周期 aimTarget,周期内不再重新选目标
        const aimFn = ctx_in.selectAimTarget || scBerserkSelectAimTarget;
        cyc.aimTarget = aimFn(ctx_in.emitWX, ctx_in.emitWY, ctx_in.enemies, ctx_in.boss, ctx_in.state);
        // R7.5: 复位伤害结算标志(单周期至多一次)
        cyc.hasDamaged = false;
        // 清理上一周期遗留的 beamBullet 容器
        if (w && w._beamBullet) w._beamBullet[li] = null;
        break;
      }
      case 'fire': {
        // R2.4: 进入 fire,生成 Beam_Bullet 位置容器(实际位置由 phaseTime 推导,这里只锁定起止点)
        if (cyc.aimTarget && w) {
          if (!w._beamBullet) w._beamBullet = [null, null];
          w._beamBullet[li] = {
            emitX: ctx_in.emitWX,
            emitY: ctx_in.emitWY,
            aimX:  cyc.aimTarget.x,
            aimY:  cyc.aimTarget.y,
          };
          if (ctx_in.addParticle) {
            const dx = cyc.aimTarget.x - ctx_in.emitWX;
            const dy = cyc.aimTarget.y - ctx_in.emitWY;
            const len = Math.max(1, Math.hypot(dx, dy));
            const ux = dx / len, uy = dy / len;
            const nx = -uy, ny = ux;
            const n = ctx_in.perfLevel >= 2 ? 6 : 14;
            for (let i = 0; i < n; i++) {
              const spread = (i - (n - 1) / 2) / n;
              const sideV = spread * (ctx_in.perfLevel >= 2 ? 90 : 150);
              const fwdV = 260 + Math.random() * 260;
              ctx_in.addParticle(
                ctx_in.emitWX + nx * spread * 18,
                ctx_in.emitWY + ny * spread * 18,
                ux * fwdV + nx * sideV,
                uy * fwdV + ny * sideV,
                0.18 + Math.random() * 0.16,
                2.4 + Math.random() * 3.8,
                i % 2 ? '#fff8d8' : '#ffd76a',
                true
              );
            }
          }
        }
        break;
      }
      case 'impact': {
        // R2.5 / R5.1 / R7.1-R7.5 / R11.1-R11.5: 命中冲击集中触发点
        const aim = cyc.aimTarget;
        // 伤害结算:仅当 aim 非默认点(屏内有候选)且本周期尚未结算
        if (aim && !aim.isDefault && !cyc.hasDamaged) {
          const baseV = (typeof ctx_in.scBaseDmg  === 'function') ? ctx_in.scBaseDmg()  : 0;
          const berV  = (typeof ctx_in.berserkDmg === 'function') ? ctx_in.berserkDmg() : 1;
          const amount = baseV * berV;
          if (ctx_in.enemies && ctx_in.enemies.length) {
            for (const e of ctx_in.enemies) {
              if (!e) continue;
              const rr = 54 + (e.r || 0);
              const dx = e.x - aim.x, dy = e.y - aim.y;
              if (dx * dx + dy * dy <= rr * rr) {
                e.hp -= amount;
                e.hitFlash = 0.14;
              }
            }
          }
          if (ctx_in.hitBoss) {
            ctx_in.hitBoss(amount, aim.x, aim.y, true);
          }
          cyc.hasDamaged = true;
        }
        // 只保留局部粒子/光环反馈,不触发全屏 shake / flash / hit-stop。
        // 粒子:R5.7 / R9.4 / R11.4,perfLevel<2 → 40,perfLevel>=2 → 16
        if (aim && ctx_in.addParticle) {
          const N = (ctx_in.perfLevel >= 2) ? 16 : 40;
          for (let i = 0; i < N; i++) {
            const ang = (i / N) * TAU_L;
            const v = 150 + Math.random() * 150;
            ctx_in.addParticle(
              aim.x, aim.y,
              Math.cos(ang) * v, Math.sin(ang) * v,
              0.42 + Math.random() * 0.26,
              3 + Math.random() * 4.5,
              '#ffd97a', true
            );
          }
        }
        // 第三层环延寿:R5.5 / R11.5,push 一个 0.52s 生命的 scFx,跨越 impact 与 cooldown 早期
        if (aim && ctx_in.scFx) {
          ctx_in.scFx.push({
            type: 'berserkImpactBurst',
            x: aim.x,
            y: aim.y,
            life: 0.36,
            maxLife: 0.36,
            rot: Math.atan2(aim.y - ctx_in.emitWY, aim.x - ctx_in.emitWX),
            seed: Math.random() * 9999,
          });
          ctx_in.scFx.push({
            type: 'berserkImpact',
            x: aim.x,
            y: aim.y,
            life: 0.52,
            maxLife: 0.52,
            rot: Math.random() * TAU_L,
          });
        }
        break;
      }
      case 'cooldown': {
        // R2.6: cooldown 起始释放 beamBullet,后续帧不再绘制 beam
        if (w && w._beamBullet) w._beamBullet[li] = null;
        break;
      }
    }
  };

  // ===== Saint_Wing Berserk_Form Emit_Point 计算(spec: saint-wing-berserk-beam-rework, Task 3.2) =====
  // computeEmitPoint(x, y, bw, bh, dep, side, lh):由僚机世界坐标 (x,y) + 本体尺寸 (bw,bh) +
  // 部署进度 dep + 发射器朝向 side ∈ {-1,+1} + 发射器局部高度 lh,计算双侧激光发射器的
  // 发射口世界坐标。公式与 drawSaintWing 中 launcher 局部坐标系保持一致(R12.4 / P17):
  //   lx      = side * (bw * 0.72 + 28)   — 发射器在僚机本体局部 X 偏移
  //   ly      = -bh * 0.16 - 12           — 发射器在僚机本体局部 Y 偏移
  //   emitY_l = -lh * 0.46                — 发射口相对发射器中心的局部 Y 偏移
  //   emitWX  = x + lx
  //   emitWY  = y + ly + emitY_l
  // 纯函数无副作用,可安全暴露给 PBT。
  const scBerserkComputeEmitPoint = (x, y, bw, bh, dep, side, lh) => {
    const lx = side * (bw * 0.72 + 28);
    const ly = -bh * 0.16 - 12;
    const emitY_l = -lh * 0.46;
    return { emitWX: x + lx, emitWY: y + ly + emitY_l, lx, ly, emitY_l };
  };

  // ===== Saint_Wing Berserk_Form Charge_Orb 视图(spec: saint-wing-berserk-beam-rework, Task 4.1) =====
  // chargeOrbView(phase, phaseTime, time, lw):返回 Charge_Orb 在当前帧的视图参数 {r, alpha}。
  //  - 呼吸频率 0.6 Hz < 1 Hz(R10.4),振幅 ±12% 在 R1.2 的 ±15% 内
  //  - charge 阶段:沿进度线性放大到 1.6 倍基础半径,亮度 0.85 → 1.00 单调不减(R1.3)
  //  - fire/impact 阶段:余晖核心 0.6×baseR,alpha 0.70(R1.4)
  //  - cooldown 阶段:从余晖单调回升至常亮基础值,alpha 0.70 → 0.85(R10.3)
  // 纯函数无副作用,可安全暴露给 PBT。clamp 复用 IIFE 顶层定义。
  const scBerserkChargeOrbView = (phase, phaseTime, time, lw) => {
    const baseR = lw * 0.42;
    // 呼吸频率 0.6 Hz < 1 Hz(R10.4),振幅 ±12% 在 R1.2 的 ±15% 内
    const breath = 1 + Math.sin(time * Math.PI * 2 * 0.6) * 0.12;
    let r;
    let alpha;
    switch (phase) {
      case 'charge': {
        const p = clamp(phaseTime / 0.50, 0, 1);  // 进度 0..1
        // R1.3: 沿 charge 进度线性放大到 1.6 倍基础半径,亮度单调不减
        r = baseR * (breath + p * 1.25);
        alpha = 0.88 + p * 0.12;
        break;
      }
      case 'fire':
      case 'impact': {
        // R1.4: 余晖核心,在 fire/impact 阶段衰减
        r = baseR * (breath * 0.78);
        alpha = 0.78;
        break;
      }
      case 'cooldown': {
        const p = clamp(phaseTime / 0.30, 0, 1);
        // 从余晖单调回升至常亮基础值
        r = baseR * (breath * (0.72 + 0.28 * p));
        alpha = 0.76 + p * 0.12;
        break;
      }
      default: {
        r = baseR * breath;
        alpha = 0.85;
      }
    }
    return { r, alpha };
  };

  // ===== Saint_Wing Berserk_Form Beam_Bullet 视图(spec: saint-wing-berserk-beam-rework, Task 4.2) =====
  // beamBulletPos(phase, phaseTime, emit, aim):fire 阶段内按 0.15s 线性插值返回当前弹头世界坐标。
  // 非 fire 阶段返回 null,确保不会退化成持续光柱。
  const scBerserkBeamBulletPos = (phase, phaseTime, emit, aim) => {
    if (phase !== 'fire' || !emit || !aim) return null;
    const t = clamp(phaseTime / 0.15, 0, 1);
    return {
      curX: lerp(emit.x, aim.x, t),
      curY: lerp(emit.y, aim.y, t),
      progress: t,
    };
  };

  // ===== Saint_Wing Berserk_Form Impact_Halo 视图(spec: saint-wing-berserk-beam-rework, Task 4.3) =====
  // haloRingRadius/Alpha 只返回几何与透明度,实际绘制在 drawSaintWing 中完成。
  const scBerserkHaloRingRadius = (layer, ip) => {
    const t = clamp(ip, 0, 1);
    if (layer === 'core') {
      return 96 * clamp(t / (1 / 3), 0, 1);
    }
    if (layer === 'ring1') {
      return 96 + 50 * clamp(t / (2 / 3), 0, 1);
    }
    if (layer === 'ring2') {
      return 112 + 118 * t;
    }
    return 0;
  };
  const scBerserkHaloRingAlpha = (layer, ip) => {
    const t = clamp(ip, 0, 1);
    if (layer === 'core') {
      return 1 - clamp(t / (1 / 3), 0, 1);
    }
    if (layer === 'ring1') {
      return 1 - clamp(t / (2 / 3), 0, 1);
    }
    if (layer === 'ring2') {
      return 1 - t;
    }
    return 0;
  };

  // initPulseCycle(li):为索引 li ∈ {0,1} 的发射器初始化 Pulse_Cycle 状态对象。
  //  - li=0 → {phase:'charge', phaseTime:0, aimTarget:null, hasDamaged:false}
  //  - li=1 采用方案 A(参考 design.md):放在 cooldown 阶段中段,实现错相约 0.625s。
  //    经过 0.30 - 0.025 = 0.275 秒后切到 charge,此时 li=0 已运行 0.975 秒(亦在 cooldown 中段),
  //    错相约 0.625s,误差 ±0.025s 在 R3.1 容差 ±0.05s 内。
  const scBerserkInitPulseCycle = (li) => {
    if (li === 0) {
      return { phase: 'charge', phaseTime: 0, aimTarget: null, hasDamaged: false };
    }
    return { phase: 'cooldown', phaseTime: 0.025, aimTarget: null, hasDamaged: true };
  };

  // advancePulseCycle(cyc, dt, ctx_in):按 dt 推进状态机;dt 拒绝 0/负数/NaN;
  // 用 while 消化超长 dt(单帧跨多阶段时每跨一个阶段调用一次 onEnterPhase)。
  const scBerserkAdvancePulseCycle = (cyc, dt, ctx_in) => {
    // 防御:dt 必须为正有限数;0/负数/NaN 直接跳过(同时满足 R2.6 与边界保护)。
    if (!(dt > 0)) return;
    cyc.phaseTime += dt;
    while (cyc.phaseTime >= scBerserkDurationOf(cyc.phase)) {
      cyc.phaseTime -= scBerserkDurationOf(cyc.phase);
      const prevPhase = cyc.phase;
      cyc.phase = scBerserkNextOf(cyc.phase);
      scBerserkOnEnterPhase(cyc, prevPhase, ctx_in);
    }
  };

  // ===== Saint_Wing Berserk_Form Aim_Target 选择(spec: saint-wing-berserk-beam-rework, Task 2.1) =====
  // selectAimTarget(emitWX, emitWY, enemies, boss, state):在 Pulse_Cycle charge 起始为单个发射器选定目标。
  //  候选筛选:enemies 中 e.y > 20 AND e.y < emitWY;若 state==='boss' 且 boss 存活且 boss.y 同样满足,加入候选。
  //  最近选取:取 d² 最小者;tie-breaking 容差 0.5 像素²(差值需明显大于 0.5 才切换),保持迭代首次顺序优先,避免抖动。
  //  无候选默认点:返回 {x: emitWX, y: max(20, emitWY - 200), isDefault: true};
  //  有候选返回:{x: best.x, y: best.y, isDefault: false}(坐标副本,不持有敌人引用,避免悬空)。
  // 纯函数无副作用,可安全暴露给 PBT。
  const scBerserkSelectAimTarget = (emitWX, emitWY, enemies, boss, state) => {
    let best = null;
    let bestD2 = Infinity;
    if (enemies && enemies.length) {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e || !(e.y > 20) || !(e.y < emitWY)) continue;
        const dx = e.x - emitWX, dy = e.y - emitWY;
        const d2 = dx * dx + dy * dy;
        if (d2 < bestD2 - 0.5) {
          best = e; bestD2 = d2;
        }
      }
    }
    if (state === 'boss' && boss && !boss.dead && boss.y > 20 && boss.y < emitWY) {
      const dx = boss.x - emitWX, dy = boss.y - emitWY;
      const d2 = dx * dx + dy * dy;
      if (d2 < bestD2 - 0.5) {
        best = boss; bestD2 = d2;
      }
    }
    if (best === null) {
      return { x: emitWX, y: Math.max(20, emitWY - 900), isDefault: true };
    }
    return { x: best.x, y: best.y, isDefault: false };
  };

  // ===== Saint_Wing Berserk_Form internals 暴露(spec: saint-wing-berserk-beam-rework, Task 1.3) =====
  // 仅暴露纯函数(无 ctx 引用、无 IIFE 外副作用),供 jsdom + fast-check 进行 PBT 时按内部键名访问。
  // 键名去除 scBerserk 前缀以方便测试调用;持有 ctx 引用的渲染器(如 Charge_Orb / Beam_Bullet 渲染)不在此暴露。
  // 后续任务(2.1 / 4.1 / 4.2 / 4.3 / 3.2)将向本对象追加:selectAimTarget, chargeOrbView,
  // beamBulletPos, haloRingRadius, haloRingAlpha, computeEmitPoint。
  // 守卫:Node 运行环境下 window 可能不存在,直接跳过避免 ReferenceError。
  if (typeof window !== 'undefined') {
    window.__saintWingBerserkInternals__ = {
      durationOf:        scBerserkDurationOf,
      nextOf:            scBerserkNextOf,
      initPulseCycle:    scBerserkInitPulseCycle,
      advancePulseCycle: scBerserkAdvancePulseCycle,
      onEnterPhase:      scBerserkOnEnterPhase,
      selectAimTarget:   scBerserkSelectAimTarget,
      computeEmitPoint:  scBerserkComputeEmitPoint,
      chargeOrbView:     scBerserkChargeOrbView,
      beamBulletPos:     scBerserkBeamBulletPos,
      haloRingRadius:    scBerserkHaloRingRadius,
      haloRingAlpha:     scBerserkHaloRingAlpha,
      lerp,
      clamp,
    };
  }

  const player = {
    x: W * 0.5,
    y: H - 180,
    r: 7,
    hitR: 2.6,       // 真正的受伤判定半径（远小于外观，STG 惯例，便于擦弹躲避）
    visualR: 34,
    hp: 130,
    maxHp: 130,
    energy: 35,
    maxEnergy: 100,
    inv: 0,
    shootCd: 0,
    beamCd: 0,
    bombCd: 0,
    grazeCd: 0,
    combo: 0,
    alive: true,
    prevX: W * 0.5,
    prevY: H - 180,
    moveVX: 0,
    moveVY: 0,
    power: 0,        // 弹幕能量值 0..MAX_POWER，拾取道具累积
    lives: 2,        // 剩余复活次数
    birdTimer: 0,    // 哑奴西亚飞鸟生成计时
    plugin: null,    // 弹幕升级插件 null | 'chain'(连锁) | 'homing'(追踪)

  function drawMotherLifeDomainEnergy(cx, cy, scale, phase, expandP, gatherP, burstP) {

      { rx: W * 0.438 * scale, ry: W * 0.196 * scale, rot: -time * 0.052, speed: 0.42, width: 4.8 },
      { rx: W * 0.354 * scale, ry: W * 0.148 * scale, rot: time * 0.078, speed: -0.58, width: 3.4 },

  function motherLifeBodyOrbitSamples(loopIndex, front) {
    const configs = [
      { rx: 82, ry: 25, cy: -22, width: 9.2, wave: 4.8, phase: 0.2 },
      { rx: 68, ry: 21, cy: -51, width: 7.8, wave: 4.0, phase: 2.4 },
      { rx: 91, ry: 30, cy: -72, width: 6.5, wave: 3.3, phase: 4.5 },
    ];
    const cfg = configs[loopIndex];
    const count = perfLevel >= 2 ? 10 : perfLevel === 1 ? 16 : 22;
    const overlap = 0.08;
    const start = front ? -overlap : Math.PI - overlap;
    const end = front ? Math.PI + overlap : TAU + overlap;
    const samples = [];
    for (let i = 0; i <= count; i++) {
      const t = i / count;
      const a = start + (end - start) * t;
      const ripple = Math.sin(a * 3 + time * 2.2 + cfg.phase) * cfg.wave;
      const x = Math.cos(a) * (cfg.rx + ripple)
        + Math.sin(time * 1.15 + cfg.phase) * (loopIndex - 1) * 2.2;
      const y = cfg.cy + Math.sin(a) * cfg.ry
        + Math.cos(a * 2.15 - time * 1.7 + cfg.phase) * 2.6;
      const da = 0.012;
      const a2 = a + da;
      const ripple2 = Math.sin(a2 * 3 + time * 2.2 + cfg.phase) * cfg.wave;
      const x2 = Math.cos(a2) * (cfg.rx + ripple2)
        + Math.sin(time * 1.15 + cfg.phase) * (loopIndex - 1) * 2.2;
      const y2 = cfg.cy + Math.sin(a2) * cfg.ry
        + Math.cos(a2 * 2.15 - time * 1.7 + cfg.phase) * 2.6;
      const dx = x2 - x, dy = y2 - y, len = Math.max(0.001, Math.hypot(dx, dy));
      const nx = -dy / len, ny = dx / len;
      const pulse = 1 + Math.sin(time * 7.4 + a * 2.6 + cfg.phase) * 0.12;
      samples.push({ t, x, y, nx, ny, half: cfg.width * 0.5 * pulse });
    }
    return samples;
  }

  function motherLifeBodyOrbitPoint(loopIndex, a) {
    const configs = [
      { rx: 82, ry: 25, cy: -24, wave: 4.8, phase: 0.2 },
      { rx: 68, ry: 21, cy: -52, wave: 4.0, phase: 2.4 },
      { rx: 91, ry: 30, cy: -69, wave: 3.3, phase: 4.5 },
    ];
    const cfg = configs[loopIndex];
    const ripple = Math.sin(a * 3 + time * 2.2 + cfg.phase) * cfg.wave;
    return {
      x: Math.cos(a) * (cfg.rx + ripple)
        + Math.sin(time * 1.15 + cfg.phase) * (loopIndex - 1) * 2.2,
      y: cfg.cy + Math.sin(a) * cfg.ry
        + Math.cos(a * 2.15 - time * 1.7 + cfg.phase) * 2.6,
    };
  }

  function drawMotherLifeBodyOrbit(front) {

  class AudioEngine {
    constructor() {
      this.ctx = null;
      this.master = null;
      this.musicGain = null;
      this.enabled = false;
      this.beatTimer = 0;

      this.scale = [0, 3, 5, 7, 10, 12, 15, 17];

      if (!AC) return;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.5;
      this.master.connect(this.ctx.destination);
      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 0.42;
      this.musicGain.connect(this.master);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = 0.9;
      this.sfxGain.connect(this.master);

    loadSfxBuffers() {
      if (!this.ctx || typeof fetch !== 'function') return;
      if (IS_MOBILE_RUNTIME) return;
      for (const [key, src] of Object.entries(SFX_PATHS)) {
        try {
          fetch(src).then(r => r.arrayBuffer()).then(buf => {
            this.ctx.decodeAudioData(buf, decoded => { this.buffers[key] = decoded; }, () => {});

        } catch (e) {}

      const b = this.buffers[key];

  // Switch playable character. Allowed on the title screen, and live mid-battle

  function toggleWingSelection(key) {
    if (!(key in equippedWings)) return;
    equippedWings[key] = !equippedWings[key];
    if (equippedWings[key]) loadAssetGroup(WING_ASSET_GROUPS[key] || []);
    const opt = WING_OPTIONS.find(o => o.key === key);
    setMessage((equippedWings[key] ? '已装备：' : '已卸下：') + (opt ? opt.name : key), 1.6);
    if (key === 'moonfeather') { wingmen.length = 0; wmBeam.active = false; wmShield.active = false; if (wingmanActive()) syncWingmen(); }
    if (key === 'reaverwing') { nrWingmen.length = 0; nrWmFx.length = 0; if (reaverWingActive()) syncNrWingmen(); }
    if (key === 'saintcrown') { scWings.length = 0; scField.active = false; scFx.length = 0; if (saintActive()) syncScWing(); }
    if (key === 'nightcoffin') { ncDrones.length = 0; ncFx.length = 0; if (ncActive()) syncNcDrones(); }
  }
  function selectChar(which) {
    if (!CHARACTERS[which] || which === selectedChar) return;
    prefetchCharacterAssets(which);
    if (state === 'title') {
      selectedChar = which;
      player.maxHp = curChar().maxHp;
      player.hp = player.maxHp;
      setMessage('已选择 ' + curChar().name, 1.6);
      return;
    }
    if (state === 'mobs' || state === 'boss' || state === 'bossIntro') {
      const ratio = clamp(player.hp / player.maxHp, 0.15, 1);
      selectedChar = which;
      player.maxHp = curChar().maxHp;
      player.hp = Math.max(1, Math.round(player.maxHp * ratio));
      player.inv = Math.max(player.inv, 0.9);
      addSpriteFx('vfxSkillCircle', player.x, player.y, 150, 0.45, 0, 0.5, 0.85);
      burst(player.x, player.y, '#bfe6ff', 22, 220, true);
      setFlash(0.4, curChar().auraColor);

  function addParticle(x, y, vx, vy, life, r, color, glow = false) {
    // 降级时按概率丢弃粒子并收紧上限，弱机优先保弹幕/手感
    if (perfLevel === 1 && Math.random() < 0.4) return;
    if (perfLevel === 2 && Math.random() < 0.7) return;
    const cap = perfLevel === 2 ? 160 : (perfLevel === 1 ? 240 : 340);
    if (particles.length > cap) particles.splice(0, particles.length - cap);
    particles.push({ x, y, vx, vy, life, maxLife: life, r, color, glow });
  }

  function burst(x, y, color, n = 16, power = 170, glow = true) {
    for (let i = 0; i < n; i++) {
      const a = rand(0, TAU);
      const s = rand(power * 0.25, power);
      addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.25, 0.75), rand(2, 8), color, glow);
    }
  }

  // Directional spark fan: tight, fast streaks shooting outward from an impact point.
  function sparks(x, y, color, n = 10, baseAngle = -Math.PI / 2, spread = TAU, power = 320) {
    for (let i = 0; i < n; i++) {
      const a = baseAngle + rand(-spread / 2, spread / 2);
      const s = rand(power * 0.45, power);
      addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.18, 0.4), rand(1.6, 4.2), color, true);
    }
  }

  // —— 程序化扩散环（替代贴图光圈/冲击环）——
  const procRings = [];
  function addRingFx(x, y, r0, r1, life, colorPrefix = 'rgba(190,225,255,', lw = 3, ry = 1) {
    if (perfLevel === 2 && Math.random() < 0.5) return;
    procRings.push({ x, y, r0, r1, life, maxLife: life, c: colorPrefix, lw, ry });
    if (procRings.length > 40) procRings.shift();
  }
  function updateProcRings(dt) {
    for (let i = procRings.length - 1; i >= 0; i--) { procRings[i].life -= dt; if (procRings[i].life <= 0) procRings.splice(i, 1); }
  }
  // 流体光柱：正弦扭动的软边竖直光束（无直边、无贴图）
  function fluidColumn(cx, hw, topY, botY, glowRGB, coreRGBA, ampMul = 0.18, spd = 8) {
    const h = botY - topY; if (h <= 1) return;
    const t = time, step = (perfLevel >= 2 ? 30 : (perfLevel >= 1 ? 22 : 15));
    const amp = hw * ampMul, freq = 0.03;
    ctx.beginPath();
    for (let y = topY; y <= botY; y += step) {
      const wav = Math.sin(y * freq + t * spd) * amp + Math.sin(y * freq * 2.1 - t * spd * 0.7) * amp * 0.4;
      const xx = cx + wav - hw; (y === topY) ? ctx.moveTo(xx, y) : ctx.lineTo(xx, y);
    }
    for (let y = botY; y >= topY; y -= step) {
      const wav = Math.sin(y * freq + t * spd) * amp + Math.sin(y * freq * 2.1 - t * spd * 0.7) * amp * 0.4;
      ctx.lineTo(cx + wav + hw, y);
    }
    ctx.closePath();
    const g = ctx.createLinearGradient(cx - hw, 0, cx + hw, 0);
    g.addColorStop(0, `rgba(${glowRGB},0)`); g.addColorStop(0.5, coreRGBA); g.addColorStop(1, `rgba(${glowRGB},0)`);
    ctx.fillStyle = g; ctx.fill();
  }

  // 程序化弯刃（镰刀/月刃通用）：以原点为中心，半径 R，glow/edge 为 'r,g,b'
  function drawScytheBlade(R, glowRGB, edgeRGB, ghostA) {
    // 光晕
    const hg = ctx.createRadialGradient(0, 0, 0, 0, 0, R * 1.5);
    hg.addColorStop(0, `rgba(${glowRGB},0.5)`); hg.addColorStop(0.5, `rgba(${glowRGB},0.2)`); hg.addColorStop(1, `rgba(${glowRGB},0)`);
    ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(0, 0, R * 1.5, 0, TAU); ctx.fill();
    // 弯刃路径（外凸弧 - 内凹弧）
    const blade = (sc, fill) => {
      ctx.beginPath();
      ctx.moveTo(-R * sc, R * 0.42 * sc);
      ctx.quadraticCurveTo(0, -R * 1.18 * sc, R * sc, R * 0.42 * sc);
      ctx.quadraticCurveTo(0, -R * 0.05 * sc, -R * sc, R * 0.42 * sc);
      ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
    };
    // 残影
    if (ghostA) { ctx.globalAlpha = ghostA; ctx.save(); ctx.translate(0, R * 0.5); blade(0.96, `rgba(${glowRGB},0.8)`); ctx.restore(); ctx.globalAlpha = 1; }
    // 主刃渐变
    const lg = ctx.createLinearGradient(0, -R * 1.1, 0, R * 0.4);
    lg.addColorStop(0, `rgba(${edgeRGB},0.98)`); lg.addColorStop(0.5, `rgba(${glowRGB},0.9)`); lg.addColorStop(1, `rgba(${glowRGB},0.35)`);
    blade(1, lg);
    // 内核高光 + 前缘锐光
    blade(0.6, `rgba(${edgeRGB},0.9)`);
    ctx.globalAlpha = 0.85; ctx.lineWidth = 1.6; ctx.strokeStyle = `rgba(${edgeRGB},0.9)`;
    ctx.beginPath(); ctx.moveTo(-R, R * 0.42); ctx.quadraticCurveTo(0, -R * 1.18, R, R * 0.42); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function drawProcRings() {
    if (!procRings.length) return;
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    for (const g of procRings) {
      const k = 1 - g.life / g.maxLife;          // 0→1 扩散
      const r = g.r0 + (g.r1 - g.r0) * k;
      const a = (1 - k) * 0.9;
      ctx.globalAlpha = a; ctx.strokeStyle = g.c + a + ')'; ctx.lineWidth = g.lw * (1 - k * 0.5);
      ctx.save(); ctx.translate(g.x, g.y); ctx.scale(1, g.ry);
      ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU); ctx.stroke(); ctx.restore();
    }
    ctx.restore(); ctx.globalAlpha = 1;
  }

  function cullEnemyBullets() {

    for (let i = 0; i < enemyBullets.length && need > 0; i++) {
      const b = enemyBullets[i];

  // —— 编队入场系统：多种规律阵型，让每一波小怪入场都整齐又多变 ——
  function spawnEnemyV(type, x, y, vx, hoverY) {
    spawnEnemy(type, x, y, undefined, hoverY);
    if (vx) { const e = enemies[enemies.length - 1]; if (e) e.vx = vx; }
  }
  // 侧边入场：从左/右屏外快速突入到目标 x、目标 y
  function spawnEnemySide(type, side, homeX, baseY) {
    const startX = side < 0 ? -70 : W + 70;
    const hy = baseY > 0 ? baseY : pickHoverY(ENEMY_DEFS[type]?.tier || 2, homeX | 0);
    spawnEnemy(type, startX, baseY > 0 ? baseY : -80, side < 0 ? 'sideL' : 'sideR', hy);
    const e = enemies[enemies.length - 1];
    if (e) { e.homeX = homeX; e.baseY = hy; e.vx = 0; e.vy = 0; }
  }
  const FORMATIONS = ['row', 'vshape', 'wings', 'arc', 'diamond', 'pincer', 'leftSweep', 'rightSweep', 'bottomRise'];
  function spawnFormation(shape, type, n) {
    const margin = 66, span = W - margin * 2, cx = W * 0.5;
    const tier = ENEMY_DEFS[type]?.tier || 2;
    n = Math.max(2, n);
    if (shape === 'pincer') {                       // 双侧夹击：左右两列，高度层错开
      const half = Math.ceil(n / 2);
      for (let i = 0; i < half; i++) spawnEnemySide(type, -1, margin + 40 + i * 34, pickHoverY(tier, i));
      for (let i = 0; i < n - half; i++) spawnEnemySide(type, 1, W - margin - 40 - i * 34, pickHoverY(tier, i + half + 3));
    } else if (shape === 'leftSweep') {             // 左侧斜列扫入，逐层降低
      for (let i = 0; i < n; i++) spawnEnemySide(type, -1, margin + 30 + i * 64, pickHoverY(tier, i + 1));
    } else if (shape === 'rightSweep') {            // 右侧斜列扫入
      for (let i = 0; i < n; i++) spawnEnemySide(type, 1, W - margin - 30 - i * 64, pickHoverY(tier, i + 2));
    } else if (shape === 'bottomRise') {            // 底部多列升起，铺满中下屏
      for (let i = 0; i < n; i++) {
        const x = margin + (n === 1 ? span / 2 : span * i / (n - 1));
        spawnEnemyRise(type, x, pickHoverY(tier, i + 5));
      }
    } else if (shape === 'vshape') {                // 倒 V：中央低、两翼高
      for (let i = 0; i < n; i++) {
        const t = n === 1 ? 0 : i / (n - 1) - 0.5;
        const lane = Math.abs(t) < 0.2 ? 3 : Math.abs(t) < 0.45 ? 2 : (t < 0 ? 1 : 4);
        spawnEnemyV(type, cx + t * span, -70 - (0.5 - Math.abs(t)) * 220, 0, pickHoverY(tier, lane));
      }
    } else if (shape === 'wings') {                 // 两翼：左右两群，高度层错开
      const half = Math.ceil(n / 2);
      for (let i = 0; i < half; i++) spawnEnemyV(type, margin + i * 46, -70 - i * 40, 24, pickHoverY(tier, i));
      for (let i = 0; i < n - half; i++) spawnEnemyV(type, W - margin - i * 46, -70 - i * 40, -24, pickHoverY(tier, i + half + 2));
    } else if (shape === 'arc') {                   // 下凹弧线：两端高、中间低
      for (let i = 0; i < n; i++) {
        const t = n === 1 ? 0.5 : i / (n - 1);
        const lane = Math.round(t * (ENEMY_LANES.length - 1));
        spawnEnemyV(type, margin + span * t, -70 - Math.sin(t * Math.PI) * 150, 0, pickHoverY(tier, lane));
      }
    } else if (shape === 'diamond') {               // 菱形集群：各行不同高度层
      const rows = [1, 2, 3, 2, 1]; let placed = 0;
      for (let r = 0; r < rows.length && placed < n; r++) {
        const c = Math.min(rows[r], n - placed);
        for (let j = 0; j < c; j++) {
          const t = c === 1 ? 0 : j / (c - 1) - 0.5;
          spawnEnemyV(type, cx + t * 180, -70 - r * 52, 0, pickHoverY(tier, r + j));
          placed++;
        }
      }
    } else {                                        // row：等距横排，锯齿+分层
      for (let i = 0; i < n; i++) {
        const x = margin + (n === 1 ? span / 2 : span * i / (n - 1));
        spawnEnemyV(type, x, -70 - (i % 2) * 46, 0, pickHoverY(tier, i));
      }
    }
  }

  function spawnCircle(x, y, count, speed, color, offset = 0, r = 7, damage = 8, kind = 'orb') {
    count = Math.max(count, Math.round(count * densMul()));
    for (let i = 0; i < count; i++) {
      const a = offset + (i / count) * TAU;
      addEnemyBullet(x, y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, damage, 7, kind);
    }
  }

  function spawnFanAtPlayer(x, y, count, spread, speed, color, r = 6) {
    const base = angleTo(x, y, player.x, player.y);
    const dm = densMul();
    count = Math.max(count, Math.round(count * dm));
    const sp = spread * (count > 1 ? Math.min(1.5, dm) : 1);
    for (let i = 0; i < count; i++) {
      const t = count === 1 ? 0.5 : i / (count - 1);
      const a = base - sp / 2 + sp * t;
      addEnemyBullet(x, y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 8, 7, 'needle');
    }
  }

      addEnemyBullet(x, y, 0, speed, 8, color, 8, 8, 'orb');

  }

      addEnemyBullet(x, y, Math.cos(a) * speed, Math.sin(a) * speed, r, color, 8, 7.5, kind);

    }
  }

  function spawnSerpentineWall(speed = 235, color = '#ffd36d') {
    const step = 34;
    const gap = 118;
    const center = W * 0.5 + Math.sin(patternTimer * 2.2) * 210;
    for (let x = 34; x < W - 30; x += step) {
      if (Math.abs(x - center) < gap) continue;
      const drift = Math.sin(x * 0.035 + patternTimer * 4.1) * 48;
      const b = addEnemyBullet(x, -28, drift, speed, 7.2, color, 8, 8.5, 'orb');
      b.spin = 0;
    }
  }

  function spawnCorridorTurn(speed = 190, color = '#ffd36d') {
    const yTop = 140;
    const yMid = H * 0.66;
    const left = 96;
    const right = W - 96;
    for (let y = yTop; y < yMid; y += 38) {
      addEnemyBullet(left, y - H * 0.62, 0, speed, 8, color, 9, 9, 'orb');
      addEnemyBullet(right, y - H * 0.62, 0, speed, 8, color, 9, 9, 'orb');
    }
    for (let x = left; x < right; x += 38) {
      if (x > W * 0.36 && x < W * 0.64) continue;
      addEnemyBullet(x, -24, 0, speed, 8, color, 9, 9, 'orb');
    }
  }

  function spawnWhiteBurstLines() {
    const baseY = boss ? boss.y + 30 : 210;
    for (let i = 0; i < 30; i++) {
      const x = 34 + i * ((W - 68) / 29);
      const a = Math.PI * 0.5 + Math.sin(i * 1.7 + boss.t) * 0.22;
      addEnemyBullet(x, baseY + rand(-18, 36), Math.cos(a) * 345, Math.sin(a) * 345, 4.2, '#f6fbff', 9, 5.8, 'needle');
    }
  }

  function addLaserWarning(x1, y1, x2, y2, width = 34, delay = 1.0, duration = 0.75) {
    warnings.push({ type: 'laser', x1, y1, x2, y2, width, life: delay, maxLife: delay, duration });
    playSfx('warning', 0.34, 0.35);
  }

  function addCircleWarning(x, y, r, delay = 0.95) {
    warnings.push({ type: 'circle', x, y, r, life: delay, maxLife: delay });
  }

  function pointLineDistance(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const len2 = dx * dx + dy * dy || 1;
    let t = ((px - x1) * dx + (py - y1) * dy) / len2;
    t = clamp(t, 0, 1);
    const x = x1 + dx * t, y = y1 + dy * t;
    return Math.hypot(px - x, py - y);
  }

  function useBeam() {
    if (state === 'title' || state === 'win' || state === 'lose') return;
    if (motherLifeActive()) {
      castLifeResonance();
      return;
    }
    if (player.beamCd > 0) return;
    // 夜裁专属小技能：浮游长剑·六连射（角色周围浮现长剑，锋利快速发射、穿透）
    if (reaverActive()) {
      player.beamCd = 6.5;
      nrSwordSalvo = 6; nrSwordTimer = 0; nrSwordSide = 1;
      screenShake = 7; setFlash(0.3, curChar().auraColor);
      if (audio.nrRingCast) audio.nrRingCast();
      return;
    }
    player.beamCd = 5.0;
    playerBeam = { x: player.x, y: player.y, life: 0.62, maxLife: 0.62, width: 118 };
    screenShake = 5;
    audio.skill();
    addSpriteFx('vfxPlayerBeam', player.x, player.y - 160, 260, 0.42, 0, 0.1, 0.54);
    if (boss && state === 'boss') hitBoss(360, player.x, boss.y, true);
    enemies.forEach(e => { if (Math.abs(e.x - player.x) < 70) e.hp -= 160; });
    for (let i = 0; i < 42; i++) addParticle(player.x + rand(-34, 34), player.y - i * 29, rand(-44, 44), rand(-260, -80), rand(0.18, 0.52), rand(2, 8), i % 3 ? '#c8f4ff' : '#f4e5ff', true);
  }

  function useBomb() {
    if (player.energy < player.maxEnergy || player.bombCd > 0 || state === 'title' || state === 'win' || state === 'lose') return;
    player.energy = 0;
    player.bombCd = 1.3;
    skillCutin = { life: 0.95, maxLife: 0.95, key: curChar().cutin, name: curChar().name, aura: curChar().auraColor, title: '月 蚀 · 终 章' };

    if (curChar().ultKind === 'wombOfAll') {
      player.bombCd = MOTHER_LIFE.ultimateDuration;
      skillCutin.title = '众 生 胎 宫';
      skillCutin.life = skillCutin.maxLife = 0.32;
      skillCutin.compact = true;
      if (!castWombOfAll()) { player.energy = player.maxEnergy; player.bombCd = 0; }
      return;
    }

    // —— 伊丽莎白「血蚀」：向前发射巨大赤红冲击波（全屏多列激光） ——
    if (curChar().ultKind === 'crimsonBeam') {
      player.bombCd = 1.6;
      ultimateEffect = { x: player.x, y: player.y, life: 1.2, maxLife: 1.2, fullLaser: true };
      flash = 0.8; screenShake = 26; audio.bomb();
      const clearCount = enemyBullets.length;
      enemyBullets.length = 0; warnings.length = 0; lasers.length = 0;
      const cols = 9;
      for (let c = 0; c < cols; c++) {
        const lx = (W / (cols + 1)) * (c + 1);
        enemies.forEach(e => { if (Math.abs(e.x - lx) < W / (cols + 1)) e.hp -= 900; });
      }
      enemies.forEach(e => { e.hp -= 300; });
      if (boss && state === 'boss') hitBoss(2600, boss.x, boss.y, true);
      for (let i = 0; i < 160; i++) addParticle(rand(0, W), rand(0, player.y), rand(-40, 40), rand(-300, -60), rand(0.3, 0.9), rand(2, 9), i % 2 ? '#ff6e88' : '#ffd0d6', true);
      dmgText(W * 0.5, H * 0.42, `血蚀 · 始祖之怒 ×${clearCount}`, '#ffd0d6', 32);
      return;
    }

    // —— 雅努西娅「坠月之巅」：制造坠落之月黑暗幻影，巨额AoE ——
    if (curChar().ultKind === 'fallMoon') {
      player.bombCd = 1.8;
      ultimateEffect = { x: W * 0.5, y: H * 0.38, life: 2.2, maxLife: 2.2, fallMoon: true };
      flash = 0.7; screenShake = 30; audio.bomb();
      const clearCount = enemyBullets.length;
      enemyBullets.length = 0; warnings.length = 0; lasers.length = 0;
      // 坠月冲击：全场巨额伤害
      enemies.forEach(e => { e.hp -= 1400; });
      if (boss && state === 'boss') hitBoss(2400, boss.x, boss.y, true);
      for (let i = 0; i < 150; i++) { const a = rand(0, TAU), s = rand(60, 520); addParticle(W * 0.5, H * 0.4, Math.cos(a) * s, Math.sin(a) * s, rand(0.4, 1.1), rand(3, 12), i % 2 ? '#ff8a6a' : '#ff5a6e', true); }
      dmgText(W * 0.5, H * 0.5, `坠月之巅 ×${clearCount}`, '#ffd0d6', 32);
      return;
    }

    // —— 夜裁「终焉裁界」：裂界黑洞三段式（展开→吸附吞噬→星爆裁决） ——
    if (curChar().ultKind === 'voidJudgement') {
      player.bombCd = 2.2;
      const tx = (boss && state === 'boss') ? boss.x : player.x;
      const ty = (boss && state === 'boss') ? boss.y + 20 : H * 0.34;
      nrVoid.active = true; nrVoid.phase = 'open'; nrVoid.t = 0; nrVoid.x = tx; nrVoid.y = ty; nrVoid.absorbed = 0;
      triggerHitStop(0.22); flash = 0.6; screenShake = 14; if (audio.nrVoidOpen) audio.nrVoidOpen();
      dmgText(tx, ty - 40, '终焉裁界', '#cfe0ff', 34);
      return;
    }

    // —— 其余角色（安娜）：月蚀清弹（清屏炸弹） ——
    ultimateEffect = { x: player.x, y: player.y, life: 1.05, maxLife: 1.05 };
    addSpriteFx('vfxClearBullets', player.x, player.y, 520, 0.82, 0, 0.72, 0.62);
    flash = 0.75;
    screenShake = 22;
    audio.bomb();
    const clearCount = enemyBullets.length;
    enemyBullets.length = 0;
    warnings.length = 0;
    lasers.length = 0;
    if (boss && state === 'boss') hitBoss(900, boss.x, boss.y, true);
    enemies.forEach(e => { e.hp -= 450; });
    for (let i = 0; i < 120; i++) {
      const a = rand(0, TAU), s = rand(70, 480);
      addParticle(player.x, player.y, Math.cos(a) * s, Math.sin(a) * s, rand(0.35, 1.1), rand(3, 13), i % 2 ? '#f2d6ff' : '#9bdcff', true);
    }
    dmgText(W * 0.5, H * 0.44, `月蚀清弹 ×${clearCount}`, '#f6d6ff', 34);
  }

  function hitBoss(amount, x, y, big = false) {
    if (!boss || boss.inv > 0 || boss.dead) return;
    amount = amount * grindDmg();
    // DPS 上限：单位时间内最多扣除 dmgCredit，爆发被摊平 → Boss 不会被秒，约 20-40 秒清完
    if (boss.dmgCredit !== undefined) {
      const actual = Math.min(amount, boss.dmgCredit);
      boss.dmgCredit -= actual;
      if (actual <= 0.5) { boss.hitFlash = 0.16; if (Math.random() < 0.3) addSpriteFx('vfxBossHit', x, y, 50, 0.18, rand(0, TAU), 0.2, 0.4); return; } // 信用耗尽：格挡，不掉血
      amount = actual;
    }
    boss.hp = Math.max(0, boss.hp - amount);
    boss.hitFlash = 0.16;
    playSfx('enemyHit', big ? 0.7 : 0.4, 0.06);   // 命中 Boss 的打击反馈（节流防刷屏）
    score += Math.floor(amount * 1.5);
    player.combo += 1;
    comboTimer = 2.0;
    bossDamageTicker++;
    if (big || Math.random() < 0.16) addSpriteFx(big ? 'vfxBossBreak' : 'vfxBossHit', x, y, big ? 180 : 74, big ? 0.46 : 0.22, rand(0, TAU), big ? 0.5 : 0.25, big ? 0.74 : 0.62);
    if (!big && bossDamageTicker % 4 === 0) {
      const pop = Math.floor(amount * rand(420, 780));
      dmgText(x + rand(-95, 95), y + rand(-46, 34), pop, '#ffb45f', rand(24, 34));
    }
    if (big || amount >= 150) dmgText(x + rand(-20, 20), y + rand(-25, 30), Math.floor(amount), big ? '#fff2a8' : '#e5fbff', big ? 34 : 22);
    if (boss.hp <= 0) defeatBoss();
  }

  function defeatBoss() {
    if (!boss || boss.dead) return;
    boss.dead = true;
    bossesCleared++;
    state = 'bossOutro';
    stateTimer = 0;
    screenShake = 30;
    flash = 1;
    audio.bossBoom();
    addSpriteFx('vfxExplosionLarge', boss.x, boss.y + 12, 390, 1.15, 0, 0.62, 0.88);
    for (let i = 0; i < 180; i++) {
      const a = rand(0, TAU), s = rand(40, 520);
      addParticle(boss.x, boss.y, Math.cos(a) * s, Math.sin(a) * s, rand(0.5, 1.8), rand(3, 16), i % 3 ? '#ffd983' : '#c199ff', true);
    }
    enemyBullets.length = 0;
    warnings.length = 0;
    lasers.length = 0;
    // Boss 击破奖励：必掉一个插件（终极 Boss 更偏向掉七神武）+ 资源
    addItem(boss.x, boss.y, (bossKind === 'finalboss' || bossKind === 'seraph') ? 'plugin_qishenwu' : randPlugin());
    addItem(boss.x - 40, boss.y, 'heal');
    addItem(boss.x + 40, boss.y, Math.random() < 0.5 ? 'life' : 'bomb');
    if (bossKind === 'finalboss') {
      setMessage('Victory · 第一章 · 月蚀终幕', 999);
    } else if (bossKind === 'midboss') {
      setMessage('守卫被击破！', 2.2);
      playSfx('bossPhase', 0.5, 0.6);
    } else if (bossKind === 'seraph') {
      setMessage('六翼炽天使坠落……极光散尽', 2.2);
      playSfx('bossPhase', 0.55, 0.72);
    } else if (bossKind === 'eclipseboss') {
      setMessage('蚀环守望者陨落……月蚀深处展开', 2.2);
      playSfx('bossPhase', 0.55, 0.7);
    } else {
      setMessage('Boss被击破！', 2.2);
      playSfx('bossPhase', 0.55, 0.7);
    }
  }

  // Short death/transition beat after a boss falls, then continue the chapter.
  function updateBossOutro(dt) {
    if (boss) {
      boss.t += dt;
      boss.y = lerp(boss.y, boss.y + 40, 0.02);
    }
    if (stateTimer < 1.4 && tickEvery(stateTimer, dt, 0.2) && boss) {
      addSpriteFx('vfxBossBreak', boss.x + rand(-90, 90), boss.y + rand(-70, 70), 130, 0.42, rand(0, TAU), 0.4, 0.7);
      burst(boss.x + rand(-60, 60), boss.y + rand(-40, 40), Math.random() < 0.5 ? '#ffd983' : '#c199ff', 14, 240, true);
      screenShake = Math.max(screenShake, 10);
    }
    if (stateTimer > 2.6) {
      // Stage progression mapping
      const stageProgression = {
        'stage1': 'stage2',
        'stage2': 'stage3',
        'stage3': 'stage4',
        'stage4': 'stage5',
        'stage5': 'stage6',
        'stage6': 'stage7',
        'stage7': 'stage8',
        'stage8': 'stage9',
        'stage9': 'stage10',
        'stage10': null  // Final stage leads to loop
      };

      const stageMessages = {
        'stage2': '第二幕：月蚀回廊',
        'stage3': '第三幕：极光圣域',
        'stage4': '第四幕：银冠圣域',
        'stage5': '第五幕：幽冥深渊',
        'stage6': '第六幕：终焉之境',
        'stage7': '第七幕：虚空裂隙',
        'stage8': '第八幕：混沌之核',
        'stage9': '第九幕：血月回廊',
        'stage10': '第十幕：终焉月蚀',
      };
      
      if (bossKind === 'finalboss') {
        // Final boss defeated - loop to stage1 with increased difficulty
        loopCount++;
        segment = 'stage1';
        state = 'mobs';
        waveIndex = 0;
        extraSpawned = 0;
        stateTimer = 0;
        spawnTimer = 1.8;
        boss = null;
        bossPhase = -1;
        bossesCleared++;
        player.lives = Math.min(6, player.lives + 1);
        player.hp = player.maxHp;
        setMessage('轮回 ' + (loopCount + 1) + ' · 月蚀更深，强度大幅提升！', 3.2);
      } else {
        // Progress to next stage
        const nextStage = stageProgression[segment];
        if (nextStage) {
          segment = nextStage;
          state = 'mobs';
          waveIndex = 0;
          extraSpawned = 0;
          stateTimer = 0;
          spawnTimer = 1.6;
          boss = null;
          bossPhase = -1;
          setMessage(stageMessages[nextStage] || '下一幕开始', 2.6);
        } else {
          // Reached end of stage6 without finalboss - loop anyway
          loopCount++;
          segment = 'stage1';
          state = 'mobs';
          waveIndex = 0;
          extraSpawned = 0;
          stateTimer = 0;
          spawnTimer = 1.8;
          boss = null;
          bossPhase = -1;
          bossesCleared++;
          player.lives = Math.min(6, player.lives + 1);
          player.hp = player.maxHp;
          setMessage('轮回 ' + (loopCount + 1) + ' · 月蚀更深，强度大幅提升！', 3.2);
        }
      }
      flash = 1;
      playSfx('victory', 0.6, 1);
    }
  }

  function damagePlayer(amount) {
    if (player.inv > 0 || state === 'win') return;
    if (motherLifeActive() && motherLifeState.ultimate.active) return;
    if (motherLifeActive() && player.berserk > 0) amount *= 0.8;
    player.hp = Math.max(0, player.hp - amount);
    player.inv = 1.3;   // 受击后短暂无敌，防止连续掉血
    player.combo = 0;
    screenShake = 11;
    flash = 0.18;
    audio.hit();
    burst(player.x, player.y, '#ff7b9d', 24, 210, true);
    dmgText(player.x, player.y - 30, `-${amount}`, '#ff9cb0', 25);
    // 被击中会损失部分火力等级（STG 惯例：死亡跌火力），但不至于一击毙命
    player.power = clamp(player.power - 18, 0, MAX_POWER);
    if (player.hp <= 0) {
      if (player.lives > 0) {
        // 复活：清空来袭弹幕、给一段无敌、保留大部分火力
        player.lives--;
        player.hp = player.maxHp;
        if (motherLifeActive()) resetMotherLifeState();
        player.inv = 2.6;
        player.power = clamp(player.power - 12, 0, MAX_POWER);
        flash = 0.6;
        screenShake = 20;
        enemyBullets.length = 0;
        warnings.length = 0;
        lasers.length = 0;
        addSpriteFx('vfxClearBullets', player.x, player.y, 460, 0.7, 0, 0.6, 0.6);
        setMessage('复活！剩余 ' + player.lives, 1.6);
        playSfx('skillBomb', 0.4, 0.3);
        return;
      }
      state = 'lose';
      stateTimer = 0;
      setMessage('Game Over · 按 R 重开', 999);
      playSfx('gameover', 0.62, 1);
      enemyBullets.length = 0;
      warnings.length = 0;
      lasers.length = 0;
    }
  }

  function update(dt) {
    if (paused) {
      audio.update(dt, false);
      return;
    }
    time += dt;
    stateTimer += dt;
    titlePulse += dt;
    screenShake = Math.max(0, screenShake - 38 * dt);
    flash = Math.max(0, flash - 1.8 * dt);
    messageTimer = Math.max(0, messageTimer - dt);
    comboTimer = Math.max(0, comboTimer - dt);
    if (comboTimer <= 0) player.combo = 0;

    updateBackground(dt);
    audio.update(dt, state === 'boss' && bossPhase >= 2);
    if (musicStarted && !musicMuted) syncBgmTrack();
    if (bgmEl && musicStarted && !musicMuted) bgmEl.volume = lerp(bgmEl.volume, state === 'boss' ? 0.64 : 0.52, 0.035);

    if (state === 'title') {
      updateParticles(dt);
      updateSpriteFx(dt);
      return;
    }

    updatePlayer(dt);
    updatePlayerShots(dt);
    updateGiantBirds(dt);
    updateItems(dt);
    updateEnemies(dt);
    updateEnemyBullets(dt);
    updateWarnings(dt);
    updateLasers(dt);
    updateParticles(dt);
    updateSpriteFx(dt);
    updateDamageTexts(dt);
    updateQishenwu(dt);
    updateWingmen(dt);

    if (state === 'mobs' || state === 'boss' || state === 'bossIntro' || state === 'bossOutro') elapsed += dt;
    if (state === 'mobs') updateMobStage(dt);
    if (state === 'bossIntro') updateBossIntro(dt);
    if (state === 'boss') updateBoss(dt);
    if (state === 'bossOutro') updateBossOutro(dt);
    if (state === 'win' || state === 'lose') {
      // slow cleanup after result
      enemyBullets.length = Math.min(enemyBullets.length, 80);
    }
  }

  function updateBackground(dt) {
    for (const s of stars) {
      s.y += s.sp * dt * (state === 'boss' ? 1.22 : 0.75);
      s.tw += dt * rand(0.4, 1.2);
      if (s.y > H + 4) { s.y = -4; s.x = rand(0, W); }
    }
    for (const f of fog) {
      f.y += f.sp * dt;
      f.x += Math.sin(time * 0.2 + f.r) * 3 * dt;
      if (f.y - f.r > H) { f.y = -f.r; f.x = rand(-120, W + 120); }
    }
  }

  // ===== 月泪·圣羽僚机系统（任意角色可装备）=====
  function wingmanActive() { return wingEnabled('moonfeather'); }
  function syncWingmen() {
    if (wingmanActive()) {
      if (wingmen.length === 0) {
        for (const side of [-1, 1]) wingmen.push({ side, x: player.x + side * 80, y: player.y - 60, floatT: rand(0, TAU), fireT: 0.3 + (side > 0 ? 0.12 : 0), spawnT: 0.6, rot: 0 });
        if (audio.wmSpawn) audio.wmSpawn();
      }
    } else { wingmen.length = 0; }
  }
  function updateWingmen(dt) {
    if (!wingmanActive()) { if (wingmen.length) wingmen.length = 0; return; }
    if (wingmen.length === 0) syncWingmen();
    const ber = player.berserk > 0;
    const firing = (state === 'mobs' || state === 'boss');
    const lv = powerLevel();
    for (const w of wingmen) {
      // 弹性跟随 + 待机浮动
      const follow = companionFollowOffset('moonfeather', w.side, ber);
      const tx = player.x + follow.x, ty = player.y + follow.y;
      w.x += (tx - w.x) * 0.12; w.y += (ty - w.y) * 0.12;
      w.floatT += dt; w.rot += dt * 0.6;
      w.renderY = w.y + Math.sin(w.floatT * 2.5) * 4;
      if (w.spawnT > 0) { w.spawnT -= dt; continue; }
      // 机体环绕微光羽（柔化静态贴图边缘，增加生命感）
      if (Math.random() < (ber ? 0.5 : 0.28)) {
        const oa = rand(0, TAU), or = rand(14, 26);
        addParticle(w.x + Math.cos(oa) * or, w.renderY + Math.sin(oa) * or, Math.cos(oa) * 12, Math.sin(oa) * 12 + 18, rand(0.3, 0.6), rand(1.2, 2.6), ber ? '#ffd98a' : '#cfeaff', true);
      }
      // 暴走变形：激光束（持续判定），平时收束
      w.laserLvl = ber ? Math.min(1, (w.laserLvl || 0) + dt * 5) : Math.max(0, (w.laserLvl || 0) - dt * 5);
      if (ber && firing) {
        const mx = w.x, my = w.renderY - 12;
        const halfW = 18 + lv * 2;            // 激光半宽（随等级变粗）
        w.laserTick = (w.laserTick || 0) - dt;
        if (w.laserTick <= 0) {
          w.laserTick = 0.05;                 // 每 0.05s 一次贯穿判定
          const dmg = (7 + lv * 3) * berserkDmg() * grindDmg();

  function syncNrBlades() {

        const a = Math.sin(t * Math.PI);   // 0→1→0 生命周期包络
        const bx = f.x, by = f.y;          // 光束底部 Y（僚机位置）

        ctx.save(); ctx.translate(bx, by);

        // ===== A. 底部金色发散发光圈（加强版）=====

        haloG.addColorStop(0.45, 'rgba(255,218,110,' + (a * 0.25).toFixed(3) + ')');
        haloG.addColorStop(0.75, 'rgba(255,205,95,' + (a * 0.10).toFixed(3) + ')');

        coreG.addColorStop(0.7, 'rgba(255,230,140,' + (a * 0.28).toFixed(3) + ')');
        coreG.addColorStop(1, 'rgba(255,218,110,0)');

        ctx.beginPath(); ctx.arc(0, 2, baseR * 0.52, 0, TAU); ctx.fill();

        if (perfLevel < 2) {

          for (let mi = 0; mi < 10; mi++) {

  // —— 小技能·天使降临（Q 键手动）：脱手召唤 + 审判领域 + 自动天罚 ——

    }
    const scored = [];
    for (const e of enemies) {
      if (!e || !scAngelPointVisible(e.x, e.y, e.r || 0)) continue;
      if (!scAngelTargetInDomain(e.x, e.y, (e.r || 10) + 36)) continue;
      const d = Math.hypot(e.x - scField.x, e.y - scField.y);
      const score = (e.hp || 1) * 1.5 + (e.r || 0) * 10 - d * 0.22 + Math.random() * 8;
      scored.push({ score, target: { x: e.x, y: e.y, r: e.r || 14, enemy: e } });
    }
    scored.sort((a, b) => b.score - a.score);
    for (const s of scored) {
      if (targets.length >= limit) break;
      targets.push(s.target);
    }
    return targets;
  }
  function scAngelSpawnMeteor(x, y, big = false, finisher = false) {

    const startY = Math.min(finisher ? -210 : -86, impactY - rand(finisher ? 650 : (big ? 390 : 270), finisher ? 820 : (big ? 560 : 410)));

      if ((b.finisher && scAngelTargetInDomain(e.x, e.y, e.r || 0)) || dist2(e.x, e.y, damageX, damageY) <= rr * rr) {

        e.hitFlash = b.finisher ? 0.34 : (b.big ? 0.22 : 0.16);
      }
    }
    if (boss && state === 'boss' && !boss.dead) {
      const rr = aoe + (boss.r || 0);
      if (scAngelPointVisible(boss.x, boss.y, boss.r || 0) && ((b.finisher && scAngelTargetInDomain(boss.x, boss.y, boss.r || 0)) || dist2(boss.x, boss.y, damageX, damageY) <= rr * rr)) hitBoss(dmg * (b.finisher ? 0.92 : 0.78), x, y, true);
    }
    scField.impacts.push({ x, y, t: 0, life: b.finisher ? 2.25 : (b.big ? 1.78 : 1.48), maxLife: b.finisher ? 2.25 : (b.big ? 1.78 : 1.48), big: b.big, finisher: b.finisher, seed: b.seed, angle: b.angle });
    if (scField.impacts.length > (perfLevel >= 2 ? 16 : 32)) scField.impacts.shift();
    if (b.finisher) {
      scFx.push({ type: 'shock', x, y, r0: 68, r1: (scField.r || 230) * 1.12, life: 0.72, maxLife: 0.72 });
    }
    const pn = b.finisher ? (perfLevel >= 2 ? 34 : 92) : (perfLevel >= 2 ? (b.big ? 16 : 10) : (b.big ? 42 : 28));
    for (let q = 0; q < pn; q++) {
      const a = rand(0, TAU), s = rand(70, b.finisher ? 620 : (b.big ? 420 : 300));
      addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s * (b.finisher ? 0.62 : 0.48) - rand(15, b.finisher ? 180 : 90), rand(0.28, b.finisher ? 1.08 : 0.74), rand(2.0, b.finisher ? 8.2 : (b.big ? 5.6 : 4.2)), Math.random() < 0.45 ? '#fff6d8' : '#ffd66a', true);
    }
    screenShake = Math.max(screenShake, b.finisher ? 12 : (b.big ? 6 : 3));
    setFlash && setFlash(b.finisher ? 0.16 : (b.big ? 0.09 : 0.045), '255,235,170');

  // ===================================================================
  //  夜棺巡礼·八芒浮骸  脱手浮游炮僚机  —— 逻辑与渲染
  // ===================================================================
  function ncOver() { return player.berserk > 0; }              // 暴走联动玩家金色暴走
  function ncFiring() { return state === 'mobs' || state === 'boss' || state === 'bossIntro'; }

  // 召唤/重建 8 枚浮游炮（围绕游荡中心散开登场）
  function syncNcDrones() {
    ncDrones.length = 0;
    ncState.mode = 'dash'; ncState.switchCd = 0; ncState.switchT = 0; ncState.target = null;
    ncState.swarmX = W * 0.5; ncState.swarmY = H * 0.30; ncState.swarmVX = rand(-70, 70); ncState.swarmVY = rand(30, 70);
    ncState.summonT = 0.6; ncState.formationIndex = 0; ncState.formationPhase = rand(0, TAU); ncState._wasOver = false;
    for (let i = 0; i < NC.count; i++) {
      const a = i / NC.count * TAU;
      ncDrones.push({
        index: i,
        x: ncState.swarmX + Math.cos(a) * 30, y: ncState.swarmY + Math.sin(a) * 30,
        vx: 0, vy: 0, angle: a, history: [],
        state: 'cruise', dashCd: rand(0.1, 0.7), dashT: 0, target: null,
        fireT: rand(0, NC.laserTick), muzzleFlash: 0, coreT: rand(0, TAU),
        slotX: ncState.swarmX, slotY: ncState.swarmY, born: time,
      });
    }
  }

  // 可被锁定的目标列表（在场敌人 + Boss）
  function ncIsValidEnemy(e) { return e && e.hp > 0 && e.y > -8 && e.y < H + 40; }
  function ncBossTarget() { return (boss && !boss.dead && boss.y > -20 && (state === 'boss' || state === 'bossIntro')) ? boss : null; }

  // 冲撞目标：优先敌群密集区（含 Boss 强权重）
  function ncSelectCluster() {
    const bt = ncBossTarget();
    let best = null, bestScore = -1;
    for (const e of enemies) {
      if (!ncIsValidEnemy(e)) continue;
      let n = 0;
      for (const o of enemies) { if (o !== e && ncIsValidEnemy(o) && dist2(e.x, e.y, o.x, o.y) < 120 * 120) n++; }
      const score = n * 3 + (e.tier >= 4 ? 5 : e.tier >= 3 ? 3 : 0) + 1;
      if (score > bestScore) { bestScore = score; best = e; }
    }
    if (bt) { const bs = 6; if (bs >= bestScore || !best) return { x: bt.x, y: bt.y }; }
    return best ? { x: best.x, y: best.y } : null;
  }

  // 激光目标：单体最高威胁（Boss > 精英 > 高血量 > 高 tier）
  function ncThreat(e) { return e.hp * 0.4 + (e.maxHp || e.hp) * 0.3 + (e.tier >= 4 ? 3000 : e.tier >= 3 ? 1200 : 0); }
  function ncSelectLaserTarget() {
    const bt = ncBossTarget();
    if (bt) return bt;
    let best = null, bestT = -1;
    for (const e of enemies) { if (!ncIsValidEnemy(e)) continue; const t = ncThreat(e); if (t > bestT) { bestT = t; best = e; } }
    return best;
  }

  const NC_FORMATION_NAMES = ['wideOctagon', 'doubleCrescent', 'pincer', 'diagonalX', 'spiral'];
  function ncAdvanceLaserFormation(initial = false, emitFx = true) {
    ncState.formationIndex = initial ? Math.floor(rand(0, NC_FORMATION_NAMES.length)) : (ncState.formationIndex + 1) % NC_FORMATION_NAMES.length;
    ncState.formationPhase = rand(0, TAU);
    ncState.laserReshuffleT = ncOver() ? NC.laserReshuffleOver : NC.laserReshuffle;
    if (emitFx) {
      const c = ncSwarmCenter();
      ncFx.push({ type: 'switch', x: c.x, y: c.y, life: 0.32, maxLife: 0.32, seed: rand(0, TAU) });
    }
  }
  function ncFormationRaw(type, tx, ty, i, count) {
    const phase = ncState.formationPhase;
    if (type === 0) {
      const a = i / count * TAU - Math.PI / 2 + ncState.laserSpin + phase;
      const r = 292 + (i % 2) * 26;
      return { x: tx + Math.cos(a) * r, y: ty + Math.sin(a) * r * 0.86 };
    }
    if (type === 1) {
      const side = i < count / 2 ? -1 : 1, j = i % (count / 2);
      const a = -Math.PI / 2 + (j - 1.5) * 0.42;
      const r = 276 + Math.abs(j - 1.5) * 22;
      return { x: tx + side * (190 + Math.cos(a) * r * 0.42), y: ty + Math.sin(a) * r };
    }
    if (type === 2) {
      const side = i < count / 2 ? -1 : 1, row = i % (count / 2);
      return { x: tx + side * (278 + Math.abs(row - 1.5) * 18), y: ty + (row - 1.5) * 92 };
    }
    if (type === 3) {
      const pts = [[-1,-1],[-0.42,-0.42],[0.42,0.42],[1,1],[1,-1],[0.42,-0.42],[-0.42,0.42],[-1,1]];
      const p = pts[i % pts.length], ca = Math.cos(phase * 0.35), sa = Math.sin(phase * 0.35);
      const px = p[0] * 235, py = p[1] * 235;
      return { x: tx + px * ca - py * sa, y: ty + px * sa + py * ca };
    }
    const golden = Math.PI * (3 - Math.sqrt(5));
    const a = phase + ncState.laserSpin * 0.55 + i * golden;
    const r = NC.formationRadiusMin + (i % 4) * 28;
    return { x: tx + Math.cos(a) * r, y: ty + Math.sin(a) * r };
  }
  function ncKeepFormationDistance(tx, ty, rawX, rawY) {
    let x = clamp(rawX, 40, W - 40), y = clamp(rawY, 60, H - 120);
    let dx = x - tx, dy = y - ty, d = Math.hypot(dx, dy);
    if (d >= NC.formationMinDistance) return { x, y };
    const a = d > 1 ? Math.atan2(dy, dx) : ncState.formationPhase;
    x = clamp(tx + Math.cos(a) * NC.formationMinDistance, 40, W - 40);
    y = clamp(ty + Math.sin(a) * NC.formationMinDistance, 60, H - 120);
    if (Math.hypot(x - tx, y - ty) >= NC.formationMinDistance - 2) return { x, y };
    const candidates = [
      { x: 40, y: 60 }, { x: W - 40, y: 60 }, { x: 40, y: H - 120 }, { x: W - 40, y: H - 120 },
      { x: 40, y: clamp(ty, 60, H - 120) }, { x: W - 40, y: clamp(ty, 60, H - 120) },
      { x: clamp(tx, 40, W - 40), y: 60 }, { x: clamp(tx, 40, W - 40), y: H - 120 },
    ];
    let best = candidates[0], bestScore = -Infinity;
    for (const c of candidates) {
      const cd = Math.hypot(c.x - tx, c.y - ty);
      const dir = ((c.x - tx) * Math.cos(a) + (c.y - ty) * Math.sin(a)) / Math.max(1, cd);
      const score = cd + dir * 80;
      if (score > bestScore) { bestScore = score; best = c; }
    }
    return best;
  }
  function ncFormationSlot(tx, ty, i, count) {
    const raw = ncFormationRaw(ncState.formationIndex, tx, ty, i, count);
    return ncKeepFormationDistance(tx, ty, raw.x, raw.y);
  }

  // E 切换：冲撞 ↔ 激光（局部聚拢、爆发、展开三段重组过渡）
  function ncToggleMode() {
    if (!ncActive() || ncDrones.length === 0) return;
    if (ncState.switchCd > 0) return;
    const fromMode = ncState.mode;
    const center = ncSwarmCenter();
    ncState.switchCd = NC.switchCd;
    ncState.switchT = NC.switchDuration;
    ncState.mode = (ncState.mode === 'dash') ? 'laser' : 'dash';
    if (ncState.mode === 'laser') {
      ncState.target = ncSelectLaserTarget();
      ncState.laserSpin = rand(0, TAU); ncState.laserReshuffleT = NC.laserReshuffle;
      ncAdvanceLaserFormation(true, false);
      for (const d of ncDrones) { d.fireT = rand(0, NC.laserTick); }
    } else {
      ncState.target = null;
      for (const d of ncDrones) { d.state = 'cruise'; d.dashCd = rand(0, 0.35); }
    }
    ncFx.push({
      type: 'modeSwitch',
      x: center.x,
      y: center.y,
      life: NC.switchDuration,
      maxLife: NC.switchDuration,
      fromMode,
      toMode: ncState.mode,
      seed: rand(0, TAU),
    });
    const color = ncState.mode === 'laser' ? '#b48cff' : '#75c8ff';
    const particleCount = perfLevel >= 2 ? 12 : perfLevel === 1 ? 20 : 30;
    for (let i = 0; i < particleCount; i++) {
      const a = i / particleCount * TAU + rand(-0.12, 0.12);
      const radius = rand(18, 62);
      const speed = rand(55, 190);
      addParticle(
        center.x + Math.cos(a) * radius,
        center.y + Math.sin(a) * radius * 0.7,
        Math.cos(a) * speed,
        Math.sin(a) * speed,
        rand(0.28, 0.62),
        rand(1.2, 3.6),
        i % 4 === 0 ? '#f5f2ff' : color,
        true
      );
    }
    screenShake = Math.max(screenShake, 1.4);
    if (audio.ncSwitch) audio.ncSwitch();
  }

  function ncSwarmCenter() {
    if (ncDrones.length === 0) return { x: ncState.swarmX, y: ncState.swarmY };
    let sx = 0, sy = 0; for (const d of ncDrones) { sx += d.x; sy += d.y; } return { x: sx / ncDrones.length, y: sy / ncDrones.length };
  }

  // 对单个目标结算伤害（Boss 走 hitBoss，杂兵直接扣血）
  function ncDamage(t, dmg) {
    if (!t) return;
    if (t === boss) hitBoss(dmg, boss.x, boss.y, false);          // hitBoss 内部统一乘 grindDmg
    else { t.hp -= dmg * grindDmg(); t.hitFlash = Math.max(t.hitFlash || 0, 0.12); }
  }

  // 冲撞经过：对范围内敌人造成 AOE + 减速 + 命中爆点（每枚浮游炮对同一敌人有命中间隔）
  function ncDashHits(d, isOver) {
    const R = isOver ? NC.aoeROver : NC.aoeR;
    const dmg = ncDashDmg() * (isOver ? 3.5 : 1.0) * berserkDmg();
    const hitGap = isOver ? NC.hitGapOver : NC.hitGap;
    const slow = isOver ? NC.slowRateOver : NC.slowRate;
    const slowDur = isOver ? NC.slowDurOver : NC.slowDur;
    let hitAny = false;
    const R2 = R * R;
    for (const e of enemies) {
      if (!ncIsValidEnemy(e)) continue;
      if (dist2(e.x, e.y, d.x, d.y) > R2) continue;
      if (!e._ncHit) e._ncHit = [];
      if (time - (e._ncHit[d.index] || -9) < hitGap) continue;
      e._ncHit[d.index] = time;
      e.hp -= dmg * grindDmg(); e.hitFlash = Math.max(e.hitFlash || 0, 0.16);
      e._ncSlowT = slowDur; e._ncSlow = slow;       // 减速：由敌人移动处读取（updateEnemies 会乘速度）
      hitAny = true;
    }
    const bt = ncBossTarget();
    if (bt && dist2(bt.x, bt.y, d.x, d.y) < R2) {
      if (!bt._ncHit) bt._ncHit = [];
      if (time - (bt._ncHit[d.index] || -9) >= hitGap) { bt._ncHit[d.index] = time; hitBoss(dmg, bt.x, bt.y, false); hitAny = true; }
    }
    if (hitAny) { spawnNcImpact(d.x, d.y, isOver); screenShake = Math.max(screenShake, isOver ? 3 : 1.6); if (isOver) triggerHitStop(0.012); }
  }

  // 冲撞命中爆点（中心白蓝 + 紫黑外圈 + 玻璃碎片 + 暗紫减速残留圈）
  function spawnNcImpact(x, y, isOver) {
    ncFx.push({ type: 'impact', x, y, life: 0.34, maxLife: 0.34, scale: isOver ? 1.4 : 1.0, seed: rand(0, TAU) });
    ncFx.push({ type: 'slowfield', x, y, life: isOver ? 2.2 : 1.5, maxLife: isOver ? 2.2 : 1.5, scale: isOver ? 1.3 : 1.0, seed: rand(0, TAU) });
    if (perfLevel < 2) ncFx.push({ type: 'shards', x, y, life: 0.4, maxLife: 0.4, scale: isOver ? 1.5 : 1.05, seed: rand(0, TAU) });
    if (perfLevel < 1) ncFx.push({ type: 'smoke', x, y, life: isOver ? 0.9 : 0.65, maxLife: isOver ? 0.9 : 0.65, scale: isOver ? 1.5 : 1.1, seed: rand(0, TAU) });
    const pn = perfLevel >= 2 ? (isOver ? 6 : 3) : perfLevel === 1 ? (isOver ? 12 : 7) : (isOver ? 22 : 12);
    for (let q = 0; q < pn; q++) { const a = rand(0, TAU), s = rand(60, isOver ? 320 : 220); addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.25, 0.6), rand(1.6, isOver ? 4.6 : 3.4), q % 3 === 0 ? '#eafaff' : (q % 3 === 1 ? '#9a6bff' : '#5a30b4'), true); }
    if (audio.ncDashHit) audio.ncDashHit();
  }

  // 浮游炮阵列主更新
  function updateNightCoffin(dt) {
    if (!ncActive()) { if (ncDrones.length) { ncDrones.length = 0; ncFx.length = 0; } return; }
    if (ncDrones.length === 0) syncNcDrones();
    if (ncState.switchCd > 0) ncState.switchCd -= dt;
    if (ncState.switchT > 0) ncState.switchT -= dt;
    if (ncState.summonT > 0) ncState.summonT -= dt;
    const over = ncOver();
    const firing = ncFiring();
    // 暴走进入：浮游炮核心超载，轻闪 + 屏震 + 充能音（上升沿一次）
    const enteredOver = over && !ncState._wasOver;
    if (enteredOver) { setFlash && setFlash(0.08, '150,90,255'); screenShake = Math.max(screenShake, 3); if (audio.ncSwitch) audio.ncSwitch(); for (const d of ncDrones) d.coreT += 0.5; }
    ncState._wasOver = over;

    // 游荡中心：朝最近敌群缓慢漂移；无敌人时在上半场自由游荡（反弹）
    const cluster = firing ? ncSelectCluster() : null;
    if (enteredOver && ncState.mode === 'dash' && cluster) {
      for (let i = 0; i < ncDrones.length; i++) {
        const d = ncDrones[i];
        d.state = 'cruise';
        d.dashCd = i * 0.025;
        d.angle = Math.atan2(cluster.y - d.y, cluster.x - d.x) + rand(-0.22, 0.22);
      }
    }
    if (cluster) { ncState.swarmX += (cluster.x - ncState.swarmX) * Math.min(1, dt * 1.6); ncState.swarmY += (cluster.y - ncState.swarmY) * Math.min(1, dt * 1.6); }
    else {
      ncState.swarmX += ncState.swarmVX * dt; ncState.swarmY += ncState.swarmVY * dt;
      if (ncState.swarmX < 90 || ncState.swarmX > W - 90) ncState.swarmVX *= -1;
      if (ncState.swarmY < 110 || ncState.swarmY > H * 0.62) ncState.swarmVY *= -1;
      ncState.swarmX = clamp(ncState.swarmX, 90, W - 90); ncState.swarmY = clamp(ncState.swarmY, 110, H * 0.62);
    }

    // 激光目标维护 + 阵列旋转/换角推进
    if (ncState.mode === 'laser') {
      if (!ncState.target || (ncState.target === boss ? (boss && boss.dead) : !ncIsValidEnemy(ncState.target))) {
        ncState.target = ncSelectLaserTarget();
      }
      // 整体持续旋转（多角度不断变化），暴走更快
      ncState.laserSpin += dt * (over ? NC.laserSpinOver : NC.laserSpin);
      // 周期重新随机各炮角度/半径（不断切换对列），暴走更频繁
      ncState.laserReshuffleT -= dt;
      if (ncState.laserReshuffleT <= 0) { ncAdvanceLaserFormation(false); if (audio.ncSwitch) audio.ncSwitch(); }
    }

    const dashSpeed = over ? NC.dashSpeedOver : NC.dashSpeed;

    for (const d of ncDrones) {
      d.coreT += dt;
      if (d.muzzleFlash > 0) d.muzzleFlash -= dt;
      // 历史轨迹（手机降点数）
      d.history.unshift({ x: d.x, y: d.y });
      const maxH = perfLevel >= 2 ? (over ? 9 : 6) : perfLevel === 1 ? (over ? 13 : 8) : (over ? 18 : NC.maxHistory);
      if (d.history.length > maxH) d.history.length = maxH;

      if (ncState.mode === 'laser') {
        // —— 激光阵列：飞向环绕槽位、瞄准、开火 ——
        const t = ncState.target;
        if (t) {
          const slot = ncFormationSlot(t.x, t.y, d.index, NC.count);
          d.slotX = slot.x; d.slotY = slot.y;
          const formFollow = over ? NC.formationFollowOver : NC.formationFollow;
          d.x += (slot.x - d.x) * Math.min(1, dt * formFollow);
          d.y += (slot.y - d.y) * Math.min(1, dt * formFollow);
          const kept = ncKeepFormationDistance(t.x, t.y, d.x, d.y);
          d.x = kept.x; d.y = kept.y;
          d.angle = Math.atan2(t.y - d.y, t.x - d.x);
          if (firing && ncState.switchT <= 0) {
            if (audio.ncLaserLoop) audio.ncLaserLoop();
            d.fireT -= dt;
            const tick = over ? NC.laserTickOver : NC.laserTick;
            if (d.fireT <= 0) {
              d.fireT = tick;
              ncDamage(t, ncLaserDmg() * (over ? 2.0 : 1.0) * berserkDmg());
              d.muzzleFlash = 0.08;
              if (audio.ncLaserHit) audio.ncLaserHit();
              // 命中点跳动粒子
              if (perfLevel < 2 && Math.random() < (over ? 0.9 : 0.6)) { const a = rand(0, TAU), s = rand(40, 160); addParticle(t.x, t.y, Math.cos(a) * s, Math.sin(a) * s, rand(0.15, 0.4), rand(1.4, over ? 4 : 2.8), Math.random() < 0.5 ? '#eafaff' : '#a86bff', true); }
            }
          }
        } else {
          // 无目标：松散环绕游荡中心
          const ca = d.index / NC.count * TAU + time * 0.6;
          d.slotX = ncState.swarmX + Math.cos(ca) * 64; d.slotY = ncState.swarmY + Math.sin(ca) * 64;
          d.x += (d.slotX - d.x) * Math.min(1, dt * 4); d.y += (d.slotY - d.y) * Math.min(1, dt * 4);
          d.angle = ca + Math.PI / 2;
        }
        d.vx = 0; d.vy = 0;
      } else {
        // —— 群体冲撞 ——
        if (d.state === 'dash') {
          // 加速到冲撞速度，沿当前角度高速穿梭
          const tvx = Math.cos(d.angle) * dashSpeed, tvy = Math.sin(d.angle) * dashSpeed;
          d.vx += (tvx - d.vx) * Math.min(1, dt * (over ? 15 : 8)); d.vy += (tvy - d.vy) * Math.min(1, dt * (over ? 15 : 8));
          d.x += d.vx * dt; d.y += d.vy * dt;
          ncDashHits(d, over);
          // 沿途暗紫外焰 / 蓝白碎星粒子（速度感）
          if (perfLevel < 2 && Math.random() < (over ? 0.95 : 0.6)) {
            const back = rand(4, 20), spread = rand(-26, 26);
            const bx = d.x - Math.cos(d.angle) * back, by = d.y - Math.sin(d.angle) * back;
            const r = Math.random();
            const col = r < 0.5 ? '#6a2ce0' : (r < 0.8 ? '#3a1e7a' : '#cfe8ff');
            addParticle(bx + Math.sin(d.angle) * spread, by - Math.cos(d.angle) * spread,
              -Math.cos(d.angle) * rand(30, 110) + rand(-40, 40), -Math.sin(d.angle) * rand(30, 110) + rand(-40, 40),
              rand(0.22, over ? 0.6 : 0.45), rand(1.4, over ? 4.2 : 2.8), col, true);
          }
          d.dashT -= dt;
          const outB = d.x < -40 || d.x > W + 40 || d.y < -40 || d.y > H + 40;
          if (d.dashT <= 0 || outB) {
            const cl = (!outB && firing) ? (cluster || ncSelectCluster()) : null;
            if (cl && Math.random() < (over ? NC.chainDashOver : NC.chainDash)) {
              // 锐角变向，继续穿梭（朝敌群方向但带大角度偏折 → 折线穿插）
              const toCl = Math.atan2(cl.y - d.y, cl.x - d.x);
              const turn = rand(NC.chainTurn[0], NC.chainTurn[1]) * (Math.random() < 0.5 ? -1 : 1);
              d.angle = toCl + turn * 0.45 + rand(-0.18, 0.18);
              const seg = over ? NC.dashSegOver : NC.dashSeg;
              d.dashT = rand(seg[0], seg[1]);
              if (audio.ncDash) audio.ncDash();
            } else {
              const cd = over ? NC.dashCdOver : NC.dashCd;
              d.state = 'cruise'; d.dashCd = rand(cd[0], cd[1]);
            }
          }
        } else {
          // 巡航：松散环绕游荡中心；冷却结束且有目标则发起冲撞
          const ca = d.index / NC.count * TAU + time * 0.7;
          const sx = ncState.swarmX + Math.cos(ca) * 70, sy = ncState.swarmY + Math.sin(ca) * 70;
          const ax = (sx - d.x), ay = (sy - d.y);
          const tvx = ax * 3.2, tvy = ay * 3.2;
          const cruiseSpeed = over ? NC.cruiseSpeedOver : NC.cruiseSpeed;
          d.vx += (clamp(tvx, -cruiseSpeed, cruiseSpeed) - d.vx) * Math.min(1, dt * (over ? 8 : 5));
          d.vy += (clamp(tvy, -cruiseSpeed, cruiseSpeed) - d.vy) * Math.min(1, dt * (over ? 8 : 5));
          d.x += d.vx * dt; d.y += d.vy * dt;
          if (Math.abs(d.vx) + Math.abs(d.vy) > 1) d.angle = Math.atan2(d.vy, d.vx);
          d.dashCd -= dt;
          if (firing && ncState.switchT <= 0 && d.dashCd <= 0 && ncState.summonT <= 0) {
            const cl = cluster || ncSelectCluster();
            if (cl) {
              const spread = rand(-0.32, 0.32);
              d.angle = Math.atan2(cl.y - d.y, cl.x - d.x) + spread;
              d.state = 'dash';
              const seg = over ? NC.dashSegOver : NC.dashSeg;
              d.dashT = rand(seg[0], seg[1]);
              if (audio.ncDash) audio.ncDash();
            } else { d.dashCd = rand(0.2, 0.5); }
          }
        }
      }
    }

    // 特效推进
    for (let i = ncFx.length - 1; i >= 0; i--) { const f = ncFx[i]; f.life -= dt; if (f.life <= 0) ncFx.splice(i, 1); }
    // 手机端：限制同时存在的特效数量（优先丢弃最老的减速残留/暗雾），防止累积掉帧
    const fxCap = perfLevel >= 2 ? 16 : perfLevel === 1 ? 32 : 64;
    if (ncFx.length > fxCap) ncFx.splice(0, ncFx.length - fxCap);
  }

  // —— 渲染：拖尾（history 动态曲线）→ 本体多层 → 激光多层 → 命中特效 ——
  function ncTrailLayer(pts, baseW, color, fade = 1) {
    ctx.strokeStyle = color;
    for (let i = 0; i < pts.length - 1; i++) {
      const p1 = pts[i], p2 = pts[i + 1];
      const t = 1 - i / pts.length;
      ctx.globalAlpha = t * t * fade;
      ctx.lineWidth = baseW * t;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.quadraticCurveTo(p1.x, p1.y, (p1.x + p2.x) * 0.5, (p1.y + p2.y) * 0.5);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  function drawNcDashTrail(d, over) {
    if (d.history.length < 2) return;
    const speed = Math.hypot(d.vx, d.vy);
    // 始终有尾：慢速→短淡尾，高速→长亮尾（不再硬截断，杜绝"几枚没光效"）
    const sFade = clamp((speed - 14) / 200, 0.22, 1);
    const mul = over ? 1.6 : 1.0;
    // 暗背雾（source-over 压暗一层，制造"黑紫外焰"被照亮的反差），手机端跳过
    if (perfLevel < 1 && speed > 80) {
      ctx.save(); ctx.globalCompositeOperation = 'source-over'; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ncTrailLayer(d.history, 56 * mul, 'rgba(12,0,26,0.5)', sFade);
      ctx.restore();
    }
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (perfLevel < 2) ncTrailLayer(d.history, 46 * mul, 'rgba(40,4,80,0.26)', sFade);   // 外层暗紫雾
    ncTrailLayer(d.history, 30 * mul, 'rgba(96,34,190,0.36)', sFade);                    // 紫色主尾流
    ncTrailLayer(d.history, 16 * mul, 'rgba(64,180,255,0.46)', sFade);                   // 蓝紫
    ncTrailLayer(d.history, 5 * mul, 'rgba(240,255,255,0.96)', sFade);                   // 白蓝核心流线
    ctx.restore();
    // 本体残影辉光（沿历史轨迹几个采样点，营造高速拖影）
    if (perfLevel < 2 && d.history.length > 4) {
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      for (let i = 2; i < d.history.length; i += 3) {
        const p = d.history[i], a = (1 - i / d.history.length) * 0.5 * sFade;
        if (a <= 0.02) continue;
        ctx.globalAlpha = a;
        const rr = (over ? 16 : 12) * (1 - i / d.history.length);
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rr);
        g.addColorStop(0, 'rgba(180,150,255,0.9)'); g.addColorStop(1, 'rgba(60,20,120,0)');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, rr, 0, TAU); ctx.fill();
      }
      ctx.globalAlpha = 1; ctx.restore();
    }
  }
  function drawNcDrone(d, over) {
    const x = d.x, y = d.y, pulse = 0.5 + Math.sin(d.coreT * 3.2) * 0.5;
    ctx.save();
    ctx.translate(x, y);
    // Layer0/1 背后暗紫柔光
    ctx.globalCompositeOperation = 'lighter';
    if (perfLevel < 2) {
      ctx.globalAlpha = 0.5;
      const bg = ctx.createRadialGradient(0, 0, 0, 0, 0, over ? 40 : 30);
      bg.addColorStop(0, over ? 'rgba(150,80,255,0.55)' : 'rgba(90,60,200,0.4)');
      bg.addColorStop(0.6, 'rgba(60,20,120,0.18)');
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(0, 0, over ? 40 : 30, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // Layer2 本体（统一外观，按角度旋转；贴图前端=蓝水晶朝下，故 -PI/2 对齐 angle）
    const bodyKey = assetReady('ncBody') ? 'ncBody' : null;
    let bodyH = over ? 54 : 46;
    if (bodyKey) {
      const img = assets.ncBody;
      const bw = bodyH * (img.width / img.height);
      ctx.save();
      ctx.rotate(d.angle - Math.PI / 2);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.drawImage(img, -bw / 2, -bodyH / 2, bw, bodyH);

      ctx.save(); ctx.rotate(d.angle - Math.PI / 2);
      ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = '#2a2050';
      ctx.beginPath(); ctx.moveTo(0, -bodyH / 2); ctx.lineTo(bodyH * 0.28, 0); ctx.lineTo(0, bodyH / 2); ctx.lineTo(-bodyH * 0.28, 0); ctx.closePath(); ctx.fill();

    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.6 + pulse * 0.4;
    const cr = (over ? 11 : 7) + pulse * 3;
    const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, cr);
    cg.addColorStop(0, 'rgba(245,252,255,1)');
    cg.addColorStop(0.4, over ? 'rgba(150,120,255,0.9)' : 'rgba(110,170,255,0.8)');
    cg.addColorStop(1, 'rgba(60,30,140,0)');
    ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(0, 0, cr, 0, TAU); ctx.fill();
    // Layer5 暴走 overlay：外缘暗紫火焰 + 电弧

      og.addColorStop(0, 'rgba(170,90,255,0.5)'); og.addColorStop(1, 'rgba(90,30,200,0)');
      ctx.fillStyle = og; ctx.beginPath(); ctx.arc(0, 0, bodyH * 0.62, 0, TAU); ctx.fill();
      // 机体周围小型电弧

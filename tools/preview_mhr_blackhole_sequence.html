<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mother Hive Black-Hole Sequence Preview</title>
  <style>
    html, body { margin: 0; height: 100%; background: #080511; color: #fff4fb; font: 14px system-ui, -apple-system, sans-serif; }
    body { display: grid; grid-template-rows: auto 1fr; }
    .bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 10px 12px; background: rgba(20, 10, 28, .92); border-bottom: 1px solid rgba(255, 190, 235, .24); }
    button, select, input { accent-color: #ff9fe3; }
    button { border: 1px solid rgba(255, 210, 245, .35); color: #fff7fc; background: rgba(255, 130, 220, .12); border-radius: 8px; padding: 7px 10px; }
    label { display: inline-flex; gap: 5px; align-items: center; }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; }
  </style>
</head>
<body>
  <div class="bar">
    <button id="play">暂停</button>
    <button id="step">单帧</button>
    <label>阶段
      <select id="phase">
        <option value="deploy">deploy</option>
        <option value="loop" selected>loop</option>
        <option value="overload">overload</option>
        <option value="collapse">collapse</option>
      </select>
    </label>
    <label>FPS <input id="fps" type="range" min="8" max="36" value="24"></label>
    <label>透明度 <input id="alpha" type="range" min="20" max="100" value="88"></label>
    <label>缩放 <input id="scale" type="range" min="60" max="135" value="105"></label>
    <label><input id="gamebg" type="checkbox" checked> 游戏背景</label>
  </div>
  <canvas id="c" width="960" height="1280"></canvas>
  <script>
  const counts = { deploy: 16, loop: 32, overload: 16, collapse: 12 };
  const base = '../assets/companions/mother_hive_ring/ultimate_link/blackhole_sequence';
  const frames = {};
  for (const [phase, count] of Object.entries(counts)) {
    frames[phase] = Array.from({ length: count }, (_, i) => {
      const img = new Image();
      img.src = `${base}/${phase}/bh_${phase}_${String(i).padStart(3, '0')}.png`;
      return img;
    });
  }
  const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
  const playBtn = document.getElementById('play'), phaseEl = document.getElementById('phase');
  const fpsEl = document.getElementById('fps'), alphaEl = document.getElementById('alpha'), scaleEl = document.getElementById('scale'), bgEl = document.getElementById('gamebg');
  let playing = true, t = 0, last = performance.now();
  playBtn.onclick = () => { playing = !playing; playBtn.textContent = playing ? '暂停' : '播放'; };
  document.getElementById('step').onclick = () => { playing = false; playBtn.textContent = '播放'; t += 1 / Number(fpsEl.value); };
  function drawBg() {
    const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
    g.addColorStop(0, '#0b1018'); g.addColorStop(.55, '#111422'); g.addColorStop(1, '#07040c');
    ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (!bgEl.checked) return;
    ctx.globalAlpha = .22;
    for (let i = 0; i < 90; i++) {
      const x = (i * 97) % canvas.width, y = (i * 173) % canvas.height;
      ctx.fillStyle = i % 3 ? '#fff0f8' : '#d1ffd9';
      ctx.beginPath(); ctx.arc(x, y, 1 + (i % 5) * .45, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  function frameIndex(phase, time) {
    const fps = Number(fpsEl.value), count = counts[phase];
    if (phase === 'loop') return Math.floor(time * fps) % count;
    return Math.min(count - 1, Math.floor((time * fps) % count));
  }
  function tick(now) {
    const dt = Math.min(.05, (now - last) / 1000); last = now;
    if (playing) t += dt;
    const phase = phaseEl.value, img = frames[phase][frameIndex(phase, t)];
    drawBg();
    const s = Number(scaleEl.value) / 100;
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height * .48);
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = Number(alphaEl.value) / 100;
    const w = 760 * s, h = 760 * s;
    if (img && img.complete) ctx.drawImage(img, -w / 2, -h / 2, w, h);
    ctx.restore();
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  </script>
</body>
</html>
